role: weaver
verdict: fail
findings_count: 4
findings:
  - file: calc.py
    line: 4
    severity: high
    category: correctness
    description: >
      Divisor is `len(numbers) - 1` instead of `len(numbers)`. This produces a
      wrong result for every non-trivial input. For example, average([2, 4])
      returns 6.0 instead of the correct 3.0. The inline comment even
      acknowledges the bug ("BUG: off-by-one, should be len(numbers)"), meaning
      a known-broken implementation was submitted unchanged.

  - file: calc.py
    line: 4
    severity: high
    category: edge-case
    description: >
      When `numbers` contains exactly one element, `len(numbers) - 1` evaluates
      to 0, causing an unhandled ZeroDivisionError at runtime. A single-element
      list is a perfectly valid input for an average function and must not crash.

  - file: calc.py
    line: 4
    severity: medium
    category: edge-case
    description: >
      When `numbers` is an empty list, `sum([])` is 0 and `len([]) - 1` is -1,
      so the function silently returns -0.0 instead of raising a meaningful
      error. Callers have no way to distinguish this from a legitimate result.
      The function should guard against an empty list and raise a ValueError
      (or similar) with a descriptive message.

  - file: calc.py
    line: 4
    severity: low
    category: style
    description: >
      A "BUG:" annotation was left in the committed source. Bug markers are
      acceptable during development but must not appear in submitted code;
      they indicate the change was never finished or reviewed before
      submission.

summary: >
  The `average` function contains a confirmed off-by-one error in its divisor
  (`len(numbers) - 1` instead of `len(numbers)`), which produces incorrect
  results for all inputs with more than one element, raises an unhandled
  ZeroDivisionError for single-element lists, and silently returns -0.0 for
  empty lists. The bug is even self-documented via an inline comment, meaning it
  was knowingly left in. The `clamp` function is logically correct and raises no
  concerns. The change must be rejected and the `average` implementation fixed
  before it can be merged.
