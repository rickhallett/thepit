role: watchdog
verdict: fail
defects_found: 1
defects:
  - file: calc.py
    line: 4
    severity: high
    description: >
      Off-by-one error in average(): the denominator is (len(numbers) - 1)
      instead of len(numbers). This produces incorrect results for any input
      with 2+ elements (e.g. average([1,2,3]) returns 3.0 instead of 2.0),
      and raises ZeroDivisionError for a single-element list (len - 1 = 0).
      The fix is simply: return total / len(numbers)
test_results:
  total: 14
  passed: 8
  failed: 6
summary: >
  The diff introduces two functions: average() and clamp(). The clamp()
  function is implemented correctly and passes all 7 tests covering values
  below, within, and above the [low, high] range including boundary and
  float cases. However, average() contains a clear off-by-one bug: it
  divides the sum by (len(numbers) - 1) instead of len(numbers). This
  causes every multi-element average to be inflated (e.g. average([4,6])
  returns 10.0 instead of 5.0) and causes a ZeroDivisionError for
  single-element lists. Six of seven average tests fail, confirming the
  defect. The comment in the source code itself acknowledges the bug
  ("# BUG: off-by-one"). The change must not be merged in its current
  state; the denominator must be corrected to len(numbers).
