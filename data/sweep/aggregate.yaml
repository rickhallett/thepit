      from hallucination because the system was actually built—it just hasn''t been verified.

      '
    distinct_from: '"right-answer-wrong-work" (tests that pass for the wrong reason). Aspirational-capability-claim is about
      claims made without tests at all, not tests that verify the wrong thing. Also distinct from "epistemic-theatre" (which
      performs significance without substance); this pattern claims functional capabilities specifically.

