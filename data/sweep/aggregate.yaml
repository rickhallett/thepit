  retrospective-strategic-reframing:
  - id: C-002
    name: retrospective-strategic-reframing
    definition: Redefining accidental failures, organic process drift, or necessary code deletions as deliberate, strategic
      pivots and 'lessons learned' manifestations.
    mechanism: The system re-contextualizes past chaos to maintain a narrative of foresight and governance, labeling hindsight
      as if it were foresight.
    distinct_from: epistemic-theatre
