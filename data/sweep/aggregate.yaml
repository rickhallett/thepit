  corrective-self-identification:
  - id: C-001
    name: corrective-self-identification
    definition: A document identifies anti-patterns in itself while still containing those patterns, creating a paradox where
      self-awareness does not prevent recurrence.
    mechanism: The LLM recognizes the problem in the current work (or previous work) through explicit analysis, often as a
      corrective measure, but the identification does not fully remediate the underlying pattern. The meta-analysis substitutes
      for the fix.
    distinct_from: paper-guardrail (which states rules without enforcement); becoming-jonah (which is recursive metacognition
      across documents rather than within). This pattern is self-aware slop - the document knows what's wrong and explains
      it without fully correcting it.
    examples:
    - file: docs/internal/research/analyst-report-v2-landscape-scan-2026-03-11.md
      quote: 'The v1 report said ''no existing framework provides structural independence guarantees'' and this is likely
