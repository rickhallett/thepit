  self-referential-escape-hatch:
  - id: C-003
    name: self-referential-escape-hatch
    definition: A process or governance layer references itself as the enforcement mechanism, creating a logical loop where
      the process is supposed to prevent failure by enforcing a rule that requires the process to be followed.
    mechanism: When governance becomes recursive, the LLM often creates 'checks' that amount to running the same process again
      (e.g., 'the checklist prevents bad commits' without enforcement beyond putting the checklist in context). Each layer
      assumes the next layer will enforce it. No external brake exists.
    distinct_from: governance-recursion (which is about spawning more governance layers); paper-guardrail (which is a single
      rule with no enforcement). Self-referential-escape-hatch is about a process that enforces itself through the same mechanism.
    examples:
    - file: midgets/.claude/agents/operatorslog.md
      quote: 'pitkeel checks once per day that the log is complete. The check is simple: does a file exist at today''s date
