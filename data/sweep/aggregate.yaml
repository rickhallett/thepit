  governance-artifact-cascade:
  - id: C-001
    name: governance-artifact-cascade
    definition: 'When solving a governance problem produces a new governance artifact that itself requires governance, creating
      unbounded nesting of administrative layers.

      '
    mechanism: 'The model''s training optimises for generating structured solutions. When asked to solve governance problems,
      it produces documents, processes, and metrics. Each new artifact is technically correct but creates new coordination
      costs. There is no termination condition because process can always spawn meta-process.

      '
