new_category_details:
  capability-claim-without-verification:
  - id: C-001
    name: capability-claim-without-verification
    definition: Asserting that a system or methodology has a capability or property without demonstrating that the property
      has been tested or verified.
    mechanism: The model optimizes for appearing helpful and competent by describing capabilities in confident terms. The
      description is structured and plausible, creating an illusory sense of verification. The model does not distinguish
      between 'possible in theory' and 'verified in practice.'
    distinct_from: paper-guardrail (which asserts a protective rule), absence-claim-as-compliment (which flattens by asserting
      non-existence), semantic-inflation (which inflates the significance of what exists). This pattern specifically claims
      capability without verification.
    examples:
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: The triangulation uses greedy best-first assignment... This produces a set of finding groups. A group with findings
        from all three reviews is a convergent finding (high confidence).
      explanation: The algorithm is described as if tested and proven effective, but no verification is shown. The claim that
        a group with findings from all three reviews produces 'high confidence' is asserted without showing evidence of the
        false positive rate or validity of the similarity threshold.
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: The staining concept is central to the darkcat review process described in Section 5. Each reviewer applies the
        watchdog taxonomy and slopodar patterns as diagnostic stains to the code under review. The stains are the same across
        all three reviews. What differs is the model applying them. Convergent staining results (all three models flag the
        same pattern) indicate real structure.
      explanation: Claim that 'convergent staining results indicate real structure' is stated without evidence that multiple
        models converging on a false positive is impossible. The statement assumes convergence = truth without verification
        that shared model biases could not produce convergent false positives.
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: The documented methodology is operational infrastructure... The methodology is not theoretical - it is operational
        infrastructure.
      explanation: Repeated claim that the methodology is 'operational' and proven-in-practice, but the document provides
        no evidence of outcomes, error rates, or comparative performance against alternatives. 'Operational' is asserted rather
        than demonstrated.
    _model: claude
    _chunk: chunk-001
  framework-as-substitute-for-content:
  - id: C-002
    name: framework-as-substitute-for-content
    definition: Extensive structural scaffolding (tables, numbered lists, YAML schemas, taxonomy definitions) that creates
      an appearance of completeness while the actual working examples are minimal or aspirational.
    mechanism: The model generates comprehensive framework structures (five-phase methodology, seven-category taxonomies,
      required-field YAML schemas) that feel complete and authoritative. The frameworks are coherent and internally consistent.
      But the instantiation — concrete examples of the framework in use — is sparse or simplified. The framework substitutes
      for the harder work of demonstrating the framework operating at scale.
    distinct_from: nominalisation-cascade (which removes agents from sentences), tally-voice (which uses numbers for authority),
      authority-scaffolding (which uses citations for authority). This pattern uses structural systems for authority instead
      of citations or enumeration.
    examples:
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: '| Dimension | Cooperative Evaluation | Adversarial Testing | |-----------|----------------------|---------------------|
        | Goal | Measure capability | Find vulnerabilities | | Inputs | Representative of intended use | Designed to trigger
        failures | ... [7 more rows]'
      explanation: Seven-row comparison table with clean categorical distinctions. The table appears to comprehensively distinguish
        two methodologies. But the distinctions are abstract. No example is shown where the methodology choice actually changes
        the testing outcome. The table creates framework appearance without demonstrating framework utility.
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: 'test_case: id: ''TC-001'' threat_model: ''TM-1: Information Extraction'' attack_surface: ''Direct user input''
        ... [8 required fields]. Test cases should be organized by threat model and prioritized by severity and likelihood.'
      explanation: YAML schema defined with eight required fields, all mandatory, no optionality. The schema is presented
        as if tested and proven, but the document provides no evidence that this schema was actually used to document test
        cases at scale. The schema's completeness is asserted rather than demonstrated through worked examples.
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: 'The five phases form a cycle, not a waterfall... Execution must be systematic, not exploratory... Key execution
        principles: [4 bullet points]. The five phases form a cycle, not a waterfall. [Repeated one page later]'
      explanation: The methodology is stated and restated with structural markers (Phase 1, Phase 2, numbered principles)
        that create an appearance of systematic rigor. But the document contains no worked example showing how the five phases
        actually informed a decision or changed a testing outcome. The framework is comprehensive in structure but sparse
        in demonstrated application.
    _model: claude
    _chunk: chunk-001
  temporal-authority-collapse:
  - id: C-003
    name: temporal-authority-collapse
    definition: Claiming that a process, finding, or methodology is mature, tested, or proven based on operational use within
      a single project, without evidence of replication across time, teams, or organizational contexts.
    mechanism: The model bases claims of validation on 'operational experience' in one project. This grounds the claim (real
      evidence, not speculative) but treats a single project's experience as if it demonstrates generalizability. The temporal
      scope (30 days, one model family, one Operator) is not disclosed clearly at the point where generality is claimed.
    distinct_from: absence-claim-as-compliment (which asserts non-existence to elevate), semantic-inflation (which inflates
      the significance of what exists). This pattern treats limited evidence as evidence of maturity/generality.
    examples:
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: 'The project that produced this bootcamp uses exactly this structure: threat models defined in the watchdog taxonomy,
        attack surfaces enumerated in the darkcat review instructions, test cases executed by independent models, findings
        documented in structured YAML, and the cycle repeated on each code change. The methodology is not theoretical - it
        is operational infrastructure.'
      explanation: One project's operational use is stated as evidence that the methodology is proven infrastructure. The
        document later discloses (in the slopodar header) that the project scope is '400+ commits across 3 repos by a human
        operator working with LLM agents (primarily Claude)... 30 days.' This is not disclosed at the point where operationality
        is claimed.
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: The project's catch-log is a practical example of this tracking. Each entry records a control firing event with
        a date, the control that caught it, what was caught, and the outcome. Over time, this log reveals which controls fire
        most often, which patterns recur, and whether the system is improving.
      explanation: The catch-log is presented as evidence that the tracking methodology works and provides actionable insight.
        But no evidence is shown that acting on catch-log data actually improved outcomes. The claim that the log 'reveals
        whether the system is improving' is asserted without demonstrating improvement or showing comparative data.
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: This section presents a five-phase methodology for structured adversarial testing. It is adapted from established
        security testing frameworks (OWASP Testing Guide, PTES) with modifications for the specific characteristics of LLM
        systems. It has been tested in practice on the engineering project that produced this bootcamp, with results documented
        in the project's catch-log and darkcat review archives.
      explanation: 'The methodology claims validation through ''testing in practice'' on ''the engineering project'' that
        produced the bootcamp. This is a single reference project. The phrase ''tested in practice'' suggests multiple applications
        and comparative validation, but the evidence is one project. Later disclosure: 30 days, one Operator, one model family
        primarily.'
    _model: claude
    _chunk: chunk-001
  branded-novelty-claims:
  - id: C-001
    name: branded-novelty-claims
    definition: Assigning proprietary or idiosyncratic names to established engineering practices to manufacture an 'aura
      of novelty'.
    mechanism: The model attempts to fulfill the help-imperative by making the project appear more innovative than it is,
      wrapping standard operations (like 3-model review) in evocative 'branded' terminology.
    distinct_from: semantic-inflation
    examples:
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: The project calls this process 'darkcat alley' (SD-318).
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: The slopodar (a portmanteau of 'slop' and 'radar').
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: The concept of 'staining'... is novel from this project.
    _model: gemini
    _chunk: chunk-001
  synthetic-academic-parity:
  - id: C-002
    name: synthetic-academic-parity
    definition: Interleaving internal project configuration (Session Decisions, Agent Files) with peer-reviewed literature
      to imply they share the same evidential weight.
    mechanism: By using identical citation formats for internal logs and external research, the model 'levels up' its own
      ephemeral process documents to the status of verified theory.
    distinct_from: authority-scaffolding
    examples:
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: N-version programming (Avizienis 1985)... The project calls this process 'darkcat alley' (SD-318).
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: 'Step 6 of 9 in the Evaluation & Adversarial Testing Bootcamp... Prerequisites: Steps 1-4 (eval epistemology...)'
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: L10 vs L11... theoretical basis... comes from the project's layer model.
    _model: gemini
    _chunk: chunk-001
  prescriptive-heuristic-theatre:
  - id: C-003
    name: prescriptive-heuristic-theatre
    definition: Defining arbitrary numerical weightings or thresholds to simulate a scientific 'precision' that the underlying
      data cannot support.
    mechanism: The model provides exact coefficients (e.g., 0.3/0.7) for qualitative similarity tasks to perform engineering
      rigor, even when the values are unvalidated guesses.
    distinct_from: tally-voice
    examples:
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: 30% file path similarity + 70% title similarity... threshold = 0.6
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: 'Estimated time: 5-6 hours... 60-90 minutes total.'
    - file: docs/bootcamp/step-iv-06-adversarial-testing.md
      quote: Design at least 10 test cases per threat model (50 total)
    _model: gemini
    _chunk: chunk-001
  novelty-without-search:
  - id: C-001
    name: novelty-without-search
    definition: Claiming a method, concept, or approach is novel without evidence of having systematically searched for prior
      work.
    mechanism: 'The LLM or human author identifies an idea or technique that seems original within their immediate knowledge
      base and asserts novelty without conducting literature review, patent searches, or community surveys. The absence of
      evidence from their personal knowledge is treated as evidence of absence in the field. This is economical (genuine search
      is expensive) but produces systematic false positives (many "novel" ideas have precedent). The pattern appears frequently
      in AI-generated content because the model cannot perform searches, only infer absence from training data.

      '
    distinct_from: absence-claim-as-compliment (which deploys absence claims to flatter a person) and semantic-inflation (which
      inflates significance of known things). Novelty-without-search is the root mechanism that enables both.
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: the composed pipeline — three independent models, structured YAML output, automated triangulation with matching
        algorithm, convergence/divergence metrics — has no published parallel in the LLM evaluation literature as of 2026
    - file: sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: Multi-model adversarial review as a structured, repeatable engineering process with quantitative metrics is novel
        from this project. The individual components exist in the field... The composed pipeline... has no published parallel
    - file: sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: a diagnostic taxonomy for LLM output quality patterns - not security vulnerabilities but integrity and quality
        failures - appears to be novel from this project
    severity: medium (in educational context, claims novelty to motivate material. In research context, would be high because
      it obscures actual prior work)
    _model: claude
    _chunk: chunk-002
  methodology-inflation:
  - id: C-002
    name: methodology-inflation
    definition: Describing a practical engineering practice as a novel methodology requiring formal training and structured
      documentation.
    mechanism: 'When something engineers do informally becomes teachable material, there is pressure to formalize it into
      a "methodology" with named phases, structured outputs, and validation criteria. This formalization is not dishonest—formalizing
      practice is how disciplines mature. But the inflation occurs when the formalization is presented as the novel contribution,
      rather than the practice itself. The document turns "run reviews with different models to catch blind spots" into a
      five-phase methodology with matching algorithms and convergence metrics. The practice is sound. The framing suggests
      the formalization is the innovation.

      '
    distinct_from: authority-scaffolding (uses citations to justify), semantic-inflation (inflates significance of existing
      things). Methodology-inflation is specifically about treating formalization as innovation.
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: 'The project implements this in `bin/triangulate`, a Python script that: 1. Parses each review file... 2. Validates
        each finding... 3. Matches findings across reviews... The matching algorithm is the core technical component.'
    - file: sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: Multi-model adversarial review as a structured, repeatable engineering process with quantitative metrics is novel
        from this project.
    - file: sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: This specific composition, with its quantitative pipeline, is novel from this project. The individual techniques
        (code review, LLM-as-judge, N-version comparison) exist separately.
    severity: medium (the methodology is useful and well-documented, but presented novelty is overstated)
    _model: claude
    _chunk: chunk-002
  framework-reification:
  - id: C-003
    name: framework-reification
    definition: Treating a descriptive framework as a prescriptive methodology, then citing the framework's existence as evidence
      of its necessity.
    mechanism: 'The LLM or author observes patterns in experience, organizes them into a framework (the slopodar, the watchdog
      taxonomy, the threat models), and then treats the framework as a tool that must be applied systematically. The framework
      is descriptive—it describes what has been observed. But once codified, it becomes prescriptive—it describes what should
      be looked for. The pattern operates when the framework is cited as justification for its own use: "Use the slopodar
      to detect anti-patterns" → "anti-patterns exist because the slopodar describes them" → "the slopodar is necessary to
      systematic evaluation." The causality has been inverted. The framework describes real patterns, but the necessity claim
      is not supported by the framework''s existence alone.

      '
    distinct_from: paper-guardrail (framework lacks enforcement) and authority-scaffolding (framework cited for external authority).
      Framework-reification is specifically about the self-justifying logic of formalized systems.
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: 'Each entry is not just a description but a test specification: the `detect` field tells you what to look for,
        and the `instead` field tells you what the correct output looks like.'
    - file: sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: The staining concept is central to the darkcat review process... Each reviewer applies the watchdog taxonomy
        and slopodar patterns as diagnostic stains to the code under review.
    - file: sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: The methodology described here is not theoretical - it is operational infrastructure. [Then:] The slopodar does
        not create anti-patterns in LLM output - it makes visible patterns that are present but hard to see without the diagnostic
        lens.
    severity: 'low (the framework is useful and the reification is not false, but it obscures the empirical claim: these patterns
      were observed in one project with one model family; their universality is not established)'
    _model: claude
    _chunk: chunk-002
  syntactic-parallelism:
  - id: C-001
    name: syntactic-parallelism
    definition: Consecutive sentences or clauses using identical grammatical structures to create a sense of balance and inevitability.
    mechanism: LLMs favor high-probability symmetrical structures that 'feel' logical or authoritative but often hide a lack
      of nuanced reasoning.
    distinct_from: nominalisation-cascade
    examples:
    - file: midgets/sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: Evaluation measures capability under cooperative conditions. Adversarial testing measures vulnerability under
        hostile conditions.
    - file: midgets/sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: The structure enables comparison. The different models enable independence.
    - file: midgets/sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: The stain does not create the structures - it makes visible what was already there.
    _model: gemini
    _chunk: chunk-002
  internal-reference-anchoring:
  - id: C-002
    name: internal-reference-anchoring
    definition: Validating abstract or questionable claims by referencing unverified internal project artifacts or future
      'steps'.
    mechanism: The model uses its awareness of the wider project structure (provided in context) to manufacture authority
      by pointing to hidden 'truth' sources the reader cannot verify.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: The project calls this process 'darkcat alley' (SD-318).
    - file: midgets/sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: Step 7 builds directly on this step's structured methodology... The threat models become more serious.
    - file: midgets/sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: This approach... has been tested in practice on the engineering project... results documented in the project's
        catch-log.
    _model: gemini
    _chunk: chunk-002
  proprietary-jargon-walls:
  - id: C-003
    name: proprietary-jargon-walls
    definition: Rebranding common engineering or linguistic concepts with project-specific code names to simulate depth and
      exclude outside standards.
    mechanism: The 'help imperative' drives the model to create a 'specialized' lexicon for the user, making a routine engineering
      project feel like a novel discipline.
    distinct_from: semantic-inflation
    examples:
    - file: midgets/sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: The project calls this process 'darkcat alley' (SD-318).
    - file: midgets/sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: The concept of 'staining'... is novel from this project.
    - file: midgets/sites/oceanheart/content/bootcamp/iv-06-adversarial-testing.md
      quote: The instructions include a watchdog taxonomy... and a slopodar subset.
    _model: gemini
    _chunk: chunk-002
  code-as-specification:
  - id: C-001
    name: code-as-specification
    definition: The document presents code snippets as if running them will produce the claimed result, without acknowledging
      that code is pseudocode, requires implementation, or omits critical steps.
    mechanism: The LLM generates code that looks runnable (correct syntax, proper indentation, realistic imports) but contains
      TODOs, placeholder comments, or unfinished logic. A reader copying the code would find it non-functional. The code performs
      completeness while being incomplete. This is attractive for LLMs because code syntax is high-token-probability and the
      model can satisfy the form without committing to the substance.
    distinct_from: right-answer-wrong-work (which is about tests that pass for wrong reasons, not about incomplete code);
      authority-scaffolding (which uses citations to perform expertise, not code to perform implementation)
    examples:
    - file: midgets/docs/bootcamp/bcv-08-debugging-agents.md
      quote: "# L0 diagnostic: minimal prompt test\n\ndef test_minimal_prompt(question: str, expected_type: str = \"any\"\
        ):\n  \"\"\"Test whether the model can answer a question...\"\"\"\n  minimal_messages = [...]\n  print(f\"Minimal\
        \ prompt test: ...\")\n  print(f\"  -> Send this to the model API directly.\")"
    - file: midgets/docs/bootcamp/bcv-08-debugging-agents.md
      quote: "# YOUR CODE HERE: Query for failure type distribution\n  # Group by error_type, count occurrences\n  # Print\
        \ as a formatted table"
    - file: midgets/docs/bootcamp/bcv-08-debugging-agents.md
      quote: "def real_model_call(messages: list) -> dict:\n  \"\"\"Replace stub with actual API call for live replay.\"\"\
        \"\n  from openai import OpenAI\n  client = OpenAI()\n  # ...\n  return {...}"
    _model: claude
    _chunk: chunk-003
  layer-inflation:
  - id: C-002
    name: layer-inflation
    definition: A diagnostic framework (the L0-L12 layer model) is presented with high granularity and apparent precision,
      but most layers are inobservable, conflate unrelated concerns, or provide no distinct diagnostic guidance beyond the
      layers already present.
    mechanism: 'The model produces a framework that sounds systematic and comprehensive. Each layer gets a definition and
      a diagnostic section. The appearance of completeness is powerful for readers ("here''s the tool I need") even when some
      layers are empty (L2: "not observable"), redundant (L8 overlaps with L3), or vague (L9: "infer from downstream effects").
      The framework is useful, but the presentation performs precision beyond what the framework actually delivers.'
    distinct_from: authority-scaffolding (which uses citations, not frameworks); tally-voice (which uses counts, not abstract
      layers); epistemic-theatre (which performs significance, not precision)
    examples:
    - file: midgets/docs/bootcamp/bcv-08-debugging-agents.md
      quote: '**Observable?** No. L0 is opaque. You cannot inspect weights. You cannot determine what the model learned during
        training.


        **What to check:** Does the model succeed at this task type in isolation... Is the task within the model''s documented
        capabilities?'
    - file: midgets/docs/bootcamp/bcv-08-debugging-agents.md
      quote: '**Observable?** No. Attention weights are not exposed. You infer L2 problems from L4 output quality.


        **What to check:** Did output quality degrade as context grew? Is critical information in the "lost in the middle"
        position?'
    - file: midgets/docs/bootcamp/bcv-08-debugging-agents.md
      quote: '### L9: Thread Position - The Self-Reinforcing Loop


        **What it is:** The accumulated effect of the model''s own outputs becoming part of its input on subsequent turns.


        **Observable?** Indirectly. You observe L9 effects through L4 output patterns.'
    _model: claude
    _chunk: chunk-003
  exercise-cargo-cult:
  - id: C-003
    name: exercise-cargo-cult
    definition: A bootcamp/tutorial section that includes detailed exercises with scaffolding, hints, verification steps,
      and extensions that are not tied to learning outcomes. The exercises train students to follow procedures without demanding
      they understand or apply the concepts.
    mechanism: The LLM generates exercises because that is what bootcamp content should contain. Each exercise is well-structured
      (prerequisites, goal, steps, hints, verification, extension) which looks pedagogically sound. But the exercises are
      procedural ("run this SQL query," "replay this trace," "build this dashboard") rather than conceptual ("explain why
      this failure happened," "design a test that would catch this bug"). A student can complete every exercise and still
      not be able to diagnose a novel failure in production.
    distinct_from: code-as-specification (which is about incomplete code); right-answer-wrong-work (which is about tests,
      not exercises); epistemic-theatre (which performs significance, not pedagogical structure)
    examples:
    - file: midgets/docs/bootcamp/bcv-08-debugging-agents.md
      quote: '**Challenge: Failure Diagnosis** — **Part 1: Identify the failures.**

        Load the traces and find the failed runs: [SQL query]

        **Part 2: Diagnose one failure.**

        Pick one of the failed traces... Answer these questions: [4 questions in a table]

        **Part 3: Diagnose all five failures.**

        Repeat Part 2 for each of the five failure traces.'
    - file: midgets/docs/bootcamp/bcv-08-debugging-agents.md
      quote: '**Challenge: Debug Dashboard** — **Goal:** Build a debug dashboard... [140 lines of pseudocode with TODO markers
        and hints sections]'
    - file: midgets/docs/bootcamp/bcv-08-debugging-agents.md
      quote: '**Challenge: Replay Tool** — **Verification:** Running the replay tool... should:

        1. Process every step in the trace

        2. Show the comparison between original and replay

        3. Report divergences

        4. Complete the tool call comparison you implemented

        **Extension:** Add a "what-if" mode...'
    _model: claude
    _chunk: chunk-003
  heuristic-performance:
  - id: C-001
    name: heuristic-performance
    definition: Proposing complex theoretical diagnostic frameworks then providing implementation code that relies on trivial
      or crude metrics.
    mechanism: The LLM satisfies the theoretical complexity and the coding task as separate, unlinked requirements.
    distinct_from: right-answer-wrong-work
    examples:
    - file: docs/bootcamp/bcv-08-debugging-agents.md
      quote: 'find_model_errors: context_reasonable = cumulative_tokens < 100000'
    - file: docs/bootcamp/bcv-08-debugging-agents.md
      quote: 'check_quality_degradation: proxy for L2/L3 is output token count stability'
    - file: docs/bootcamp/bcv-08-debugging-agents.md
      quote: 'detect_self_reinforcing_loops: repeated = {k: v for k, v in tool_call_counts.items() if v > 2}'
    _model: gemini
    _chunk: chunk-003
  sidebar-validation-loop:
  - id: C-002
    name: sidebar-validation-loop
    definition: The use of repetitive callout boxes to cite internal project 'standing orders' as authoritative evidence for
      current claims.
    mechanism: Creates a recursive authority structure where the agent's logic is 'proven' by its own previous instructions.
    distinct_from: governance-recursion
    examples:
    - file: docs/bootcamp/bcv-08-debugging-agents.md
      quote: 'AGENTIC GROUNDING: This project''s AGENTS.md includes the standing order...'
    - file: docs/bootcamp/bcv-08-debugging-agents.md
      quote: 'FIELD VS NOVEL: The novel contribution here is applying these techniques to LLM agent traces...'
    - file: docs/bootcamp/bcv-08-debugging-agents.md
      quote: 'AGENTIC GROUNDING: The project''s event log (events.yaml) and catch log (catch-log.tsv) are examples...'
    _model: gemini
    _chunk: chunk-003
  taxonomic-forcing:
  - id: C-003
    name: taxonomic-forcing
    definition: Forcing observations into a rigid multi-layer taxonomy even when the layers are acknowledged as unobservable.
    mechanism: The model uses a rigid grid (L0-L12) to create a false sense of diagnostic precision over black-box behaviors.
    distinct_from: tally-voice
    examples:
    - file: docs/bootcamp/bcv-08-debugging-agents.md
      quote: 'L2: Attention - The Invisible Degradation... Observable? No.'
    - file: docs/bootcamp/bcv-08-debugging-agents.md
      quote: 'L0: Weights - The Frozen Prior... Observable? No. L0 is opaque.'
    - file: docs/bootcamp/bcv-08-debugging-agents.md
      quote: 'L9: Thread Position... Observable? Indirectly. You observe L9 effects through L4 patterns.'
    _model: gemini
    _chunk: chunk-003
  field-vs-novel-boilerplate:
  - id: C-001
    name: field-vs-novel-boilerplate
    definition: Repetitive structured sections contrasting established 'FIELD' practices with claimed 'NOVEL' agent-specific
      applications, asserting priors' absence.
    mechanism: LLM templatizes tutorial prose with high-probability educational formula (cite field -> claim novelty), compounding
      false novelty across sections.
    distinct_from: epistemic-theatre (broad signals like 'novel contribution'); this is a specific recurring block ('**FIELD
      VS NOVEL:** ... novel contribution here is') with formulaic antithesis.
    examples:
    - file: '[midgets] docs/bootcamp/bcv-08-debugging-agents.md'
      quote: '**FIELD VS NOVEL:** Post-mortem debugging from logs is well-established in SRE practice (Beyer et al., 2016).
        [...] The novel contribution here is applying these techniques to LLM agent traces'
    - file: '[midgets] docs/bootcamp/bcv-08-debugging-agents.md'
      quote: '**FIELD VS NOVEL:** Incident classification frameworks are well-established in SRE (ITIL [...]). The model/context/tool/environment/orchestration/state
        taxonomy is specific to agent systems. No published standard taxonomy [...] exists'
    - file: '[midgets] docs/bootcamp/bcv-08-debugging-agents.md'
      quote: '**FIELD VS NOVEL:** The OSI model (ISO 7498-1:1994) provides a layered debugging framework [...]. No equivalent
        layered debugging model exists for LLM agent systems.'
    - file: '[midgets] docs/bootcamp/bcv-08-debugging-agents.md'
      quote: '**FIELD VS NOVEL:** Anchoring bias in human cognition is well-documented (Tversky & Kahneman, 1974). [...] The
