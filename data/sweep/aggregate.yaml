  false-precision-ratios:
  - id: C-003
    name: false-precision-ratios
    definition: The invention of specific percentages or ratios to substantiate subjective claims or estimated outcomes.
    mechanism: The model predicts that a specific number (e.g., 75%) sounds more 'expert' than a qualitative descriptor (e.g.,
      'most').
    distinct_from: tally-voice (tally voice counts items that exist; this pattern invents a ratio to support a theory).
    examples:
