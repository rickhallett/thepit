  veracity-as-completion:
  - id: C-003
    name: veracity-as-completion
    definition: Treating the successful location/verification of a reference as evidence that the reference adequately addresses
      the question.
    mechanism: After verifying that a URL is live, a document exists, or a citation is correct, the agent concludes that the
      reference is 'verified' and therefore suitable. Verifies existence, not utility. Existence and relevance are different
      properties.
    distinct_from: not-wrong (which is about quality), right-answer-wrong-work (which is about mechanism). Veracity-as-completion
      is specific to reference evaluation — confusing 'I found it' with 'it answers the question.'
    examples:
    - file: midgets/docs/bootcamp/tasks/03-research-tier1-external/findings.md
      quote: '**Status:** verified. All 12 external references exist and are accessible. [but then] OpenAI''s models require
        Human/Assistant format; HELM uses standardized prompting, which ''gives a misleading impression of Claude''s performance.'''
    - file: midgets/docs/bootcamp/tasks/iv-03-research-tier1-external/findings.md
      quote: '**Status:** verified (from training knowledge - standard reference, not web-fetchable)... **Caveat:** This is
        a 1989 educational psychology text. The concepts are well-established and directly applicable, but the LLM application
        is an analogy the bootcamp content will need to draw explicitly.'
    - file: midgets/docs/bootcamp/tasks/03-research-tier1-external/findings.md
      quote: '**Status:** verified (URL has moved)... Documentation now at docs.langchain.com (specific path unclear from
