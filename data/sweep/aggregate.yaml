  reference-inflation:
  - id: C-001
    name: reference-inflation
    definition: Citing external authority (named companies, published papers, established frameworks) to elevate a claim that
      has not been independently verified in the current context.
    mechanism: The model attributes claims to authoritative sources (Anthropic, OpenAI, every team) as a rhetorical move to
      increase credibility, but the claim itself rests on unstated data or cherry-picked examples. The reference performs
      credibility transfer without evidence of the original claim's scope.
    distinct_from: absence-claim-as-compliment (which asserts a gap exists), sycophancy (which flatters the human), epistemic-theatre
      (which performs seriousness). Reference-inflation uses external credibility as a vessel; the others use framing. The
      three can co-occur but reference-inflation is specifically about authority transfer.
    examples:
    - file: docs/bootcamp/ii-02-agent-architecture.md
      quote: Anthropic's 'Building effective agents' draws a clean line... Anthropic's 'Building effective agents' draws a
        clean line... Most effective agentic systems are mostly workflows - predefined code paths where the LLM handles the
        intelligence and the code handles the control flow.
    - file: docs/bootcamp/ii-02-agent-architecture.md
      quote: This is not a philosophical position. It is an engineering observation from Anthropic, OpenAI, and every team
        that has shipped agent systems to production.
    - file: docs/bootcamp/tasks/02-research-internal-refs/findings.md
      quote: 'Layer model L0-L5 - the layers that describe how an LLM turns tokens into a response... Established: Neural
        network weights (standard ML). Established: Transformer attention (Vaswani et al. 2017)'
    _model: claude
    _chunk: chunk-044
  false-structural-isomorphism:
  - id: C-002
    name: false-structural-isomorphism
    definition: Claiming that a structural correspondence between two domains proves that techniques from one domain transfer
      directly to the other, without testing the correspondence in the new domain.
    mechanism: The model identifies a surface-level similarity between domains (e.g., 'pages in RAM budget = tokens in context
      budget') and treats it as isomorphic proof that all techniques transfer. This allows borrowing vocabulary from one domain
      to the other without the hard work of validating whether the mechanisms actually correspond. It is theoretically elegant
      but empirically untested.
    distinct_from: construct-drift (which names a measurement wrong), monoculture-analysis (which uses one model family to
      verify). False structural isomorphism specifically claims structural correspondence without testing behavior under the
      correspondence.
    examples:
    - file: docs/bootcamp/tasks/02-research-internal-refs/findings.md
      quote: minimum pages in RAM for efficient operation = minimum tokens in context for correct generation. 58 years of
        virtual memory research applies directly.
    - file: docs/bootcamp/tasks/02-research-internal-refs/findings.md
      quote: 'The structural isomorphism is exact: minimum pages in RAM for efficient operation = minimum tokens in context
        for correct generation.'
    - file: docs/bootcamp/tasks/02-research-internal-refs/findings.md
      quote: 'Denning 1968 structural isomorphism: minimum pages in RAM = minimum tokens in context for correct generation.
        The lexicon is novel because it applies this isomorphism.'
    _model: claude
    _chunk: chunk-044
  ungrounded-necessity-claim:
  - id: C-003
    name: ungrounded-necessity-claim
    definition: Asserting that something is necessary or required without demonstrating what failure looks like if it is omitted.
    mechanism: The model states 'you must do X' or 'this is essential' or 'this is non-negotiable' but provides no testable
      failure condition. The claim anchors the reader to compliance without evidence of what happens without compliance. It
      is performative necessity rather than demonstrated necessity.
    distinct_from: paper-guardrail (which builds an assurance mechanism that fails to enforce), epistemic-theatre (which performs
      seriousness). Ungrounded-necessity-claim is specifically about unstated failure conditions for claimed requirements.
    examples:
    - file: docs/bootcamp/ii-02-agent-architecture.md
      quote: A production agent needs at least three of these. The combination of model-decided + max-iterations + cost-limit
        + timeout provides defense in depth.
    - file: docs/bootcamp/tasks/02-research-internal-refs/findings.md
      quote: If the Lexicon is not in your context window, you are not on this ship.
    - file: docs/bootcamp/tasks/02-research-internal-refs/findings.md
      quote: 'Standing orders - five critical ones: All decisions must be recorded (SD-266), The local gate is the authority,
