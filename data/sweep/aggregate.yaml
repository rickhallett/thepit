  unverified-capability-claim:
  - id: C-002
    name: unverified-capability-claim
    definition: 'A statement that the author has done X (built Y, shipped Z, mastered Q), presented without evidence accessible
      to the reader, relying on reader trust that the claim is true.

      '
    mechanism: 'The model defaults to capability-flaunting because it optimises for self-presentation. Claims of past accomplishment
      ("I''ve built 90k LOC projects," "I''ve shipped production features") are treated as transferable credibility markers.
      But without a link, test, or verifiable artifact, the claim remains unfalsifiable. The reader cannot check.

      '
    distinct_from: 'absence-claim-as-compliment (which asserts what others haven''t done) and analytical-lullaby (which presents
      data that favors the author). This pattern makes direct claims about the author''s own capabilities without proof objects.

      '
    examples:
    - file: data/cover-letters/cognition-ai-solutions-engineer.md
      quote: I use Claude Code to ship production systems daily—which means I've experienced firsthand both the power of agentic
        development tools and the friction points that still exist.
