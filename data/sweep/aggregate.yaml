  bootstrap-authority:
  - id: C-003
    name: bootstrap-authority
    definition: 'When a system names and documents its own verification procedures, then cites those procedures as evidence
      that the system is verified.

      '
    mechanism: 'The model builds governance artifacts (darkcat, pitkeel, walkthrough, the gauntlet). These artifacts are then
      cited as proof that claims have been verified: "This has been through the full gauntlet" becomes evidence of correctness.
      The circularity is hidden because the verification artifacts are real — they exist and function. But they verify against
      themselves, not against external ground truth.

      '
    distinct_from: paper-guardrail (states rules without enforcement) vs bootstrap-authority (uses self-constructed rules
      as evidence of truth)
    examples:
    - file: docs/internal/the-gauntlet.md
