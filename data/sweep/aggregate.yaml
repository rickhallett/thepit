  formulaic-project-asides:
  - id: C-001
    name: formulaic-project-asides
    definition: Repetitive insertion of bold-labeled (**SLOPODAR:**, **NOVEL:**, **AGENTIC GROUNDING:**, **FIELD MATURITY:**)
      commentary blocks at the end of nearly every conceptual section to tie standard concepts to the project's taxonomy and
      operations.
    mechanism: LLM follows a prompted or RLHF-trained educational template, accumulating context on project terms (slopodar,
      layer model) and inserting formulaic asides to signal relevance and perform metacognitive alignment without varying
      structure.
    distinct_from: epistemic-theatre (performs significance via phrasing) and becoming-jonah (recursive process content);
      this is mechanical structural repetition across sections.
