    _chunk: chunk-085
  natural-language-pseudocode:
  - id: C-003
    name: natural-language-pseudocode
    definition: Writing complex procedural constraints (loops, conditional branches, fail-fast logic) in natural language
      markdown as if it were executable code.
    mechanism: Agents mimic the structure of computer science (algorithms/logic) within prose instructions to perform 'engineering
      discipline' while remaining entirely non-enforceable.
    distinct_from: paper-guardrail
    examples:
    - file: jobsworth/agentic-finance-analysis/.claude/commands/review-finances.md
