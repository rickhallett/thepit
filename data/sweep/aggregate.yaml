  convergence-divergence-theatre:
  - id: C-001
    name: convergence-divergence-theatre
    definition: Framing all analysis as numbered convergence/divergence points in tables to perform intellectual rigour without
      causal depth.
    mechanism: LLM reflex to categorize comparisons into binary converge/diverge grids, substituting structure for reasoning;
      high-probability token pattern from academic/training data.
