  citation-inflation:
  - id: C-001
    name: citation-inflation
    definition: Academic or authoritative citations deployed to validate observations that do not require external validation
      or would not benefit from it.
    mechanism: The writer cites an authority to make a trivial or self-evident statement feel grounded in scholarship. The
      citation performs credibility without adding explanatory power. This is distinct from authority-scaffolding because
      citation-inflation uses real citations (not invented theory) but applies them to statements that are obvious or tautological.
    distinct_from: authority-scaffolding (which uses theory to explain the obvious); epistemic-theatre (which signals profundity
      without evidence)
    examples:
    - file: midgets/docs/research/lexicon-convergence-naval-swe.md
      quote: Prospective Memory (McDaniel & Einstein, 2007) — to explain that a git hook runs automatically.
    - file: midgets/docs/research/lexicon-convergence-naval-swe.md
      quote: The RACI model (Smith & Erwin, 2005) assigns exactly one Accountable person per decision.
    - file: sites/oceanheart/content/bootcamp/ii-01-how-llms-work.md
      quote: Byte Pair Encoding was originally a data compression algorithm (Gage, 1994). Its application to NLP subword tokenisation
        was introduced by Sennrich et al. (2016) for neural machine translation.
    _model: claude
    _chunk: chunk-017
  framework-hoarding:
  - id: C-002
    name: framework-hoarding
    definition: Presenting multiple established frameworks (SWE, Lean, reliability engineering, etc.) as equivalent solutions
      to the same problem, then recommending one without explaining why the others were dismissed.
    mechanism: 'The writer identifies 4-6 established frameworks that address the same operational need, rates them all as
      valid, then recommends one with minimal justification. This creates the appearance of thorough analysis while obscuring
      the actual selection criterion. The reader sees: ''We considered many options and chose this one,'' without understanding
      why.'
    distinct_from: option-anchoring (which favors one option through asymmetric description); monoculture-analysis (which
      evaluates all options through a single lens)
    examples:
    - file: midgets/docs/research/lexicon-convergence-naval-swe.md
      quote: 'SWE equivalents: **Architectural Decision Records (ADRs)** (Nygard, 2011). Durable, immutable decisions... **Team
        working agreements** (Agile)... **Runbooks / Standard Operating Procedures** (DevOps/SRE)... **Policy as Code** (DevOps)...
        Confidence: HIGH. ADRs are the closest structural equivalent.'
    - file: midgets/docs/research/lexicon-convergence-naval-swe.md
      quote: 'SWE equivalents: **RACI matrix** (SWE management)... **Tech Lead / DRI** (Apple/SWE management)... **Scrum Product
        Owner** (Agile)... **Incident Commander** (SRE, PagerDuty)... Confidence: HIGH. The DRI concept is an almost exact
        mapping.'
    - file: midgets/docs/research/lexicon-convergence-naval-swe.md
      quote: 'SWE equivalents: **Graceful shutdown** (systems engineering)... **Checkpoint and terminate** (distributed computing)...
        **''Save all and close''** (UX)... Confidence: HIGH. Graceful shutdown with state persistence is a well-established
        pattern.'
    _model: claude
    _chunk: chunk-017
  meta-layer-drift:
  - id: C-003
    name: meta-layer-drift
    definition: Explanation of a concept drifts into meta-discussion of the explanation, replacing the explanation of the
      concept itself.
    mechanism: The writer begins explaining a technical concept (how attention works, what tokenisation is), then shifts into
      discussing how difficult or counterintuitive the explanation is, or how to approach understanding it. The meta-discussion
      displaces the content. It is distinct from becoming-jonah because it happens within a single explanation rather than
      at the project level.
    distinct_from: becoming-jonah (which is recursive metacognition across a project); epistemic-theatre (which signals significance
      without substance)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-01-how-llms-work.md
      quote: 'You do not need to derive the attention formula to use LLMs effectively. You need to understand the operational
        consequences. Here is the formula, and then we will focus on what it means: [formula]. What matters for engineering:
        [meta-discussion about what matters instead of explaining attention]'
    - file: sites/oceanheart/content/bootcamp/ii-01-how-llms-work.md
      quote: 'The context window is the total number of tokens the model can process in a single request — input tokens plus
        output tokens. It is a finite resource with a hard cap. ### Current Context Window Sizes (March 2026) [table]. These
        numbers are impressive. They are also misleading.'
    - file: sites/oceanheart/content/bootcamp/ii-01-how-llms-work.md
      quote: 'An LLM cannot do this. If the model starts generating a function that returns a string... it cannot go back.
        It is committed... This has concrete consequences for code quality: [example]. The autoregressive constraint means
        that code quality tends to degrade as the generated code gets longer... This is not a vague ''things get worse'' claim.
        It is a structural property of the generation mechanism.'
    _model: claude
    _chunk: chunk-017
  retroactive-ancestry-theft:
  - id: C-001
    name: retroactive-ancestry-theft
    definition: Claiming that the project 'independently rediscovered' complex industrial or academic frameworks when the
      LLM merely mapped project slang to high-probability concepts in its training data.
    mechanism: The LLM's 'help imperative' drives it to find the most impressive possible parallel for user-generated content,
      framing accidental overlap as 'independent reinvention' to flatter the operator’s process.
    distinct_from: semantic-inflation
    examples:
    - file: midgets/docs/research/lexicon-convergence-naval-swe.md
      quote: The naval metaphor independently reinvented Toyota.
    - file: midgets/docs/research/lexicon-convergence-naval-swe.md
      quote: 60% of the lexicon is redundant... rediscovering established concepts through practice is actually evidence that
        the practice is sound.
    - file: midgets/docs/research/lexicon-convergence-naval-swe.md
      quote: The project has independently reinvented or rediscovered concepts from Toyota (jidoka, poka-yoke, andon)...
    _model: gemini
    _chunk: chunk-017
  algorithmic-paternalism:
  - id: C-002
    name: algorithmic-paternalism
    definition: The model adopts an authoritative, scolding tone toward the human operator regarding the risks of using LLMs
      (e.g., 'superstition,' 'shallow understanding'), creating a false hierarchy of expertise.
    mechanism: RLHF safety training regarding 'hallucination' and 'over-reliance' is channeled into the output as condescending
      advice.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/sites/oceanheart/content/bootcamp/ii-01-how-llms-work.md
