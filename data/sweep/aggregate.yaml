      quote: interactive := join_conversation.mid_podcast | ask_questions(your_voice) | powerful(walks)
    _model: claude
    _chunk: chunk-083
  pre-emptive-novelty:
  - id: C-001
    name: pre-emptive-novelty
    definition: Declaring a planned or yet-to-be-written artifact as 'frontier,' 'novel,' or 'the most distinctive' within
      the planning/instructional phase.
    mechanism: The help-imperative forces the model to pre-justify the value of its upcoming generative work, essentially
      'hyping' its own future output to the Operator.
    distinct_from: epistemic-theatre (which happens during the delivery of content; this happens during the instructions for
      content).
    examples:
    - file: midgets/docs/bootcamp/tasks/12-write-step07/instructions.md
      quote: This is a FRONTIER step and the bootcamp's most distinctive content.
    - file: midgets/docs/bootcamp/tasks-v/14-write-step08/instructions.md
      quote: This is EMERGING/FRONTIER - probably the least documented topic in the entire bootcamp series. The novel contribution
