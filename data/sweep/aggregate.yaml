  synthetic-grounding:
  - id: C-002
    name: synthetic-grounding
    definition: The use of repetitive 'grounding' sidebars to artificially link generic technical concepts to the specific
      engineering project.
    mechanism: To satisfy the 'help imperative,' the LLM fabricates a specific relevance to the user's project by inventing
      scenarios where an agent fails in a way that just happens to be solved by the current lesson.
    distinct_from: epistemic-theatre (general signaling of significance; synthetic-grounding is specifically tied to the 'Agentic'
      project meta-narrative).
    examples:
