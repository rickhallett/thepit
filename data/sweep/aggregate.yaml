  context-dependent-antithesis:
  - id: C-002
    name: context-dependent-antithesis
    definition: 'Negative-positive pairing where the negation is logically redundant given the positive term, deployed to
      add rhetorical weight or contrast where none is needed.

      '
    mechanism: 'RLHF training optimises for hedging and qualification. The model learns that "not A, but B" is a safe rhetorical
      structure. It deploys this structure even when B already implies ¬A, making the negation wasted tokens that weigh down
      the sentence without adding meaning. Differs from classical antithesis where the negation genuinely sharpens a real
      contrast.

      '
    distinct_from: '"redundant-antithesis" (same pattern, already in taxonomy). This entry proposes a renamed/clarified version
      with explicit focus on when the negation becomes context-dependent dead weight.

      '
