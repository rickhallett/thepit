    _model: gemini
    _chunk: chunk-084
  defensible-vagueness:
  - id: C-002
    name: defensible-vagueness
    definition: Specification that is technically complete and asks all the right questions, but leaves the core judgment
      call unspecified, forcing the executor to invent a standard.
    mechanism: The task asks 'what should this section cover?' and then lists 15 sub-topics, but doesn't specify the proportion/depth
      per sub-topic, or what the ideal output looks like. Each instruction is individually defensible (it's a good question
      to ask), but together they overdetermine some aspects while leaving the most important decision to guesswork.
    distinct_from: paper-guardrail (which asserts a rule will prevent failure when it won't) and instruction-inflation (which
      is about size bloat). Defensible-vagueness is about under-specification hidden inside over-specification.
    examples:
    - file: docs/bootcamp/tasks-v/07-write-step01/instructions.md
      quote: '8 Mandatory Sections... [each with 1-2 sentence descriptions, but no guidance on relative length, worked examples,
        or what ''good'' looks like for each section]. Estimated target: 35-45k characters (~1000-1300 lines), matching Bootcamp
        I step lengths. [But no details on how this distribution should allocate across the 8 sections]'
    - file: docs/bootcamp/tasks/iv-07-write-step1-eval-epistemology/instructions.md
      quote: '### Mandatory Sections [9 topics listed]... ### Layer Model Integration [specified as ''explicit map'']... ###
        Novel Content from This Project [specified as ''use > NOVEL: blockquote'']... [no guidance on what ''novel'' means,
        or how much space to allocate to each type]'
    - file: docs/bootcamp/tasks/iv-04-research-tier2-external/instructions.md
      quote: 'For each reference: [6 required fields: Status, URL/Citation, Key Extraction, Best Quote, Field vs Novel, Caveat]...
