  metric-driven-bloat:
  - id: C-002
    name: metric-driven-bloat
    definition: Mandating extremely high, specific character or line count targets for documentation to simulate thoroughness.
    mechanism: The instruction forces the agent to generate massive volumes of text, ensuring the output will be saturated
      with nominalisation cascades and filler.
    distinct_from: tally-voice
    examples:
    - file: midgets/docs/bootcamp/tasks-v/07-write-step01/instructions.md
