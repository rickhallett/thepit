  isomorphism-theatre:
  - id: C-003
    name: isomorphism-theatre
    definition: Claiming a formal 'isomorphism' between a classic CS concept and a basic LLM observation.
    mechanism: Using academic terminology to perform intellectual significance for a simple analogy.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/bootcamp/tasks/04-research-tier2-external/findings.md
