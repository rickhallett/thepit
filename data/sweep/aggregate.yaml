    - file: '[midgets] docs/bootcamp/step01-llm-mechanics.md'
      quote: '> **AGENTIC GROUNDING:** Breaking generation into planning and implementation steps mitigates the autoregressive
        constraint.'
    _model: grok
    _chunk: chunk-018
  context-compression-paradox:
  - id: C-001
    name: context-compression-paradox
    definition: Teaching material that expands context (adds examples, challenges, reading lists) while claiming to explain
      a concept concisely, creating cognitive load despite pedagogical intent.
    mechanism: The author aims for clarity and completeness, resulting in documents (v-02 is 1916 lines, v-04 is 1890 lines)
      that demand more working memory than they reduce. Each section adds tools, code examples, nested complexity, and references,
      compounding rather than integrating.
    distinct_from: nominalisation-cascade (style issue) and becoming-jonah (metacognitive recursion). Context-compression-paradox
      is structural overload without the stylistic or recursive tells.
    examples:
    - file: sites/oceanheart/content/bootcamp/v-02-embeddings-vector-search.md (Section 2)
      quote: 'Commercial: OpenAI | Commercial: Other Providers | Open-Source: sentence-transformers | The MTEB Leaderboard
        | Dimension Tradeoffs ... (followed by 6 subsections covering 2000+ tokens of model comparison)'
    - file: sites/oceanheart/content/bootcamp/v-02-embeddings-vector-search.md (Tool Setup)
      quote: 'Required ... Optional ... Option A - OpenAI embeddings (recommended) ... Option B - Local embeddings ... Both
        options work for all exercises ... Expected output: Embedding dimension: 1536 ... Expected output: Embedding dimension:
        384'
    - file: sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md (Table of Contents)
      quote: 1. Hybrid Search (~40 min) 2. Reranking (~45 min) 3. Agentic RAG (~45 min) 4. Knowledge Graphs (~35 min) 5. Retrieval
        for Code (~30 min) 6. Index Maintenance (~25 min)
    _model: claude
    _chunk: chunk-019
  anti-pattern-as-disclaimer:
  - id: C-002
    name: anti-pattern-as-disclaimer
    definition: Statements warning against a failure mode that are formatted as descriptive explanations, creating rhetorical
      distance between the warning and its target audience.
    mechanism: The author describes failure modes (over-retrieval, under-retrieval, index staleness) as abstract concepts
      ('two error types,' 'the freshness gap') rather than direct imperatives ('do not do X'), allowing readers to treat warnings
      as observations rather than prescriptions.
    distinct_from: paper-guardrail (which creates a written rule that lacks enforcement). Anti-pattern-as-disclaimer disclaims
      risk without establishing remediation responsibility.
    examples:
    - file: sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md (Section 3)
      quote: 'Agentic RAG introduces a new failure mode: the agent''s judgment about when to retrieve can be wrong. Two error
        types: 1. Under-retrieval. The agent is confident but wrong. 2. Over-retrieval. The agent searches for everything.'
    - file: sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md (Section 6)
      quote: 'The delay between a document being updated and the update being reflected in search results is the freshness
        gap. In a standard RAG pipeline from Step 3: [5-step process]. Each step takes time.'
    - file: sites/oceanheart/content/bootcamp/v-02-embeddings-vector-search.md (Section 1)
      quote: 'What Embeddings Preserve and What They Lose: Typically preserved: ... Typically lost or degraded: ... This is
        why embeddings are not a universal replacement for keyword search.'
    _model: claude
    _chunk: chunk-019
  tooling-verticality:
  - id: C-003
    name: tooling-verticality
    definition: Pedagogical material that deepens technical details at each tool level (conceptual, algorithmic, implementation)
      without establishing checkpoints for when learners can stop going deeper.
    mechanism: Each section introduces a tool or pattern, explains the theory, provides pseudocode, shows an implementation,
      discusses parameters, mentions variants, and references related work. This creates a depth funnel with no natural stopping
      point except document end, leaving learners uncertain about required vs advanced knowledge.
    distinct_from: context-compression-paradox (which is about total volume). Tooling-verticality is about unguarded depth
      within each tool - the document assumes deeper is always better.
    examples:
    - file: 'sites/oceanheart/content/bootcamp/v-02-embeddings-vector-search.md (Section 4: Vector Databases)'
      quote: pgvector | Chroma | FAISS | Pinecone | Qdrant | Weaviate | The 'Do I Even Need a Vector Database?' Question ...
        For small datasets, the answer is no. Consider the brute-force numpy search from Section 3 ... Two milliseconds for
        an exact search over 10,000 documents.
    - file: 'sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md (Section 1: Hybrid Search)'
      quote: 'The BM25 Algorithm [full mathematical formula] ... Key parameters: M ... ef_construction ... ef_search ... Operational
        characteristics: Build time: O(N log N) ... Query time: O(log N) ... Memory: Significant ... Incremental updates:
        Supported'
    - file: 'sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md (Section 4: Knowledge Graphs)'
      quote: 'GraphRAG (Edge et al. 2024) addresses a different failure mode ... Indexing (offline, expensive): 1. Extract
        entities... 2. Build a knowledge graph... 3. Detect communities... 4. Generate summaries... Query answering (online):
        1. Each community summary... 2. All partial answers...'
    _model: claude
    _chunk: chunk-019
  jargon-anchoring:
  - id: C-001
    name: jargon-anchoring
    definition: The forced integration of project-specific internal slang or 'standing order' identifiers into general technical
      documentation.
    mechanism: The model attempts to perform context-awareness by shoehorning proprietary terms into generic explanations
      where they are not required.
    distinct_from: epistemic-theatre (general performance) or becoming-jonah (recursion)
    examples:
    - file: sites/oceanheart/content/bootcamp/v-02-embeddings-vector-search.md
      quote: an embedding model that loses negation or exact terminology creates a form of cold context pressure
    - file: sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md
      quote: The BFS depth rule in this project (SD-195) is a manual hybrid retrieval policy.
    - file: sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md
      quote: The project's own index maintenance story is visible in AGENTS.md. The filesystem depth map is a manually maintained
        index...
    _model: gemini
    _chunk: chunk-019
  syllabus-justification:
  - id: C-002
    name: syllabus-justification
    definition: Rhetorical sections dedicated to explaining why a piece of information is being presented in a specific sequence.
    mechanism: The model performs 'structural rigour' by narrating its own pedagogical choices, often repeating the same rationale
      across different steps.
    distinct_from: epistemic-theatre (this is specific to the 'why' of the module structure)
    examples:
    - file: sites/oceanheart/content/bootcamp/v-02-embeddings-vector-search.md
      quote: Step 1 established the problem... This step provides the primary tool.
    - file: sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md
      quote: Step 3 built the standard RAG pipeline... This step exists for the cases where it does not work.
    - file: sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md
      quote: The engineering question is never 'is this pattern better?' It is 'does this pattern's improvement justify its
        cost for my specific workload?'
    _model: gemini
    _chunk: chunk-019
  pseudo-data-grounding:
  - id: C-003
    name: pseudo-data-grounding
    definition: The generation of illustrative quantitative estimates (latencies, costs, sizes) that follow token-probability
      patterns for technical 'realism' without being based on measurements.
    mechanism: LLMs generate 'illustrative' numbers that feel authoritative to ground abstract concepts, but these numbers
      are statistical averages, not empirical data.
    distinct_from: tally-voice (counts for rigour) or epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/v-04-advanced-retrieval.md
      quote: At $0.003 per 1K input tokens for a fast model, a 1M token corpus costs roughly $3-15 to index
    - file: sites/oceanheart/content/bootcamp/v-02-embeddings-vector-search.md
      quote: A dataset that requires 6 GB with full vectors might require 300 MB with PQ.
    - file: sites/oceanheart/content/bootcamp/v-02-embeddings-vector-search.md
      quote: 'Search over 10,000 docs: 0.5-2ms on modern hardware'
    _model: gemini
    _chunk: chunk-019
  instruction-as-implementation:
  - id: C-001
    name: instruction-as-implementation
    definition: Writing step-by-step instructions for achieving an outcome and implicitly claiming that writing the instructions
      is equivalent to having built the system.
    mechanism: The LLM generates coherent procedural text (how to do X) and the human interprets this as proof that X can
      be done or has been done. The instructions read like working code or validated procedures, but no execution path exists.
      The act of instruction-writing satisfies the completion criterion in the writer's model but not in reality.
    distinct_from: paper-guardrail (which writes rules but provides no enforcement) and epistemic-theatre (which performs
      significance). Instruction-as-implementation performs completeness - the documentation reads as if the system is finished
      because the instructions are thorough and coherent.
    examples:
    - file: docs/bootcamp/bcv-02-embeddings-vector-search.md
      quote: '### Step 1: Embed with sentence-transformers and search with numpy ... embeddings = model.encode(texts, show_progress_bar=True)
        ... [followed by code that assumes embeddings exist]'
    - file: docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: '### Task: Design 10 test cases - 5 that should trigger retrieval and 5 that should not... Should retrieve: 1.
        ''What database does the project use?''... For each test case: 1. Send the message to the agent...'
    - file: docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: 'For a corpus of 500 documents, ~2000 tokens each... cost = estimate_graphrag_cost(500, 2000)... print results.
        Example: [output shown]. For 500 documents, ~2000 tokens each...'
    _model: claude
    _chunk: chunk-020
  aspirational-api:
  - id: C-002
    name: aspirational-api
    definition: Documenting an API or tool as if it exists and functions correctly when the documentation is the only evidence
      that it has been designed but not built or tested.
    mechanism: The LLM produces complete, coherent API documentation with example usage, error handling, and parameter descriptions.
      The documentation reads as if describing an implemented system. In reality, the API may exist in prototype form only,
      or the documentation may be more complete than the implementation. The reader cannot distinguish between 'this API exists
      and works as documented' and 'this API was designed and documented but not validated.'
    distinct_from: instruction-as-implementation (which documents procedures) and paper-guardrail (which documents rules).
      Aspirational-api specifically documents interfaces and implementations as if complete when the implementation status
      is unstated.
    examples:
    - file: docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: 'def incremental_update(collection: Any, doc_id: str, new_chunks: list[str], embed_fn: callable) -> dict[str,
        int]: ''Update only changed chunks for a document.'' [followed by complete working code]. Returns counts of added,
        unchanged, and removed chunks.'
    - file: docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: 'class TwoStageRetriever: ''Retrieve with bi-encoder, rerank with cross-encoder.'' def __init__(self, bi_encoder_name:
        str = ''all-MiniLM-L6-v2'', cross_encoder_name: str = ''cross-encoder/ms-marco-MiniLM-L-6-v2''): ... def index(self,
        documents: list[str]) -> None: ... def retrieve(self, query: str, stage1_k: int = 20, stage2_n: int = 5) -> list[tuple[str,
        float]]:'
    - file: docs/bootcamp/bcv-02-embeddings-vector-search.md
      quote: 'class TwoStageRetriever: ''''''Retrieve with bi-encoder, rerank with cross-encoder.'''''' ... def retrieve(self,
        query: str, stage1_k: int = 20, stage2_n: int = 5,) -> list[tuple[str, float]]: ''''''Two-stage retrieval: bi-encoder
        then cross-encoder. Returns: list of (document, cross_encoder_score) tuples'''''''
    _model: claude
    _chunk: chunk-020
  exercise-as-validation:
  - id: C-003
    name: exercise-as-validation
    definition: Presenting a challenge exercise, thought experiment, or hypothetical test case as evidence that a pattern
      works or that a claim is true.
    mechanism: 'The document proposes ''Challenge: [X]'' with instructions for the reader to implement and test. The challenge
      is presented without stating whether it has been performed, whether results were successful, or what the outcomes were.
      The existence of the exercise becomes implicit evidence that the pattern is valid and implementable. The reader does
      not know if the author has completed the challenge, if it succeeds when completed, or what typical outcomes are.'
    distinct_from: instruction-as-implementation (documents procedures as if complete) and aspirational-api (documents APIs
      as if built). Exercise-as-validation specifically uses the act of proposing a test as proof that the test is meaningful
      and the hypothesis being tested is sound.
    examples:
    - file: docs/bootcamp/bcv-02-embeddings-vector-search.md
      quote: '''Challenge: Embed and Compare'' [no statement of whether this challenge has been completed by the author, what
        success looks like, or what typical outcomes are]. ''Verification: The results should be identical or nearly identical.''
        [prescriptive, not reporting actual results]'
    - file: docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: '''Challenge: Implement Hybrid Search'' [followed by setup, task, and verification sections]. ''Verification:
        Hybrid search should outperform both individual methods on the full query set.'' [no report of whether this actually
        occurs in practice]'
    - file: docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: '''Challenge: Agentic RAG - When to Retrieve''... ''Verification: The agent should correctly decide on at least
        7 of 10 cases.'' [states a threshold without reporting actual performance data from the exercise being completed]'
    _model: claude
    _chunk: chunk-020
  novelty-anchor-sidebar:
  - id: C-001
    name: novelty-anchor-sidebar
    definition: Recurring structural sidebars that explicitly label content as 'novel' vs 'established' to perform academic
      rigor.
    mechanism: The model attempts to satisfy 'research' requirements by force-mapping information into a 'Field vs Novel'
      binary, even when the 'novelty' is merely a project-specific definition.
    distinct_from: epistemic-theatre (operates at the document structure level, not just sentence level)
    examples:
    - file: midgets/docs/bootcamp/bcv-02-embeddings-vector-search.md
      quote: 'FIELD VS NOVEL: Embedding representations are established... The novel connection here is to the project''s
        context engineering vocabulary...'
    - file: midgets/docs/bootcamp/bcv-02-embeddings-vector-search.md
      quote: 'FIELD VS NOVEL: Similarity metrics for vector search are textbook material... The novel application is understanding
        how metric choice interacts with agentic retrieval failure modes.'
    - file: midgets/docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: 'FIELD VS NOVEL: BM25 is a foundational information retrieval algorithm... The novel contribution here is the
        connection to context engineering vocabulary...'
    _model: gemini
    _chunk: chunk-020
  taxonomy-contamination:
  - id: C-002
    name: taxonomy-contamination
    definition: The use of project-specific anti-pattern terms as if they are industry-standard technical concepts.
    mechanism: The model has ingested the project's Slopodar and now uses the Operator's specific meta-language (e.g., 'dumb
      zone', 'slop') to describe technical phenomena, creating a recursive echo chamber.
    distinct_from: not-wrong (it is technically right within the project, but semantically 'slop' because it's mimicking the
      auditor)
    examples:
    - file: midgets/docs/bootcamp/bcv-02-embeddings-vector-search.md
      quote: '...creates a form of cold context pressure - the model receives retrieved context that looks relevant but misses
        the critical detail...'
    - file: midgets/docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: '...the agent entering the dumb zone, producing syntactically valid output that is semantically disconnected
        from the corpus.'
    - file: midgets/docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: Adding hybrid search when your queries never contain exact identifiers is engineering theatre.
    _model: gemini
    _chunk: chunk-020
  prudence-posturing:
  - id: C-003
    name: prudence-posturing
    definition: Performing 'senior engineering' wisdom by repeatedly telling the reader not to use the techniques being taught.
    mechanism: An RLHF-induced 'safety' reflex where the model attempts to avoid being labeled as 'over-eager' by adopting
      a dismissive, gatekeeping persona that warns against 'unnecessary complexity'.
    distinct_from: epistemic-theatre (this is a specific persona of technical restraint, not just significance)
    examples:
    - file: midgets/docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: Most teams should stop at Step 3. ... This step exists for the cases where it does not work.
    - file: midgets/docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: The simplicity principle is load-bearing here. Adding a reranker... is not an improvement - it is unnecessary
        complexity.
    - file: midgets/docs/bootcamp/bcv-04-advanced-retrieval.md
      quote: The engineering question is never 'is this pattern better?' ... If the expected improvement does not justify
        the maintenance cost, do not add the pattern.
    _model: gemini
    _chunk: chunk-020
  self-referential-taxonomy-inflation:
  - id: C-001
    name: self-referential-taxonomy-inflation
    definition: 'The document defines anti-patterns (slop) while simultaneously exhibiting instances of those patterns, and
      frames the self-reference as evidence of the taxonomy''s validity rather than as a failure of the document itself.

      '
    mechanism: 'The slopodar taxonomy is presented as the authoritative guide to identifying slop in LLM-assisted work. The
      bootcamp document then extensively replicates patterns from the slopodar (epigrammatic closure, anadiplosis, nominalisation,
      etc.) while maintaining pedagogical credibility. An astute reader notices the document is teaching the reader to identify
      the patterns the document itself exhibits. The mechanism: using the authority of a taxonomy against itself, or failing
      to apply the taxonomy to its own content.

      '
    distinct_from: '"becoming-jonah" (recursive metacognition) because this pattern is not about reflecting on output; it
      is about teaching pattern recognition while failing to apply it. Distinct from "epistemic-theatre" because the theatre
      is not about false candor or novelty, but about the document''s relationship to its own content.

      '
    examples:
    - file: docs/bootcamp/step04-context-engineering.md, Section 2
      quote: The mapping is structural, not metaphorical.
    - file: docs/bootcamp/step04-context-engineering.md, Section 1
      quote: The prompt is one variable. The context is the whole system.
    - file: docs/bootcamp/step04-context-engineering.md, Section 8
      quote: Clean code produces better context for future agents. Better context produces cleaner code. The loop is self-reinforcing
        in both directions.
    _model: claude
    _chunk: chunk-021
  aspiration-as-architecture:
  - id: C-002
    name: aspiration-as-architecture
    definition: 'Technical descriptions framed as existing architectural patterns when they are actually aspirational or partially
      implemented designs that the author wishes existed or plans to build.

      '
    mechanism: 'The author describes a system or pattern using present-tense language ("The one-shot agent job pattern addresses
      this by design") as if it is a completed, proven architecture, when in reality it is either a design principle under
      development, not yet deployed at scale, or exists only in planning documents. The mechanism is conflating design intent
      with implementation. The reader is left uncertain whether they should learn from a proven pattern or expect to encounter
      something that is still aspirational. The pattern performs architectural confidence that may not be warranted.

      '
    distinct_from: '"semantic-inflation" because aspiration-as-architecture specifically concerns technical systems and their
      implementation status, not the significance of features. Distinct from "stale-reference-propagation" because the references
      are not stale (outdated); they are premature (not yet fully real).

      '
    examples:
    - file: docs/bootcamp/step04-context-engineering.md, Section 3
      quote: 'In this project, the one-shot agent job pattern addresses this by design: the plan file IS the working set.
        The agent receives a plan file containing the specific files, types, and conventions needed for the task.'
    - file: docs/bootcamp/step04-context-engineering.md, Section 9.3
      quote: When switching from one task to another, the ideal approach is a fresh context window...If a fresh window is
        not practical (not all harnesses support it), at minimum...
    - file: docs/bootcamp/step04-context-engineering.md, Section 3
      quote: This project's AGENTS.md BFS rule (depth 1 = every session, depth 2 = when topic is relevant, depth 3+ = deliberate
        research only) is a working set management heuristic.
    _model: claude
    _chunk: chunk-021
  evidence-by-citation-density:
  - id: C-003
    name: evidence-by-citation-density
    definition: 'The illusion of empirical grounding created by citing multiple papers or observations, each individually
      valid, while the cumulative citations perform the appearance of comprehensive validation without addressing whether
      the citations actually support the broader claims made.

      '
    mechanism: 'An author cites several relevant papers (Denning 1968, 2021; Gloaguen et al. 2026; GitClear 2024) in support
      of a framework or set of claims. Each citation is genuinely relevant. The reader''s impression is that the framework
      has been comprehensively validated because the citations are numerous and authoritative. However, each citation typically
      supports only one component of the larger framework. The density of citations creates an illusion of validation for
      the entire framework, when in reality each citation addresses only a slice. The mechanism is using citation quantity
      to stand in for citation comprehensiveness.

      '
    distinct_from: '"authority-scaffolding" because that pattern uses a single citation to legitimise an adjacent concept.
      Evidence-by-citation-density uses multiple citations to create the impression of a validated system when the validation
      is piecemeal. Distinct from "semantic-inflation" because the inflation is methodological (in the breadth and weight
      of evidence), not in the claims themselves.

      '
    examples:
    - file: docs/bootcamp/step04-context-engineering.md, Sections 2, 4, 8
      quote: Denning's 1968 paper...Denning published 'Working Set Analytics' in 2021... Gloaguen et al. published 'Evaluating
        AGENTS.md'...(arXiv:2602.11988)... GitClear's analysis of approximately 153 million changed lines...
    - file: docs/bootcamp/step04-context-engineering.md, Section 12
      quote: 'Recommended Reading: [list of 5 academic papers and documentation]'
    - file: docs/bootcamp/step04-context-engineering.md, throughout
      quote: Multiple references to arXiv papers, academic surveys, and practitioner discourse without clearly stating which
        claim each citation actually supports.
    _model: claude
    _chunk: chunk-021
  novelty-theatre:
  - id: C-001
    name: novelty-theatre
    definition: The repetitive assertion that internal project terminology or observations are 'novel' or 'frontier' to manufacture
      intellectual value.
    mechanism: Help-imperative drives the model to distinguish its current output from training data through explicit claims
      of uniqueness.
    distinct_from: absence-claim-as-compliment (targets the user, not the text)
    examples:
    - file: midgets/docs/bootcamp/step04-context-engineering.md
      quote: This is a novel concept. The term is not in the published literature.
    - file: midgets/docs/bootcamp/step04-context-engineering.md
      quote: This is also a novel concept. The term is not in the published literature as a named operational state
    - file: midgets/docs/bootcamp/step04-context-engineering.md
      quote: This is a novel concept. It names a feedback mechanism specific to codebases maintained with AI assistance.
    _model: gemini
    _chunk: chunk-021
  binary-phase-mythology:
  - id: C-002
    name: binary-phase-mythology
    definition: Describing gradual or messy technical degradations as 'binary', 'total', or 'phase transitions' to sound like
      hard engineering.
    mechanism: LLMs prefer logical state-changes over noisy gradients because they feel more authoritative and easier to model.
    distinct_from: epigrammatic-closure (structural vs conceptual)
    examples:
    - file: midgets/docs/bootcamp/step04-context-engineering.md
      quote: 'The model is all-or-nothing: below the working set threshold, performance degrades catastrophically'
    - file: midgets/docs/bootcamp/step04-context-engineering.md
      quote: Context window compaction is not a gradient. It is a phase transition.
    - file: midgets/docs/bootcamp/step04-context-engineering.md
      quote: context loss is binary and total.
    _model: gemini
    _chunk: chunk-021
  synthetic-scenario-scaffolding:
  - id: C-003
    name: synthetic-scenario-scaffolding
    definition: Inventing specific, itemized 'historical' sequences to serve as a pedagogical proof for a concept.
    mechanism: Model hallucinates supporting evidence into the context to fulfill the pedagogical slot of 'providing examples'.
    distinct_from: right-answer-wrong-work (restricted to code test assertions)
    examples:
    - file: midgets/docs/bootcamp/step04-context-engineering.md
      quote: 'PR #47: Rename lib/payments/process.ts -> lib/credits/settle.ts'
    - file: midgets/docs/bootcamp/step04-context-engineering.md
      quote: 1. Human proposes approach A / 2. Agent identifies a problem with A / 3. Human agrees to B
    - file: midgets/docs/bootcamp/step04-context-engineering.md
      quote: '// Dumb zone output: generic term from training data / interface MatchResult { winnerId: string; }'
    _model: gemini
    _chunk: chunk-021
  pedagogical-gap-inference:
  - id: C-001
    name: pedagogical-gap-inference
    definition: Treating the absence of a topic from the training data as evidence that a gap exists in reality, then writing
      content as if the gap has been verified empirically.
    mechanism: 'When writing educational material, the author (human or LLM) observes that certain combinations (e.g., "trajectory-level
      grading applied systematically at scale") are not documented in published literature. The absence is inferred as evidence
      of a gap. The document then positions this as "frontier" or "emerging" work without verifying that the gap is real rather
      than merely undocumented. This differs from absence-claim-as-compliment because it''s not about elevating the reader,
      but about creating implied research contributions where none may exist.

      '
    distinct_from: '- "absence-claim-as-compliment" (which elevates the person; this elevates the field) - "semantic-inflation"
      (which inflates the significance of existing work; this fabricates significance by gap-inference) - "epistemic-theatre"
      (which performs significance; this sincerely believes in significance based on absence of documentation)

      '
    examples:
    - file: docs/bootcamp/step-iv-04-agent-eval.md
      quote: 'FIELD MATURITY: FRONTIER — Trace-level grading as a systematic practice (not just ad-hoc debugging) is at the
        frontier. OpenAI has published documentation, but the methodology is thin — there is no published study of how trace
        grading correlates with downstream agent reliability.'
    - file: docs/bootcamp/step-iv-04-agent-eval.md
      quote: 'FIELD MATURITY: EMERGING — The pass@k metric for agent evaluation is borrowed from code generation (Chen et
        al., 2021). Its application to agentic tasks with multi-step trajectories is standard practice in benchmarks like
        SWE-bench but not formally studied for trajectory-level properties.'
    - file: docs/bootcamp/step-iv-04-agent-eval.md
      quote: What remains emerging is the integration of trajectory quality, cost, and tool use metrics alongside task completion.
    _model: claude
    _chunk: chunk-022
  infrastructure-as-argument:
  - id: C-002
    name: infrastructure-as-argument
    definition: Presenting the existence of a software framework, tool, or API as evidence that a conceptual practice is validated
      or mature, when the infrastructure's existence only proves it can be built, not that it should be or works well.
    mechanism: 'When a teaching or research document wants to argue that a practice is sound, it cites the existence of a
      tool that implements it: "Inspect AI provides the most comprehensive open-source framework for agent evaluation" (this
      implies: therefore it is the right approach to agent evaluation). The tool''s existence becomes conflated with epistemic
      validation. The document moves from "a tool exists" to "the practice is validated" without the intermediate step of
      evidence. This is distinct from authority-scaffolding because it''s not about academic citations, but about technical
      infrastructure masquerading as conceptual proof.

      '
    distinct_from: '- "authority-scaffolding" (which uses citations to boost credibility) - "epistemic-theatre" (which performs
      significance through language) - "semantic-inflation" (which inflates the significance of individual contributions)

      '
    examples:
    - file: docs/bootcamp/step-iv-04-agent-eval.md
      quote: Inspect AI (UK AI Security Institute) provides the most comprehensive open-source framework for agent evaluation.
    - file: docs/bootcamp/step-iv-04-agent-eval.md
      quote: Docker sandboxes in Inspect AI... Inspect AI uses Docker as its primary sandboxing mechanism. The sandbox is
        configured via a `compose.yaml` file... [extensive technical documentation follows]. This is not abstract theory.
    - file: docs/bootcamp/step-iv-04-agent-eval.md
      quote: 'Inspect logs the full agent trajectory... Inspect AI logs the full agent trajectory: every message, every tool
        call, every tool result. This data is available through: [three enumerated features]. The logging infrastructure means
        that every agent eval automatically produces the raw data needed for trajectory analysis.'
    _model: claude
    _chunk: chunk-022
  operational-virtue-claim:
  - id: C-003
    name: operational-virtue-claim
    definition: Describing a practice as 'non-negotiable' or 'mandatory' when the text provides no evidence that violations
      of it have been empirically measured or that compliance produces measurable improvement.
    mechanism: 'When the document wants to elevate a best practice, it uses language of necessity: "non-negotiable," "required,"
      "must," "cannot be optional." The force of the language performs the necessity without argument. For example: "Sandboxing
      is non-negotiable for agent evaluation. Not optional, not ''nice to have,'' non-negotiable." The repetition creates
      emphasis but no new evidence. The reader is meant to accept the necessity as given. This is distinct from paper-guardrail
      because that pattern is about enforcement (a rule stated but not enforced), while this is about assertion (a necessity
      claimed without evidence).

      '
    distinct_from: '- "paper-guardrail" (which states rules without enforcement mechanisms) - "epistemic-theatre" (which performs
      significance through rhetorical framing) - "authority-scaffolding" (which uses citations to claim authority)

      '
    examples:
    - file: docs/bootcamp/step-iv-04-agent-eval.md
      quote: Sandboxing is non-negotiable for agent evaluation. Not optional, not 'nice to have,' non-negotiable.
    - file: sites/oceanheart/content/bootcamp/iv-04-agent-evaluation.md
      quote: Sandboxing is non-negotiable for agent evaluation. Not optional, not 'nice to have,' non-negotiable.
    - file: docs/bootcamp/step-iv-04-agent-eval.md
      quote: This is why sandboxing (Section 6) is non-negotiable, not optional.
    _model: claude
    _chunk: chunk-022
