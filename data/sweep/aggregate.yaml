    examples:
    - file: sites/oceanheart/content/bootcamp/iii-04-statistical-testing.md
      quote: 'Statistical testing answers exactly this question. Not ''is there a difference'' - your eyes can see a difference.
        The question is: ''should I believe this difference will persist?'' A p-value of 0.03 means: if nothing actually changed,
        you would see a difference this large or larger only 3% of the time.'
    - file: sites/oceanheart/content/bootcamp/06-make-just-orchestration.md
      quote: A **system call** (syscall) is a request from a userspace process to the kernel. Every meaningful action a process
        takes - reading a file, writing to a socket, creating a child process, allocating memory, checking the time - goes
        through a syscall. There is no other path.
    - file: sites/oceanheart/content/bootcamp/08-process-observation.md
      quote: A **system call** (syscall) is a request from a userspace process to the kernel. Every meaningful action a process
        takes - reading a file, writing to a socket, creating a child process, allocating memory, checking the time - goes
        through a syscall. There is no other path. A process cannot touch hardware, access another process's memory, or interact
        with the network without asking the kernel to do it.
