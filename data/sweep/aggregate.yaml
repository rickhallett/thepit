      The mechanism: mastery of explanation ≠ mastery of application, but the document performs the equivalence.'
    distinct_from: epistemic-theatre (performs significance of individual findings) vs competence-performance-gap (document
      is locally excellent but performs global effectiveness it hasn't demonstrated). Not-wrong (correct but flat) vs competence-performance-gap
