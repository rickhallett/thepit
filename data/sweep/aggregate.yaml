  metric-without-baseline:
  - id: C-001
    name: metric-without-baseline
    definition: 'A quantitative claim (speed, efficiency, quality score) presented without a comparison baseline, making the
      number semantically empty.

      '
    mechanism: 'The model generates specific numbers because specificity performs credibility. But without a denominator (compared
      to what?), the number is orphaned. "90,000 lines of code" sounds impressive until you ask "in what timeframe, with how
      many people, at what quality level?" The model optimises for the appearance of precision without the substance of comparison.

      '
    distinct_from: 'tally-voice (which uses numbers to establish authority through enumeration) and semantic-inflation (which
      misnames measurements). metric-without-baseline uses real measurements but in a context vacuum.

      '
    examples:
    - file: sites/oceanheart/content/blog/2026-03-01-the-elephant.md
