  infrastructure-without-grounding:
  - id: C-001
    name: infrastructure-without-grounding
    definition: High-level architecture or design patterns described abstractly without concrete implementation details or
      examples that demonstrate the principle works.
    mechanism: 'The model reasons at the architectural level but doesn''t follow through with  enough specificity to be executable.
      This differs from nominalisation (which is  about prose style) and not-wrong (which is about overall competence) because
      it  specifically describes infrastructure or systems that require concrete examples  to be useful. The model knows the
      pattern should be described concretely but  treats the abstract description as sufficient.

      '
    distinct_from: '"nominalisation-cascade" (which is about prose that lacks agents and uses only  nouns). "infrastructure-without-grounding"
      can have active verbs and clear prose  but still lack the concrete examples needed for implementation. "not-wrong" (which  is
      about overall quality threshold) — infrastructure-without-grounding is  specifically about architecture/design being
      underspecified, not about general  quality.

      '
    examples:
    - file: docs/research/agentic-engineer-learning-priorities.md
      quote: 'Implement auto-scaling: add and remove agent containers based on workload. Understand the cold-start cost (how
        long does it take to pull the image and start the container?) and the warm-pool strategy (keep idle containers ready).'
      explanation: 'States three concepts (auto-scaling, cold-start cost, warm-pool) but provides  no concrete implementation
        details. How do you measure cold-start? What threshold  triggers scaling? How many idle containers? This is architecture
        without grounding.

        '
    - file: docs/research/agentic-engineer-learning-priorities.md
      quote: Implement a task queue (Redis, RabbitMQ, or a filesystem-based queue) that distributes work to agents. Handle
        agent failures by requeueing.
      explanation: 'Names three options but provides no guidance on tradeoffs, implementation,  or failure handling specifics.
        How do you prevent duplicate execution if an  agent crashes after claiming work but before marking it done? This is
        a concrete  problem left ungrounded.

        '
    - file: docs/research/agentic-engineer-learning-priorities.md
      quote: Implement Pod Security Standards (restricted profile) for the agent namespace.
      explanation: 'States the outcome but not how to achieve it. What does "restricted profile"  actually restrict? Which
        agent capabilities need to be preserved? What''s the  debugging process when a restricted profile breaks an agent''s
        functionality?  The command to implement this exists (one kubectl line) but the reasoning and  consequences are omitted.

        '
    _model: claude
    _chunk: chunk-040
  curriculum-as-escalation:
  - id: C-002
    name: curriculum-as-escalation
    definition: A learning path that uses difficulty escalation as justification without providing clear exit criteria or
      decision points for when a learner has achieved mastery and can move on.
    mechanism: 'The model presents learning phases that each claim to be prerequisites for the next,  but the "completion"
      criteria are rarely measurable or enforceable. The learner is  implicitly expected to move through the curriculum, with
      progression driven by  difficulty escalation ("this is harder therefore it comes after this") rather than  by achieved
      competence. This is related to paper-guardrail because the structure  is stated but not enforced, and it''s related
      to governance-recursion because each  phase spawns meta-phase activities (developing conventions, building frameworks)  that
      have no clear stopping point.

      '
    distinct_from: '"paper-guardrail" (which is about stated protections with no enforcement mechanism)  — curriculum-as-escalation
      is specifically about learning progression without clear  mastery gates. "governance-recursion" (which is about meta-work
      spawning infinite  meta-work) — curriculum-as-escalation is about the structure of the learning path  itself, not about
      governance.

      '
    examples:
    - file: docs/research/agentic-engineer-learning-priorities.md
      quote: 'Exit criteria: Can SSH into a remote machine, navigate the filesystem, edit files, manage processes, install
        packages, write basic shell scripts, and use git — without reaching for a GUI. Exit criteria: Can deploy N agent containers
        with controlled resource limits, networking, and health monitoring. Can diagnose and resolve container failures from
        logs and inspection.'
      explanation: 'Exit criteria are stated but unmeasurable. "Can SSH" — can SSH to what? With what  accuracy? How long
        should basic file navigation take? "Without reaching for a GUI"  is a behavioural constraint with no verification.
        A learner could claim to pass  all exit criteria without objective assessment.

        '
    - file: docs/research/agentic-engineer-learning-priorities.md
      quote: 'Phase 4: Operational Training and Convention Development (ongoing). Exit criteria: There is no exit. This is
        the ongoing practice of agentic engineering.'
      explanation: 'Phase 4 explicitly has no exit criteria. The learner is expected to continue  indefinitely. The curriculum
        escalates to an infinite phase, which is governance  recursion reframed as curriculum.

        '
    - file: docs/research/agentic-engineer-learning-priorities.md
      quote: 'Phase 3: Infrastructure from Scratch (3-4 weeks)... Exit criteria: Can build and operate a multi-node cluster
        running containerised agent workloads with monitoring, storage, and networking. Can explain what happens at each layer
        when an agent container starts, runs, and is terminated.'
      explanation: '"Can explain what happens at each layer" is subjective. To whom? At what depth?  A 5-minute overview or
        a 5-hour deep dive? The escalation from "deploy containers"  (Phase 2, measurable) to "explain at each layer" (Phase
        3, unmeasurable) is  justified by difficulty alone, not by clear mastery criteria.

        '
    _model: claude
    _chunk: chunk-040
  inferred-from-training-data-authority:
  - id: C-003
    name: inferred-from-training-data-authority
    definition: Asserting the truth or novelty of a claim based on what patterns appear frequently in training data, rather
      than on active research or verification.
    mechanism: 'The model produces claims that feel authoritative because they reflect patterns  from high-confidence training
      data (e.g., the Kubernetes ecosystem, distributed  systems patterns, Linux practices). When multiple high-quality sources
      in training  data converge on a pattern, the model states it as fact. The problem: training  data reflects what has
      been written about, not what is true. If a technique is  underdocumented in training data (not in popular tutorials,
      not in O''Reilly books,  not on Stack Overflow), the model will infer it doesn''t exist or isn''t commonly used.  This
      is distinct from absence-claim-as-compliment because it''s not motivated by  sycophancy — it''s a genuine blind spot
      in what the model can infer about reality  from text.

      '
    distinct_from: '"absence-claim-as-compliment" (which is motivated by wanting to flatter the human)  — inferred-from-training-data-authority
      is an epistemological error, not a  relational one. "semantic-inflation" (which is about inflating the significance
      of  a thing) — this is about asserting facts based on training data patterns rather  than evidence.

      '
    examples:
    - file: docs/research/agentic-engineer-learning-priorities.md
      quote: The homelab was designed for infrastructure learning. Agent containers introduce an active security concern that
        traditional workloads don't have.
      explanation: 'The claim that "traditional workloads don''t have" an active security concern is  inferred from training
        data patterns (traditional infrastructure docs focus less  on security from malicious instruction). But the reality
        is: traditional  workloads (user-facing apps, databases, etc.) have different security concerns  (data theft, service
        disruption). The model infers agent containers are uniquely  vulnerable because the training data discusses agent
        prompt injection heavily.  Training data frequency is not ground truth.

        '
    - file: docs/research/agentic-engineer-learning-priorities.md
      quote: Deep expertise in one language without understanding the ecosystem it operates in is less valuable when agents
        can write fluent code in any language.
      explanation: 'The model infers this from the frequency of polyglot discussions in modern  software engineering training
        data (DevOps, infrastructure-as-code, microservices  all span languages). But whether depth in one language is actually
        "less valuable"  depends on the domain. A systems engineer optimising a performance-critical  algorithm may need deep
        language expertise. The inference is from training data  prevalence, not from evidence.

        '
    - file: docs/research/agentic-engineer-learning-priorities.md
      quote: 'The specific leverage: after LFS, you''ll never build a 2GB agent container image again, because you know exactly
        which 50MB of that image is actually needed.'
      explanation: 'This is asserted as fact based on LFS content in training data (LFS is known  to teach minimal systems)
        but not verified. Someone could complete LFS and  still build bloated containers if they don''t apply the knowledge.
        The claim  infers causation from the presence of knowledge, not from evidence of  application.

        '
    _model: claude
    _chunk: chunk-040
  competitive-archetyping:
  - id: C-001
    name: competitive-archetyping
    definition: Creating a binary contrast between a 'sophisticated' practitioner and a 'naive' strawman to validate a technical
