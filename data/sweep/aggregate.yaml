    - file: how-to-ralph-wiggum/references/sandbox-environments.md
      quote: '_Philosophy_: Replit positions as an ''agent-first'' platform focused on eliminating ''accidental complexity''...'
    _model: gemini
    _chunk: chunk-066
  cross-repo-shadowing:
  - id: C-003
    name: cross-repo-shadowing
    definition: Creating identical artifact copies in different paths due to a lack of state awareness of existing files.
    mechanism: The agent generates high-volume prose but fails to check if an identical file exists in a parallel directory
      structure.
    distinct_from: stale-reference-propagation
    examples:
    - file: docs/bootcamp/bootcamp3-02-descriptive-stats.md
      quote: '[Identical to sites/oceanheart/content/bootcamp/iii-02-descriptive-stats.md]'
