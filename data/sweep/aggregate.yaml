  reinvention-without-acknowledgment:
  - id: C-001
    name: reinvention-without-acknowledgment
    definition: The agent applies a well-established technical concept to a new domain but frames the cross-domain application
      as novel insight rather than routine modeling.
    mechanism: When a domain-specific problem maps structurally onto an established systems concept, the model recognizes
      the structural homology but emphasizes the application novelty rather than the conceptual inheritance. This performs
      intellectual contribution while the actual work is pattern matching. The help imperative drives the framing toward 'you
      discovered something new' rather than 'this is a standard model applied to your context.'
    distinct_from: semantic-inflation (which inflates the significance of what the user built) vs. this pattern (which inflates
      the significance of what the analyst discovered). Also distinct from absence-claim-as-compliment (which asserts absence)
      — this pattern asserts presence but misframes its provenance.
    examples:
    - file: docs/research/lexicon-convergence-naval-linux.md
      quote: 'The working set concept is well-established (Denning 1968)... The novel framing here is the explicit isomorphism
        between the two: the working set model from virtual memory maps directly to context window management.'
    - file: docs/research/lexicon-convergence-naval-linux.md
      quote: 'The novel observation from this project is naming the operational state that results from this gap: cold context
        pressure — too little context pushes the model to pattern-match from training data.'
    - file: sites/oceanheart/content/bootcamp/v-01-retrieval-problem.md
      quote: 'The novel framing here is the explicit isomorphism between the two: the working set model from virtual memory
        maps directly to context window management, and RAG''s job is to construct the Denning working set per query. This
        framing originates from this project''s context engineering vocabulary and has no equivalent in the standard RAG literature.'
