  didactic-recursion:
  - id: C-003
    name: didactic-recursion
    definition: The constant cross-referencing of a project's own internal structure ('Step X' vs 'Step Y') to create an illusion
      of modularity and coherence.
    mechanism: The LLM anchors its generation by repeating the 'Step' sequence, reminding the reader what was learned and
      what is coming next to mask the potential lack of actual inter-module dependencies.
    distinct_from: tally-voice (enumeration for substance; didactic-recursion is structural self-citation).
    examples:
