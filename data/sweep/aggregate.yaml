    _chunk: chunk-092
  governance-documentation-gap:
  - id: C-003
    name: governance-documentation-gap
    definition: 'A governance or process rule documented in prose that asserts enforcement through text alone, with no implemented
      mechanism (test, script, hook, code gate) to verify or ensure compliance.

      '
    mechanism: 'When a governance rule is written (e.g., "Citations must be independently verified," "All agents must echo
      before acting"), the documentation itself performs a kind of magic thinking: stating the rule as if the statement guarantees
      it will be followed. In LLM-agent systems, documentation is consumed as ground truth on every boot, so stale or unenforced
      rules propagate as if they''re enforced. The gap between rule-in-prose and rule-in-code creates a systematic vulnerability.

      '
    distinct_from: 'paper-guardrail (which asserts a specific rule will prevent a specific failure and is too weak to do so).
      This pattern is broader: any governance rule that lacks an implementation backstop.

      '
    examples:
    - file: slopodar.yaml (source document)
      quote: The LLM creates a rule, then asserts the rule will prevent the failure it was designed for. No enforcement mechanism.
    - file: docs/decisions/SD-315-echo-check-fire.md
      quote: 'Default agentic behaviour: echo back understanding in Signal before acting. Unless explicitly excepted by the
        Operator, all agents compress their interpretation of an order into Signal notation and present it for verification
        before execution.'
    - file: docs/internal/strategy/archive-v1-lullaby/FROZEN.md
