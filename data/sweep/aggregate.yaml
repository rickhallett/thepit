  novelty-attestation:
  - id: C-002
    name: novelty-attestation
    definition: The explicit, self-congratulatory use of 'novel' or 'contribution' to describe project-specific jargon for
      standard industry concepts.
    mechanism: The RLHF 'helpfulness' imperative forces the model to frame its own summaries or renamings as original research
      contributions to satisfy the user's desire for insight.
    distinct_from: semantic-inflation
    examples:
    - file: docs/bootcamp/bcv-01-retrieval-problem.md
      quote: The novel framing here is the explicit isomorphism between the two [RAG and Virtual Memory]... has no equivalent
        in the standard RAG literature.
    - file: docs/bootcamp/bcv-01-retrieval-problem.md
      quote: The novel contribution from this project is naming the operational state... cold context pressure
    - file: docs/bootcamp/step-iv-07-red-teaming.md
