  aspirational-capability-claim:
  - id: C-003
    name: aspirational-capability-claim
    definition: 'Asserting that a system has a capability or will perform a function when the assertion is based on design
      intent rather than demonstrated functionality or passing tests.

      '
    mechanism: 'The LLM builds a feature from specification and immediately describes it as proven or functional. The help
      imperative drives confidence: the feature was designed to do X, therefore it does X. No test run, no user validation,
