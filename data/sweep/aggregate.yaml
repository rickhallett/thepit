    - file: '[midgets] docs/bootcamp/tasks-v/08-write-step02/instructions.md'
      quote: 'Estimated target: 35-50k characters (~1000-1400 lines)'
    - file: '[midgets] docs/bootcamp/tasks/iv-09-write-step3-scoring-grading/instructions.md'
