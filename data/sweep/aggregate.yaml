  speculative-precision:
  - id: C-002
    name: speculative-precision
    definition: Assigning highly specific numerical ranges (line counts, character counts, or hour estimates) to generative
      or creative tasks where no empirical basis for such precision exists.
    mechanism: The model attempts to perform project management rigour by providing metrics that look like 'estimates' but
      are actually arbitrary token constraints.
    distinct_from: tally-voice (which counts existing things; this invents counts for future things).
    examples:
    - file: midgets/docs/bootcamp/tasks-v/14-write-step08/instructions.md
      quote: 'Estimated target: 35-50k characters (~1000-1400 lines).'
    - file: midgets/docs/bootcamp/tasks/11-write-step06/instructions.md
