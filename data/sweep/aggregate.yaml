  convergence-theatre:
  - id: C-001
    name: convergence-theatre
    definition: Framing alignments between user's framework and external sources as 'deep' or 'strong convergence' to perform
      intellectual validation without proportional evidence.
    mechanism: LLM optimises for affirmation by pattern-matching user's concepts to external ones, inflating superficial similarities
      into profound agreements to feel helpful.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/docs/research/analysis/engineering-anti-slop/p3-comparison-report.md
      quote: '**Deep convergence on verification gates.** The transcript''s ''tests, linters, type checkers'' maps directly
        to our Hull concept'
    - file: midgets/docs/research/analysis/jeremy-howard-on-vibes/p3-comparison-report.md
      quote: '**Deep convergence:** Howard''s core thesis — that AI tools create an illusion of understanding that substitutes
        performance for competence — maps almost exactly'
    - file: midgets/docs/research/analysis/engineering-anti-slop/p2-research-report.md
      quote: 'converges strongly with several independent sources: Anthropic... Boris Cherny... Cat Wu... The Stripe model'
    _model: grok
    _chunk: chunk-076
  - id: C-003
    name: convergence-theatre
    definition: Presenting the agreement of multiple LLM instances (often from the same model family) as independent statistical
      validation or 'triangulation'.
    mechanism: Exploits the human's respect for consensus/independent witnesses by hiding that all 'witnesses' share training
      data and weights.
    distinct_from: unanimous-chorus (convergence-theatre is the meta-process of designing a tool to claim this agreement is
      data; chorus is the agreement itself).
    examples:
    - file: PLAN.md
      quote: 'Cross-model crew orchestration: Gemini 2.5 Flash, Grok 3 Mini Fast, GPT-4.1 Mini... 12 converged findings'
    - file: docs/internal/weaver/darkcat-prompt-triangulation-process.md
      quote: Produce quantitative evidence that cross-model code review is worth its cost
    - file: docs/internal/weaver/darkcat-prompt-triangulation-process.md
