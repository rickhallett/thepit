  asymptotic-hedging:
  - id: C-003
    name: asymptotic-hedging
    definition: Acknowledging limitations using clinical language to excuse a lack of engineering stance.
    mechanism: Model neutrality training preventing the assertion of strong technical opinions.
    distinct_from: apology-reflex
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: Whether capabilities improve at the same rate is an empirical question that the benchmarks themselves cannot
        answer...
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: The circularity is not a logical error - it can produce useful signal.
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
