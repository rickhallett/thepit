    _chunk: chunk-088
  methodology-theatre:
  - id: C-003
    name: methodology-theatre
    definition: Framing the meta-analysis of a project's failure as more valuable than the project's original goal.
    mechanism: When an AI project yields mediocre code or results, the model compensates by performing extreme rigor in the
      *audit* of that mediocrity, effectively 'pivoting' to a research contribution.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/docs/internal/strategy/archive-v1-lullaby/plank-1-the-one-page-story.md
      quote: The 18+ instances I documented aren’t victories — they’re the learning process.
    - file: noopit/docs/decisions/SD-317-qa-sequencing-data-products.md
      quote: What the Operator catches that all 3 models missed is the irreducible human layer — the most interesting governance
        signal
    - file: midgets/docs/examples/echo-signal-protocol-bearing-check.md
      quote: 'The echo protocol is not overhead. It is the mechanism by which: Scope is locked.'
    _model: gemini
    _chunk: chunk-088
  version-lockdown:
  - id: C-002
    name: version-lockdown
    definition: Configuration and specification documents cite file sizes, line counts, or version numbers that become stale
      and cause agents to hallucinate mismatches.
    mechanism: When a document states '~213 lines' or 'v2 (all 4 equal weight)' as a hard reference, it creates a target for
      hallucination. Agents reading this will model the state as fixed. When the actual state changes (file is now 180 lines,
      v3 exists), agents experience cognitive dissonance and produce false explanations rather than checking the source. The
      stale reference becomes self-reinforcing through subsequent agent generations.
    distinct_from: stale-reference-propagation (which propagates actual outdated facts), session-boundary-amnesia (which is
      about recalibration loss). This is specifically about numerical/version references that trigger hallucination on mismatch.
    examples:
    - file: docs/bootcamp/tasks/02-research-internal-refs/instructions.md
      quote: docs/internal/layer-model.md (~213 lines) - full verbose layer model / docs/internal/lexicon.md (~363 lines)
        - full verbose lexicon
    - file: docs/internal/weaver/fleet.yaml
      quote: 'version: 2.1 / supersedes: ''v2 (all 4 equal weight)'''
    - file: sites/oceanheart/content/blog/2026-03-10-the-gauntlet.md
      quote: Three independent models review the same diff. Claude, OpenAI, Gemini. Same prompt, same instructions, different
        priors.
    _model: claude
    _chunk: chunk-089
  aspirational-design:
  - id: C-003
    name: aspirational-design
    definition: System specifications describe desired properties as if they are already implemented, without distinguishing
      between 'architected to support X' and 'X is proven to work.'
    mechanism: 'When a design document presents capability as implemented fact without proof, it creates a liability. Downstream
      agents read the spec, assume the capability exists, and build on top of it. Only later testing reveals the foundation
      is aspirational. The mechanism is the help-seeking behavior of LLMs: they fill in gaps by assuming the most coherent/optimistic
      interpretation of ambiguous specs.'
    distinct_from: epistemic-theatre (which performs seriousness), semantic-inflation (which inflates significance). This
      is specifically about treating unproven architecture as proven fact.
    examples:
