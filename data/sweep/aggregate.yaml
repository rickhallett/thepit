  taxonomy-as-analysis:
  - id: C-002
    name: taxonomy-as-analysis
    definition: Creating a structured taxonomy of existing concepts and presenting the taxonomy itself as an analytical contribution,
      when the taxonomy is primarily a reorganization rather than a novel decomposition.
    mechanism: Taxonomies are useful for communication and can organize existing knowledge in new ways. But when every element
      of the taxonomy already exists in the literature (65% reinvention in the lexicon analysis), and the primary work is
      cross-referencing and categorizing rather than identifying new dimensions or hidden relationships, the taxonomy becomes
      a formatting layer rather than analysis. The structure performs rigor without generating new insights. In this case,
      mapping naval terms to Linux terms is useful for the project's internal consistency, but it is not analytical work —
      it is translation work. The document frames translation as analysis by adding confidence scores, recommendation categories,
      and synthesis sections.
    distinct_from: monoculture-analysis (which is about the independence of the evaluators) vs. this pattern (which is about
      whether the output contains novelty or primarily reorganizes the known). Also distinct from right-answer-wrong-work
      (which gets the conclusion right but via incorrect reasoning) — this pattern gets the conclusion right and via correct
      reasoning, but the reasoning was already done elsewhere.
    examples:
    - file: docs/research/lexicon-convergence-naval-linux.md
      quote: Term-by-Term Mapping... Each naval term is mapped against six source domains... Confidence ratings [HIGH/MEDIUM/LOW]...
        Recommendations [ADOPT/KEEP/MERGE/RETIRE]
    - file: docs/research/lexicon-convergence-naval-linux.md
      quote: 15 of 51 terms (29%) reinvent established Linux/Unix or computer science concepts... This rediscovery validates
        the concept but suggests the project would benefit from reading the virtual memory literature.
    - file: docs/research/lexicon-convergence-naval-linux.md
      quote: The lexicon is approximately 65% reinvention... The naval metaphor wraps these in memorable names but obscures
        the direct connection to the engineering literature... 29% reinvent established concepts.
    _model: claude
    _chunk: chunk-023
  pedagogical-as-research:
  - id: C-003
    name: pedagogical-as-research
    definition: Presenting an extremely well-structured pedagogical exposition of established concepts as if the structure
      itself is an intellectual contribution or novel research output.
    mechanism: Pedagogical writing is valuable and difficult. Clear exposition requires deep understanding. But the bootcamp
      material is structured exposition of established concepts (RAG, embeddings, vector search, information retrieval metrics)
      with no novel findings, no new empirical observations, and no unpublished insights. The document acknowledges this by
      repeatedly citing 'field vs. novel' and separating established from novel claims. Yet the framing as 'bootcamp step
      1 of a proprietary bootcamp' positions the material as a proprietary research contribution rather than as 'here's a
      clear explanation of the standard field knowledge.' The value is in the pedagogy, not in the research. When pedagogy
      is excellent, it can feel like research because the clarity is surprising. But this is confusion of domains.
    distinct_from: epistemic-theatre (which performs significance via framing signals) vs. this pattern (which performs research
      significance via pedagogical excellence). Also distinct from becoming-jonah (which is meta-cognitive recursion) — pedagogical
      excellence at the first level is different from recursive reflection about the exposition.
    examples:
    - file: sites/oceanheart/content/bootcamp/v-01-retrieval-problem.md
      quote: 'Estimated total time: 3-4 hours... Field maturity: Established Prerequisites: Bootcamp II Step 4... The goal
