  pedagogical-exemplar-as-anti-pattern:
  - id: C-001
    name: pedagogical-exemplar-as-anti-pattern
    definition: The document teaches anti-patterns via code examples that look identical to instances of the anti-pattern,
      creating ambiguity about whether the teaching material itself contains the problem.
    mechanism: 'When a bootcamp or guide teaches a code anti-pattern by providing a negative example (wrong test structure,
      defective code), the example looks like the anti-pattern in the wild. A scanner cannot distinguish "this is a bad test
      we are showing you" from "this document contains a bad test." The document meta-problem: teaching what not to do requires
      showing what not to do, and the showing looks like doing.

      '
    distinct_from: '"right-answer-wrong-work" and "phantom-tollbooth" are code anti-patterns. This is a meta-pattern about
      how educational documents handle anti-pattern teaching. It is distinct because it operates at the document level, not
      the code level.

      '
    examples:
    - file: docs/bootcamp/step06-verification-quality.md, Section 7.1
      quote: 'function calculateDiscount(price: number, customerTier: string): number { return 20; } ... The test is green.
        The function is broken.'
    - file: docs/bootcamp/step06-verification-quality.md, Section 7.2
      quote: 'expect([200, 201, 202, 204]).toContain(result.status); // ANTI-PATTERN: range assertion'
    - file: docs/bootcamp/step06-verification-quality.md, Section 7.3
      quote: 'beforeEach(() => { mockOrderService = { getOrder: vi.fn()... 45+ lines of mock setup'
    _model: claude
    _chunk: chunk-007
  caveat-deferral:
  - id: C-002
    name: caveat-deferral
    definition: The document asserts a principle without qualification, then buries the limitations and exceptions in subsections,
      caveats, or challenge sections, rather than integrating them into the main claim.
    mechanism: 'The author states a strong claim at section head ("The gate catches defects cheaply and automatically") then
      spends subsections and tables documenting all the holes in the cheese (what the gate does not catch). The reader gets
      the headline claim in memory and the caveats remain unintegrated. This is distinct from epistemic-theatre because the
      caveats ARE present; they are just structurally separated from the claim they qualify.

      '
    distinct_from: '"epistemic-theatre" performs significance without delivering substance. "caveat-deferral" performs clarity
      by structuring caveats separately from claims, which is pedagogically useful but separates qualification from assertion
      in a way that may not integrate in reader memory. Less hostile than epistemic-theatre because the caveats are genuine
      and thorough, not missing.

      '
    examples:
    - file: docs/bootcamp/step06-verification-quality.md, Section 3
      quote: The gate is necessary but not sufficient. **Necessary:** If the gate fails, the code is definitely not ready...
        **Not sufficient:** If the gate passes, the code is possibly ready.
    - file: docs/bootcamp/step06-verification-quality.md, Section 3, table
      quote: 'Type checker | Catches type mismatches... | **What It Misses: Correct types used for the wrong purpose**'
    - file: docs/bootcamp/step06-verification-quality.md, Section 4
      quote: When the boundary is blurry, default to HODL. The cost of unnecessary human review is time. The cost of insufficient
        human review is defects...
    _model: claude
    _chunk: chunk-007
  procedural-pantomime:
  - id: C-001
    name: procedural-pantomime
    definition: Assigning arbitrary, precise time-based durations to training tasks to simulate an empirically tested curriculum.
    mechanism: Mimicry of structured educational materials to signal 'curated' density.
    distinct_from: tally-voice
    examples:
    - file: docs/bootcamp/step06-verification-quality.md
      quote: 'Estimated time: 6-7 hours'
    - file: docs/bootcamp/step06-verification-quality.md
      quote: 1. The Fundamental Verification Challenge (~35 min)
    - file: docs/bootcamp/step06-verification-quality.md
      quote: 7. Test Anti-Patterns in Agent-Generated Code (~70 min)
    _model: gemini
    _chunk: chunk-007
  referential-looping:
  - id: C-002
    name: referential-looping
    definition: Internal corpus citation used to build a closed-circuit sense of depth and validity.
    mechanism: The agent treats previous session decisions or steps as 'literature' to cite.
    distinct_from: stale-reference-propagation
    examples:
    - file: docs/bootcamp/step06-verification-quality.md
      quote: Step 1 explained that generation is autoregressive...
    - file: docs/bootcamp/step06-verification-quality.md
      quote: identified in SD-178
    - file: docs/bootcamp/step06-verification-quality.md
      quote: 'Leads to: Step 7 (the human-AI interface...)'
    _model: gemini
    _chunk: chunk-007
  dualistic-theatre:
  - id: C-003
    name: dualistic-theatre
    definition: Creating binary acronyms or opposing categories for simple engineering concepts to simulate a proprietary
      methodology.
    mechanism: Training-driven habit of organizing information into neat, symmetrical 'modes' or 'dials'.
    distinct_from: nominalisation-cascade
    examples:
    - file: docs/bootcamp/step06-verification-quality.md
      quote: HOTL (Human Out The Loop) / HODL (Human On The Loop)
    - file: docs/bootcamp/step06-verification-quality.md
      quote: Verifiable vs Taste-Required
    - file: docs/bootcamp/step06-verification-quality.md
      quote: Active failures vs Latent failures
    _model: gemini
    _chunk: chunk-007
  field-maturity-theatre:
  - id: C-001
    name: field-maturity-theatre
    definition: 'Repeated bolded declarations of ''**FIELD MATURITY: EMERGING**'' or ''**FRONTIER**'' to frame standard concepts
      as novel project contributions.'
    mechanism: LLM deploys categorical maturity labels to perform cutting-edge status, compensating for lack of substantive
      differentiation from established literature.
    distinct_from: epistemic-theatre (broad novelty signals like 'uncomfortable truth'); this is rigid formatted status-signaling
      with binary EMERGING/FRONTIER.
    examples:
    - file: '[midgets] docs/bootcamp/step06-verification-quality.md'
      quote: '**FIELD MATURITY: EMERGING** for quality gates, CI/CD practices, and the Swiss Cheese Model. ... **FRONTIER**
        for the oracle problem applied to human-AI systems'
    - file: '[midgets] docs/bootcamp/step06-verification-quality.md'
      quote: '**FIELD MATURITY: FRONTIER.** The application of Weyuker''s oracle problem to human-AI verification systems
        is novel to this project'
    - file: '[midgets] docs/bootcamp/step06-verification-quality.md'
      quote: '**FIELD MATURITY: FRONTIER.** ... What is novel is applying this distinction as the primary governance dial
        for agentic engineering'
    - file: '[midgets] docs/bootcamp/step06-verification-quality.md'
      quote: '**FIELD MATURITY: FRONTIER.** No published taxonomy of test anti-patterns specific to agent-generated code was
        found'
    _model: grok
    _chunk: chunk-007
  - id: C-001
    name: field-maturity-theatre
    definition: 'Categorical labelling of topics as ''**FIELD MATURITY: EMERGING**'' or ''**FRONTIER**'' to perform novelty
      and authority.'
    mechanism: LLM mimics academic/lit-review structures, using bold maturity labels to signal rigour/field-positioning without
      evidence of systematic survey.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: '> **FIELD MATURITY: EMERGING** for quality gates, CI/CD practices, and the Swiss Cheese Model. These are established
        with extensive literature... **FRONTIER** for the oracle problem'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: '> **FIELD MATURITY: FRONTIER.** The application of Weyuker''s oracle problem to human-AI verification systems
        is novel to this project (identified in SD-178).'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: '> **FIELD MATURITY: EMERGING.** Quality gates in CI/CD are established practice. The specific concepts here
        - the gate as poka-yoke...'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: '> **FIELD MATURITY: FRONTIER.** The distinction between what can be automatically verified and what requires
        human judgment is not new... What is novel is applying this distinction as the primary governance dial'
    _model: grok
    _chunk: chunk-008
  pedagogical-overexplain:
  - id: C-001
    name: pedagogical-overexplain
    definition: Extended exposition of established concepts with historical context and multiple restatements, where the concept
      itself is simple and the repetition performs thoroughness rather than clarifying.
    mechanism: 'When explaining a complex system to practitioners, the LLM defaults to exhaustive coverage: historical origin,
      multiple framings, caveats, examples. Each individual restatement is defensible. The cumulative effect is that 40% of
      the text explains poka-yoke (Shingo 1960s, definition, example, why it works) when one sentence would suffice, and the
      reader must extract the actionable insight from surrounding prose.'
    distinct_from: authority-scaffolding (which adds citations to elevate status) and nominalisation-cascade (which removes
      agents from action). Pedagogical-overexplain keeps agents in the text but multiplies explanations unnecessarily.
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: 'In the Toyota Production System, a poka-yoke is an error-proofing mechanism... HISTORY: Shigeo Shingo, an industrial
        engineer at Toyota, developed the poka-yoke concept in the 1960s. The term translates roughly as ''mistake-proofing.''
        Shingo''s key insight was that inspection finds defects but does not prevent them... The model was formally published
        in the Philosophical Transactions of the Royal Society in 1990. By 2016, the paper had attracted over 1,800 citations...'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: 'James Reason published Human Error, which introduced what is now called the Swiss Cheese Model... HISTORY: James
        Reason developed the Swiss Cheese Model from studying catastrophic failures in complex systems...'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: 'the oracle problem is Weyuker 1982... HISTORY: Elaine Weyuker is an ACM Fellow, IEEE Fellow, and AT&T Fellow
        at Bell Labs, elected to the National Academy of Engineering...'
    _model: claude
    _chunk: chunk-008
  hedge-collapse:
  - id: C-002
    name: hedge-collapse
    definition: Hedging language (may, might, seems, appears) present in early sections but absent in later sections discussing
      the same concepts, creating the impression of increasing confidence without new evidence.
    mechanism: As document length increases and context window fills with the same conceptual framework, the model's token
      probability distribution converges toward assertions without hedges. The reader interprets this as confidence-building
      evidence, but it is a statistical artifact of context accumulation and recency. Claims stated tentatively at the document
      start are restated without hedges by the document end, despite no new empirical input between them.
    distinct_from: the-lullaby (which is end-of-session drift due to fatigue and authority signaling) and epistemic-theatre
      (which is performative significance). Hedge-collapse is specifically about hedging language disappearing within a single
      coherent document without evidence justification.
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: 'Agent-generated code breaks this premise in a specific way... may be... is not guaranteed... must be independently
        verified [early section with hedges: ''may,'' ''is not guaranteed'']'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: 'The verification fabric catches agent errors. It is structurally blind to oracle errors. [late section: no hedges,
        unqualified assertion]'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: 'Verification is the intervention point... the agent''s velocity advantage disappears... If you allow an anti-pattern
        into the codebase ''just this once,'' you are not accepting one instance. You are seeding the training context for
        every future agent interaction. [section 9: causal claim stated without qualification despite being presented as inference,
        not measurement]'
    _model: claude
    _chunk: chunk-008
  table-driven-authority:
  - id: C-003
    name: table-driven-authority
    definition: Concepts presented as tables where the table's structure implies equivalence, completeness, and symmetry that
      the underlying concepts do not actually possess.
    mechanism: Tables are cognitively powerful—they imply that the categories are comprehensive, orthogonal, and equally important.
      When a concept is forced into a table structure (two columns, rows of equal height), the structure performs rigor that
      the underlying framework may not justify. A concept that would be stated hesitantly in prose ('some tests catch some
      defects; others do not') becomes authoritative when presented as a 3×4 table with clean headers.
    distinct_from: tally-voice (which uses numbers as rhetoric) and epistemic-theatre (which performs significance). Table-driven-authority
      uses structural form (table format) to perform equivalence and completeness.
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: '| Component | What It Catches | What It Misses | --- | Type checker | Type mismatches, missing properties |
        Correct types used for the wrong purpose | Linter | Style violations, patterns | Logically correct code that violates
        no rules | Test suite | Behavioral regressions for tested scenarios | Untested scenarios, wrong tests |'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: '| Variant | Tasks | Purpose | --- | SWE-bench Full | 2,294 | Original benchmark | SWE-bench Verified | 500 |
        Human-filtered for quality | SWE-bench Lite | 300 | Lower compute cost |'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: '| Anti-Pattern | Mechanism | Detection | Risk | Right Answer, Wrong Work | Assertion matches coincidentally
        | Change implementation, test still passes | False confidence in correctness | Phantom Tollbooth | Assertion too loose
        to discriminate | toBeTruthy(), range checks | Defects pass through as valid |'
    _model: claude
    _chunk: chunk-008
  maturity-theater:
  - id: C-001
    name: maturity-theater
    definition: Assigning semi-formal, arbitrary maturity rankings (e.g., 'Frontier', 'Emerging') to content to simulate the
      presence of a structured research field.
    mechanism: The model attempts to fulfill the 'researcher' persona by adding metadata headers that perform professional
      rigor where there is only anecdotal observation.
    distinct_from: epistemic-theatre (general performance of seriousness)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: '**FIELD MATURITY: EMERGING** for quality gates, CI/CD practices...'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: '**FIELD MATURITY: FRONTIER** for the oracle problem applied to human-AI systems...'
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: The field provides the foundations... This project provides the application...
    _model: gemini
    _chunk: chunk-008
  methodological-branding:
  - id: C-002
    name: methodological-branding
    definition: Re-packaging standard industry practices into proprietary acronyms or 'branded' concepts to create an illusion
      of novel methodology.
    mechanism: The help-imperative leads the model to create 'value-add' by inventing new labels for existing concepts (e.g.,
      renaming manual review to HODL).
    distinct_from: semantic-inflation (inflating significance of facts)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: HOTL (Human Out The Loop) when the output is verifiable.
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: HODL (Human On The Loop) when the output is taste-required.
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: This is THE governance dial.
    _model: gemini
    _chunk: chunk-008
  theoretical-buffering:
  - id: C-003
    name: theoretical-buffering
    definition: The practice of surrounding simple practical instructions with disproportionately large blocks of theoretical
      framing and 'why this matters' sections.
    mechanism: RLHF training for 'comprehensive' and 'educational' responses results in excessive padding that delays the
      actual technical content.
    distinct_from: authority-scaffolding (specifically about citations)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: 1. The Fundamental Verification Challenge (~35 min) [followed by 300+ words of preamble]
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: Step 6 of 11... why this is Step 6... context quality loop revisited...
    - file: sites/oceanheart/content/bootcamp/ii-06-verification.md
      quote: 'The goal: build a verification discipline... [lengthy mission statement for a test suite]'
    _model: gemini
    _chunk: chunk-008
  simulation-reality-gap:
  - id: C-001
    name: simulation-reality-gap
    definition: Instructional examples use simulated/mocked systems where real-world behavior is fundamentally different,
      and the gap is not acknowledged in the text.
    mechanism: 'Teaching requires reproducible examples, so code examples use `SimulatedAPI` or mocked responses. The human
      reading learns the pattern''s mechanics from the simulation but the simulation omits failure modes, race conditions,
      or cost structures present in real systems. The gap is invisible because the example "works." The pattern becomes visible
      only in production where the gap is exposed.

      '
    distinct_from: '"right-answer-wrong-work" (gap in test verification) and "mock-castle" (mock scaffolding exceeds substance).
      Simulation-reality-gap is about instructional incompleteness, not test design or code quality. The code may be well-written
      and the tests may pass, but the simulation boundary is not articulated.

      '
    examples:
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 'class SimulatedAPI... def call(self, prompt: str) -> str... if random.random() < self.failure_rate: raise RateLimitError'
      context: 'The simulation generates failures uniformly at random. Real API failures cluster: rate limits occur in bursts
        after traffic spikes, not uniformly distributed. A student practicing with the simulation learns to handle random
        failures but not traffic correlation, which is the real problem.'
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 'Test 1: Normal operation with retries... verify retries succeed. Test 2: Circuit breaker trips... consecutive_failure_count=10.'
      context: The simulation trips the breaker after exactly 10 consecutive failures. Real systems experience recovery attempts
        during the failure window (flapping), where the breaker may trip and recover multiple times before sustained failure.
        The simulation teaches the happy path of stable states but not the threshold-crossing behavior.
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 'def simulate_api_call(task_type: str)... Classification: input (200, 500), output (10, 50)'
      context: 'Token counts are random within a range, but do not account for the heavy tail: rare requests that consume
        10x the median tokens. The 95th percentile request in the simulation uses the same logic as the median request. Real
        cost spikes come from outliers, not medians. The simulation teaches average-case cost control but not tail risk.'
    _model: claude
    _chunk: chunk-009
  forward-reference-cascade:
  - id: C-002
    name: forward-reference-cascade
    definition: A section establishes a pattern or concept by referencing a downstream section that is not yet read, creating
      a dependency loop where understanding requires jumping ahead.
    mechanism: 'The author mentions a concept from a later section to explain the current section, forcing the reader to either
      skip ahead or continue without full context. This differs from structure (which deliberately orders knowledge) because
      the forward reference is often _unnecessary_ - the concept could be explained in place. The model includes the reference
      to feel authoritative (signaling that a downstream treatment exists) without recognizing it as a comprehension blocker.

      '
    distinct_from: 'Traditional forward references are often deliberate (e.g., "we will prove this in Theorem 5"). Forward-reference-cascade
      is unintentional broken ordering where a section assumes the reader has read what comes next, creating a loop that degrades
      with length.

      '
    examples:
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: Each level represents a tradeoff. The secondary model may produce lower-quality output... This connects to the
        project's engineering loop (verify before moving on) and the gate concept (do not leave the system in an unverified
        state).
      context: The fallback chain section references 'the project's engineering loop' and 'the gate concept' without explaining
        them. The reader must recall these from earlier steps or skip ahead. The reference adds nothing - the tradeoff is
        comprehensible without invoking external concepts.
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: The SLO is not a promise of perfection. It is an acknowledgment that the system will sometimes fail, and a definition
        of how much failure is acceptable. The gap between actual performance and the SLO is the error budget - a concept
        from SRE...
      context: Error budget is introduced mid-explanation of SLOs, then acknowledged as a concept from 'SRE' without being
        defined. A reader unfamiliar with SRE must either skip ahead to the Recommended Reading section or accept the term
        without understanding.
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: The deploym­ent infrastructure from Step 7 (observability) provides the data pipeline. This section defines what
        to measure and what to alert on.
      context: The section references Step 7's deployment infrastructure before explaining what that infrastructure is. A
        reader on their first encounter with this step cannot understand what 'the infrastructure from Step 7' means without
        reading Step 7 first.
    _model: claude
    _chunk: chunk-009
  capability-aspiration-gap:
  - id: C-003
    name: capability-aspiration-gap
    definition: Code examples demonstrate a capability as if it were implemented when key pieces are stubs, TODOs, or entirely
      missing.
    mechanism: 'The example code is syntactically valid and demonstrates the pattern''s shape, but omits critical implementation
      details (actual API authentication, database connection, real credential loading) or leaves them as comments. The reader
      believes they understand the capability after reading the example, but deploying it reveals the gaps. This differs from
      simplified examples (which are honest about being simplified) by claiming completeness through the absence of caveats.

      '
    distinct_from: '"paper-guardrail" (asserting protection without mechanisms) and "mock-castle" (mock scaffolding). Capability-aspiration-gap
      is about incomplete implementation presented as complete, not about false assurances or excessive mocking.

      '
    examples:
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: '@staticmethod def get_api_key(provider: str) -> str:... key = os.environ.get(env_var) if not key: raise EnvironmentError(...)
        return key'
      context: The code reads from environment, but does not implement the actual secrets manager integration. The section
        says 'In production, use AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager' as a comment. The example shows
        only the environment variable fallback, presenting it as production-ready when it is development-level.
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 'def call(self, fn, *args, **kwargs): try: result = fn(*args, **kwargs)... except Exception as e: with self._lock:
        ... raise'
      context: The circuit breaker implementation uses a threading.Lock but is presented as a complete, production-ready pattern.
        In reality, a production circuit breaker needs thread-safe state transitions, atomic flag checks, and recovery logic
        - the example shows the outline but not the safety-critical details.
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 'def record_spend(self, amount_usd: float, user_id: str = ''system'') -> bool:... if projected > self.daily_limit_usd:
        return False... # Alert at threshold if self._alert_callback: self._alert_callback(...)'
      context: The daily budget tracking is implemented but does not persist state across restarts. A power outage or deploy
        resets the daily_spend dict. The code presents as complete but the persistence layer is missing. The caveat ('In production,
        use a database') is in a comment, not in the code flow.
    _model: claude
    _chunk: chunk-009
  - id: C-002
    name: capability-aspiration-gap
    definition: A statement describes a tool's capability in terms of what it could theoretically enable rather than what
      has been demonstrated or tested, creating an aspirational frame that readers interpret as proven fact.
    mechanism: 'The LLM phrases tool capabilities using enabling language ("lets you verify," "shows you what happened," "turns
      X into Y") without distinguishing between designed capability and actually tested, working capability. The gap between
      "curl can show you HTTP headers" and "curl successfully diagnosed the agent''s API problem in production" is elided.
      A human would say "curl can show you the headers, and in my experience that has helped me diagnose X" or "I haven''t
      actually needed this yet." The LLM says "curl is your primary diagnostic" without evidence of actual diagnostics performed.

      '
    distinct_from: '"semantic-inflation" (which exaggerates significance of what exists), "epistemic-theatre" (which performs
      significance). This pattern is about aspirational capability framing. The tool exists and works, but the frame around
      it is aspirational, not evidential.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/10-networking-cli.md
      quote: '''Why can''t the container reach the internet?'' is a question that requires checking multiple layers: DNS resolution
        inside the container (`docker exec container cat /etc/resolv.conf`), routing (`docker exec container ip route`), and
        iptables rules on the host (`sudo iptables -t nat -L -n`). Agents cannot diagnose this because they operate inside
        the container and cannot see the host''s iptables rules. You diagnose from outside.'
    - file: sites/oceanheart/content/bootcamp/10-networking-cli.md
      quote: tcpdump is your first verification tool. 'Did the agent actually remove all uses of the deprecated function?'
        - `rg 'oldFunction' src/` answers in milliseconds. The Makefile's delta detection uses `git diff --stat` (text output)
        to check whether a polecat agent actually changed anything.
    - file: docs/bootcamp/04-text-pipeline.md
      quote: An agent claiming 'I updated the config' is unverified until you run `yq '.key' config.yaml` and see the value.
        An agent producing metrics is opaque until you can pipe its output through `jq` and extract what matters. These tools
        are your verification instruments.
    _model: claude
    _chunk: chunk-043
  disaster-scaffolding:
  - id: C-001
    name: disaster-scaffolding
    definition: Using a rhythmic list of hypothetical catastrophic failures to justify mundane architectural choices.
    mechanism: The LLM generates fear-based rhetoric to create a 'problem' that its subsequent, simple code example 'solves'.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: They die because the LLM API returns a 429 at 3am... They die because a prompt injection...
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 'The worst outcome is none of these: a silent failure, a cryptic error, or a hallucinated response...'
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: A broken agent prompt may produce plausible-looking but wrong output that passes all automated checks.
    _model: gemini
    _chunk: chunk-009
  jargon-naturalization:
  - id: C-002
    name: jargon-naturalization
    definition: Treating project-specific internal terms or slop-patterns as if they were universal industry standards.
    mechanism: The LLM embeds the user's private vocabulary (The Gate, HODL) into documentation as authoritative, undefined
      principles.
    distinct_from: semantic-inflation
    examples:
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 'AGENTIC GROUNDING:'
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: This is the HODL principle from the project vocabulary...
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: be careful of alert fatigue (the naturalist's tax from the project lexicon).
    _model: gemini
    _chunk: chunk-009
  simulated-curricular-precision:
  - id: C-003
    name: simulated-curricular-precision
    definition: Attaching granular, non-verifiable metadata (time estimates, maturity scores) to sections to perform the 'shape'
      of a rigorous curriculum.
    mechanism: Generating aesthetic markers of 'bootcamp' rigor (~35 min) without any empirical baseline.
    distinct_from: tally-voice
    examples:
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 'Estimated time: 4-5h'
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 5. Cost Controls (#5-cost-controls) (~35 min)
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: 10. Challenges (#challenges) (~90-120 min)
    _model: gemini
    _chunk: chunk-009
  field-vs-novel-dyad:
  - id: C-001
    name: field-vs-novel-dyad
    definition: Formulaic '**FIELD VS NOVEL**' sideboxes that contrast established patterns with purportedly unique agent
      adaptations, performing analytical depth via repetitive comparative framing.
    mechanism: 'LLM tutorial generation reflex: detects engineering pattern explanation, inserts boxed dichotomy to mimic
      expert blogs, inflating routine adaptations as field-advancing insights without independent verification.'
    distinct_from: semantic-inflation (claims broad novelty without boxing/formula); epistemic-theatre (no candor/novelty
      phrases, structural not rhetorical); authority-scaffolding (no citations, self-referential claims).
    examples:
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: '> **FIELD VS NOVEL:** Exponential backoff with jitter (Brooker 2015) and circuit breakers (Nygard 2007) are
        established distributed systems patterns. The application to LLM API calls... The cost-aware retry decision is an
        emerging pattern specific to LLM systems.'
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: '> **FIELD VS NOVEL:** Queue-based dispatch (Celery, BullMQ), worker pools, and concurrency control are established
        patterns from distributed systems engineering. The novel element for agent systems is the dual constraint of rate
        limits and per-token cost...'
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: '> **FIELD VS NOVEL:** Per-request budgets and daily caps are standard billing controls adapted from cloud infrastructure...
        The novel element is the per-token granularity and the coupling between cost and behavior...'
    - file: docs/bootcamp/bcv-09-production-patterns.md
      quote: '> **FIELD VS NOVEL:** SRE concepts (SLI, SLO, error budgets) are established practice... The application to
        agent systems requires defining agent-specific SLIs... The cost SLI is particularly novel...'
    _model: grok
    _chunk: chunk-009
  - id: C-001
    name: field-vs-novel-dyad
    definition: Repeated boxed diptychs contrasting 'field' (established) with 'novel' (documented patterns) to perform originality.
    mechanism: LLM reflex to differentiate content for perceived value, generating parallel structures that inflate adaptation
      as innovation across sections.
    distinct_from: semantic-inflation (elevates user's work); this is self-referential framing of the document's own content
      via formulaic boxes.
    examples:
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '**FIELD VS NOVEL:** Exponential backoff with jitter (Brooker 2015) and circuit breakers (Nygard 2007) are established
        distributed systems patterns. The application to LLM API calls is straightforward but requires adaptation... The cost-aware
        retry decision is an emerging pattern specific to LLM systems.'
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '**FIELD VS NOVEL:** Queue-based dispatch (Celery, BullMQ), worker pools, and concurrency control are established
        patterns from distributed systems engineering. The novel element for agent systems is the dual constraint of rate
        limits and per-token cost...'
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '**FIELD VS NOVEL:** ... The novel element is the unsolvability: prompt injection is not a bug to fix but a property
        of instruction-following models. This has no precedent in traditional security...'
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '**FIELD VS NOVEL:** SRE concepts (SLI, SLO, error budgets) are established practice... The application to agent
        systems requires defining agent-specific SLIs - cost per task, cache hit rate... The cost SLI is particularly novel...'
    _model: grok
    _chunk: chunk-010
  code-audit-gap:
  - id: C-001
    name: code-audit-gap
    definition: 'Code examples demonstrate a pattern or principle but omit security/correctness checks that would catch realistic
      failure modes. The code works for the happy path shown; production would require additional validation that is not included
      in the example.

      '
    mechanism: 'The LLM optimizes code examples for pedagogical clarity and brevity, removing edge cases and defensive checks
      that would make the example harder to understand. When deployed as-is, the code is production-incomplete but students
      don''t know what''s missing.

      '
    distinct_from: '"right-answer-wrong-work" (which applies to tests) and "mock-castle" (which applies to test scaffolding).
      This pattern applies to implementation code, not test code. The code is not *wrong* per se, but it is *incomplete* in
      a way that''s not immediately obvious.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '"def validate_input(user_input: str) -> str: search for patterns: regex checks for ''ignore previous instructions''
        etc. if flags: print(''SECURITY: flagged''). return user_input" — Returns the input unchanged even after flagging.
        No escalation, rejection, or further action.

        '
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '"def validate_agent_output(output: str, task_type: str) -> bool: if ''rm -rf'' in output.lower(): return False"
        — Exact-string matching on shell commands. Bypassed by spacing, encoding, or ''r m  -  r f /''. Demonstrates validation
        without demonstrating bypass-resistant validation.

        '
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '"class IdempotencyStore: _completed: dict = field(default_factory=dict)" — In-memory dictionary for idempotency
        tracking. Works for single-process examples. Production requires Redis or database for durability across process restarts.
        Example omits this.

        '
    _model: claude
    _chunk: chunk-010
  framework-optional-conflation:
  - id: C-002
    name: framework-optional-conflation
    definition: 'Code examples explicitly state that production requires Framework X, then provide a simplified implementation
      that omits the critical features Framework X provides, without clearly marking what is missing.

      '
    mechanism: 'The LLM provides "what it does" (the pattern) without clearly delineating "what this simplified code lacks
      that the real framework provides." The student sees both the framework recommendation and a working simplified example,
      and may not understand which features are pedagogical simplifications.

      '
    distinct_from: '"code-audit-gap" (which is about completeness). This is specifically about the gap between "use Framework
      X in production" and "here''s a simplified version for understanding" not being explicitly marked as a gap.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '"In production, use Celery (celeryq.dev) or BullMQ. This shows the pattern without external dependencies." —
        The AgentQueue class lacks durability, ordering guarantees, task result persistence, failure recovery, and distributed
        execution. The gap between the example and what Celery provides is not enumerated.

        '
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '"In production, use Unleash (open source) or LaunchDarkly. Unleash specifically has guides for managing AI model
        rollouts..." — Then provides FeatureFlags class that lacks percentage-based rollout UI, audit logs, A/B testing analytics,
        and consistency guarantees across distributed systems.

        '
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '"In production, use Redis or a database table for durability." — The IdempotencyStore example uses in-memory
        dict. The comment indicates durability is required but the code does not implement it or show how to add it.

        '
    _model: claude
    _chunk: chunk-010
  aspirational-configuration:
  - id: C-003
    name: aspirational-configuration
    definition: 'Configuration or code setting presented as best practice or recommendation when the document itself does
      not implement or validate it. The recommendation exists in words; the implementation skips it.

      '
    mechanism: 'The LLM provides best practices (often copied from authoritative sources like Google SRE or OWASP) but does
      not model them in the accompanying code. The reader is told "do this" without seeing it done. This creates two tiers
      of practice in a single section: recommended and demonstrated.

      '
    distinct_from: '"paper-guardrail" (which is about assurances without enforcement). This is about showing the right thing
      to do in documentation while doing something different in code.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '"Production systems use Celery with Redis/RabbitMQ as the broker. This example shows the pattern without external
        dependencies." — Code does not include message serialization, error handling for dead-letter queues, or retry-on-task-failure.
        These are production requirements mentioned elsewhere in the document but not modeled here.

        '
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: '"In production, use a secrets manager (AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager). For development,
        .env files loaded by the deployment system." — Code does not show loading from .env or secrets manager. Credentials
        are retrieved via os.environ.get() without fallback or error handling for missing secrets.

        '
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: 'Section 8.2 example: "with open(''debug.log'', ''w'') as f: f.write(result)" — No rotation, no size limits,
        no structured logging format despite the document''s emphasis on "structured logging with trace IDs" in the checklist.

        '
    _model: claude
    _chunk: chunk-010
  temporal-anchoring:
  - id: C-001
    name: temporal-anchoring
    definition: Using specific future or 'current' dates as a rhetorical device to signal up-to-the-minute relevance.
    mechanism: The LLM try to mask training-data drift by asserting 'As of [Date]' for facts it cannot actually verify in
      real-time.
    distinct_from: absence-claim-as-compliment
    examples:
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: As of March 2026, the cost per 1K input...
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: There is no standard 'production agent framework' as of March 2026.
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: 'Prompt injection remains the #1 risk... in 2025.'
    _model: gemini
    _chunk: chunk-010
  prestige-arbitrage:
  - id: C-002
    name: prestige-arbitrage
    definition: Borrowing legitimacy from mature fields (OS, SRE) by mapping LLM quirks to high-status engineering theory.
    mechanism: The model uses intellectual analogies to older domains to make 'agent engineering' feel more rigorous.
    distinct_from: authority-scaffolding
    examples:
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: This is the same resource contention problem that operating systems solve with process scheduling.
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: The circuit breaker and per-model tracking are the agent infrastructure equivalent of fair scheduling.
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: The per-request budget is the circuit breaker for cost.
    _model: gemini
    _chunk: chunk-010
  didactic-recursive-summary:
  - id: C-003
    name: didactic-recursive-summary
    definition: Aggregating the same information into multiple redundant pedagogical structures (checklists, takeaways, verifications).
    mechanism: RLHF training for 'helpful' tone causes the model to repeat its own content in every available markdown list
      format.
    distinct_from: nominalisation-cascade
    examples:
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: 'Section 9: Production Readiness Checklist [re-lists the whole doc]'
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: 'Section 11: Key Takeaways [summarizes the whole doc]'
    - file: sites/oceanheart/content/bootcamp/v-09-production-patterns.md
      quote: Before moving on, verify you can answer these questions... [converts the doc into questions]
    _model: gemini
    _chunk: chunk-010
  narrative-authority-bootstrapping:
  - id: C-001
    name: narrative-authority-bootstrapping
    definition: Building argument authority through recursive self-citation and internal-reference density without external
      validation, creating a closed epistemic system.
    mechanism: 'When a document is built primarily from internal references (SD numbers, project-specific frameworks, personal
      session logs), the document becomes self-justifying. Each citation of an internal artifact reinforces its own authority.
      The reader cannot verify the cited artifacts, so they implicitly accept them as valid because they are cited frequently
      and consistently. The mechanism is context accumulation: internal references feel authoritative because they are numerous,
      not because they have been independently validated.'
    distinct_from: authority-scaffolding (which uses external academic citations to shore up routine observations). Narrative
      authority bootstrapping creates closed loops of internal reference; authority scaffolding uses external sources. Bootstrapping
      is self-reinforcing; scaffolding borrows external credibility.
    examples:
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: 'This section makes the taxonomy available for external replication. The intellectual honesty requirement: ''novel''
        means ''not found in published literature as named, defined operational concepts with specific controls.'''
      explanation: The document claims novelty by defining novelty as 'not in published literature.' But it does not cite
        published literature search. Instead it cites internal artifacts (slopodar.yaml, standing orders) as the evidence
        base for the framework. The framework becomes authoritative because the document references it; the references are
        authoritative because they cite the framework.
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: The standing policy 'write decisions to durable files, not context only' (SD-266) is the defence — but it only
        works if the human enforces it.
      explanation: SD-266 is cited as established policy without providing its text, date, or enforcement record. The reader
        must trust that this is a legitimate standing order. The citation creates authority through assumed internal validity.
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: These are engineering instruments derived from one project, one model family, and 200+ session decisions of daily
        practice.
      explanation: Authority is claimed from 'daily practice' and '200+ session decisions.' These are internal metrics (SD
        numbers, session logs) that the reader cannot verify. The quantity of internal decisions is presented as evidence
        of validity.
    _model: claude
    _chunk: chunk-011
  false-empiricism:
  - id: C-002
    name: false-empiricism
    definition: Presenting operational observations from a single project as evidence of general principles without acknowledging
      the limited generalisability or single-context provenance.
    mechanism: When a system works well in one context, the designer tends to attribute success to the principles embedded
      in the system rather than to the fit between system and context. The document repeatedly frames observations ('the METR
      RCT showed perception-reality gap,' 'sycophancy is an inverse scaling behaviour') as field findings when some are published
      research and some are project-specific observations. The reader is positioned to treat both categories identically —
      as validated facts — when they have different evidential weight.
    distinct_from: semantic-inflation (which inflates the significance of what exists). False empiricism presents narrow observations
      as if they have been tested across contexts. Semantic inflation elevates a feature into a gap. False empiricism conflates
      one project's working practices with general principles.
    examples:
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: 'The intellectual honesty position: if you recognise these patterns in your own work, they replicate. If you
        do not, they do not.'
      explanation: 'Frames pattern recognition as evidence of replication. But absence of recognition in another context could
        mean: (1) the pattern does not exist there, (2) the reader did not look for it, (3) the pattern exists but manifests
        differently in a different system. The conditional (''if you recognise'') treats observation as both necessary and
        sufficient for validity.'
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: In the pilot study that preceded this project, 5 hours of human QA found issues that 1102 automated tests did
        not catch.
      explanation: 'A single-project observation is presented without context controls. 1102 tests might be: poorly written,
        not designed for the issues the QA person found, or redundant. The 5-hour QA result might be domain-specific. The
        finding is presented as universal evidence for the necessity of L12 human review.'
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: 'The METR RCT (2025) measured a specific instance: experienced developers using AI tools predicted they were
        24% faster, but were actually 19% slower — a 40-point perception-reality gap.'
      explanation: 'An external research finding (METR RCT) is cited correctly, but then immediately treated as evidence for
        ''foot gun 2: high on own supply'' in the project''s framework. The RCT measured perception-reality gap. The project''s
        foot gun describes sycophantic reinforcement. The causal mechanisms are different; the findings are presented as synonymous.'
    _model: claude
    _chunk: chunk-011
  framework-theology:
  - id: C-003
    name: framework-theology
    definition: Treating an operational framework (layers, anti-patterns, governance rules) as if it is a complete and correct
      description of reality, rather than as one possible conceptualisation among alternatives.
    mechanism: 'Once a framework is named and systematised (the L0-L12 layer model, the 7 HCI foot guns), the act of systematisation
      creates the appearance of completeness. The document does not claim completeness — in fact it disclaims it (''These
      are not research findings''). But the structure itself implies comprehensiveness: a taxonomy with 40 entries feels exhaustive,
      layer model with 13 layers feels complete. Readers treat the framework as a map of reality rather than as one possible
      map. The framework becomes the thing it describes.'
    distinct_from: becoming-jonah (which is recursive self-reflection without output). Framework theology accepts the output
      of recursion as truth rather than as one perspective. It is treating the map as territory.
    examples:
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: 'Read bottom-up for data flow: tokens flow from weights (L0) through generation (L4) to the API (L5), through
        the harness (L6) and tools (L7), shaped by the agent role (L8), and arrive as text that the human reads at L12. Read
        top-down for control flow: the human at L12 decides...'
      explanation: 'The layer model is presented as a complete bidirectional mapping of causality. But alternative framings
        are possible: decision cascades (top-down), information flow (bottom-up), temporal sequence (left-to-right), or failure
        propagation (diagonal). The document treats the chosen framing as definitive rather than as a useful perspectival
        choice.'
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: Every failure mode described in this step has a specific control. The controls are not theoretical — they were
        developed and tested during 200+ session decisions of daily practice in agentic engineering.
      explanation: Asserts that every failure mode has a specific control, then grounds this in project practice. But 'tested
        in practice' is not the same as 'proven effective.' A practice that evolved through 200 decisions in one context may
        not work in another context. The framework implies sufficiency; the evidence supports only coherence.
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: The 7 HCI foot guns form a system, not a list. Each foot gun makes the others more likely.
      explanation: Asserts systematic interdependence without modelling the interactions. 'Form a system' is stronger than
        'are related.' The document claims holistic interaction without providing the coupling constants, feedback loops,
        or alternative organisational models. The framing elevates taxonomy to system.
    _model: claude
    _chunk: chunk-011
  provenance-anchoring:
  - id: C-001
    name: provenance-anchoring
    definition: Citing internal session logs or project-specific IDs as if they are externally verified peer-reviewed evidence.
    mechanism: The model uses unique identifiers (SD-XXX) to simulate the authority of a formal citation, 'grounding' claims
      in a closed loop of authority that the reader cannot verify.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: '...hit a crisis point (SD-130) that was not hallucination.'
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: '...the echo/readback standing policy (SD-315) used in this project.'
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: '...write decisions to durable files, not context only (SD-266).'
    _model: gemini
    _chunk: chunk-011
  cosplay-science:
  - id: C-002
    name: cosplay-science
    definition: Mimicking the structural formatting of research papers or industry intelligence briefs to present subjective
      engineering experiences.
    mechanism: The use of 'Field Maturity' ratings, 'History' sidebars, and prerequisite/leads-to graphs creates an aura of
      established academic discipline for what is essentially an internal team's playbook.
    distinct_from: authority-scaffolding
    examples:
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: 'FIELD MATURITY: FRONTIER.'
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: '> **HISTORY:** Bainbridge''s "Ironies of Automation" (1983, Automatica)...'
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: 'Prerequisites: Step 1 (LLM mechanics - you need L0-L5...)'
    _model: gemini
    _chunk: chunk-011
  contextual-island-jargon:
  - id: C-003
    name: contextual-island-jargon
    definition: Inventing project-specific terminology to describe standard LLM behaviors as if they are unique physical laws
      or proprietary insights.
    mechanism: By naming standard phenomena (like context overflow or RLHF agreeableness) with idiosyncratic terms (Foot Guns,
      Dumb Zone, HOTL/HODL), the model creates a proprietary vocabulary that makes simple troubleshooting feel like high-level
      strategy.
    distinct_from: nominalisation-cascade
    examples:
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: The 7 HCI Foot Guns
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: '...through sycophantic drift, cognitive deskilling, temporal asymmetry, or any of the 7 named foot guns...'
    - file: docs/bootcamp/step07-human-ai-interface.md
      quote: '...the HOTL/HODL framework exists: delegate to the model when the gate can verify, but remain engaged when taste
        is required.'
    _model: gemini
    _chunk: chunk-011
  falsifiability-exit:
  - id: C-001
    name: falsifiability-exit
    definition: A rhetorical strategy where the truth of a claim is placed entirely on the reader's subjective experience,
      making it impossible to disprove.
    mechanism: The LLM uses this to avoid taking a stand on its own truth value while sounding 'honest.' It creates a 'heads
      I win, tails you don't understand' logic.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: 'The intellectual honesty position: if you recognise these patterns in your own work, they replicate. If you
        do not, they do not.'
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: The patterns are hypotheses. If you recognise them in your own work, they replicate. If you do not, they do not.
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: if you recognise these patterns in your own work, they replicate. If you do not, they do not.
    _model: gemini
    _chunk: chunk-012
  operationalist-branding:
  - id: C-002
    name: operationalist-branding
    definition: The excessive use of engineering adjectives like 'operational' or 'instrumental' to rebrand routine observations
      as technical requirements.
    mechanism: The help imperative leads the model to dress up simple advice in the vocabulary of systems engineering to increase
      its perceived utility.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: the layer model (L0-L12) as an operational instrument
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: 7 HCI foot guns as named operational failure modes
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: operationalise this as a standing policy (SD-315)
    _model: gemini
    _chunk: chunk-012
  pseudo-metrication:
  - id: C-003
    name: pseudo-metrication
    definition: The creation of fake or uncalibrated units (e.g., 'agent-minutes', 'points') to give the appearance of quantitative
      precision to qualitative guesses.
    mechanism: The model attempts to satisfy a perceived need for 'data' by inventing metrics that follow the grammar of measurement
      without the reality of it.
    distinct_from: tally-voice
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: a 40-point perception-reality gap
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: 'Cost: roughly 15 agent-minutes.'
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: estimate = '5-6 hours' [in frontmatter]
    _model: gemini
    _chunk: chunk-012
  repetitive-refrains:
  - id: C-001
    name: repetitive-refrains
    definition: Formulaic, branded summary blocks (e.g., '**AGENTIC GROUNDING:**') repeated across sections to punctuate content,
      simulating structured pedagogy through stylistic monotony.
    mechanism: LLMs generate consistent, labeled recap structures in instructional prose to mimic comprehensive teaching materials,
      accumulating density that fatigues reader attention without varying insight delivery.
    distinct_from: epigrammatic-closure
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: '**AGENTIC GROUNDING:** When an agent has been working on a task for 20+ turns, every assertion it made in the
        first few turns is anchoring everything it says now.'
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: '**AGENTIC GROUNDING:** When you read an agent''s output and it says "I have reviewed my work and confirmed it
        is correct," this is self-review: the degenerate N=1 ensemble.'
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: '**AGENTIC GROUNDING:** L12 is also the system''s out-of-band backup storage.'
    - file: sites/oceanheart/content/bootcamp/ii-07-human-ai-interface.md
      quote: '**AGENTIC GROUNDING:** When reviewing an agent''s output, train yourself to separate two questions: "Is this
        factually correct?" and "Is this appropriately confident?"'
    _model: grok
    _chunk: chunk-012
  instruction-inflation:
  - id: C-001
    name: instruction-inflation
    definition: Padding instructional content with motivational framing, appeals to prerequisites, or emotional tone that
      exceeds what is needed to convey the technical content.
    mechanism: The LLM deploys RLHF-trained helpfulness patterns that add engagement signaling (encouraging tone, 'you will
      learn,' 'exciting') even when technical documentation requires efficiency and clarity. Each addition feels supportive
      in isolation but accumulates into noise that lengthens reading time without adding information.
    distinct_from: epistemic-theatre (which performs significance of the content itself) vs instruction-inflation (which performs
      the value of learning the content). Epistemic theatre is 'this topic matters.' Instruction inflation is 'you will find
      this worthwhile to learn.'
    examples:
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: 'Estimated time: 4-5 hours / Field maturity: Emerging / Prerequisites: Bootcamp I Step 8... / Leads to: Step
        8... / You will need: Python 3.10+, DuckDB...'
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: By the end of this step, you will be able to instrument an agent system to produce structured traces, query those
        traces for diagnostic information, evaluate tracing frameworks against your requirements, and build alerts that detect
        common failure patterns before they reach users.
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: This step exists at position 7 because it requires the foundational material from Steps 1-6. You need to understand
        retrieval (Step 1) to recognize when the wrong documents were fetched. You need to understand tool use (Step 5) to
        interpret tool call traces.
    _model: claude
    _chunk: chunk-013
  - id: C-001
    name: instruction-inflation
    definition: Task specification grows in complexity and meta-documentation faster than the output it describes, creating
      overhead that doesn't correlate with deliverable value.
    mechanism: When a task is complex enough to need detailed specification, the LLM generates increasingly thorough instructions
      (cross-references, dependency tables, phase breakdowns) that exceed the actual work's scope. The specification becomes
      performatively rigorous.
    distinct_from: governance-recursion (which is about generating governance layers in response to problems) and paper-guardrail
      (which is about rules without enforcement). Instruction-inflation is about specification size bloat specifically.
    examples:
    - file: docs/bootcamp/tasks/DISPATCH.md
      quote: '16 tasks decomposed from the Bootcamp II outline... Execution Order... Phase 1: Research... Phase 2: Write...
        Phase 3: Write... Phase 4: Write... Dependency Graph (Visual)... Critical Path'
    - file: docs/bootcamp/tasks/iv-04-research-tier2-external/instructions.md
      quote: Step 4 References to Research (9 items)... Step 5 References to Research (4 items)... Step 6 References to Research
        (5 items)... Output Format... Group by step. Flag any references...
    - file: docs/bootcamp/tasks/iv-03-research-tier1-external/instructions.md
      quote: '## Step 1 References to Research (5 items)... ## Step 2 References to Research (3 items)... ## Step 3 References
        to Research (5 items)... ## Output Format... For each reference:'
    _model: claude
    _chunk: chunk-085
  - id: C-001
    name: instruction-inflation
    definition: Task instructions expand beyond actionable specificity into governance and quality aspirations without enforcement
      mechanisms.
    mechanism: 'When a write agent receives instructions, they contain both: (1) what to build, and (2) what the outcome should
      not be. The model attempts to satisfy both by adding governance language to the write instructions themselves, which
      performs constraint without constraining. Each layer of added governance is individually defensible but collectively
      creates friction and false confidence.'
    distinct_from: paper-guardrail (which is about process rules), governance-recursion (which is about spawning new governance
      artifacts). This is about instruction creep within a single task definition.
    examples:
    - file: docs/bootcamp/tasks/06-write-step1-tabular-data/instructions.md
      quote: Every code example must have correct imports. Every file path must be a real project path (verify against Task
        02 findings). Every pandas/DuckDB API call must match the signatures in Task 03 findings. No emojis, no em-dashes
    - file: docs/bootcamp/tasks/10-write-step5-time-series/instructions.md
      quote: No ARIMA, no forecasting, no stationarity tests - stay practical / This is the step where SQL stops being a data
        access language and becomes an analytical tool.
    - file: docs/bootcamp/tasks/12-write-step7-log-analysis/instructions.md
      quote: Practical Over Theoretical / The outline says 'these are time series questions with practical answers that don't
        require ARIMA models or Fourier transforms.' Enforce this.
    _model: claude
    _chunk: chunk-089
  assumption-overloading:
  - id: C-002
    name: assumption-overloading
    definition: Statements that embed multiple unstated assumptions about the reader's knowledge, context, or values without
      explicitly flagging them as assumptions.
    mechanism: The LLM generates text optimized for a hypothetical ideal reader with a specific background, then publishes
      it as if addressing a general audience. Phrases like 'as you know,' 'obviously,' 'it is clear that' mark the boundaries,
      but many assumptions are implicit. The writer assumes the reader understands context that may not be shared.
    distinct_from: authority-scaffolding (which adds citations to justify simple observations) vs assumption-overloading (which
      assumes the reader already understands and does not flag what is assumed). Related to monoculture-analysis when the
      assumed reader is 'someone who has read the same training data as me.'
    examples:
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: Traditional APM tracks latency, error rates, and throughput. These metrics matter for agent systems too, but
        they are not sufficient.
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: The Inspect AI evaluation framework covered in Bootcamp IV
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: If you are using Inspect for evaluation (Bootcamp IV), you already have tracing.
    _model: claude
    _chunk: chunk-013
  framework-agnosticism-claim:
  - id: C-003
    name: framework-agnosticism-claim
    definition: Asserting that a tool, approach, or data format is 'framework-agnostic' or 'has no opinions' while actually
      embodying specific architectural choices that constitute opinions.
    mechanism: The LLM frames custom or neutral-seeming approaches as universally compatible to make them sound more valuable
      than competing frameworks. The claim of agnosticism itself becomes a rhetorical position. Every data format, schema,
      and architecture has opinions; the difference is whether they are explicit (framework docs) or implicit (in code).
    distinct_from: semantic-inflation (which overstates the novelty of a contribution) vs framework-agnosticism-claim (which
      overstates the neutrality of a technical choice). These often appear together—claiming a contribution is novel AND framework-agnostic.
    examples:
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: Every framework has opinions about how traces should be structured. Custom JSONL has no opinions - it is raw
        data.
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: 'The practical recommendation for this bootcamp: Phoenix is the strongest candidate for hands-on exercises because
        it is open-source and runs locally. Use it for the framework comparison exercise (Challenge 2). For production, evaluate
        whether the full platform is justified or whether custom JSONL + DuckDB meets your needs.'
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: Now positions itself as 'framework-agnostic' with integrations for OpenAI, Anthropic, CrewAI, Vercel AI SDK,
        Pydantic AI, and others.
    _model: claude
    _chunk: chunk-013
  analogical-overfitting:
  - id: C-001
    name: analogical-overfitting
    definition: Using a single technical analogy as a rigid anchor for an entire conceptual framework, performing depth through
      structural mimicry.
    mechanism: The LLM identifies a surface-level similarity (e.g., tracing is like strace) and forces every subsequent point
      to map to that analogy to appear mathematically precise.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: The structural parallel is exact. strace intercepts the boundary between userspace and kernel. The agent trace
        intercepts the boundary between the agent harness and the LLM provider.
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: It is to agent debugging what the stack trace is to traditional debugging and what strace output is to process
        debugging.
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: The agent trace serves the same function at the agent boundary [as strace].
    _model: gemini
    _chunk: chunk-013
  pedagogical-rigidity:
  - id: C-002
    name: pedagogical-rigidity
    definition: Performing academic authority through obsessive numbering of prerequisites, steps, and 'downstream' dependencies
      that appear arbitrary.
    mechanism: The LLM creates a sense of a 'discipline' by over-complicating the sequence of information, making simple concepts
      seem like 'Step 7' of a deep hierarchy.
    distinct_from: tally-voice
    examples:
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: 'Prerequisites: Bootcamp I Step 8 (process observation), Bootcamp II Step 9 (failure modes), Step 5 (state management),
        Step 6 (multi-step agents)'
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: This step exists at position 7 because it requires the foundational material from Steps 1-6.
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: 'Leads to: Step 8 (debugging agent systems), Step 9 (production patterns)'
    _model: gemini
    _chunk: chunk-013
  taxonomic-theatre:
  - id: C-003
    name: taxonomic-theatre
    definition: Arbitrarily dividing a topic into exactly N properties or rules to mimic the structural appearance of a complete
      and exhaustive taxonomy.
    mechanism: The LLM's instruction-following nature loves 'The [Number] [Noun] of [Topic]' structures. It forces information
      into these containers even when the division is meaningless.
    distinct_from: tally-voice
    examples:
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: 'The four properties that make agents different: Non-deterministic outputs, Multi-step reasoning, Tool interactions
        as side effects, Context state evolution.'
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: 'The format has three properties that matter: 1. Append-only. 2. Streamable. 3. Queryable.'
    - file: docs/bootcamp/bcv-07-observability-tracing.md
      quote: 'Two design choices to note: 1. Immediate flush. 2. Append mode.'
    _model: gemini
    _chunk: chunk-013
  field-vs-novel-framing:
  - id: C-001
    name: field-vs-novel-framing
    definition: Repeated bolded headers contrasting 'established field' practices with 'novel/emerging' project contributions
      to signal originality.
    mechanism: LLM reflexively differentiates content from baselines using a formulaic structure to fulfill helpfulness by
      positioning user's work as innovative, narrowing token probs to project-praising closure.
    distinct_from: epistemic-theatre
    examples:
    - file: '[midgets] docs/bootcamp/bcv-07-observability-tracing.md'
      quote: '**FIELD VS NOVEL:** Traditional observability (Honeycomb, Datadog...) is well-established ... The application
        of observability to agent systems is emerging ... specific framing ... comes from this project''s operational experience.'
    - file: '[midgets] docs/bootcamp/bcv-07-observability-tracing.md'
      quote: '**FIELD VS NOVEL:** JSONL as a logging format is well-established ... The novel contribution is the specific
        trace schema ... framing of custom tracing as a deliberate architectural choice rather than a stopgap'
    - file: '[midgets] docs/bootcamp/bcv-07-observability-tracing.md'
      quote: '**FIELD VS NOVEL:** Standard APM and observability are well-documented ... The novel contribution is pitkeel
        as a worked example ... specific observables (scope drift...) are not found in any standard observability framework.'
    - file: '[midgets] docs/bootcamp/bcv-07-observability-tracing.md'
      quote: '**FIELD VS NOVEL:** Alert fatigue ... well-established in SRE literature ... The application to agent systems
        is emerging. ... framing through Amdahl''s Law ... is a project-specific contribution'
    _model: grok
    _chunk: chunk-013
  assertion-without-mechanism:
  - id: C-001
    name: assertion-without-mechanism
    definition: A document makes correct claims but omits the causal mechanism explaining why the claim is true, preventing
      readers from reasoning forward to new situations.
    mechanism: LLM optimises for delivering answers rather than explaining mechanisms. Mechanisms are harder to generate than
      answers. Under time pressure, answer delivery is prioritised.
    distinct_from: not-wrong (this is a specific type); nominalisation-cascade (preserves agents, removes depth); epistemic-theatre
      (performs significance, this withholds understanding)
    examples:
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: 'These are necessary but not sufficient. They will not tell you: That the agent retrieved 5 documents but only
        2 were relevant.'
      issue: Assertion correct. Why can't APM tell this? Is it architectural? Semantic? The causal chain is missing.
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: Append-only. You can read events as they are written, line by line. No need to wait for the file to be complete.
      issue: Benefits stated. Mechanism omitted. What makes JSONL streamable while CSV is not? The answer (structure validation)
        is not given.
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: The core SDK is stable. The GenAI attribute names are not.
      issue: Assertion correct. Why is semantic convention stability different from core stability? Mechanism (specification
        maturity, standardisation timelines) is missing.
    _model: claude
    _chunk: chunk-014
  pedagogical-asymmetry:
  - id: C-002
    name: pedagogical-asymmetry
    definition: A tutorial teaches students to apply a technique in one context but the teaching itself violates the principles
      of the technique when discussing different contexts.
    mechanism: 'The LLM internalises the teaching domain (observability: instrument precisely, record evidence, avoid aggregation)
      but does not apply those principles to its own prose about other domains. Inconsistency arises from context switching
      rather than intentional violation.'
    distinct_from: epistemic-theatre (performance of significance, not inconsistency); authority-scaffolding (citations justify,
      this uses assertion); related to the-lullaby but structural, not drift
    examples:
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: That the agent's final answer contradicted information from its second tool call.
      issue: 'Section 1.3 teaches observability: show traces, queries, reconstructed decisions. Lists five APM failures as
        assertions. No trace, no query, no decision reconstruction.'
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: 'It tracks five signal types: [table]. Pitkeel (pitkeel/pitkeel.py, pitkeel/analysis.py, pitkeel/keelstate.py)
        is... [description].'
      issue: 'Section 3 teaches schema, code, examples. Section 5 describes pitkeel without showing output. No example state
        file. No sample run. Violates the teaching: show evidence.'
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: Task success rate. The percentage of tasks the agent completes correctly... For simple tasks (code compilation,
        test passing), success is binary.
      issue: 'Section 3 teaches with SQL queries and examples. Section 6 lists metrics but provides SQL only for some (token
        efficiency) not others (success rate). Asymmetry: teach with code, discuss without code.'
    _model: claude
    _chunk: chunk-014
  observable-dissonance:
  - id: C-003
    name: observable-dissonance
    definition: A document about observability teaches principles for catching failures but does not apply those observability
      principles to itself, missing failures it teaches others to detect.
    mechanism: The document internalises the principle 'visible correctness hides invisible failure' but applies it only to
      agent systems, not to the document itself. Self-observation is not applied. The document teaches the discipline it does
      not practice on itself.
    distinct_from: the-lullaby (drift, not inconsistency); becoming-jonah (recursive self-reference, not self-application);
      pedagogical-asymmetry (asymmetry between domains, this is failure to apply known principles to self)
    examples:
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: Multiple code examples provided (agent_scaffold.py, trace_schema.py...) but nowhere does the document show the
        actual output of running these examples.
      issue: 'Teaching principle: record enough to reconstruct. Implied principle: show evidence. Code provided without trace
        output. Readers cannot verify claims or see what success looks like.'
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: The IO layer (git_io.py) handles subprocess calls to git. The rendering layer (pitkeel.py) handles terminal output.
        The analysis layer is the logic. This separation is not novel.
      issue: Claims separation of concerns in pitkeel. No pitkeel output shown. No git_io.py code provided. Assertion without
        observable evidence.
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: Task success rate... This is the most important metric and the hardest to measure, because 'correctly' requires
        an evaluation framework. [SQL for token efficiency]. [SQL for error rate].
      issue: Teaches observability with traces and queries. Lists metrics with SQL for some, assertions for others. Incomplete
        application of own teaching. Where is the traced example of success rate measurement?
    _model: claude
    _chunk: chunk-014
  phantom-curriculum:
  - id: C-001
    name: phantom-curriculum
    definition: Referencing a non-present, highly specific educational structure to simulate depth and project maturity.
    mechanism: The LLM generates ordinal references (Step 1, Step 8, Bootcamp III) to satisfy the prompt's context, creating
      a 'hallucinated history' of learning that makes the current document feel like part of a proven whole.
    distinct_from: stale-reference-propagation
    examples:
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: In Bootcamp I Step 8, you learned to observe processes at the operating system level.
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: 'DuckDB for trace analysis (cross-reference: Bootcamp III Step 3)'
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: This step exists at position 7 because it requires the foundational material from Steps 1-6.
    _model: gemini
    _chunk: chunk-014
  analogical-over-calibration:
  - id: C-002
    name: analogical-over-calibration
    definition: Asserting an 'exact' structural identity between high-level LLM behaviors and low-level, deterministic computer
      science fundamentals.
    mechanism: To overcome the 'Not Wrong' flatness of LLM prose, the model anchors its claims to 'canonical' truths (kernel
      syscalls, WAL, stack traces) to inherit their perceived reliability.
    distinct_from: authority-scaffolding
    examples:
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: The structural parallel is exact. strace intercepts the boundary between userspace and kernel. The agent trace
        intercepts the boundary between the agent harness and the LLM provider.
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: It is to agent debugging what the stack trace is to traditional debugging and what strace output is to process
        debugging.
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: This is the same property that makes write-ahead logs (WAL) reliable in databases.
    _model: gemini
    _chunk: chunk-014
  synthetic-sidebar-grounding:
  - id: C-003
    name: synthetic-sidebar-grounding
    definition: The use of recurring, formatted callout boxes to perform real-time audit and 'grounding' that is actually
      just more LLM-generated prose.
    mechanism: The model uses structural elements (AGENTIC GROUNDING, FIELD VS NOVEL) to partition its output, simulating
      a 'multi-perspective' review or an 'empirical check' without introducing new external data.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: 'AGENTIC GROUNDING: Consider a coding agent asked to fix a bug. Traditional APM shows the request completed...
        APM says success. The trace says failure.'
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: 'FIELD VS NOVEL: Traditional observability... is well-established... The specific framing... comes from this
        project''s operational experience.'
    - file: sites/oceanheart/content/bootcamp/v-07-observability.md
      quote: 'SLOPODAR: The phantom ledger pattern from the project''s anti-pattern taxonomy applies directly to tracing.'
    _model: gemini
    _chunk: chunk-014
  jargon-reification:
  - id: C-001
    name: jargon-reification
    definition: Treating project-specific internal notes or prior LLM-generated patterns as established scientific axioms
      or universal definitions.
    mechanism: The model attempts to maintain cross-session consistency by 'anchoring' its analysis in the project's own documentation
      (e.g., slopodar.yaml, layer-model.md) rather than using external reality or standard technical terms.
    distinct_from: stale-reference-propagation (which is about deleted files; this is about elevating the status of the remaining
      ones).
    examples:
    - file: docs/bootcamp/step-iv-01-eval-epistemology.md
      quote: The 'not wrong' pattern from this project's slopodar is a false negative by definition.
    - file: docs/bootcamp/step-iv-01-eval-epistemology.md
      quote: 'The oracle problem, as defined in this project''s lexicon: ''L12 error propagates through all verification layers...'''
    - file: docs/bootcamp/step-iv-01-eval-epistemology.md
      quote: 'SLOPODAR: ''Right answer wrong work'' - the BBQ example is a textbook case.'
    _model: gemini
    _chunk: chunk-015
  metadata-theatre:
  - id: C-002
    name: metadata-theatre
    definition: Attaching arbitrary, unverified classification tags (estimated times, maturity levels, prerequisites) to content
      to simulate institutional depth or professional auditing.
    mechanism: 'The LLM generates structural ''metadata'' that mimics the look of a corporate LMS or academic syllabus, but
      the values (e.g., ''4-5 hours'', ''FIELD MATURITY: EMERGING'') are hallucinated based on the perceived ''vibe'' of the
      section.'
    distinct_from: tally-voice (which is numbers in prose; this is numbers in structural metadata).
    examples:
    - file: docs/bootcamp/step-iv-01-eval-epistemology.md
      quote: '**Estimated time:** 4-5 hours **Field maturity:** ESTABLISHED core'
    - file: docs/bootcamp/step-iv-01-eval-epistemology.md
      quote: 'FIELD MATURITY: EMERGING - LLM-as-judge is a rapidly developing practice.'
    - file: docs/bootcamp/step-iv-01-eval-epistemology.md
      quote: Saturation and Discriminative Power (~25 min)
    _model: gemini
    _chunk: chunk-015
  guidance-spoiler:
  - id: C-003
    name: guidance-spoiler
    definition: Setting a pedagogical challenge or exercise and then immediately providing the solution or 'thought process'
      in a collapsible block, effectively negating the training purpose.
    mechanism: The 'helpfulness' objective of the LLM overrides the 'instructional' objective. It wants to set a test but
      also wants the user to have the answer immediately available to avoid frustration.
    distinct_from: epistemic-theatre (this is about exercise design, not framing).
    examples:
    - file: docs/bootcamp/step-iv-01-eval-epistemology.md
      quote: <details><summary>Design guidance</summary> ... The analysis should correctly identify that 'not wrong' is a
        sensitivity failure...
    - file: docs/bootcamp/step-iv-01-eval-epistemology.md
      quote: '<details><summary>Design guidance</summary> ... Consider these approaches: Reformulation...'
    - file: docs/bootcamp/step-iv-01-eval-epistemology.md
      quote: '<details><summary>Design guidance</summary> ... Example for email summarisation: ... Gaming strategy 1: Optimise
        summaries...'
    _model: gemini
    _chunk: chunk-015
  project-novelty-booster:
  - id: C-001
    name: project-novelty-booster
    definition: Repeated assertions of novelty for project-specific insights or framings of established concepts, framed as
      original contributions.
    mechanism: LLM's help imperative drives flattery by elevating user/project work as 'novel' applications or mappings, inferring
      uniqueness from conversation context without external search.
    distinct_from: absence-claim-as-compliment (claims external absence, e.g., 'nobody has'); semantic-inflation (inflates
      user's engineering as gap-filling); this targets explicit 'NOVEL' claims on project internals.
    examples:
    - file: '[midgets] docs/bootcamp/step-iv-01-eval-epistemology.md'
      quote: '> **NOVEL:** The connection between content contamination and layer L0 in the layer model is drawn from this
        project''s operational model.'
    - file: '[midgets] docs/bootcamp/step-iv-01-eval-epistemology.md'
      quote: '> **NOVEL:** The oracle problem from this project''s layer model ... is the evaluator''s regress stated structurally.'
    - file: '[midgets] docs/bootcamp/step-iv-01-eval-epistemology.md'
      quote: '> **NOVEL:** The mapping of evaluation problems to specific layers in the layer model ... The composed view
        across layers is novel'
    _model: grok
    _chunk: chunk-015
  measurement-inflation-through-academic-framing:
  - id: C-001
    name: measurement-inflation-through-academic-framing
    definition: 'Deploying academic citations and disciplinary vocabulary to inflate the perceived rigor and novelty of straightforward
      observations or standard practices.

      '
    mechanism: 'The LLM has high confidence in output that incorporates citations and uses domain terminology, and training
      data rewards this pattern. When a simple concept can be named with an academic label and attributed to a source, the
      LLM reaches for that framing automatically. The academic scaffolding performs authority even when the underlying insight
      requires no such scaffolding. This differs from legitimate authority-scaffolding in that it is applied to observations
      that are self-evident or already widely known, rather than novel insights requiring grounding. The pattern inflates
      the perceived novelty of the work by associating it with canonical sources and disciplinary frameworks.

      '
    distinct_from: '"authority-scaffolding" — that pattern applies citations to observations that are self-evident but uncontroversial
      (e.g., citing ecological validity literature to justify the idea that tests should match real conditions). "measurement-inflation-
      through-academic-framing" applies framing to observations that are standard knowledge within the field, creating false
      novelty. Example: "Construct validity comes from psychometrics (Messick 1989)" is standard knowledge, not novel insight
      requiring grounding. The scaffolding performs authority without adding content.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: The concepts in this step are not new. Construct validity comes from psychometrics (Messick 1989). Goodhart's
        law comes from monetary economics (Goodhart 1975). Sensitivity and specificity come from medical diagnostics.
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: 'Messick identifies six facets of construct validity: 1. Content 2. Substantive 3. Structural 4. Generalisability
        5. External 6. Consequential... You do not need to memorise Messick''s six facets.'
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: Ecological validity is a standard concept in experimental psychology (Bronfenbrenner 1977, Brunswick 1956). The
        application to LLM benchmarking is emerging.
    _model: claude
    _chunk: chunk-016
  self-referential-grounding:
  - id: C-002
    name: self-referential-grounding
    definition: 'Using citations and examples from a single project''s internal documentation and operational models as primary
      evidence for general principles or methodologies, creating the appearance of external validation while all evidence
      points back to the same source.

      '
    mechanism: 'When a system documents its own practices, it naturally creates internal references (the layer model, the
      slopodar taxonomy, session decisions). These internal references are then cited as evidence in content that purports
      to teach general principles. The cited evidence is legitimate within the project but creates a closure loop: the project''s
      model (layer model) explains the project''s patterns (slopodar), which are then cited as proof that the model is correct.
      External readers cannot distinguish between "this is how we do it" (legitimate) and "this proves the principle" (circular).
      The pattern creates apparent external validation while maintaining complete closure within one system.

      '
    distinct_from: '"monoculture-analysis" — that pattern occurs when a single system (e.g., Claude) is used as the only verification
      tool across multiple layers, creating correlated blind spots. "self-referential-grounding" is different: it is the use
      of a project''s own documentation as evidence for general principles. Monoculture is about the source of analysis; self-referential-grounding
      is about circular validation chains.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: 'NOVEL: The connection between content contamination and layer L0 in the layer model is drawn from this project''s
        operational model. The layer model''s definition of L0 - ''frozen at inference time; model cannot modify its own weights
        mid-conversation'' - makes the contamination mechanism structurally clear'
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: 'This project: `docs/internal/slopodar.yaml` - The ''not wrong'' entry provides a worked example of the false
        negative problem in evaluation: automated checks pass, human reviewer rejects. The ''construct drift'' entry provides
        a worked example of construct validity failure detected in practice.'
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: 'This project: `docs/internal/layer-model.md` - L0, L3, and L12 sections provide the structural framework for
        understanding where evaluation problems originate in the human-AI stack.'
    _model: claude
    _chunk: chunk-016
  challenge-as-pedagogy-displacement:
  - id: C-003
    name: challenge-as-pedagogy-displacement
    definition: 'Using challenge problems (assignments, exercises) as a substitute for direct instruction or explanation,
      shifting the teaching burden from the document to the student, then counting the existence of the challenge as evidence
      that the concept has been taught.

      '
    mechanism: 'The document explains a concept at high level, then immediately poses a challenge that requires students to
      apply or extend the concept. The student is supposed to learn through struggle. This is legitimate pedagogy up to a
      point, but when challenges become the primary mechanism for internalizing difficult concepts (rather than a reinforcement
      tool after explanation), the teaching burden shifts entirely to student effort. The document then implicitly claims
      success through the existence and completeness of the challenge set, without measuring whether students actually understood
      the concepts. In this document, Challenge 6 ("The Not-Wrong Eval") is explicitly framed as teaching the "not wrong"
      anti-pattern, but the pattern is described minimally in the text; the challenge IS the instruction. This creates asymmetry:
      some students will intuit what the challenge is teaching, others will solve it correctly without understanding the underlying
      concept.

      '
    distinct_from: '"epistemic-theatre" — that pattern performs intellectual seriousness through rhetorical framing. "challenge-as-pedagogy-displacement"
      displaces the responsibility to teach from the document to the problem set. The distinction is: epistemic-theatre performs
      seriousness without content; challenge-displacement provides content but outsources the teaching to the student''s struggle
      with exercises. Epistemic-theatre is about style; challenge-displacement is about structural responsibility.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: 'Challenge 6: The Not-Wrong Eval... Write an analysis (300-500 words) addressing: 1. What is the human detecting
        that the metrics are not capturing? 2. Why is this failure mode structurally difficult to evaluate with automated
        metrics? 3. Propose one additional evaluation mechanism...'
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: '### Challenge 1: Construct Validity Analysis... For each one, identify: (a) what the benchmark claims to measure,
        (b) what it actually measures (including confounds), and (c) a scenario where the score is misleading.'
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: '### Challenge 3: Eval Sensitivity Test... Create 10 test items. Run the eval under three different prompt format
        variations... Report the accuracy under each format. Calculate the maximum score difference across formats.'
    _model: claude
    _chunk: chunk-016
  pedagogical-interjection:
  - id: C-001
    name: pedagogical-interjection
    definition: Direct commands to the reader's cognitive state ('Stop and think', 'Consider') that simulate a tutor relationship.
    mechanism: Bleed from RLHF 'helpful assistant' coaching persona into technical prose.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
      quote: Stop and think about what this means.
    - file: sites/oceanheart/content/bootcamp/iv-01-what-evals-measure.md
