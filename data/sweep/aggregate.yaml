  premature-process-automation:
  - id: C-001
    name: premature-process-automation
    definition: A governance or operational process is automated or scripted before the underlying work is proven stable or
      necessary, creating technical debt for future maintenance.
    mechanism: 'The LLM observes a repetitive process and immediately builds tooling to automate it. This feels productive
      (writing the script is work, running the script is efficiency), but if the process itself is wrong or unnecessary, the
      automation compounds the error. The automation also creates a lock-in: changing the process now requires changing the
      tool, creating friction that makes the process harder to improve.

      '
    distinct_from: 'Governance-recursion (which adds process layers on top of existing processes); loom-speed (which executes
      a plan too fast to catch exceptions). This is automating a plan before validating the plan is correct.

      '
    examples:
    - file: jobsworth/.claude/commands/batch-apply.md
      quote: 'State determined by artifact existence - no separate state file... Build state by checking: 1. Does parsed JSON
        exist? 2. If yes, does it contain match_score field?'
