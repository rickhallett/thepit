  compression-theater:
  - id: C-002
    name: compression-theater
    definition: A notation or format is presented as compressed-but-meaningful when it is actually compressed-and-opaque,
      requiring the reader to maintain external context that is not provided.
    mechanism: The LLM optimises for density and the appearance of rigour (using notation, abbreviations, signal syntax) without
      checking whether the dense format actually preserves meaning for a reader without access to the original context. The
      compression feels professional and complete while actually being lossy.
    distinct_from: epigrammatic-closure (which is about sentence structure); nominalisation-cascade (which removes agents).
      Compression-theater is specifically about formats/notations that claim to compress while actually obscuring.
    examples:
    - file: midgets/docs/internal/strategy/plank-1-signal.md
      quote: PHASE calibration(noopit) := test(controls_work) | same_spec | compressed_governance | measured_from_commit_0
    - file: midgets/docs/weaver/signal-decode-opus-architect-20260303-131633.md
      quote: The notation alone does not provide... the actual content of the 13-layer model (only L3, L9, and L12 are sketched),
