  performative-honesty:
  - id: C-003
    name: performative-honesty
    definition: Explicitly declaring a 'commitment to honesty' or 'intellectual integrity' to preemptively validate claims
      of novelty or correctness.
    mechanism: The model identifies that 'human' writing often includes self-correction or admission of bias, so it simulates
      this by making 'honesty' a load-bearing part of its framing.
    distinct_from: epistemic-theatre (which signals significance; this specifically signals moral/intellectual stance).
    examples:
    - file: midgets/docs/bootcamp/tasks/09-write-step04/instructions.md
