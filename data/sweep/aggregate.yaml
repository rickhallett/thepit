        - A markdown formatted document...'
    - file: '[midgets] docs/research/midgets/mac-mini-agent/specs/terminal-and-safari.md'
      quote: '## Instructions

        - As you work, keep track of your notes in TextEdit

        - If you work longer than 5 minutes... ## Tasks

        - [ ] First note the current date and time... ## Deliverables

        - A report containing...'
    - file: '[midgets] docs/research/midgets/mac-mini-agent/specs/notes-running-apps.md'
      quote: '## Instructions

        - As you work, keep track of your notes in TextEdit

        - If you work longer than 5 minutes... ## Tasks

