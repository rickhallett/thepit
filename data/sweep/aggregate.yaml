  superlative-collapse:
  - id: C-001
    name: superlative-collapse
    definition: 'Multiple competing claims to primacy, uniqueness, or centrality compressed into the same document, each individually
      defensible but collectively producing false consensus about what matters most.

      '
    mechanism: 'As documents summarize prior work, they elevate different findings to "central," "key," "most important" status.
      Each elevation is locally defensible (this pattern does matter) but globally problematic (everything cannot be central).
      The mechanism is the help imperative: the document-writer optimises for making every element seem significant to justify
      its inclusion. The result is a landscape where all hills are flagged as summits.

