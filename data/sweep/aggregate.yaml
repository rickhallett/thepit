  copy-paste-duplication:
  - id: C-001
    name: copy-paste-duplication
    definition: Exact or near-identical blocks of content duplicated within or across files without functional purpose.
    mechanism: LLM regenerates similar structured content (tables, messages, docs) from analogous prompts, lacking cross-session
      memory or deduplication checks.
    distinct_from: stale-reference-propagation (outdated propagating info) vs duplication (redundant fresh copies); not whack-a-mole
      (iterative fixes).
    examples:
