  pedantic-scaffold:
  - id: C-001
    name: pedantic-scaffold
    definition: 'Excessive definitional framing where a simple observation is preceded by ceremonial "what is X" exposition
      that treats the concept as requiring introduction even when the reader''s competence level is demonstrated by their
      reading the document.

      '
    mechanism: 'The model optimises for completeness and pedagogical structure, inserting "what is a syscall?" sections before
      discussing syscalls even though the document assumes shell literacy and filesystem familiarity. Each section is individually
      justified but their cumulative effect creates a doctoral-thesis tone where a systems handbook would suffice. The scaffolding
      is not false; it is excessive.

      '
    distinct_from: 'Authority-scaffolding (which adds citations to justify a claim); epistemic-theatre (which signals significance
      without providing substance). Pedantic-scaffold provides substance but wraps it in ceremony. The distinction: "what
      is this?" followed by "here is why it matters" vs "what is this?" followed by "here is what this is."

      '
    examples:
    - file: docs/bootcamp/08-process-observation.md, section 1
      quote: A system call (syscall) is a request from a userspace process to the kernel. Every meaningful action a process
        takes - reading a file, writing to a socket... - goes through a syscall. There is no other path.
    - file: docs/bootcamp/06-make-just-orchestration.md, section 1
      quote: 'Make''s fundamental model is three concepts: 1. Targets - things you want to produce (usually files) 2. Prerequisites
        - things the target depends on (usually other files) 3. Recipes - shell commands that produce the target from the
        prerequisites'
    - file: docs/bootcamp/bootcamp3-04-statistical-testing.md, section 1
      quote: Most introductions to hypothesis testing start with the math. We are going to start with the decision. You have
        two sets of numbers... The logic of hypothesis testing is a structured way to make that decision.
    confidence: strong
    notes: 'This pattern appears 20+ times across the three documents, always following the structure of "What is X?" + "Here
      is X." + "X has these properties." The pattern is not harmful and is pedagogically reasonable for a bootcamp-format
      document. The confidence is strong because of frequency and consistency, not because of severity. Every bootcamp section
      begins with a definitional scaffold.

      '
    _model: claude
    _chunk: chunk-052
  defensive-qualification:
  - id: C-002
    name: defensive-qualification
    definition: 'Excessive hedging and preemptive disclaimers inserted before technical statements to anticipate and neutralise
      potential criticism, resulting in sentences that establish safety before claiming anything.

      '
    mechanism: 'The model trained on feedback that punishes overconfidence and rewards hedging. When making any technical
      claim, it automatically prepends qualifications: "you may not need to know," "most people skip," "this is not the whole
      story," "there are exceptions," "this is speculative," "we do not need to memorise." Each qualifier is individually
      defensible but their accumulation signals anxiety about the claim''s validity rather than genuine uncertainty.

      '
    distinct_from: 'Epistemic-theatre performs certainty without evidence. Defensive-qualification performs uncertainty even
      when evidence is present. Both are mismatches between confidence and content, but in opposite directions.

      '
    examples:
    - file: docs/bootcamp/08-process-observation.md
      quote: Modern Linux has approximately 450 syscalls. You will encounter perhaps 30-40 routinely. The rest are specialised.
        You do not need to memorise them - you need to know the pattern
    - file: docs/bootcamp/06-make-just-orchestration.md
      quote: 'This distinction is fundamental. Make answers: ''what needs to be done, given what has already been done?''
        Just answers: ''run this named recipe.'' Make reasons about state (file timestamps). Just does not. [But later:] This
        split is organisational, not functional. All four files share the same variable namespace.'
    - file: docs/bootcamp/bootcamp3-04-statistical-testing.md
      quote: These are not rigid boundaries. They are calibration points. A d of 0.3 is between small and medium. What matters
        is whether the size of the effect justifies the cost of the change.
    confidence: strong
    notes: 'Present in ~15 instances across the corpus. The pattern appears most densely in sections introducing a new tool
      or concept. Not necessarily harmful - it reflects honest epistemic humility. But it creates a cautious tone that may
      undermine confidence in the material being taught. The document claims to be teaching mastery; the hedging suggests
      the Operator should remain uncertain.

      '
    _model: claude
    _chunk: chunk-052
  worked-example-drift:
  - id: C-003
    name: worked-example-drift
    definition: 'Extensive worked examples that begin as illustration and drift into becoming the primary content, with the
      general principle receding into background explanation for the specific code or commands shown.

      '
    mechanism: 'The model generates a worked example to clarify a concept, then continues iterating on the example (adding
      parameters, varying inputs, showing error cases) until the example becomes the content and the principle becomes secondary.
      Each example is individually valuable but collectively they displace the conceptual understanding they were meant to
      support.

      '
    distinct_from: 'Good pedagogical examples (which illustrate a principle). Worked-example-drift is when the examples become
      the endpoint rather than the vehicle for understanding the principle. The distinction: "Here is the principle; here
      is an example that shows it" vs "Here are six examples; notice the pattern?"

      '
    examples:
