    name: unexamined-scope-boundary
    definition: 'A document makes claims about a domain (e.g., "CBRN evaluation methodology," "safety eval standards") but
      defines scope in a way that excludes contradicting evidence, then presents the limited scope as comprehensive.

      '
    mechanism: 'The document states what exists within its chosen boundaries (Anthropic RSP, METR, UK AISI, published papers)
      then presents this as "the" state of the field. Excluded: industry practice outside the frontier labs, regulatory requirements
      from different jurisdictions, unresolved empirical questions. The scope boundary is invisible because the document does
      not declare it. The reader infers "no single open CBRN standard" from "these five published sources do not define one,"
      not from a systematic audit of the domain.

      '
    distinct_from: absence-claim-as-compliment (scope-boundary also claims absence but does so by limiting what is examined)
