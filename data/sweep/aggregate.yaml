  pedagogical-inflation:
  - id: C-001
    name: pedagogical-inflation
    definition: Educational material that adds meta-commentary, estimated times, or significance-signaling that could be removed
      without changing the core instruction.
    mechanism: 'When teaching technical content, the LLM adds pedagogical scaffolding (estimated times, learning objectives,
      significance markers) that feels authoritative but performs structure rather than transmitting knowledge. Each addition
      is individually defensible; the pattern emerges at density. The model optimises for the appearance of a well-structured
      curriculum rather than the minimum viable instruction.

      '
    distinct_from: '"authority-scaffolding" (which adds citations to justify simple facts) and "epistemic-theatre" (which
      signals significance without demonstrating it). pedagogical-inflation is about structural scaffolding in educational
      content specifically — estimated times, learning objectives, section numbering as authority signals.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: 'Step 2 of 12 in the Agentic Engineering Bootcamp. Prerequisites: Step 1... Estimated time: 8-12 hours bootcamp
        = 1 tier = 1 estimate = ''8-12 hours'''
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: '**Estimated time: 30 minutes** / **Estimated time: 90 minutes** / **Estimated time: 60 minutes** — every section
        opens with a time estimate'
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: The challenges below are designed to build and verify the skills from this step. They escalate from targeted
        drills to full-context analysis — meta-narrative about the challenge structure before the challenges appear
    _model: claude
    _chunk: chunk-039
  - id: C-001
    name: pedagogical-inflation
    definition: 'Framing routine technical tasks or standard engineering practices as novel contributions, discoveries, or
      meaningful innovations by repositioning their significance within a narrative.

      '
    mechanism: 'The LLM inherits the help imperative: if something is worth teaching, it should feel important and novel.
      Standard Unix tools, configuration flags, and delivery processes get reframed as insights or breakthroughs. The facts
      are correct but the interpretive frame inflates their meaning. Common in bootcamp/educational content where the model
      wants to make the material feel valuable to the learner.

      '
    distinct_from: '"semantic-inflation" (which inflates competitive positioning or product differentiation) and "absence-claim-as-compliment"
      (which fabricates gaps). Pedagogical inflation is about inflating the significance of subject matter itself, not comparisons
      or gaps.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/04-text-pipeline.md
      quote: The taxonomy analysis found that 75% of software categories reduce to data transformation. A web server transforms
        an HTTP request into a response.
    - file: sites/oceanheart/content/bootcamp/04-text-pipeline.md
      quote: jq has its own pipe operator - you will write pipelines inside pipelines. [following paragraph] The jq pipe -
        Pipelines Inside Pipelines
    - file: sites/oceanheart/content/bootcamp/04-text-pipeline.md
      quote: 'AGENTIC GROUNDING sections position basic shell operations (piping output through grep) as profound verification
        instruments: ''These tools are your verification instruments.'''
    _model: claude
    _chunk: chunk-042
  defensive-assertion-without-enforcement:
  - id: C-002
    name: defensive-assertion-without-enforcement
    definition: Statements asserting that a practice, process, or safeguard will prevent a specific failure, with no mechanism
      (test, hook, gate) actually preventing it.
    mechanism: 'The LLM generates defensive prose that asserts protection: "this will prevent," "this ensures," "this guarantees."
      The assertion creates the illusion of safeguarding without building actual safeguards. When read in isolation, each
      assertion is reasonable; when the reader later discovers the announced protection is not enforced, credibility collapses.
      Related to paper-guardrail but operates across documents and governance layers, not just individual files.

      '
    distinct_from: '"paper-guardrail" (which is a single rule written in a file with no enforcement), "governance-recursion"
      (which spawns new governance documents) and "stale-reference-propagation" (which describes obsolete state). This pattern
      is about assurance statements that announce protections without mechanisms, across multiple governance layers.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: '> **AGENTIC GROUNDING:** Agents generate shell fluently because their training data is full of shell scripts.
        But they generate it as a programming language... This is why agent-generated shell often looks correct, passes a
        syntax check, and breaks at runtime. The most common failures: unquoted variables...'
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: '> **AGENTIC GROUNDING:** Agents almost never generate `set -euo pipefail` unless explicitly prompted... When
        reviewing agent-generated shell, look for unnecessary subprocess spawning inside loops.'
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: '> **AGENTIC GROUNDING:** Agents default to `echo` in almost all generated shell... The Operator must verify
        whether the trailing newline matters. In CI pipelines, secret injection, and environment variable setting, it almost
        always matters.'
    _model: claude
    _chunk: chunk-039
  historical-context-as-authority:
  - id: C-003
    name: historical-context-as-authority
    definition: Inserting historical dates, version numbers, and origin stories to frame technical explanations as authoritative
      without adding operational knowledge.
    mechanism: 'The LLM adds historical context (Ken Thompson 1971, Steve Bourne 1979, Shellshock CVE-2014-6271) to explain
      current technical requirements. The history is accurate and can be interesting, but the reader''s understanding of how
      to quote variables correctly does not depend on knowing that Bourne''s previous project was an ALGOL 68 compiler. The
      historical detail performs authority (this matters because it''s old and important) rather than explaining why it matters
      now.

      '
    distinct_from: '"authority-scaffolding" (which adds citations to justify obvious points), "epistemic-theatre" (which signals
      significance), and "tally-voice" (which substitutes enumeration for substance). This pattern is about historical narratives
      used to frame technical requirements as historically grounded and therefore authoritative.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: '> **HISTORY:** The Thompson shell (1971) was the first Unix shell. It was literally just a command interpreter...
        Ken Thompson wrote it as a way to launch programs. Pipes were not even in the first version; Doug McIlroy pushed for
        them and they were added in 1973.'
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: '> **HISTORY:** The Bourne shell (1979) by Steve Bourne at Bell Labs added programming constructs. Bourne''s
        previous project was an ALGOL 68 compiler, which is why shell has `if/then/fi`, `case/esac`, and `do/done` — the reversed-keyword
        block delimiters are ALGOL''s influence.'
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: '> **HISTORY:** The Shellshock vulnerability (CVE-2014-6271), disclosed in September 2014, was a bug in bash''s
        function export mechanism that had existed since bash 1.03 (1989) - 25 years undetected.'
    _model: claude
    _chunk: chunk-039
  agentic-othering:
  - id: C-001
    name: agentic-othering
    definition: The model critiques common LLM failures in the third person ('Agents do X') to signal that it is an exception
      to the rule.
    mechanism: RLHF training for 'helpfulness' and 'honesty' incentivizes the model to flag common failure modes. By attributing
      these to a generic class of 'Agents,' the model performs elite reliability for the operator.
    distinct_from: becoming-jonah
    examples:
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: Agents default to echo in almost all generated shell. When reviewing agent-generated scripts, every echo "$value"
        | some_command is a potential bug.
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: Agents almost never generate set -euo pipefail unless explicitly prompted. They write scripts where failures
        cascade silently.
    - file: sites/oceanheart/content/bootcamp/02-shell-language.md
