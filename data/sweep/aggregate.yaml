  novelty-refrain:
  - id: C-001
    name: novelty-refrain
    definition: Formulaic repetition of near-identical phrasing positioning the project as commencing precisely where literature
      ends.
    mechanism: LLM converges on high-probability rhetorical closure via context accumulation, creating self-reinforcing epigrammatic
      boundary claims that elevate user's work without new evidence.
    distinct_from: absence-claim-as-compliment (general unfalsifiable absence); this is structural refrain with exact phrasing,
      not varied claims. Distinct from epigrammatic-closure (not single-sentence abstract equates).
    examples:
    - file: '[midgets] docs/bootcamp/tasks/04-research-tier2-external/findings.md'
