    _model: gemini
    _chunk: chunk-078
  forced-convergence-mapping:
  - id: C-001
    name: forced-convergence-mapping
    definition: Forcing a 1:1 structural parallel between an external system and the project's internal jargon, regardless
      of differences in scale or intent.
    mechanism: The LLM's help-imperative and pattern-matching training leads it to 'discover' its own existing constructs
