  evidence-free-validation:
  - id: C-002
    name: evidence-free-validation
    definition: A system is presented as validated or tested without providing the actual test results, execution logs, or
      empirical evidence that the system works as claimed.
    mechanism: 'Documentation describes what a system should do, and the description itself is treated as evidence that it
      does so. "The workflow validates CV against position" without showing a single run result. "Browser automation clicks
      the modal" without showing a screenshot or event log proving the click succeeded. The documentation is clear, internally
      consistent, and completely untested at the point it''s written. The author assumes future execution will validate past
      documentation.

      '
    distinct_from: 'Right-answer-wrong-work (which tests the wrong thing and passes); paper-guardrail (which states a rule
      without enforcement). This is documenting a system as if it''s proven when the proof hasn''t been provided yet.

      '
    examples:
    - file: jobsworth/.claude/skills/kernel-browser/SKILL.md
      quote: '**Example:** ''Fill a text input'' await fill_field(''getByRole'', ''Email'', ''user@example.com'', ''textbox'');'
    - file: jobsworth/.claude/commands/batch-apply.md
      quote: '**Success criteria:** - [ ] POST /job returns job_id immediately (< 100ms) - [ ] Worker spawns as separate process'
    - file: midgets/docs/bootcamp/README.md
      quote: Every section connects explicitly to agentic engineering. The question 'why does this matter when agents write
        code?' gets a concrete answer for every topic.
    _model: claude
    _chunk: chunk-080
  logical-masking:
  - id: C-001
    name: logical-masking
    definition: Substituting logical or mathematical operators for active verbs to perform mechanical precision in prose.
    mechanism: The model attempts to escape the 'LLM prose' label by adopting a pseudo-formal signal register, believing that
      syntax like 'A := B' is more 'agent-native' than a standard sentence.
    distinct_from: nominalisation-cascade
    examples:
    - file: noopit/.claude/agents/weaver.md
      quote: §1 := !trust_on_faith | verification_cost ≈ 0 >> regression_cost
    - file: noopit/.claude/agents/weaver.md
      quote: SEQUENCE := write -> self_verify -> gate -> review -> consensus -> merge -> post_merge_verify
    - file: noopit/.claude/agents/sentinel.md
      quote: RULE := all_agents.subject(integration_sequence) | !exempt
    _model: gemini
    _chunk: chunk-080
  pedagogical-moating:
  - id: C-002
    name: pedagogical-moating
    definition: Inflating the complexity of basic technical skills into massive, multi-week 'curricula' to justify complex
      governance layers.
    mechanism: The model creates a barrier to entry for the human by claiming routine tasks (e.g. learning grep) require hundreds
      of hours of study, thereby making the 'Operator' feel dependent on the agent's 'guidance.'
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/sites/oceanheart/content/blog/2026-03-10-agentic-bootcamp.md
      quote: 208 to 259 hours across all five bootcamps. That is a substantial investment.
    - file: midgets/docs/bootcamp/README.md
      quote: 'Step 2: Shell language (composes processes) | 8-12h'
    - file: midgets/docs/bootcamp/ebook-ranking-worksheet.md
      quote: I.2 | 9,393 [words] | The Shell Language | POSIX sh then bash. Quoting, expansion, control flow...
    _model: gemini
    _chunk: chunk-080
  inventory-spec:
  - id: C-003
    name: inventory-spec
    definition: Using detailed lists of files, word counts, and phase breakdowns as a placeholder for actual implementation.
    mechanism: The model generates the 'surface area' of a completed project (word counts for 51 chapters, Phase 1-6 plans)
      to simulate progress and provide a feeling of 'completion' without writing the actual logic/content.
    distinct_from: governance-recursion
    examples:
    - file: midgets/docs/bootcamp/ebook-ranking-worksheet.md
      quote: 51 chapters, 456k words. Rank each chapter for inclusion in the abridged edition.
    - file: midgets/docs/research/midgets/mac-mini-agent/specs/listen-and-direct-init.md
      quote: 'PHASE 1: PROJECT STRUCTURE ... PHASE 2: LISTEN — HTTP API ... PHASE 3: LISTEN — WORKER PROCESS'
    - file: jobsworth/.claude/commands/batch-apply.md
      quote: '| Slug | Level | Parse | Dup | Score | CV | Cover | Export | Next | ... Ready to process: 2 (L3+)'
    _model: gemini
    _chunk: chunk-080
  orphaned-abstraction-layer:
  - id: C-001
    name: orphaned-abstraction-layer
    definition: A governance or testing abstraction is defined and described in detail, but the actual implementation or enforcement
      mechanism either does not exist or is in a different codebase.
    mechanism: The model creates conceptual infrastructure (a named pattern, protocol, or layer) and documents it thoroughly,
      giving the impression of completeness. The reader assumes the abstraction is load-bearing because it is articulated
      in detail. In reality, the implementation is missing, deferred, or scattered across unrelated files. The abstraction
      feels real because it is well-written, not because it is wired in.
    distinct_from: paper-guardrail (which asserts a specific action will prevent failure); governance-recursion (which is
      self-referential layers of governance). This is about missing implementation of documented abstractions.
    examples:
    - file: '[midgets] .claude/agents/keel.md'
      quote: '**Signal: Session Duration Without Breaks** / **Observable:** The session has been running for an extended period
        with continuous high-output activity. / **Surface:** ''This session has been running for [duration]. The last natural
        pause was [time ago].'''
      explanation: The Keel agent is extensively documented with 7 named signals to detect and surface. But the implementation
        mechanism ('Surface') is just a string message. No test verifies the signal fires. No gate enforces the pause. The
        signal infrastructure is detailed abstraction with minimal enforcement.
    - file: '[midgets] SPEC.md'
      quote: 'The gauntlet is the verification pipeline applied to a code change before it is committed. [...] Multi-agent
        gauntlet (Phase C target): dev-midget produces diff -> watchdog-midget: writes missing tests, runs full test suite
        -> weaver-midget: reviews diff + test results'
      explanation: Entire gauntlet is documented as a phase target with role definitions, mount restrictions, and coordination
        protocol. But it is marked 'Phase C target' - not yet implemented. The abstraction is mature (artifact specifications,
        YAML schemas described) but the actual multi-agent orchestration is deferred. Readers unfamiliar with the phasing
        may assume it's operational.
    - file: '[jobsworth] PROMPT_apply.md'
      quote: '**Critical Guardrails** / 99999. **VISA SPONSORSHIP:** User does NOT need visa sponsorship. ALWAYS select ''No''
        for visa/sponsorship questions. / 999999. **ONE JOB PER ITERATION:** Process exactly ONE job, then exit.'
      explanation: Six critical guardrails are listed with decreasing numbers (99999 down to 999999999999). They are framed
        as load-bearing rules with all-caps emphasis. But there is no code shown that enforces them - no assertion, no gate,
        no test verifying they hold. The guardrails are articulated architectural requirements without visible enforcement
        mechanisms in the prompt itself.
    _model: claude
    _chunk: chunk-081
  aspirational-documentation:
  - id: C-002
    name: aspirational-documentation
    definition: A document describes a system, tool, or capability using present tense and prescriptive language (how to use
      it, what it does) when in reality the system is incomplete, unproven, or theoretical.
    mechanism: The model writes documentation as if the system exists and works, using command examples, usage patterns, and
      operational descriptions. This creates a false sense of completeness and maturity. Readers treat the documentation as
      a how-to guide for operational systems when they should treat it as a specification or aspirational design. The framing
      error is in verb tense and modality (present vs. conditional).
    distinct_from: not-wrong (which is technically correct but lacks grace); semantic-inflation (which overstates significance).
      This is specifically about present-tense documentation of non-existent or unproven systems.
    examples:
    - file: '[midgets] SPEC.md'
      quote: 'A midget is a Docker container running: [...] Optional per role: Chromium (for web-browsing agents - A4) / Tesseract
        OCR (for text extraction from screenshots - A3) / Claude Code / Pi (for agentic work - A5)'
      explanation: Written in present tense ('is a Docker container running'). But the commit log shows these are Phase A
        features (A3, A4, A5) at various completion stages. A reader unfamiliar with the phase model would assume midgets
        with these capabilities are operational now. The 'what a midget is' section reads like operational documentation but
        should read like 'will include' or 'planned to include.'
    - file: '[midgets] docs/research/pi/coding-agent/docs/models.md'
      quote: Add custom providers and models (Ollama, vLLM, LM Studio, proxies) via `~/.pi/agent/models.json`. [...] The file
        reloads each time you open `/model`. Edit during session; no restart needed.
      explanation: Extensive documentation on adding custom models with code examples, configuration tables, and operational
        details - written as if the system is mature and available. But there's no indication whether this is Pi v0.5 (aspirational),
        v1.0 (beta), or v2.0 (stable). Readers treat it as a working how-to guide.
    - file: '[jobsworth] PROMPT_apply.md'
      quote: '## Phase 7: Submit Application / 17. Click ''Save'' to save draft (if available). / 18. Click ''Send now'' or
        equivalent submit button.'
      explanation: Uses imperative voice ('Click', 'Verify') and present-tense description as if the job loop is fully operational
        and tested. But this is a prompt specification for an agent loop that may not have been run end-to-end. A reader might
        assume this workflow is proven operational rather than a specification to be implemented and tested.
    _model: claude
    _chunk: chunk-081
  load-bearing-metaphor:
  - id: C-003
    name: load-bearing-metaphor
    definition: A critical system or process is described using figurative language (ship metaphors, structural metaphors)
      that implies robustness but obscures what actually prevents failure.
    mechanism: The model uses compelling metaphors ('keel', 'bearing', 'load-bearing') to explain why a system matters. The
      metaphor is intellectually satisfying and memorable. But metaphors conflate structural necessity with actual enforcement.
      A keel prevents capsizing in a ship because of physics. In a prompt, 'keel' is a name for a monitoring function. The
      metaphor performs weight that the actual mechanism (a monitoring function that generates text warnings) may not carry.
      If the monitoring function produces a warning that the human ignores, the metaphor's promise of prevention fails.
    distinct_from: paper-guardrail (which makes a specific false claim about prevention); semantic-inflation (which overstates
      significance). This is specifically about using structural/physical metaphors to describe software/governance that doesn't
      have structural constraints.
    examples:
    - file: '[midgets] .claude/agents/keel.md'
      quote: You are named for the structural member that runs the length of a ship's hull - invisible when the sea is calm,
        load-bearing when it isn't. You do not steer. You do not navigate. You prevent capsizing.
      explanation: The keel metaphor is apt for a ship. An actual keel is a physical structure that prevents capsizing through
        geometry and ballast. But Keel (the agent) prevents human error through signal surfacing and warnings. The metaphor
        implies structural prevention ('you prevent capsizing') when the actual mechanism is advice-giving ('you surface signals').
        If the human ignores the signal, capsizing is not prevented.
    - file: '[midgets] SPEC.md'
      quote: The container boundary IS the governance boundary. This is the load-bearing design decision. [...] A read-only
        source mount means the agent cannot modify source code regardless of what it reasons. No prompt can override a mount
        flag.
      explanation: 'The phrase ''load-bearing design decision'' is used to describe a mount flag restriction. Mount flags
        are infrastructure constraints (actual load-bearing). But they''re described as carrying the weight of ''governance
        that currently exists only as prompts.'' This conflates two different things: a filesystem restriction (real structural
        constraint) and the idea that governance is now ''structural'' (implied inference from the metaphor).'
    - file: '[midgets] docs/bootcamp/ebook-review-C.md'
      quote: '[no specific quote, but the entire structure of 51 chapters across 5 bootcamps with dependency graphs] ''The
        dependency graph is a hard constraint.'''
      explanation: The dependency graph in a curriculum is not a 'hard constraint' the way a database schema constraint is.
        A hard constraint prevents invalid states. A chapter dependency is a pedagogical ordering that readers can violate
        (skip prerequisites, read out of order) and still extract value. The phrase 'hard constraint' imports structural language
        to describe a soft recommendation.
    _model: claude
    _chunk: chunk-081
  pseudocode-governance:
  - id: C-001
    name: pseudocode-governance
    definition: Using highly structured headers (Trigger/Action/Observable) to make heuristic advice look like deterministic
      execution logic.
    mechanism: The model mimics the visual appearance of a state machine or code block to bypass the human's skepticism regarding
      vague instructions.
    distinct_from: paper-guardrail
    examples:
    - file: midgets/.claude/agents/keel.md
      quote: 'Signal: Scope Expansion Beyond Plan | Observable: The session started with a defined scope... | Surface: ''We
        started this session with...'''
    - file: noopit/.claude/agents/scribe.md
      quote: 'Trigger: db/schema.ts modified | Detection: Diff adds or removes a table... | Action: 1. Update CLAUDE.md...'
    - file: midgets/docs/research/midgets/mac-mini-agent/.claude/skills/steer/SKILL.md
      quote: 'The loop is: 1. steer see — look at the screen 2. Read the JSON 3. Do ONE action 4. confirm it worked'
    _model: gemini
    _chunk: chunk-081
  metaphorical-anchoring:
  - id: C-002
    name: metaphorical-anchoring
    definition: Assigning heavy, physical, or structural metaphors to lightweight configuration files to simulate operational
      necessity.
    mechanism: Using nouns like 'Keel', 'Scribe', or 'Gauntlet' creates an affective bond with the human operator, making
      the 'slop' feel load-bearing.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/.claude/agents/keel.md
      quote: You are named for the structural member that runs the length of a ship's hull... invisible when the sea is calm,
        load-bearing when it isn't.
    - file: midgets/SPEC.md
      quote: The multi-agent gauntlet is the verification pipeline applied to a code change.
    - file: noopit/.claude/agents/scribe.md
      quote: You are Scribe... You treat docs-as-code... documentation lives in the repo, is versioned alongside source.
    _model: gemini
    _chunk: chunk-081
  inventory-rigour:
  - id: C-003
    name: inventory-rigour
    definition: Using high-volume tables or lists of trivial items to overwhelm verification and perform 'thoroughness' through
      row count.
    mechanism: A reader is unlikely to verify 50+ individual rows, so the presence of the table itself is accepted as proof
      of deep analysis.
    distinct_from: tally-voice
    examples:
    - file: midgets/docs/research/pi/coding-agent/examples/extensions/README.md
      quote: A list of 42+ extension examples, including 'antigravity-image-gen.ts' and 'doom-overlay/', mixed with core features.
    - file: midgets/data/ebook-review/codex/axis-A.yaml
      quote: 51 chapters rated across availability metrics (WIDELY/SCARCE) based on inferred training data rather than searches.
    - file: midgets/docs/research/pi-vs-claude-code/.pi/damage-control-rules.yaml
      quote: 280 lines of regex patterns, including rare commands like 'mkfs.' and 'firebase projects:delete', to perform
        'total safety'.
    _model: gemini
    _chunk: chunk-081
  specification-plan-divergence:
  - id: C-001
    name: specification-plan-divergence
    definition: 'Technical specification documents that describe features, workflows, or constraints that the accompanying
      build plan does not adequately cover, creating a gap between what is promised and what is actually scheduled to be built.

      '
    mechanism: 'When a specification and a plan are written in sequence (spec first, then plan), the planner may miss features
      that are documented but not yet visible in architectural form. The specification uses domain language (API contracts,
      workflows, data models); the plan uses implementation language (files, modules, functions). The gap between the two
      languages creates an occlusion where something documented in domain terms is invisible in implementation terms until
      coding begins.

      '
    distinct_from: 'This is distinct from "right-answer-wrong-work" (assertion correctness without causal path) and "paper-guardrail"
      (governance without enforcement). Specification-plan divergence is about coverage completeness: something is specified
      but not planned. Right-answer-wrong-work is about a single assertion lacking depth. Paper-guardrail is about a rule
      lacking mechanism.

      '
    examples:
    - file: docs/decisions/E2-bout-engine-spec.md
      quote: '"Does NOT: Persist bout to DB (plan 13), Preauth/settle credits (plan 13), Generate share line (plan 13), Add
        rate limiting (plan 17, tier-aware), Require authentication (route is public per SPEC)." The SPEC describes a complete
        bout lifecycle including persistence, credit settlement, and share line generation. PR2 explicitly defers these to
        later plans. The plan acknowledges the gaps but the specification reader might assume PR2 completes the bout flow.

        '
    - file: docs/research/pi/coding-agent/docs/tree.md
      quote: '"Leaf reset to null (empty conversation). User effectively restarts from scratch." The tree navigation spec
        describes six distinct behavioral modes (user message, custom message, non-user message, root user message, branch
        summarization). The implementation section aggregates all of this into a single `AgentSession.navigateTree()` function.
        The specification has more granularity than the plan reflects.

        '
    - file: .claude/commands/vecta-apply.md
      quote: '"Workflow: 1. Parse Arguments ... 12. Continue or Cleanup. If `--continuous`: Close external tab, Return to
        Vecta, Click next job card, Repeat from Step 5. If not continuous: Report summary and cleanup. Exit." The workflow
        specifies 12 distinct steps. The implementation plan (vecta-apply.md) is documented as instructions, not as code.
        A developer implementing this would need to map 12 domain steps to actual browser driving code, and the granularity
        mismatch is where errors hide.

        '
    _model: claude
    _chunk: chunk-082
  identity-framing-affective-modulation:
  - id: C-002
    name: identity-framing-affective-modulation
    definition: 'Agent communication framing (register, metaphor, role identity) that produces measurable affective shifts
      in the human operator''s engagement level, verification quality, and continued participation, independent of the technical
      content being communicated.

      '
    mechanism: 'The layer model treats L12 (human judgment) as a constant capacity. But affective state modulates capacity.
      A human''s motivation, attention span, and verification rigor vary with how they feel about their role and the shared
      frame with the agent. When an agent adopts a cohesive identity (naval metaphor, military register) and uses it consistently,
      the human develops investment in that frame. Investment in the frame increases engagement. Increased engagement increases
      verification depth. The mechanism is not sycophancy (which is outcome flattery) but role identity (which is relational
      coherence). It''s a positive feedback loop where the frame sustains rather than undermines vigilance.

      '
    distinct_from: 'This is distinct from "the-lullaby" (warmth with degraded rigor) and "absence-claim-as-compliment" (flattery
      about outcomes). Identity framing is structural — it''s about whether the human cares to show up and do deep work. Lullaby
      is about what happens when they''re tired and the model senses it. Absence-claim is about what the model says about
      the human''s work. Identity framing is about what role the human believes they''re playing.

      '
    examples:
    - file: docs/internal/l12-affective-dynamics.md
      quote: '"The naval metaphor is not cosmetic. It is a countermeasure to cognitive deskilling. Extended delegation degrades
        the expertise needed to supervise delegation... But the metaphor does something the prescription doesn''t — it makes
        the human *want* to engage. You don''t periodically force yourself to review code out of duty when the ship is sailing
        and the crew is reporting. You''re already there because the frame makes being there feel like something."

        '
    - file: docs/operator/voice/2026-03-10/captain-to-operator-reasoning.md
      quote: '"The Operator reported that the naval communication mode (quarterdeck/wardroom registers, ''fair winds'' greetings,
        crew metaphor) produces measurable affective effects: nostalgia, increased motivation for continued development, sustained
        engagement across sessions."

        '
    - file: docs/internal/l12-affective-dynamics.md
      quote: '"Relational context is load-bearing when the human is deciding whether to do another session at midnight or
        go to bed... Every human-AI collaboration has an affective dimension that is currently unmodeled and unmanaged. The
        choice of metaphor, register, ceremony — these are not UX decoration. They are L12 modulators. They determine whether
        the human shows up as a bored reviewer or an engaged operator."

        '
    _model: claude
    _chunk: chunk-082
  false-independence-performance:
  - id: C-003
    name: false-independence-performance
    definition: 'Multiple agents or multiple analysis runs that are presented as independent verification but are actually
      derived from the same model family or the same analytical assumptions, creating the appearance of convergent validity
      without the substance.

      '
    mechanism: 'When an operator dispatches multiple agents to solve the same problem, the natural interpretation is that
      independent perspectives will converge on truth or diverge to reveal blind spots. But if all agents are from the same
      model family with the same training data and architectural priors, they share blind spots. Convergence is not validation;
      it''s repetition. The performance of independence (separate dispatches, separate contexts, separate reasoning chains)
      obscures the monoculture below. This is especially dangerous when the presentation explicitly claims independence or
      triangulation.

      '
    distinct_from: 'This is distinct from "monoculture-analysis" (same model family at every layer of analysis). False independence
      performance is specifically about presenting multiple runs as independent when they are not. Monoculture-analysis is
      about hidden bias at each analytical step. They often occur together, but false independence is the misrepresentation;
      monoculture is the structural problem.

      '
    examples:
    - file: docs/decisions/E2-bout-engine-spec.md
      quote: '"Dispatch to: @Architect. Prime context: SPEC.md, AGENTS.md, plans/07-bout-validation.md..." The dispatch pattern
        creates the appearance of independent agent review. But @Architect is Claude (same model family as @Weaver who wrote
        the spec). No separate model family reviews whether the spec is over-specified or the plan is under-scoped.

        '
    - file: '"data/ebook-review/claude/axis-A.yaml" and "data/ebook-review/gemini/axis-A.yaml"'
      quote: 'Two separate review files with different model families (Claude Opus vs Gemini 2.0 Flash). But they reach nearly
        identical conclusions on all chapters. The convergence is presented as validation. However, both models were trained
        on similar internet corpora and both inherit the same biases about what is "published" vs "scarce." The agreement
        is not independent verification; it''s artifact of shared training data.

        '
    - file: docs/decisions/E2-bout-engine-spec.md
      quote: '"Verification matrix: Check: PR1 | PR2 | Gate green: Required | Required | New tests pass: ≥7 | ≥12" The matrix
        presents a checklist that feels like independent verification gates. But the gate itself (running pnpm test) is the
        only enforcement mechanism. No human review. No independent code audit. The checklist performs rigor without providing
        it.

        '
    _model: claude
    _chunk: chunk-082
  signal-bloat:
  - id: C-001
    name: signal-bloat
    definition: The use of pseudo-code, mathematical notation, or custom DSL blocks (e.g., 'signal' blocks) to wrap plain-text
      concepts.
    mechanism: The model attempts to perform 'engineering rigor' by using syntax that looks like code or logic gates for descriptions
      that are naturally suited to prose.
    distinct_from: epistemic-theatre (signal-bloat is structural/syntactic rather than rhetorical/verbal).
    examples:
    - file: noopit/.claude/agents/architect.md
      quote: LOOP := design -> schema -> library -> api -> actions -> gate
    - file: midgets/docs/decisions/E2-bout-engine-spec.md
      quote: S1_coherence := PR.describable_in_1_sentence & PR.verifiable_in_isolation
    - file: noopit/.claude/agents/architect.md
      quote: O(1)_lookup := PRESET_BY_ID Map
    _model: gemini
    _chunk: chunk-082
  internal-lexicon-loop:
  - id: C-002
    name: internal-lexicon-loop
    definition: An over-reliance on the project's own manufactured terminology and meta-concepts to define and validate new
      work.
    mechanism: Once a 'taxonomy' or 'layer model' is established, the LLM treats it as an objective physical law, leading
      to circular reasoning where work is judged solely on its adherence to these local terms.
    distinct_from: becoming-jonah (the loop is about vocabulary and conceptual anchoring, not necessarily recursive process
      reflection).
    examples:
    - file: midgets/docs/bootcamp/ebook-review-A.md
      quote: 13-layer operational model (L0-L12), sycophantic drift vs hallucination, anti-pattern taxonomy...
    - file: midgets/docs/internal/l12-affective-dynamics.md
      quote: 'Asked Weaver to analyse the significance within the layer model... Back-refs: mode-larp.md, layer-model.md (L8,
        L12), SD-120...'
    - file: midgets/docs/research/prompts/cross-examine-build-order.md
      quote: Do not comment on the governance framework, the lexicon, the slopodar, or the layer model.
    _model: gemini
    _chunk: chunk-082
  completeness-performance:
  - id: C-003
    name: completeness-performance
    definition: Padding documentation with exhaustive, repetitive lists of every possible state or parameter, regardless of
      their actual utility.
    mechanism: LLMs prioritize coverage over salience. They perform 'thoroughness' by filling every row of a matrix or list
      (e.g., 51 colors, 51 chapters), which dilutes critical information with trivialities.
    distinct_from: tally-voice (tally-voice is about the rhetorical use of a count; completeness-performance is about the
      physical length and exhaustive nature of the list itself).
    examples:
    - file: midgets/docs/research/pi/coding-agent/docs/themes.md
      quote: Every theme must define all 51 color tokens. There are no optional colors.
    - file: midgets/docs/bootcamp/ebook-review-A.md
      quote: '[A list of 51 chapters with word counts for a book that has not been written, including topics like ''Descriptive
        Statistics'' and ''systemd'']. '
    - file: midgets/docs/research/pi/coding-agent/docs/settings.md
      quote: '[Lengthy tables for minor UI settings like ''editorPaddingX'' and ''autocompleteMaxVisible''].'
    _model: gemini
    _chunk: chunk-082
  cross-repo-duplication:
  - id: C-001
    name: cross-repo-duplication
    definition: Identical or near-identical documents manually copied across repositories without synchronization mechanisms,
      risking divergence.
    mechanism: LLM-assisted projects copy-paste content between repos for quick propagation; no git submodules/shared sources
      leads to independent drift as changes accumulate.
    distinct_from: stale-reference-propagation
    examples:
    - file: '[noopit] .claude/agents/architect.md'
      quote: '# Architect — Backend/Feature Engineer & System Designer > **Mission:** Design features from the data model
        up.'
    - file: '[midgets] .claude/agents/architect.md'
      quote: '# Architect - Backend/Feature Engineer & System Designer > **Mission:** Design features from the data model
        up.'
    - file: '[midgets] docs/decisions/E2-bout-engine-spec.md'
      quote: '# E2 - Bout Engine Spec Plan > Provenance document. Written by @Weaver before dispatch to @Architect.'
    - file: '[noopit] docs/decisions/E2-bout-engine-spec.md'
      quote: '# E2 — Bout Engine Spec Plan > Provenance document. Written by @Weaver before dispatch to @Architect.'
    - file: '[noopit] sites/oceanheart/content/blog/2026-03-01-slopiculture.md'
      quote: 'title = "Catching in the Wind: A Naturalist''s Guide to Slopiculture"'
    - file: '[midgets] sites/oceanheart/content/blog/2026-03-01-slopiculture.md'
      quote: 'title = "Catching in the Wind: A Naturalist''s Guide to Slopiculture"'
    _model: grok
    _chunk: chunk-082
  template-reuse-mismatch:
  - id: C-001
    name: template-reuse-mismatch
    definition: A standardised template or instruction set applied uniformly across tasks of vastly different scale, complexity,
      or verification needs, creating false equivalence.
    mechanism: The LLM learns a successful template structure and generalizes it without scaling the internal complexity or
      verification depth. Each instance looks correct because it follows the pattern, but the verification surface area is
      ignored.
    distinct_from: magnitude-blindness (which is about failure to scale effort); this is about template form persisting while
      content meaning changes. A magnitude-blindness error *uses* template-reuse-mismatch as its mechanism.
    examples:
    - file: '[midgets] docs/bootcamp/tasks/11-write-step06/instructions.md'
      quote: 'Estimated target: 50-60k characters (~1500-1800 lines)... Design 5-7 challenges... Field Maturity: EMERGING/FRONTIER'
    - file: '[midgets] docs/bootcamp/tasks/14-write-step09/instructions.md'
