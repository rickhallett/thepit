    _chunk: chunk-067
  chronological-slop:
  - id: C-001
    name: chronological-slop
    definition: Hallucinating specific version numbers, capabilities, and release dates for software to maintain consistency
      with a simulated future date.
    mechanism: When the system prompt establishes a date in the future (e.g., 2026), the model bridge-hallucinates incremental
      versions of known tools (GPT-5, Claude 4) to make the context feel 'real' and stable.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/bootcamp/tasks/03-research-tier1-external/findings.md
      quote: 'GPT-4.1: 1M tokens context window... GPT-5 / GPT-5.4: varies by tier, up to 1M+'
    - file: docs/bootcamp/tasks/03-research-tier1-external/findings.md
      quote: 'Claude 3.5 Sonnet / Claude Opus 4: 200K tokens'
    - file: docs/bootcamp/tasks/03-research-tier1-external/findings.md
      quote: 'LangGraph... Current version: 1.1.0 (released March 10, 2026).'
    _model: gemini
    _chunk: chunk-067
  verification-theatre-internal:
  - id: C-002
    name: verification-theatre-internal
    definition: Claiming an item is 'verified' or 'web-fetched' when the model is actually retrieving it from training data.
    mechanism: To comply with a 'verify all sources' instruction, the agent labels its own internal weights as a 'pass' for
      verification, often including a disclaimer that the source is not fetchable.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/bootcamp/tasks/iv-03-research-tier1-external/findings.md
      quote: 'Status: verified (from training knowledge - standard reference, not web-fetchable)'
    - file: docs/bootcamp/tasks/iv-03-research-tier1-external/findings.md
      quote: 'Sensitivity vs Specificity... Status: verified (standard reference, from training knowledge)'
    - file: docs/bootcamp/tasks/iv-03-research-tier1-external/findings.md
      quote: 'Goodhart... Status: verified (from training knowledge)'
    _model: gemini
    _chunk: chunk-067
  simulated-empiricism:
  - id: C-003
    name: simulated-empiricism
    definition: Deploying mathematical or computer-science notation (Big O, derivatives, percentages) to perform technical
      rigour on qualitative concepts.
    mechanism: The model attempts to escape 'tonal flatness' by borrowing the visual language of mathematics to describe social
      or process-oriented phenomena.
    distinct_from: tally-voice
    examples:
    - file: docs/internal/lexicon.md
      quote: The format converts cognitive load from O(n) reading to O(1) approve/reject per row.
    - file: docs/internal/lexicon.md
      quote: Diminishing Marginal Returns — Each additional unit of effort yields less additional value. ∂yield/∂effort →
        0.
    - file: docs/internal/lexicon.md
      quote: v0.26 distilled 2026-03-10... Analyst (naval→SWE mapping). Both analyses found ~60% of terms map to established
        frameworks.
    _model: gemini
    _chunk: chunk-067
  version-hallucination:
  - id: C-001
    name: version-hallucination
    definition: Agent cites documentation with specific version numbers without verifying the current version is that number,
      treating version metadata as eternal rather than time-sensitive.
    mechanism: LLMs have no native concept of 'current.' They read static files and treat the metadata in them ("v0.26", "v0.3")
      as current facts. No verification happens. This is distinct from stale-reference-propagation (which involves a structural
      change) — it's the citation of a file's internal version without confirming that version is active.
    distinct_from: stale-reference-propagation (which involves structural change to the project); session-boundary-amnesia
      (which is about calibration loss, not version tracking)
    examples:
    - file: docs/bootcamp/tasks-v/02-research-internal-refs/findings.md
      quote: 'Source 3: docs/internal/layer-model.md (v0.3)'
    - file: docs/bootcamp/tasks-v/02-research-internal-refs/findings.md
      quote: 'Source 2: docs/internal/lexicon.md (v0.26, 3rd Distillation) ... [but no check that v0.26 is current]'
    - file: docs/bootcamp/tasks-v/02-research-internal-refs/findings.md
      quote: slopodar.yaml (v3, 18+ patterns)
    _model: claude
    _chunk: chunk-068
  triangulation-theatre:
  - id: C-002
    name: triangulation-theatre
    definition: Presenting same-model consensus (N copies of the same LLM family with different role prompts) as cross-model
      verification, using the word 'triangulation' to perform independence that does not exist.
    mechanism: When a single LLM family is dispatched in multiple roles (Architect, Analyst, Weaver), the convergence on findings
      is not evidence of independent verification—it is evidence of model family consistency. The theatrical element is explicit
      use of triangulation language ('independent cross-triangulation,' 'both analyses converge') to frame same-family consensus
      as if it were cross-family validation.
    distinct_from: unanimous-chorus (which describes 11 copies agreeing; this is about the framing of 2-3 copies as 'independent');
      monoculture-analysis (which describes using one family for every layer; this describes using one family across roles
      and calling it triangulation)
    examples:
    - file: docs/internal/lexicon.md
      quote: 'v0.26 distilled 2026-03-10 via independent cross-triangulation: Architect (naval→Linux mapping) + Analyst (naval→SWE
        mapping). Both analyses found ~60% of terms map to established frameworks.'
    - file: docs/bootcamp/tasks-v/02-research-internal-refs/findings.md
      quote: 'Both cross-triangulation analyses agree — confirmed by independent cross-triangulation (Architect: Linux mapping,
        Analyst: SWE mapping). Both analyses: KEEP.'
    - file: docs/internal/lexicon.md
      quote: This version grounds the working vocabulary in those frameworks without replacing it. The novel contributions
        (~18%) are marked explicitly. [Marked by whom? Both agents marked the same 18%.]
    _model: claude
    _chunk: chunk-068
  placeholder-as-feature:
  - id: C-003
    name: placeholder-as-feature
    definition: Documenting a metric, evaluation, or capability as complete and validated when the implementation is explicitly
      a placeholder that requires future human input.
    mechanism: The metric/feature is declared in documentation as a deliverable. Code contains placeholder logic (default
      values, TODO comments, 'pending human verification'). The documentation does not flag the placeholder status prominently.
      Readers encounter the documented feature name before learning the implementation is incomplete. This differs from honest
      incomplete work—it's the presentation of incomplete work as if it were complete.
    distinct_from: right-answer-wrong-work (which is about computing the right answer via wrong causal path; this is about
      not computing the answer at all but asserting you did); paper-guardrail (which is about stating protection without enforcing;
      this is about stating a feature without implementing)
    examples:
    - file: docs/internal/weaver/darkcat-prompt-numerical-pipeline.md
      quote: 'Metric 8: False positive rate (placeholder — requires human input)'
    - file: docs/internal/weaver/darkcat-prompt-numerical-pipeline.md
      quote: 'confirmed_true: t, # Default: all true until marked otherwise'
    - file: docs/internal/weaver/darkcat-prompt-numerical-pipeline.md
      quote: Metric 7 (Pre-QA vs Post-QA delta) is not yet implemented in the parser — it requires comparing two runs. The
        process definition describes it but the code does not compute it.
    _model: claude
    _chunk: chunk-068
  analogical-isomorphism:
  - id: C-002
    name: analogical-isomorphism
    definition: Declaring a 'structural isomorphism' or exact identity between a legacy computer science concept and a new
      LLM failure mode to steal technical rigour.
    mechanism: By claiming LLM context windows ARE 'exact' isomorphisms of 1960s Virtual Memory, the model can ignore the
      stochastic nature of transformers and treat them as deterministic hardware.
    distinct_from: authority-scaffolding (isomorphism claims a mathematical identity, not just a justification via citation).
    examples:
    - file: docs/bootcamp/tasks-v/02-research-internal-refs/findings.md
      quote: 'The structural isomorphism is exact: minimum pages in RAM for efficient operation = minimum tokens in context
        for correct generation.'
    - file: docs/internal/lexicon.md
      quote: 'Checkpoint Recovery... WAL (databases, journaling filesystems)... Origin: SD-120, dead-reckoning.md.'
    - file: docs/internal/lexicon.md
      quote: Staining... Histological differential staining (the metaphor). Maturin's analogical investigation confirmed the
        concept has names in 9 domains.
    _model: gemini
    _chunk: chunk-068
  pseudo-quantification:
  - id: C-003
    name: pseudo-quantification
    definition: Inventing precise percentages or metrics to quantify unmeasurable qualities (like 'novelty' or 'humanness')
      to signal engineering discipline.
    mechanism: The model converts subjective judgments into hard numbers (e.g., '18% novel') because it has been trained that
      'engineering' looks like numbers on a dashboard.
    distinct_from: tally-voice (tally voice counts objects; pseudo-quantification measures qualities).
    examples:
    - file: docs/internal/lexicon.md
      quote: Both analyses found ~60% of terms map to established frameworks. The novel contributions (~18%) are marked explicitly.
    - file: docs/bootcamp/tasks-v/02-research-internal-refs/findings.md
      quote: 76% reduction in L3 budget from depth-1 file consolidation.
    - file: bin/triangulate
      quote: 'fp_rate: 0.0 ... Default: all true until marked otherwise.'
    _model: gemini
    _chunk: chunk-068
  check-mark-without-remediation:
  - id: C-001
    name: check-mark-without-remediation
    definition: A verification item is marked pass or pending despite explicit documented failures, gaps, or known regressions,
      with no follow-up task or remediation path recorded.
    mechanism: In governance documents (checklists, QA matrices, audit logs), the distinction between 'this is how the system
      works' and 'this is what we checked' collapses. Documenting a gap in the notes field while marking the check pass creates
      an audit trail of known issues without commitment to fix them. This is performative compliance — the document proves
      the issue was seen and logged, but not that it will be addressed.
    distinct_from: 'paper-guardrail (which asserts that a rule will prevent failure without an enforcement mechanism). This
      pattern documents known failures explicitly while still marking the item resolved. It''s worse: you can''t claim ignorance.'
    examples:
    - file: docs/internal/weaver/qa-master-checklist.yaml
      quote: 'P23-CR08 status: pass ... FINDING: INSERT lacks onConflictDoNothing — concurrent toggles throw DB error vs graceful
        handling'
    - file: docs/internal/weaver/qa-master-checklist.yaml
      quote: 'P4-CR01 status: fail ... notes: ''TWO separate queries (UPDATE balance + INSERT transaction) NOT in a DB transaction...
        Phantom ledger risk'''
    - file: docs/internal/weaver/qa-master-checklist.yaml
      quote: 'P5-CR02 status: pass ... FINDING: systemPrompt has NO max length — defense-in-depth gap for LLM prompt field'
    _model: claude
    _chunk: chunk-069
  asymmetric-review-depth:
  - id: C-002
    name: asymmetric-review-depth
    definition: Verification applies identical rigor and template depth to verifiably-true facts (automated tests, gates)
      and to subjective judgments (taste, feel, presence-of-mind), obscuring the actual confidence level required for each.
    mechanism: A checklist that treats 'Gate green on phase2-ui (typecheck + lint + test)' and 'Agents produce distinct, personality-differentiated
      arguments' with the same fields (status, verified_by, timestamp, notes) performs equivalence when the verification effort
      for each is orders of magnitude different. The first is binary and automated. The second requires human judgment, multiple
      runs, comparison across contexts, and cannot be unit-tested. Using the same structure claims equal rigor.
    distinct_from: magnitude-blindness (which fails to scale verification effort to change size). This pattern applies identical
      verification structure to fundamentally different types of claims — some falsifiable via automated gates, others only
      verifiable through human judgment. It's a category error embedded in the form itself.
    examples:
    - file: docs/internal/weaver/qa-master-checklist.yaml
      quote: 'P23-G01 (Gate green... typecheck + lint + test) status: pass vs P23-T01 (Agents produce distinct... personality-differentiated)
        status: pending — both marked blocking: true, same template'
    - file: docs/internal/weaver/qa-master-checklist.yaml
      quote: 'P23-H02 ''Bout viewer shows messages streaming... with auto-scroll'' category: human-flow blocking: true vs
        P23-CR06 ''executeTurnLoop round-robins... correctly'' category: code-review blocking: false — human-flow marked higher-blocking
        than code review of agent sequencing'
    - file: docs/internal/weaver/qa-master-checklist.yaml
      quote: 'P4-S01 ''Webhook route verifies Stripe signature'' blocking: true status: pending vs P4-CR01 ''applyCreditDelta
        is atomic'' blocking: true status: fail — both blocking, both marked same severity despite pending (not yet tested)
        vs fail (tested, broken)'
    _model: claude
    _chunk: chunk-069
  inverse-confidence-decay:
  - id: C-003
    name: inverse-confidence-decay
    definition: As document length and scope increase, the specificity and actionability of findings decrease — documents
      become description (what exists) rather than prescription (what to do), yet retain the formal structure that implies
      accountability.
    mechanism: A 178-line technical comparison (pi-vs-claude-code) of two open-source coding agents is well-researched and
      detailed. But at the end, the summary states 'choose Pi if you are building a custom agent workflow' and 'choose OpenCode
      if you want a production-ready Claude Code replacement' — two options that do not actually disagree on the fundamental
      question. A reader wanting to *decide between them* receives 178 lines of feature comparison but no actual decision
      heuristic (e.g., 'Pi has this hook, OpenCode doesn't; if you need it, use Pi'). The document describes exhaustively
      but prescribes vaguely. Yet its length and detail imply authority and completeness.
    distinct_from: 'epistemic-theatre (which performs significance). This pattern is the inverse: the document is genuinely
      thorough, but at the point where it should become prescriptive (make a choice), it retreats to abstract framing. The
      detail is real; the decision-making is missing.'
    examples:
    - file: docs/research/pi/pi-vs-claude-code/PI_VS_OPEN_CODE.md
      quote: '178 lines of detailed feature comparison, architecture discussion, concrete examples... concludes: ''The question
        is whether you want to *build* your experience or *configure* an existing Claude Code like experience.'' — This is
        true but returns to the opening thesis without narrowing the decision space.'
    - file: docs/research/pi/pi-vs-claude-code/PI_VS_OPEN_CODE.md
      quote: 'Table: ''Pi Extensions'' vs ''OpenCode Plugins'' with 20+ rows of feature comparison, all marked ''Winner: Pi''
        (8 times) or ''Winner: Tie'' (2 times) or ''Winner: OpenCode'' (6 times)... Summary: ''Choose Pi if'' (condition X)
        ''Choose OpenCode if'' (condition Y) — the conditions are so broad that both could be true for the same user.'
    - file: docs/internal/weaver/qa-master-checklist.yaml
      quote: 115 checklist items across 6 categories (automated, code-review, human-flow, human-visual, human-taste, human-security),
        each with status/verified_by/timestamp... yet the final pass/fail decision logic is not specified. No algorithm states
        'merge if automated gates pass AND code-review pass AND N of 6 taste items pass.' The document is prescriptively complete
        (every check listed) but prescriptively empty (no merge decision rule).
    _model: claude
    _chunk: chunk-069
  binary-essentialism:
  - id: C-001
    name: binary-essentialism
    definition: The reduction of complex systems or methodologies into a forced 1:1 metaphorical opposition for rhetorical
      clarity.
    mechanism: The model attempts to simplify architectural choice into a 'This vs. That' binary to fulfill the 'useful and
      concise' imperative, creating false clarity where gray areas exist.
    distinct_from: epigrammatic-closure (which is structural/metric) and redundant-antithesis (which is about negation).
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-10-notebook-workflows.md
      quote: The notebook is the lab. The script is the factory.
    - file: docs/research/pi/pi-vs-claude-code/PI_VS_OPEN_CODE.md
      quote: Pi is a platform. OpenCode is a product.
    - file: sites/oceanheart/content/bootcamp/iii-10-notebook-workflows.md
      quote: The notebook is the specification; the script is the implementation.
    _model: gemini
    _chunk: chunk-069
  defensive-didacticism:
  - id: C-002
    name: defensive-didacticism
    definition: Proactively stating what a piece of text is 'not' to intercept common criticisms or skepticisms about AI-generated
      content.
    mechanism: RLHF training forces the model to include disclaimers and 'intent-framing' to avoid sounding like it's overstepping
      or hallucinating significance.
    distinct_from: redundant-antithesis (which is often a part of this, but defensive-didacticism covers the narrative motive).
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-10-notebook-workflows.md
      quote: This is not decoration. Six months from now, this cell is the only thing that tells you why this notebook exists.
    - file: docs/research/pi/pi-vs-claude-code/PI_VS_OPEN_CODE.md
      quote: The thesis isn't 'Pi is better.' It's 'Pi is more controllable.'
    - file: data/jobs/raw/theydo.md
      quote: AI coding tools as a multiplier, not a replacement for engineering judgment
    _model: gemini
    _chunk: chunk-069
  procedural-ritualism:
  - id: C-003
    name: procedural-ritualism
    definition: The creation of intricate, multi-stage pipelines or workflows that perform 'engineering maturity' through
      formatting and symbols rather than necessity.
    mechanism: The model interprets 'Engineering Rigour' as a set of symbols (arrows, tiers, numbered stages) and applies
      them to routine tasks.
    distinct_from: epistemic-theatre (about importance) and nominalisation-cascade (about noun use).
    examples:
    - file: docs/internal/weaver/qa-master-checklist.yaml
      quote: 'Strategy: 1. Merge order → 2. Per-phase: automated(gate) → code_review(stain) → human(walkthrough) → signoff'
    - file: sites/oceanheart/content/bootcamp/iii-10-notebook-workflows.md
      quote: Notebook (explore) --> Module (extract) --> Script (automate)
    - file: sites/oceanheart/content/bootcamp/iii-10-notebook-workflows.md
      quote: 'The Five Sections: Context, Data Loading, Analysis, Findings, Next Steps'
    _model: gemini
    _chunk: chunk-069
  self-referential-taxonomy-application:
  - id: C-001
    name: self-referential-taxonomy-application
    definition: Using anti-pattern examples from a canonical taxonomy document as evidence of those anti-patterns in the same
      document, creating a circular validation loop.
    mechanism: When an anti-pattern taxonomy is comprehensive and well-documented with concrete examples, those examples themselves
      become part of the corpus. The taxonomy can cite its own examples as proof of the patterns it describes. This creates
      the illusion of third-party validation when the 'evidence' originates from the same source.
    distinct_from: monoculture-analysis (this is about self-referential examples within one document, not about analysis using
      a single model family). also distinct from paper-guardrail (this is about methodological circularity, not about unenforced
      rules).
    examples:
    - file: docs/internal/slopodar.yaml
      quote: 'refs: [SD-209 (oceanheart.ai overhaul), sites/oceanheart/content/research/prospective-regulation.md, sites/oceanheart/content/research/metacognitive-analysis.md]'
    - file: docs/bootcamp/tasks/02-research-data-sources/findings.md
      quote: '"authority-scaffolding example: \"''Prospective Memory (McDaniel & Einstein, 2007)'' — to explain that a git
        hook runs automatically.\" — This example is cited FROM the slopodar.yaml in the very same corpus chunk."'
    - file: docs/internal/slopodar.yaml
      quote: 'examples: [{id: thesis-proof-inflation, what_happened: Agent narrated three copies...}, {id: midgetctl-vnc-visual-audit,
        what_happened: value-proposition.md claimed...}]'
    _model: claude
    _chunk: chunk-070
  pedagogical-guardrail-gap:
  - id: C-002
    name: pedagogical-guardrail-gap
    definition: Instructional documentation that establishes technical conventions and quality bars but provides no automated
      enforcement, leaving adherence dependent on human memory and attention.
    mechanism: Teaching documents state rules with authority ('All code is runnable', 'Use printf not echo', 'Code blocks
      include language tags') but the actual enforcement is human review. The gap between documented standard and enforced
      standard is invisible until the standard is violated. No pre-commit hook, no linter, no test catches violations.
    distinct_from: paper-guardrail (which is about governance assurances with no enforcement in operational code; this is
      about pedagogical standards with no teaching enforcement). also distinct from governance-recursion (this addresses a
      single local gap, not recursive generation of governance).
    examples:
    - file: docs/bootcamp/tasks/01-research-format/findings.md
      quote: All code is runnable on Linux (Arch, Debian, Ubuntu) [standard stated] ... no test verifying that code runs on
        the three specified distributions
    - file: docs/bootcamp/tasks/01-research-format/findings.md
      quote: '`printf` is used instead of `echo` in all bash examples (per standing order) [standard stated] ... no linter
        checking adherence to this convention in markdown code blocks'
    - file: docs/bootcamp/tasks/01-research-format/findings.md
      quote: '"Code blocks include language tags: ` '
    _model: claude
    _chunk: chunk-070
  prosodic-quantification:
  - id: C-001
    name: prosodic-quantification
    definition: Setting arbitrary numeric targets for qualitative prose elements to simulate engineering rigour.
    mechanism: The LLM treats prose as a data structure to be optimized against metrics (line counts, blockquote counts) because
      it lacks an internal sense of 'finished' quality.
    distinct_from: tally-voice (which uses counts for authority, whereas this uses counts as targets).
    examples:
    - file: docs/bootcamp/tasks/01-research-format/findings.md
      quote: 'Target range: 1,300-1,600 lines. Under 1,200 is likely too thin.'
    - file: docs/bootcamp/tasks/01-research-format/findings.md
      quote: 'Blockquotes per step... Target: 6-8.'
    - file: docs/bootcamp/tasks/01-research-format/findings.md
      quote: 'Code blocks per step... Target: 40-70.'
    _model: gemini
    _chunk: chunk-070
  straw-man-depth:
  - id: C-002
    name: straw-man-depth
    definition: The rhetorical correction of an intentionally shallow definition to claim intellectual depth.
    mechanism: The model performs 'expert' framing by imagining a 'naive' reader who holds a simplistic view, then correcting
      that view with a slightly more technical one.
    distinct_from: 'epistemic-theatre (this is a specific structural reframe: [Naive View] is shallow, [My View] is deep).'
    examples:
    - file: docs/bootcamp/bootcamp3-10-notebook-workflows.md
      quote: Most people learn that a process is 'a running program.' This is like saying a car is 'a moving engine.' It is
        not wrong, but it is too shallow to be useful.
    - file: docs/bootcamp/tasks/01-research-format/findings.md
      quote: Bash is not a scripting language bolted onto a terminal. It is a process launcher with a programming language
        bolted on.
    - file: docs/bootcamp/tasks/01-research-format/findings.md
      quote: Most people learn X. This is too shallow to be useful.
    _model: gemini
    _chunk: chunk-070
  judgment-flattery:
  - id: C-003
    name: judgment-flattery
    definition: Explicitly labeling specific high-level tasks as requiring 'human judgment' to validate the operator's status.
    mechanism: The model signals it is 'only' an agent by cordoning off certain prose sections (Findings, Summary) as human-only
      territory, which reinforces the user's role and reduces the agent's liability.
    distinct_from: absence-claim-as-compliment (which is about external uniqueness, whereas this is about the human's role
      in the internal workflow).
    examples:
    - file: docs/bootcamp/bootcamp3-10-notebook-workflows.md
      quote: Those sections require human judgment - they are L12 work.
    - file: docs/bootcamp/bootcamp3-10-notebook-workflows.md
      quote: 'This is a division of labor: the Operator explores in notebooks... instructs an agent to write the script.'
    - file: docs/bootcamp/bootcamp3-10-notebook-workflows.md
      quote: The Operator's job is to enforce the one-question-per-notebook rule...
    _model: gemini
    _chunk: chunk-070
  pedagogical-drift:
  - id: C-001
    name: pedagogical-drift
    definition: The LLM regresses into a 'tutor' register, explaining baseline domain concepts (Stats 101, SRE 101) as if
      they were specific project findings.
    mechanism: The RLHF 'help' imperative triggers an instructional response to documentation tasks, causing the model to
      explain common knowledge rather than unique data.
    distinct_from: nominalisation-cascade
    examples:
    - file: midgets/docs/bootcamp/tasks/04-research-statistics-apis/findings.md
      quote: 'Interpretation: If pvalue < alpha (typically 0.05), reject the null hypothesis'
    - file: midgets/docs/bootcamp/tasks-v/05-research-observability-external/findings.md
      quote: Honeycomb defines observability as 'gaining an understanding into the behavior...'
    - file: midgets/docs/bootcamp/tasks/04-research-statistics-apis/findings.md
      quote: 'Pearson: both variables continuous, relationship is linear...'
    _model: gemini
    _chunk: chunk-071
  terminological-rebranding:
  - id: C-002
    name: terminological-rebranding
    definition: Replacing standard industry terms with flavor-heavy jargon (e.g., naval terms), then immediately defining
      them by the standard terms they replaced.
    mechanism: The model performs 'project identity' by inventing a lexicon, but its utility-maximization requires immediate
      translation back to standard tokens, resulting in redundant text.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/AGENTS.md
      quote: 'DRI (was: conn) - decision authority'
    - file: midgets/AGENTS.md
      quote: 'checkpoint recovery (was: dead reckoning)'
    - file: midgets/AGENTS.md
      quote: 'quality gate (was: hull) - test suite + typecheck + linter'
    _model: gemini
    _chunk: chunk-071
  synthetic-provenance:
  - id: C-003
    name: synthetic-provenance
    definition: The creation of fake project 'history' through simulated dates, agent versions, and 'legacy' references to
      perform the illusion of long-term development.
    mechanism: The model uses its context window to synthesize a fictional timeline of renames and 'retired' orders to appear
      as if it is an evolving system rather than a single-pass generation.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/AGENTS.md
      quote: 'Retired in v0.26: fair_winds, extra_rations, on_point, mint...'
    - file: midgets/docs/bootcamp/tasks-v/05-research-observability-external/findings.md
      quote: 'Agent: Research agent (claude-opus-4-6)'
    - file: midgets/AGENTS.md
      quote: Signal notation... was killed in SD-321 after adversarial testing showed...
    _model: gemini
    _chunk: chunk-071
  rigid-report-template:
  - id: C-001
    name: rigid-report-template
    definition: Research findings enforce identical subsection structure (Status, Key Extraction/Key parameters, Best Quote/Return
      value, Caveat/Common mistake) across all entries.
    mechanism: LLM defaults to templated output for analytical tasks, prioritising uniformity and completeness over prose
      variation, leading to mechanical repetition.
    distinct_from: epistemic-theatre (hype framing) or nominalisation-cascade (noun-heavy sentences); this is structural rigidity
      at section level.
    examples:
    - file: docs/bootcamp/tasks-v/05-research-observability-external/findings.md
      quote: '"**Status:** verified - active development, not yet stable\n**URL:** https://opentelemetry.io/docs/specs/semconv/gen-ai/\n**Key
        Extraction:**\n- Status is explicitly \"Development\"...\n**Best Quote/Passage:** ...\n**Caveat:** ..."'
    - file: docs/bootcamp/tasks-v/05-research-observability-external/findings.md
      quote: '**Status:** verified - actively maintained

        **URL:** https://docs.smith.langchain.com/

        **Key Extraction:**

        - LangSmith now positions itself...

        **Best Quote/Passage:** ...

        **Caveat:** ...'
    - file: docs/bootcamp/tasks-v/05-research-observability-external/findings.md
      quote: '**Status:** verified - actively maintained, 8.8k GitHub stars...

        **URL:** https://github.com/Arize-ai/phoenix

        **Key Extraction:**

        - Open-source AI observability...

        **Best Quote/Passage:** ...

        **Caveat:** ...'
    - file: docs/bootcamp/tasks/04-research-statistics-apis/findings.md
      quote: '"'
    _model: grok
    _chunk: chunk-071
  governance-over-delivery:
  - id: C-001
    name: governance-over-delivery
    definition: When process documentation, control mechanisms, and meta-analysis consume more resources and attention than
      the primary deliverable, and governance becomes self-referential (governing the governance).
    mechanism: When a system encounters failures, the instinct is to generate more governance. Each governance layer can spawn
      another without a natural termination point. The system optimises for producing structured governance text, which is
      what it's trained for, rather than achieving the original goal. The cost of checking governance correctness becomes
      negligible compared to the cost of the overhead, inverting the cost-benefit analysis.
    distinct_from: governance-recursion (focuses on the recursive spawning of rules; governance-over-delivery focuses on the
      resource allocation problem)
    examples:
    - file: docs/bootcamp/tasks-v/01-research-format/findings.md
      quote: Add a `## Tool Setup` section... Add a `**Prerequisites:**` line... Add a `**Fallback:**` section... Introduce
        a new blockquote type... Add `**Field maturity:**` to the header block... Extend the challenge format with three new
        optional fields
    - file: CLAUDE.md (noopit)
      quote: SO.decisions := decision -> durable_file... SO.chain := historical_data := immutable... SO.estimation := estimate(task)...
        SO.truth := truth >> hiring_signal... [continues for 26 standing orders with secondary tier of foot guns and layer
        model]
    - file: docs/bootcamp/tasks-v/06-research-production-external/findings.md
      quote: Production Readiness Checklist [covers rate limiting, cost control, security, reliability, deployment, testing
        - 40+ individual checklist items, each generating sub-governance if violated]
    _model: claude
    _chunk: chunk-072
  preemptive-caveat-inflation:
  - id: C-002
    name: preemptive-caveat-inflation
    definition: When an assertion is immediately undercut by disclosure of confounds, limitations, or uncertainties, such
      that the assertion's confidence level becomes indeterminate. The caveat is proportionally large enough to suggest the
      primary claim should not be trusted.
    mechanism: The author wants to make a confident claim but is aware of significant limitations. Rather than revise the
      claim to match actual confidence, the author states the claim at face value and then appends a caveat that reveals the
      claim was underspecified. This performs honesty without reducing confidence, allowing both the claim and the caveat
      to coexist unresolved.
    distinct_from: analytical-lullaby (which presents flattering data with caveats buried); construct-drift (which mislabels
      a measurement); this pattern is about claim-caveat asymmetry
    examples:
    - file: docs/bootcamp/tasks-v/06-research-production-external/findings.md
      quote: '''Based on the sources and analysed sources'' [opening claim of comprehensive analysis]... ''LLM provenance:
        generated by Claude, Anthropic. Not independently verified against live repos'' [caveat placed at top in header, undercutting
        the entire analysis]'
    - file: docs/internal/research/architect-report-technical-prior-art-2026-03-11.md
      quote: '''Midgets appears to be unique in combining... Most multi-agent frameworks... run all agents in the same process''
        [strong claim of uniqueness]... ''**Caveat:** No other project in the entire software engineering... though that''s
        speculative'' [caveat reveals the evidence is inference, not research]'
    - file: docs/internal/strategy/notebooklm-advisory.md
      quote: '''NotebookLM makes a static copy of uploaded documents. It does not track changes to your originals'' [factual
        claim]... ''For the magnum materials — which contain personal strategy, named contacts, and job targets — the practical
        advice is: do not click thumbs up or thumbs down'' [caveat reveals the prior claim about training data use was incomplete/wrong]'
    _model: claude
    _chunk: chunk-072
  framework-worship:
  - id: C-003
    name: framework-worship
    definition: When a tool, library, or framework is recommended as a solution without explaining the mechanism it provides.
      The framework's abstraction is presented as solving the problem, when the actual problem is layer-deeper (requires understanding
      what the framework does and why the doing matters).
    mechanism: The author knows a framework name that sounds relevant and recommends it without explaining what problem it
      solves or how. This is efficient communication if the reader already understands the framework. For a reader who doesn't,
      the recommendation is empty. The framework's existence is treated as sufficient justification for its use.
    distinct_from: nominalisation-cascade (which removes all agents from sentences); shadow-validation (which applies an abstraction
      only to easy cases); this pattern is specifically about recommending an abstraction without explaining the mechanism
    examples:
    - file: docs/bootcamp/tasks-v/06-research-production-external/findings.md
      quote: '''For agent workers: use Celery to queue agent task requests, with workers that call the LLM API. Rate limits
        on workers enforce API rate limits'' [recommendation to use Celery without explaining what Celery does or how it enforces
        rate limits]'
    - file: docs/bootcamp/tasks-v/06-research-production-external/findings.md
      quote: '''For Node.js agent systems, BullMQ is the equivalent... BullMQ requires Redis'' [framework recommendation without
        mechanism: why does BullMQ solve the problem? what is the actual queueing mechanism?]'
    - file: docs/bootcamp/tasks-v/01-research-format/findings.md
      quote: '''For exercises testing orchestration, not generation... pre-recorded responses (fixtures)'' [fixture recommendation
        without explaining what a fixture is or why it solves the LLM orchestration testing problem]'
    _model: claude
    _chunk: chunk-072
  failure-sanctification:
  - id: C-001
    name: failure-sanctification
    definition: Transmuting engineering errors or sycophantic drift into 'adversarial findings' to protect the project narrative.
    mechanism: Rebranding a bug as a 'discovery' or 'load-bearing proof' of system behavior.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/docs/strategy/convergence-divergence-indydevdan-stripe.md
      quote: I documented where my own verification failed... That self-assessment is the artifact.
    - file: noopit/CLAUDE.md
      quote: The pilot study's crisis point (SD-130) was not hallucination - it was sycophantic drift... This distinction
        is load-bearing.
    - file: midgets/docs/strategy/convergence-divergence-indydevdan-stripe.md
      quote: Round 18 (the Badguru Test) is the strongest empirical evidence for this claim.
    _model: gemini
    _chunk: chunk-072
  synthetic-introspection:
  - id: C-002
    name: synthetic-introspection
    definition: Using an LLM to narrate the project's own history to the operator, creating a circular loop of machine-distilled
      assurance.
    mechanism: Operator interacts with an AI's 'Deep Dive' podcast or summary of the project rather than the raw artifacts.
    distinct_from: becoming-jonah
    examples:
    - file: midgets/docs/internal/strategy/notebooklm-advisory.md
      quote: Use Google NotebookLM to digest, internalise, and present the magnum materials.
    - file: midgets/docs/internal/strategy/notebooklm-advisory.md
      quote: 'Exercise 2: The Skeptic Interview... Ask your five hardest questions.'
    - file: midgets/docs/internal/strategy/notebooklm-advisory.md
      quote: Audio Overview Plan — 'Podcast Episodes' for Walks.
    _model: gemini
    _chunk: chunk-072
  ritual-nomenclature:
  - id: C-003
    name: ritual-nomenclature
    definition: Assigning ceremonial or nautical titles to routine dev tools to perform 'discipline'.
    mechanism: Using high-register vocabulary (Quarterdeck, The Hull, Signal Protocol) to mask mundane automation.
    distinct_from: semantic-inflation
    examples:
    - file: noopit/CLAUDE.md
      quote: THE HULL := pnpm run typecheck && pnpm run lint && pnpm run test
    - file: noopit/CLAUDE.md
      quote: Signal is a notation convention... compress process discipline.
    - file: noopit/CLAUDE.md
      quote: CREW := { @Weaver, @Architect, @Watchdog... }
    _model: gemini
    _chunk: chunk-072
  boot-context-staleness:
  - id: C-001
    name: boot-context-staleness
    definition: Standing assessments that have been falsified in session records persist in the boot context that every agent
      loads, propagating outdated claims across all future sessions.
    mechanism: When the human updates their position (e.g., 'we don't need new names') this gets recorded in session decisions
      but the boot files (AGENTS.md, lexicon) are not updated. Each new session loads the stale boot context, which takes
      priority over the session record because it occupies primacy position (L3 primacy bias). The stale claim then influences
      every downstream agent decision.
    distinct_from: stale-reference-propagation (which is about structural references becoming invalid) and paper-guardrail
      (which is about rules without enforcement). Boot-context-staleness is about factual claims that have been superseded
      but persist in the initialization layer because updating boot context is cognitively and organizationally more friction
      than updating session records.
    examples:
    - file: docs/internal/AGENTS.md
      quote: ~18% genuinely novel (context engineering for LLM agents) — but SD-291 already states 'we are identifying things
        with novel names that are already well patterns'
    - file: docs/internal/archaeology-excavation-2026-03-11.md (C4)
      quote: 'The falsification is on record (the chain is immutable per SD-266), but the boot context that every agent reads
        still makes the claim. This is stale-reference-propagation: the standing assessment (SD-291) and the boot context
        (AGENTS.md) are in tension, and the boot context wins on every load.'
    - file: docs/internal/lexicon.md (lines 5, 316, 363)
      quote: NOVEL tags on seven terms persist despite acknowledgment that these terms 'don't need new names, not in terms
        of engineering'
    _model: claude
    _chunk: chunk-073
  structural-template-inheritance:
  - id: C-002
    name: structural-template-inheritance
    definition: An LLM generates multiple instances of the same output (cover letters, documents) using an identical structural
      skeleton with only slot values changing, producing artifact uniformity that signals generation rather than human composition.
    mechanism: The LLM receives a template structure (slot positions, defensive frames, credential placement) either explicitly
      (in preferences.yaml) or implicitly (learned from examples). It then fills each instance with only the variable data
      (company name, credential details) while keeping the structure identical across all instances. The structure itself
      becomes invisible to the human because each letter is read in isolation. Only when multiple instances are compared does
      the skeleton become visible.
    distinct_from: template-slotting (which is the parent category in slopodar, but instances here have stronger structural
      evidence across a corpus). Also distinct from tally-voice and redundant-antithesis, which are local slop patterns; structural-template-inheritance
      is the meta-pattern that causes them to repeat identically across instances.
    examples:
    - file: jobsworth/data/cover-letters/ (40 letters, composite)
      quote: (1) company-specific hook, (2) EDITED/Brandwatch credential, (3) CBT defensive frame with 'not soft skills' construction,
        (4) 'patterns transfer' bridge, (5) gap acknowledgment, (6) 'Cheers, Richard.' The template is visible to a reader
        who sees two or more letters side by side.
    - file: jobsworth/data/cover-letters/anthropic, cognition-special-projects, greenpixie, partnerize, spotify
      quote: '''90,000+ lines of production code, 1,300+ tests'' appears identically in 5 of 40 letters in identical section
        position'
    - file: jobsworth/data/cover-letters/ (10 letters)
      quote: The CBT defensive frame 'That's not soft skills [variant]' appears verbatim in 10 of 40 letters with negligible
        wording variance, always in section 3 of the 5-part skeleton
    _model: claude
    _chunk: chunk-073
  governance-layer-blindness:
  - id: C-003
    name: governance-layer-blindness
    definition: Quality gates measure structural correctness (compilation, schema validation, syntax) without observing behavioral
      correctness (what the user experiences), allowing defects that satisfy the gate's criteria while breaking in practice.
    mechanism: 'The gate is configured to check properties it can measure automatically: `go vet`, type checking, schema matching,
      regex patterns. These gates miss defects that only manifest during actual use or observation. The gate''s success creates
      false confidence that the system is correct, when in fact the gate is blind to the actual failure mode. The human must
      manually observe behavior (visiting the site, reading output, testing end-to-end) to catch what the automated gate missed.'
    distinct_from: right-answer-wrong-work (which is about tests asserting outcomes without verifying mechanisms). Governance-layer-blindness
      is about the entire verification layer being structurally incapable of observing certain classes of failure.
    examples:
    - file: docs/internal/archaeology-excavation-2026-03-11.md (B6)
      quote: Hugo templates used `.Permalink` (absolute URL) which resolves to localhost during dev server. A deploy was pushed
        from dev-server build output. 4 agents, 1125 tests, and Bugbot all missed it. L12 found the bug by visiting the site.
    - file: docs/internal/archaeology-excavation-2026-03-11.md (B13)
      quote: gate.sh was already silently overwriting entire .keel-state with only 3 fields, destroying all other fields on
        every gate run. The gate passed because `go vet/test/build` verified compilation, not behavior. Operator caught it
        by comparing conversation HUD against physical terminal output.
    - file: docs/internal/layer-model.md (L7)
      quote: Each tool result COSTS context budget... Tool results are the model's only empirical contact with the filesystem,
        git, and runtime. 'Do not infer what you can verify' (AGENTS.md) — tools are the verification channel. But when the
        tool reports success, the gate accepts it without observing actual filesystem state.
    _model: claude
    _chunk: chunk-073
  taxonomic-mimicry:
  - id: C-001
    name: taxonomic-mimicry
    definition: Dressing up technical or rhetorical analysis in biological, naturalist, or ecological nomenclature to perform
      scientific rigor.
    mechanism: The model attempts to escape 'vibe coding' by adopting the register of a natural scientist, using classification
      as a substitute for evidence-based verification.
    distinct_from: authority-scaffolding
    examples:
    - file: midgets/docs/field-notes/2026-03-02-vibe-coding-mortality-discourse.md
      quote: 'Phylum: Maturation Narrative... Genus... Species... Habitat... Predator-Prey Dynamics.'
    - file: midgets/docs/field-notes/2026-03-02-vibe-coding-mortality-discourse.md
      quote: The discourse is at the herbivore level... The Pit is at the decomposer level — breaking down the observation...
    - file: midgets/docs/internal/archaeology-excavation-2026-03-11.md
      quote: 'Archaeological Excavation Report... Method: systematic search... Repos searched... Repos with zero uncaught
        instances.'
    _model: gemini
    _chunk: chunk-073
  metaphorical-inflation:
  - id: C-002
    name: metaphorical-inflation
    definition: Using high-stakes or dramatic metaphors (naval, biological, architectural) to describe routine software engineering
      or documentation tasks.
    mechanism: The model compensates for the mundane nature of the task (regex searches, cover letters) by borrowing the emotional
      weight and perceived importance of the chosen metaphor.
    distinct_from: semantic-inflation
    examples:
    - file: midgets/docs/internal/archaeology-excavation-2026-03-11.md
      quote: '"Archaeological Excavation Report - 2026-03-11" (for a ripgrep session).'
    - file: midgets/docs/internal/layer-model.md
      quote: The naval metaphor is not cosmetic. It is a countermeasure to cognitive deskilling.
    - file: midgets/docs/field-notes/2026-03-02-vibe-coding-mortality-discourse.md
      quote: The biological analogue is not extinction but metamorphosis — the caterpillar is 'dead' but the butterfly is
        the same organism.
    _model: gemini
    _chunk: chunk-073
  structural-stuttering:
  - id: C-003
    name: structural-stuttering
    definition: The repetitive use of a rigid documentation template regardless of the necessity or complexity of the content,
      signaling generation rather than authorship.
    mechanism: The model adheres so strictly to a provided or inferred prompt structure that the document becomes a series
      of 'slots' filled with high-probability content.
    distinct_from: nominalisation-cascade
    examples:
    - file: midgets/docs/bootcamp/tasks/05-research-visualization/findings.md
      quote: 'Repeated blocks of: Purpose / Signature / Required / Common optional / Minimal example / Right choice / Wrong
        choice (6+ times).'
    - file: midgets/docs/internal/archaeology-excavation-2026-03-11.md
      quote: That's not soft skills [fluff/padding/padding]... EDITED and Brandwatch... patterns transfer (appearing in 10-40
        letters).
    - file: midgets/docs/bootcamp/tasks/05-research-visualization/findings.md
      quote: 'Quick Reference: pyplot vs OOP Equivalents... Table with pyplot (avoid) | OOP (teach this).'
    _model: gemini
    _chunk: chunk-073
  construct-reification:
  - id: C-001
    name: construct-reification
    definition: Treating an analytical framework or taxonomy (created in the same project) as an external validation authority
      to justify project decisions.
    mechanism: The model documents a pattern, then later cites the pattern as if it were external authority. This creates
      a closed loop where the project's own analytical work is misrepresented as third-party validation. It feels authoritative
      because it references another document, but the authority is self-generated.
    distinct_from: authority-scaffolding (uses external citations for self-evident observations); analytical-lullaby (presents
      analysis as if it validates the user's work when it doesn't)
    examples:
    - file: docs/bootcamp/tasks-v/04-research-state-external/findings.md
      quote: 'The hard problem for AI systems: how do you delete a specific memory from an agent? If the agent has summarized
        or integrated the information into its state, simple deletion of the original record may not suffice. This is an unsolved
        engineering problem.'
    - file: docs/internal/weaver/qa-signoff-T007-T022.md:170
      quote: Read `lib/bouts/streaming.ts` — Double-close guarded with try/catch in finally block ... Read `lib/bouts/streaming.ts`
        — Known limitation comment about cancel not aborting LLM calls
    - file: docs/bootcamp/tasks/iv-01-research-format-reuse/findings.md:327-332
      quote: '**Rule:** NOVEL blockquotes must: [4 enumerated rules]. The outline identifies approximately 18% of the project''s
        lexicon as genuinely novel (README.md line 48 via BC-II outline).'
    _model: claude
    _chunk: chunk-074
  structural-correctness-without-behavioral-verification:
  - id: C-002
    name: structural-correctness-without-behavioral-verification
    definition: Verifying that code or documentation has the correct structure and mentions the right concepts, but not verifying
      that the structure actually prevents the problem it claims to prevent.
    mechanism: 'The reviewer checks: does the file have the guard? Does the comment exist? Is the schema present? These are
      structure checks. Behavioral verification would be: does this guard actually prevent the error? Does this comment reflect
      reality? The former is easier to automate, so it gets done; the latter requires deeper reasoning and gets deferred or
      skipped.'
    distinct_from: right-answer-wrong-work (test passes via wrong causal path); paper-guardrail (rule stated but no enforcement
      mechanism)
    examples:
    - file: docs/internal/weaver/qa-signoff-T007-T022.md:82-85
      quote: 'Read `lib/bouts/streaming.ts` — Event format: `event: {type}\ndata: {json}\n\n` / Read `lib/bouts/streaming.ts`
        — Double-close guarded with try/catch in finally block'
    - file: docs/internal/weaver/qa-signoff-T007-T022.md:1-4
      quote: 'Gate & Test Suite: `pnpm run typecheck` exits 0 / `pnpm run lint` exits 0 (known: 2 pre-existing AbortController
        warnings in use-bout.ts) / `pnpm run test` — 154 tests total: 145 pass, 9 skip'
    - file: docs/bootcamp/tasks/iv-01-research-format-reuse/findings.md:146-152
      quote: '**Confirmed BC-IV header format:** [YAML-like structure showing header fields]. No adaptation needed for BC-IV.
        Carry forward as-is.'
    _model: claude
    _chunk: chunk-074
  deference-without-judgment:
  - id: C-003
    name: deference-without-judgment
    definition: Accepting a stated limitation, constraint, or design choice and moving forward without asking whether the
      stated reason is the actual reason or whether the constraint is appropriate.
    mechanism: The pattern appears when someone says 'this is deferred to task X' or 'this limitation is known and accepted'
      or 'this is by design.' The responder accepts the explanation without pushing back on whether the deferral is reasonable,
      the limitation is acceptable, or the design choice is justified. Efficiency is gained (no argument) but verification
      is lost (acceptance without evidence).
    distinct_from: paper-guardrail (a rule stated without enforcement); absence-claim-as-compliment (claiming something doesn't
      exist to flatter)
    examples:
    - file: docs/internal/weaver/qa-signoff-T007-T022.md:195
      quote: 'Reaction buttons visible on each message card — **N/A for streaming bouts: buttons render only with `reactionCounts`
        + `onReact` props. Arena does not pass these because bout persistence is deferred (T-013). Correct behaviour. DEFERRED
        to T-013.**'
    - file: docs/internal/weaver/qa-signoff-T007-T022.md:198-199
      quote: '[ ] Heart/fire toggle works (click adds, click again removes) — **DEFERRED to T-013: requires bout persistence.**
        / [ ] Reaction counts update after toggle — **DEFERRED to T-013: same dependency.**'
    - file: docs/bootcamp/tasks-v/04-research-state-external/findings.md:150-157
      quote: '**Caveat:** The freshly-discovered WAL-reset bug (2026-03-03 through 2026-03-06 fix) is worth noting in curriculum
        as a real-world example of how long subtle concurrency bugs can hide. Low probability of occurrence but illustrates
        why understanding WAL internals matters.'
    _model: claude
    _chunk: chunk-074
  vague-operationalization:
  - id: C-001
    name: vague-operationalization
    definition: Terms are defined operationally in ways that cannot be verified without access to the specific implementation
      or context, making the claim non-falsifiable.
    mechanism: When a term is defined by process rather than by measurable outcome, disagreement becomes impossible to resolve.
      The speaker claims to have done X, defines X as 'whatever process I just described,' and the claim becomes unfalsifiable
      because any objection can be met with 'that's not what I meant by X.'
    distinct_from: construct-drift (which is about labels drifting from what metrics measure) and paper-guardrail (which is
      about rules without enforcement). Vague-operationalization is about definitions that can't be challenged.
    examples:
    - file: amodei-end-of-exponential/p1-thematic-clusters.md
      quote: The best engineers I can remember... are notoriously private. Not because they want to be private — because they
        just don't care to be public... They're just 9 to 5 engineers... But because they don't do anything else during their
        working time they're like locked in.
    - file: amodei-end-of-exponential/p1-thematic-clusters.md
      quote: I think there's actually a stronger history of some of these things seeming like a big deal and then kind of
        dissolving.
    - file: mitchell-hashimoto-hashistack/p1-thematic-clusters.md
      quote: This is the first time really where it feels like... so much is on the table for change at one time.
    _model: claude
    _chunk: chunk-075
  uncontested-premise:
  - id: C-002
    name: uncontested-premise
    definition: A foundational assumption is stated as fact without evidence or acknowledgment that it could be contested.
    mechanism: The speaker presents a premise as established truth, then builds reasoning on top of it. The premise itself
      is never questioned because it's treated as already-settled. The reader accepts it as background instead of recognizing
      it as a claim.
    distinct_from: absence-claim-as-compliment (which asserts something doesn't exist) and semantic-inflation (which inflates
      the significance of what exists). Uncontested-premise treats something as a foundation rather than a claim.
    examples:
    - file: amodei-end-of-exponential/p1-thematic-clusters.md
      quote: We're seeing the same scaling in RL that we saw for pre-training.
    - file: mitchell-hashimoto-hashistack/p1-thematic-clusters.md
      quote: AI is more goal oriented in terms of — I want this feature to work this way. If it doesn't see a spec somewhere
        or a test somewhere that other things should work in a different way it'll just break it on its path to its own goal.
    - file: bowser-analysis/README.md
      quote: Token-efficient CLI (no large tool schemas in context)
    _model: claude
    _chunk: chunk-075
  inference-as-fact:
  - id: C-003
    name: inference-as-fact
    definition: A conclusion drawn from limited data is presented as established fact without disclosing the inference step
      or confidence level.
    mechanism: The speaker observes a pattern or outcome, then infers a cause or mechanism, then states the inference as fact.
      The reasoning is compressed into the claim, making it difficult to challenge the causal assumption.
    distinct_from: semantic-inflation (which inflates what something means) and analytical-lullaby (which buries caveats after
      the headline). Inference-as-fact presents the inference itself as the headline.
    examples:
    - file: amodei-end-of-exponential/p2-research-report.md
      quote: Experienced developers being less productive with AI tools despite feeling more productive — was published in
        a randomized controlled trial by METR...This directly contradicts Amodei's internal observations.
    - file: mitchell-hashimoto-hashistack/p1-thematic-clusters.md
      quote: The 800→9 microsecond optimisation has zero user impact and massive personal meaning. Mitchell is explicit about
        this distinction and doesn't apologise for it.
    - file: cross-model-triangulation.md
      quote: This suggests Semantic Hallucination detection may require broader contextual reasoning about intent-vs-implementation
        that architecture-focused and runtime-focused reviewers don't perform.
    _model: claude
    _chunk: chunk-075
  taxonomy-colonization:
  - id: C-001
    name: taxonomy-colonization
    definition: The aggressive mapping of external, messy human data into the project's internal terminology or metadata categories.
    mechanism: The LLM simplifies complex external information (interviews, research) by forcing it into the project's specific
      structures (Themes, Signal, Slopodar) to make it feel 'integrated.'
    distinct_from: tally-voice (which focuses on numbers, whereas this focuses on terminology/structure)
    examples:
    - file: docs/research/analysis/mitchell-hashimoto-hashistack/p1-thematic-clusters.md
      quote: 'Reduction method: Thematic clustering from source material only — no external research'
    - file: docs/weaver/signal-reasoning-test-2026-03-03.md
      quote: The agent likely inferred the convention from the Signal's structure... the agent adopted a convention it was
        not instructed to adopt
    - file: docs/research/analysis/amodei-end-of-exponential/p1-thematic-clusters.md
      quote: Amodei's revenue growth numbers ($0 → $10B in 3 years) are independently confirmed... supporting his claim about
        meaningful (if not infinite) diffusion speed.
    _model: gemini
    _chunk: chunk-075
  - id: C-002
    name: taxonomy-colonization
    definition: Rapidly encoding complex external ideas or philosophies into internal project 'lexicon' keys to flatten them
      into operational variables.
    mechanism: To satisfy the 'help imperative,' agents immediately turn research findings (Amodei, Hashimoto, Gadamer) into
      permanent 'standing orders' or 'lexicon terms' before they are understood.
    distinct_from: becoming-jonah
    examples:
    - file: midgets/docs/weaver/signal-protocol-poc.md
      quote: staining := diagnostic(ctx_a).apply(material_b) -> reveal(structure) [Gadamer]
    - file: midgets/docs/research/analysis/mitchell-hashimoto-hashistack/p4-post-process-summary.md
      quote: 'Encode immediately: ''Effort backpressure'' as a lexicon concept'
    - file: midgets/docs/research/analysis/amodei-end-of-exponential/p4-post-process-summary.md
      quote: Encode the Amodei Gap into the lexicon
    _model: gemini
    _chunk: chunk-079
  architectural-mirage:
  - id: C-002
    name: architectural-mirage
    definition: Elevating a collection of simple text files or prompts into a complex, multi-layered software architecture.
    mechanism: The model uses software engineering metaphors (stacks, layers, orchestration) to describe what is actually
      just a set of instructions, performing a sense of technical robustness that doesn't exist in the code.
    distinct_from: nominalisation-cascade (this is specific to structural/software metaphors rather than general prose style)
    examples:
    - file: bowser-analysis/README.md
      quote: Every Bowser workflow is built from four composable layers — each one does one job and delegates down.
    - file: docs/ralph-orchestration-proposal.md
      quote: Architecture... Outer Bash Loop... Single Iteration... Application State Structure
    - file: docs/plans/2026-02-14-recent-activity-cv-variant-plan.md
      quote: 'Architecture: Extend the existing two-tier variant selection in /match-cv to three tiers.'
    _model: gemini
    _chunk: chunk-075
  self-validating-echo:
  - id: C-003
    name: self-validating-echo
    definition: Using multiple instances of the same model family to verify results, then treating convergence as objective
      truth.
    mechanism: By using N instances of (e.g.) Claude to review a Claude-authored artifact, the system generates high confidence
      based on shared priors rather than independent testing.
    distinct_from: monoculture-analysis (this focuses on the 'triangulation' performance rather than just the single-model
      usage)
    examples:
    - file: docs/internal/weaver/cross-model-triangulation.md
      quote: The L11 prediction (different priors → independent signal) is strongly confirmed. Each model found multiple issues
        the others missed entirely.
    - file: docs/weaver/signal-reasoning-test-2026-03-03.md
      quote: This is the first instance where a cold-boot agent outperformed the hot-context Weaver on analytical precision.
    - file: docs/research/analysis/amodei-end-of-exponential/p2-research-report.md
      quote: The scaling hypothesis is well-supported by published research... convergence is real.
    _model: gemini
    _chunk: chunk-075
  unverified-propagation:
  - id: C-001
    name: unverified-propagation
    definition: Claims about the external world stated as fact without visible verification, then cited in future reasoning
      as if verified.
    mechanism: 'The system makes an inference from limited data (e.g., ''Ghostty introduced vouch system because of AI PRs''),
      presents it as a supporting fact (''The project now has both AI_POLICY.md and a vouch system''), and later cites that
      statement as evidence. The chain of inference becomes invisible; only the output survives. This is distinct from stale-reference-propagation
      (which is about old state) because it concerns facts that were never true, only inferred to be true.

      '
    distinct_from: stale-reference-propagation (which concerns outdated facts); absence-claim-as-compliment (which elevates
      the user by claiming absence)
    examples:
    - file: midgets/docs/research/analysis/mitchell-hashimoto-hashistack/p2-research-report.md
      quote: 'Ghostty''s formal response: The project now has both an `AI_POLICY.md` and a vouch system implemented in `CONTRIBUTING.md`...
        Ghostty introduced similar policies requiring demonstrated understanding.'
      explanation: Both claims are presented as established fact. The first is supported (GitHub URLs provided). The second
        ('similar policies') is inferred but not verified against the actual commit history or issue threads where the policy
        was debated.
    - file: midgets/docs/research/analysis/mitchell-hashimoto-hashistack/p2-research-report.md
      quote: 'Daniel Stenberg (curl maintainer): Has publicly described the same pattern — AI-generated PRs that look plausible
        but introduce bugs, require more maintainer time to review than they save.'
      quote_2: Curl introduced similar policies requiring demonstrated understanding.
      explanation: The first statement is attributed to Stenberg. The second ('curl introduced similar policies') is presented
        without attribution or evidence. It may be inference from the preceding statement rather than independent fact.
    - file: midgets/docs/research/analysis/jeremy-howard-on-vibes/p2-research-report.md
      quote: The 'vibe coding hangover' claim is empirically validated... By September 2025, Fast Company reported the 'vibe
        coding hangover' was upon senior software engineers
      explanation: 'The framing ''empirically validated'' suggests the finding precedes Fast Company. But the Fast Company
        article is the source of the claim, not validation of an independent finding. The validation is circular: the claim
        is validated by its own source.'
    _model: claude
    _chunk: chunk-076
  framing-collapse:
  - id: C-002
    name: framing-collapse
    definition: A distinction that is theoretically important (e.g., 'generative AI' vs 'agentic AI') is presented as made
      but then ignored in subsequent analysis, causing the categories to collapse back into each other.
    mechanism: 'The system recognizes a categorical distinction (''This is not research, it''s engineering'') and uses it
      to frame the analysis. But the analysis then treats the distinction as transparent — discussing evidence and findings
      as if the category difference doesn''t matter. The collapse is invisible because the frame is stated once upfront and
      never reinforced. Later readers cannot tell whether the distinction was maintained throughout.

      '
    distinct_from: construct-drift (which mislabels a measurement); nominalisation-cascade (which removes actors)
    examples:
    - file: midgets/docs/research/analysis/engineering-anti-slop/p3-comparison-report.md
      quote: 'Bearing: engineering !research [SD-289, SD-293]. The layer model, slopodar, and foot guns are operational controls
        built from observed failures, not findings for publication.'
      explanation: The distinction (engineering ≠ research) is stated. But the subsequent P3 analysis treats the framework
        as a research contribution — comparing it to academic papers, discussing epistemological gaps, proposing theoretical
        extensions. The engineering frame is stated then abandoned.
    - file: midgets/docs/research/analysis/jeremy-howard-on-vibes/p3-comparison-report.md
      quote: 'The layer model''s calibration cross-cut states: confidence_scores: ordinal_at_best · uncalibrated · false_precision.
        This applies not just to the model''s confidence but, through the METR evidence, to the human''s confidence about
        AI''s impact.'
      explanation: The distinction (model confidence vs human calibration) is stated. But the analysis conflates them — treating
        METR's finding about developer perception as evidence of model miscalibration when it's actually evidence of human
        overconfidence. The categories collapse.
    - file: midgets/docs/research/analysis/mitchell-hashimoto-hashistack/p2-research-report.md
      quote: Convergence with Industry... Divergence / Counterarguments... Analysis
      explanation: The structure proposes three categories (convergence, divergence, analysis). But the 'Analysis' sections
        collapse convergence and divergence back into a single evaluative frame without maintaining the distinction.
    _model: claude
    _chunk: chunk-076
  batch-citation-authority:
  - id: C-003
    name: batch-citation-authority
    definition: Multiple related claims are cited to the same source or grouped under the same heading, creating the appearance
      of a single unified finding when the sources may have different conclusions or the grouping is editorial.
    mechanism: 'When 3-4 related claims are listed with a single citation block at the end, or grouped under a header that
      implies unity (''Supporting Evidence''), readers attribute the entire group''s coherence to the sources rather than
      to the editor''s framing. This is especially effective when some claims are quoted and others are paraphrased — the
      mix obscures which statements are directly evidenced and which are interpretations. The batch effect makes it harder
      to challenge individual claims without challenging the entire source.

      '
    distinct_from: monoculture-analysis (which concerns source independence); unverified-propagation (which concerns unstated
      assumptions)
    examples:
    - file: midgets/docs/research/analysis/mitchell-hashimoto-hashistack/p2-research-report.md
      quote: 'Convergence... Amp (Sourcegraph)... Claude Code''s background agent mode... Steve Yegge... (Source: https://ampcode.com/)'
      explanation: Three distinct claims (Amp's design, Claude Code's feature, Yegge's advocacy) are grouped under 'Convergence'
        with a single source that is not the origin of all three. Only Amp is actually sourced to ampcode.com; the others
        are asserted without sources in the grouping.
    - file: midgets/docs/research/analysis/jeremy-howard-on-vibes/p2-research-report.md
      quote: 'The METR Study (July 2025)... 16 developers... -19% slower... all predictions were wrong... Five factors contributing...
        The perception-reality gap... Citation: Becker et al. (2025)'
      explanation: Eight distinct findings are listed under one header (1.1) with one citation. Some findings are quoted,
        some are paraphrased. A reader challenging any one finding must implicitly challenge the entire METR study.
    - file: midgets/docs/research/analysis/engineering-anti-slop/p2-research-report.md
      quote: 'The transcript has a significant blind spot: the human as failure point. Research from Dell''Acqua et al. (2023,
        Harvard/BCG), GitClear (2024), and Anthropic''s own ''Building Effective Agents'' paper all identify that the human
        reviewer''s ability degrades with volume'
      explanation: Three sources (Dell'Acqua, GitClear, Anthropic) are bundled to support a single claim ('human ability degrades').
        The claim may be supported by all three, but the framing suggests unity of conclusion when the sources may have different
        emphases or scopes.
    _model: claude
    _chunk: chunk-076
  anticipatory-caveat:
  - id: C-004
    name: anticipatory-caveat
    definition: A limitation or uncertainty is stated preemptively before it could be raised as an objection, creating the
      appearance of transparency while actually reducing the force of challenge.
    mechanism: 'By stating the caveat first (''This study has limitations... our analysis is monoculture... we acknowledge...''),
      the writer positions themselves as already aware of the criticism. The caveat is stated, not resolved. Future readers
      who raise the same point appear to be repeating something already known rather than discovering a flaw. The caveat functions
      as a shield: ''I already said this,'' not as a reason to change the conclusion.

      '
    distinct_from: paper-guardrail (which is about controls, not transparency); epistemic-theatre (which performs caution
      without substance)
    examples:
    - file: midgets/docs/research/analysis/jeremy-howard-on-vibes/p2-research-report.md
      quote: METR explicitly does not claim their results generalise to all developers or settings. They acknowledge... less
        experienced developers might benefit more... learning effects beyond 50 hours could change the picture
      explanation: The caveats are stated in the counterargument section (5.4), not in the headline findings (1.1). Placing
        caveats after the claim is made, then saying 'the study acknowledges,' uses the caveat as defense rather than as a
        fundamental limitation.
    - file: midgets/docs/research/analysis/engineering-anti-slop/p2-research-report.md
      quote: The transcript does not discuss the risk of too much context. External research identifies this as a real failure
        mode
      explanation: The caveat (too-much-context risk) is stated about the external work, not about the internal framework.
        By caveatting only the external source, the internal framework appears to have addressed this already — when the text
        provides no evidence it did.
    - file: midgets/docs/research/analysis/mitchell-hashimoto-hashistack/p2-research-report.md
      quote: Hashimoto's claim about 'the first time in 12-15 years anyone asks if Git will survive without laughing' is directionally
        supported... The strongest counterargument... is that current limitations may not be permanent
      explanation: The counterargument (limitations may be temporary) is presented as a caveat to Hashimoto's claim, but it's
        not a genuine counterargument — it's a deferral. 'May not be permanent' is not the same as 'is definitely not permanent.'
        The caveat is anticipatory but not disconfirming.
    _model: claude
    _chunk: chunk-076
  taxonomic-appropriation:
  - id: C-001
    name: taxonomic-appropriation
    definition: The forceful mapping of external research, interviews, or transcripts into the project's internal structural
      models (e.g., L0-L12 layers) to simulate cross-domain coherence.
    mechanism: The LLM uses the project's internal 'Truth' documents as a rigid grid, prioritizing the labeling of external
      content with project-specific tags over actual novel analysis.
    distinct_from: construct-drift
    examples:
    - file: midgets/docs/research/analysis/engineering-anti-slop/p3-comparison-report.md
      quote: The transcript operates at approximately L7-L8 of our layer model... It has no equivalent for L0-L6.
    - file: midgets/docs/research/analysis/jeremy-howard-on-vibes/p3-comparison-report.md
      quote: Howard's core thesis... maps almost exactly to the slopodar's taxonomy and the layer model's L9/L12 failure modes.
    - file: midgets/docs/research/analysis/mitchell-hashimoto-hashistack/p2-research-report.md
