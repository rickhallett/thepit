  pedagogical-scaffolding-drift:
  - id: C-001
    name: pedagogical-scaffolding-drift
    definition: 'Educational content that starts with necessary foundational explanation but gradually  inflates scaffolding
      into the main message, eventually leaving substance behind.

      '
    mechanism: 'In educational writing, the author must provide context and definitions for readers to  follow. The LLM generates
      clear, well-structured context. But as it continues, the  scaffolding (definitions, background, comparative frameworks)
      becomes denser than the  novel content, and the original insight gets buried. The scaffolding was meant to support  the
      message but has become the message. This differs from nominalisation-cascade  (which removes agents entirely) and epistemic-theatre
      (which performs seriousness) - it''s  specifically the inflation of explanatory structure beyond its functional role.

      '
    distinct_from: 'Authority-scaffolding (citations used to justify simple claims). This pattern is about  explanatory structure
      crowding out content, not citations crowding out argument. Also  distinct from tally-voice (which inflates through enumeration)
      and epigrammatic-closure  (which inflates through rhythmic regularity).

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/v-05-state-management.md
      quote: '"The question is never ''does my system have state?'' but ''where does my state live, and  what happens when
        I lose it?'' For traditional applications, the answer is usually  straightforward: state lives in a database, is accessed
        through an ORM or query layer,  and is protected by transactions and replication."

        '
      explanation: 'This is appropriate scaffolding - necessary to set context. But the document continues  with 40+ more
        pages of scaffolding (state categories, backend comparisons, schema design,  concurrency patterns) before the working
        example in Section 3. By the time we reach  Section 8 (Concurrency and State), the reader has absorbed so much scaffolding
        that the  novel content (flock vs optimistic vs event sourcing) is delivered as just another  comparison, not a synthesis.

        '
    - file: sites/oceanheart/content/bootcamp/v-05-state-management.md
      quote: '"State management is a spectrum of design choices, not a progression from bad to good.  Where you should sit
        on the spectrum depends on the task, the failure tolerance, and  the cost of state infrastructure. | Decision heuristic:
        1. Start with files if...  2. Move to SQLite when... 3. Add Redis when... 4. Use PostgreSQL when..."

        '
      explanation: 'The decision heuristic is valuable and novel (files -> SQLite -> Redis -> PostgreSQL).  But it''s preceded
        by 15 pages of definition, comparison tables, and individual backend  explanations. The scaffolding is so dense that
        the heuristic - the actual insight -  arrives as the coda, not the headline. A clearer structure: heuristic first,
        then  detailed sections explaining why each choice matters.

        '
    - file: sites/oceanheart/content/bootcamp/v-05-state-management.md
      quote: '"AGENTS.md is approximately 600 lines of structured information: objectives, standing  orders, vocabulary, the
        layer model, anti-pattern taxonomy, filesystem map, recent  decisions. The file IS a state restoration mechanism.
        | Consider what happens at  session start: 1. The harness loads AGENTS.md... 2. The agent now ''knows''...  3. The
        agent is operational..."

        '
      explanation: 'The section demonstrates a valid concept (checkpoint recovery) by walking through a  sequence. But the
        walkthrough uses three numbered steps where one sentence would suffice:  "AGENTS.md is a checkpoint from which the
        agent resumes." The scaffolding (step-by-step  walkthrough) becomes the content itself rather than supporting the
        content.

        '
    _model: claude
    _chunk: chunk-005
  framework-colonization:
  - id: C-002
    name: framework-colonization
    definition: 'Using an established framework or terminology so thoroughly that the novel content  becomes indistinguishable
      from the framework, making it appear that the project is  applying known patterns rather than creating new ones.

      '
    mechanism: 'The author correctly identifies that agent state management maps to database concepts  (write-ahead logging,
      ACID, working sets, crash recovery). But by explaining everything  through the database framework - "WAL is like," "working
      set applied to," "event sourcing  for," - the novel insight (these patterns are necessary *because* of context window
      volatility,  which is unique to agents) becomes framed as "database theory applied to agents" rather  than "agent-specific
      state problems that happen to resemble database problems." The framework  colonizes the explanation, making the work
      appear derivative.

      '
    distinct_from: 'Authority-scaffolding (which uses citations to justify). This pattern uses entire frameworks  (database
      theory, systems architecture) as explanatory scaffolding. Also distinct from  semantic-inflation (which inflates significance
      of the user''s work). This inflates the  significance of *known* frameworks applied to agent problems.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/v-05-state-management.md
      quote: '"SD-266 is the write-ahead log (WAL) pattern applied to agent state. | In database  systems, the WAL principle
        is: ''changes to data files must be written only after  those changes have been logged...'' | Applied to agent state,
        the principle becomes:  ''write the decision to durable storage before acting on it.''"

        '
      explanation: 'The connection is valid and useful - agents do need WAL semantics. But the framing  "apply WAL to agents"
        makes the work sound like direct application of existing theory  rather than discovery of an isomorphic problem. The
        novel insight - that LLM context  window death is structurally identical to database crashes and requires the same
        recovery  mechanisms - is buried in the framing. Reframed: "Agent context windows are volatile  memory with no persistent
        backing. This is identical to the database crash problem that  WAL solves. WAL provides the solution," which inverts
        the direction of borrowing.

        '
    - file: sites/oceanheart/content/bootcamp/v-05-state-management.md
      quote: '"The working set concept (Denning 1968, applied to LLM context in this project)  transfers directly to state
        design. The working set for context is the minimum set  of tokens needed for correct model output. The working set
        for state is the minimum  set of persisted data needed for correct agent behavior."

        '
      explanation: 'The document appropriates "working set" from memory hierarchy research and applies it  to state. This
        is correct and useful. But by anchoring to Denning, the framing becomes  "here is a classic concept from 1968, let''s
        apply it here" rather than "agents face a  constraint-satisfaction problem identical to what working set describes."
        The framework  colonizes the explanation.

        '
    - file: sites/oceanheart/content/bootcamp/v-05-state-management.md
      quote: '"Event sourcing eliminates write conflicts entirely by changing the data model. Instead  of updating mutable
        state, processes append immutable events to a log. Current state is  derived by replaying the event log. | Why this
        eliminates conflicts: appends do not  conflict..."

        '
      explanation: 'Event sourcing is a known pattern from distributed systems. The document explains it  correctly but frames
        the application as "use event sourcing for agent state" rather  than "agent multi-process coordination has the same
        conflict profile as distributed  system state, so event sourcing applies." The known framework becomes the lens, making  the
        agent-specific insight (multi-process agent state coordination IS a distributed  system problem) invisible.

        '
    _model: claude
    _chunk: chunk-005
  challenge-debt-accumulation:
  - id: C-003
    name: challenge-debt-accumulation
    definition: 'Educational content that defers practical application until the end through a sequence  of "challenges,"
      creating a debt where readers must integrate multiple sections before  testing understanding or encountering failure.

      '
    mechanism: 'The document provides 30+ pages of explanation (state management spectrum, backends,  schema design, concurrency),
      then at the end offers four challenge sections asking  readers to design systems using all the prior material. The reader
      cannot validate  understanding incrementally - they read passively through sections 1-8, accumulate  context, and only
      at the end (sections 9-12, "Challenges") encounter problems where  they must actively apply what they learned. This
      creates a debt: if the reader misunderstood  something in section 3, they will not discover this until challenge 10.
      Also, challenges  are optional ("Challenge: State Architecture Analysis" suggests they can be skipped),  making the
      entire integrated learning optional.

      '
    distinct_from: 'Pedagogical-scaffolding-drift (which is about explanation structure, not deferral of  practice). This
      is specifically about the deferral of validation and the accumulation of  untested context before application. Also
      distinct from right-answer-wrong-work (which is  about incorrect verification of a single assertion) - this is about
      deferring all  verification to the end.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/v-05-state-management.md
      quote: '"## Challenge: State Architecture Analysis | **Estimated time: 30 minutes** | **Goal:**  Map every durable state
        file in this project... | **Verification:** Your table should  have 6 rows and 5 columns. For each file, you should
        be able to explain why the project  chose a file over a database..."

        '
      explanation: 'This challenge requires understanding state categories (Section 4), update patterns  (Section 3.2), recovery
        mechanisms (implicit throughout), SQLite capabilities (Section  6.2), and git integration (Section 3). The reader
        cannot attempt this until finishing  all prior sections. If understanding of "update pattern" is incomplete after
        section  3.2, this will not be discovered until the challenge at the end.

        '
    - file: sites/oceanheart/content/bootcamp/v-05-state-management.md
      quote: '"## Challenge: Session State Implementation | **Estimated time: 30 minutes** | **Goal:**  Build a simple agent
        that processes 5 sequential tasks... | **Part A: File-based state**  | Implement `process_tasks_file(tasks, state_dir)`
        that: 1. For each task, reads the  previous result from a JSON file..."

        '
      explanation: 'This challenge assumes mastery of atomic writes (Section 3.4, temp + rename pattern),  idempotent resumption,
        and file-based state from Section 2. The reader has not built  anything in sections 1-8 - they have read descriptions.
        This is the first application,  and it requires synthesizing material from sections 2, 3, and 4.

        '
    - file: sites/oceanheart/content/bootcamp/v-05-state-management.md
      quote: '"## Key Takeaways | Before moving on, verify you can answer these questions without  looking anything up: |
        1. What are the three positions on the state management spectrum,  and when is each the right choice? | 2. Why is
        an agent''s context window state  fundamentally different from a web application''s session state?..."

        '
      explanation: 'The "Key Takeaways" section defers validation of understanding to the very end. This  should appear after
        each major section (after 2.4, after 4.3, after 6.5) to enable  readers to validate incrementally. Deferring all validation
        to a single checkpoint at  the end creates a single point of failure: if the reader discovers at question 1 that  they
        misunderstood the spectrum, they have 30+ pages to reprocess rather than 5 pages.

        '
    _model: claude
    _chunk: chunk-005
