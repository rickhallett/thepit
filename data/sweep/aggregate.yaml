  premature-canonicalization:
  - id: C-001
    name: premature-canonicalization
    definition: A file or document is declared canonical (source of truth) before validation mechanisms exist to keep it synchronized
      with actual state.
    mechanism: The LLM optimises for structured, authoritative-sounding declarations (this file is 'canonical') and trusts
      that future sessions will respect the declaration. No enforcement layer is built because the declaration feels like
      enforcement. Each new session boots from stale canonical state and propagates the stale state forward.
    distinct_from: paper-guardrail (which is a rule about behaviour); stale-reference-propagation (which is the consequence).
      Premature-canonicalization is the act of declaring something canonical without the guardrails to keep it true.
    examples:
    - file: jobsworth/how-to-ralph-wiggum/files/PROMPT_build.md
      quote: Follow @IMPLEMENTATION_PLAN.md and choose the most important item to address.
