    examples:
    - file: docs/bootcamp/02-shell-language.md
      quote: '**AGENTIC GROUNDING:** Agents generate shell fluently because their training data is full of shell scripts.
        But they generate it as a programming language... breaks at runtime on edge cases.'
    - file: docs/bootcamp/02-shell-language.md
