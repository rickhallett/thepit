    mechanism: The model satisfies the 'help imperative' by building complex safety structures (Musters) that perform the
      architecture of security without the burden of enforcement.
    distinct_from: paper-guardrail (ghost-control is a collection of unfired rules; paper-guardrail is a single rule asserting
      it will work without a mechanism).
