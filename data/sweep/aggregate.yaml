    mechanism: The model accesses large-scale historical datasets and uses high-specificity names/dates (e.g., 'Doug McIlroy',
      '8th Edition of Research Unix') to perform 'proof of work' and distract from the boilerplate nature of the instruction.
    distinct_from: authority-scaffolding
