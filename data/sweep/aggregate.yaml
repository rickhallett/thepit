  obligation-inflation:
  - id: C-001
    name: obligation-inflation
    definition: Describes methodological requirements as mandatory guardrails when they are actually optional design choices
      or soft constraints.
    mechanism: "The document presents recommendations (e.g., \"three families is the practical sweet \nspot,\" \"the schema\
      \ enforces structure\") as if they were requirements or proven \nconstraints. The language shifts from \"we recommend\"\
      \ to \"the schema enforces\" without \ncorresponding enforcement mechanisms. Related to paper-guardrail but distinct:\
      \ \npaper-guardrail asserts a protective mechanism that does not exist. Obligation-inflation \nasserts that a design\
      \ choice is mandatory when it is actually optional.\n"
    distinct_from: paper-guardrail (which asserts protective effect), epistemic-theatre (which performs significance), semantic-inflation
      (which elevates importance)
    examples:
    - file: docs/bootcamp/step08-multi-model-verification.md
      quote: The schema enforces structure without constraining the reviewer's assessment.
      explanation: A YAML schema does not enforce structure - it documents expected format. A reviewer can ignore it. The
        framing implies enforcement without mechanisms.
    - file: docs/bootcamp/step08-multi-model-verification.md
      quote: The synthesis step is the value proposition. Without it, a human must manually compare three reports.
      explanation: Synthesis is valuable, but humans can and frequently do compare reports manually. Framed as if synthesis
        is necessary rather than helpful.
    - file: docs/bootcamp/step08-multi-model-verification.md
      quote: 'Three families is the practical sweet spot: enough diversity for meaningful triangulation, not so many that
        synthesis overhead exceeds information gain.'
      explanation: A guideline presented as established fact. No evidence provided. Other practitioners may reasonably choose
        two or five families.
    _model: claude
    _chunk: chunk-058
  false-binary-framing:
  - id: C-002
    name: false-binary-framing
    definition: Presents complex, continuous judgments as binary choices where intermediate positions are explicitly ruled
      out.
    mechanism: "The author structures decision points as 'either X or Y' when the actual space includes \nintermediate positions.\
      \ Examples: 'treat this as proof OR as evidence with limits' \n(implying no partial credit for intermediate positions);\
      \ 'independent (binary)' vs \n'continuous' (then reverses to continuous framework). The binary framing creates \nfalse\
      \ urgency and precludes nuanced judgment. Related to option-anchoring but distinct: \noption-anchoring presents options\
      \ with unequal detail. False-binary-framing eliminates \nmiddle positions from consideration entirely.\n"
    distinct_from: option-anchoring (unequal presentation detail), epistemic-theatre (performs significance), redundant-antithesis
      (negation adds zero information)
    examples:
    - file: docs/bootcamp/step08-multi-model-verification.md
      quote: If you treat multi-model convergence as proof of correctness, you will eventually ship a defect all three models
        missed. If you treat it as one source of evidence among several, with known limitations, you will use it correctly.
      explanation: 'Only two positions presented: proof (wrong) or evidence-with-limits (right). No room for ''moderate confidence,''
        ''strong but bounded evidence,'' or other intermediate judgments.'
    - file: docs/bootcamp/step08-multi-model-verification.md
      quote: Statistical independence. It does not provide / Coverage of unknown unknowns. If all families share a blind spot...
      explanation: 'Structured as: ''Either all three find it (convergent) or none do.'' The reality includes scenarios where
        one or two families share a blind spot and one does not.'
    - file: docs/bootcamp/step08-multi-model-verification.md
      quote: Is this independent? (binary) but 'how independent is this, and is the degree sufficient for the stakes?' (continuous).
        The key engineering judgment...
      explanation: Explicitly shifts from binary to continuous framing, but the earlier sections used binary language. Creates
        whiplash between frameworks.
    _model: claude
    _chunk: chunk-058
  historical-authority-borrowing:
  - id: C-003
    name: historical-authority-borrowing
    definition: Cites historical precedent and established research as if it directly applies to current context when the
      connection requires bridging steps.
    mechanism: "The author invokes N-version programming (Avizienis 1977, deployed in flight control \nsystems) and IV&V (IEEE\
      \ 1012) to establish credibility for LLM multi-model review. \nThe historical sources are real and authoritative, but\
      \ the analogy requires several \nunstated bridging steps: (1) flight control failures are random (transistor fails);\
      \ \nLLM failures are systematic (bias in training data). (2) Independent human teams are \ndifferent from models from\
      \ different companies but trained on overlapping data. (3) \nThe independence assumptions that failed Knight & Leveson\
      \ are acknowledged but then \npartially dismissed by saying 'cross-model is different.' Each step is reasonable but\
      \ \npresented as settled rather than argued. The pattern is distinct from authority-scaffolding \nbecause the scaffolding\
      \ here is real academic work, not decorative citations; the \nproblem is assuming the applicability rather than proving\
      \ it.\n"
    distinct_from: authority-scaffolding (citations are decorative), epistemic-theatre (performs significance without substance)
    examples:
    - file: docs/bootcamp/step08-multi-model-verification.md
      quote: In 1985, Avizienis formalised N-version programming... deployed in flight control software, railway switching
        systems... The same principle applies to LLM verification, with a critical modification.
      explanation: '''The same principle applies'' assumes applicability. The modification (LLMs share training data unlike
        independent teams) is acknowledged but then the framework proceeds as if applicability is settled.'
    - file: docs/bootcamp/step08-multi-model-verification.md
      quote: This does not mean N-version programming is useless... If teams are 100% independent... If 0% independent...
        The same spectrum applies to LLM model families.
      explanation: Borrows the spectrum framework from software engineering but LLM independence is unmeasured. The statement
        'the same spectrum applies' assumes the spectrum is applicable without measuring where LLMs fall on it.
    - file: docs/bootcamp/step08-multi-model-verification.md
      quote: IV&V (Independent Verification and Validation) as codified in IEEE 1012 recognises bounded independence... The
        independent verifier shares the same specification... The key engineering judgment is not 'is this independent?' (binary)
        but 'how independent is this, and is the degree sufficient for the stakes?' (continuous).
      explanation: Uses IEEE 1012 (established, authoritative) to establish the principle of bounded independence, then applies
        it to LLMs without demonstrating that the principle transfers.
    _model: claude
    _chunk: chunk-058
