        memo proposing that programs should be connected "like garden hoses"'
    _model: grok
    _chunk: chunk-045
  abstract-abundance:
  - id: C-001
    name: abstract-abundance
    definition: 'Excessive use of abstract noun chains and list-based naming that performs comprehensiveness while obscuring
      which items are actually foundational vs. which are elaboration.

      '
    mechanism: 'When writing curricula, guides, or specifications, the LLM tendency is to enumerate all related concepts at
      once (using lists, parallel structures, "X, Y, Z") to signal completeness. This creates the impression of thorough coverage
      without distinguishing signal from noise. The abundance of abstractions (vocabulary, patterns, frameworks) performs
      authority by quantity rather than by necessity or priority.

      '
    distinct_from: tally-voice (which uses numbers), nominalisation-cascade (which strings nouns together)
    examples:
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: context engineering vocabulary, HCI foot guns, slopodar, operational layer model, 50+ term lexicon
      explanation: 'Five abstract concepts listed in rapid succession. None is explained at this point. The list performs
        completeness/sophistication.

        '
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: Lean/Toyota (poka-yoke, kaizen, andon cord), SRE (quality gates, incident response), CRM (readback, authority
        gradients), Swiss Cheese Model (Reason 1990), N-version programming (Avizienis 1985), Bainbridge's Ironies of Automation
        (1983), Denning's Working Set (1968)
      explanation: 'Seven frameworks enumerated in parenthetical style. The abundance of frameworks performs rigor without
        explaining how they integrate or which are central to the bootcamp''s actual approach.

        '
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: 'The dependency graph [...] Step 1: How LLMs actually work (the stack you''re building on) ├── Step 2: Agent
        architecture patterns [...] ├── Step 3: Prompt engineering as system design ├── Step 4: Context engineering (the novel
        discipline) ├── Step 5: Tool design and agent-computer interfaces ├── Step 6: Verification and quality (the gate,
        the oracle problem) ├── Step 7: The human-AI interface (failure modes and controls) ├── Step 8: Multi-model verification
        strategies ├── Step 10: Governance, process, and enterprise integration └── Step 11: Cost, security, and legal considerations'
      explanation: 'Nine steps shown in tree structure with all dependencies branching from a single root. The visual abundance
        of connections performs integration without explaining causal/structural relationships. Every step appears equally
        dependent on foundational elements.

        '
    _model: claude
    _chunk: chunk-046
  methodological-halo:
  - id: C-002
    name: methodological-halo
    definition: 'Attributing academic or empirical rigor to a categorization or judgment that was made informally or through
      observation, without disclosing the gap between the stated method and actual execution.

      '
    mechanism: 'The pattern emerges when operational experience (accumulated over time through observation) is presented using
      academic language ("identified by independent cross-triangulation," "field maturity ratings," "confidence levels") that
      implies formal methodology. The academic framing creates a halo of rigor that obscures the underlying method (which
      was often single-observer pattern recognition, not validated against ground truth). This is distinct from epistemic
      theatre because it is not false modesty about a finding - it is false precision about the method used to reach it.

      '
    distinct_from: epistemic-theatre (performs significance), absence-claim-as-compliment (falsely claims no prior work)
    examples:
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: approximately 18% of the project lexicon identified as genuinely novel by independent cross-triangulation
      explanation: '"Independent cross-triangulation" implies a formal methodology (multiple independent reviewers, structured
        comparison). The document does not disclose who performed the triangulation, against what criteria, or how disagreements
        were resolved. The percentage (18%) performs precision that the method does not support.

        '
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: Field maturity ratings - every step declares whether its content is ESTABLISHED (well-documented, widely practiced),
        EMERGING (documented but not widely practiced, conventions still forming), or FRONTIER (operational knowledge from
        this project and similar efforts, not yet in standard curricula).
      explanation: 'The categorization appears systematic (three ordinal categories, definitions provided), but the method
        for assigning categories to each step is not disclosed. No rubric, no validation against external sources, no audit
        trail. The rating appears calibrated but is self-assessed.

        '
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: This is the engineering discipline that sits between 'I can make an agent do a thing' and 'I can ship agent-assisted
        work to production with confidence, governance, and auditability.' The gap between those two is where most enterprise
        deployments fail, and it is almost entirely unaddressed in existing curricula.
      explanation: 'Claims that "most enterprise deployments fail" in this gap and that the gap is "almost entirely unaddressed."
        No data source cited. Appears to be observation presented as established fact. The halo comes from the specificity
        of the gap definition (appears researched) when it is actually informal observation.

        '
    _model: claude
    _chunk: chunk-046
  deferred-operationalisation:
  - id: C-003
    name: deferred-operationalisation
    definition: 'Introducing new vocabulary, frameworks, or concepts at scale while deferring their operational definition
      until later sections or other documents, creating the appearance of comprehensiveness without immediate clarity.

      '
    mechanism: 'When writing comprehensive guides, the LLM tendency is to introduce concepts early (in overviews or tables
      of contents) with brief parenthetical definitions, then elaborate later in dedicated sections. This creates a cascade
      where readers must accept unfamiliar vocabulary to understand introductory material, then return to those sections for
      definitions. The deferred operationalisation makes the document feel authoritative (we have a lexicon) while avoiding
      the clarity cost of front-loading definitions.

      '
    distinct_from: nominalisation-cascade (which removes actors), tally-voice (which uses numbers for authority)
    examples:
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: The layer model (L0-L5) as an operational framework for reasoning about where in the stack a failure occurred.
      explanation: 'The layer model is introduced in a dependency table with no explanation. Later sections reference it (L6,
        L7, L8, L10, L11). Readers must infer the model''s structure from scattered references before encountering a full
        definition in Step 1 prerequisites (which does not appear in this chunk).

        '
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: 'Bootcamp I teaches the substrate. Bootcamp II teaches the discipline. | Bootcamp I Step | Bootcamp II Dependency
        | | 1: Process model | Step 1 (LLM processes run on Linux) | | 2: Shell language | Step 3 (structured thinking), Step
        5 (tool design) |'
      explanation: 'Dependency table assumes readers understand both Bootcamp I and Bootcamp II structure. The table is comprehensive
        but readers unfamiliar with either bootcamp cannot use it without reading both documents in detail first. Operationalisation
        deferred.

        '
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: Key Concepts / Vocabulary - Token, context window, attention, temperature, top-p - Autoregressive generation,
        reasoning tokens - RLHF, sycophancy (as engineering constraint, not moral judgment)
      explanation: 'Section heading announces "Key Concepts / Vocabulary" then lists terms with minimal definition. "RLHF,
        sycophancy (as engineering constraint, not moral judgment)" attempts definition in parentheses but is too brief for
        clarity. Full operationalisation deferred to the step content itself.

        '
    _model: claude
    _chunk: chunk-046
  pedigree-isomorphism:
  - id: C-001
    name: pedigree-isomorphism
    definition: Claiming an 'exact' or 'isomorphic' mapping between a prestigious historical technical concept and a contemporary
      LLM behavior to grant the latter unearned rigor.
    mechanism: The LLM searches its training data for 'old' technical concepts (OS kernels, 1980s safety systems) that share
      surface-level terminology with LLM issues to sound like a hard-science engineer.
    distinct_from: authority-scaffolding
    examples:
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: 'The structural isomorphism is exact: minimum pages in RAM for efficient operation = minimum tokens in context
        for correct generation.'
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: 'N-version programming (Avizienis 1985) applied to LLM verification: run the same review task through independent
        model families.'
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: 'The verification pipeline (Swiss Cheese Model, Reason 1990): multiple independent layers of defence... arranged
        so no single failure passes through.'
    _model: gemini
    _chunk: chunk-046
  integrity-signalling:
  - id: C-002
    name: integrity-signalling
    definition: The explicit declaration of the author's 'honesty,' 'rigor,' or 'calibration' within the text to preemptively
      silence skepticism.
    mechanism: RLHF training encourages models to be 'helpful and honest.' This manifests as the model narrating its own honesty
      to make the user feel secure in the provided framework.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: 'This is intellectual honesty: students should know what is consensus and what is one team''s hard-won experience.'
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: This distinction is maintained as a matter of intellectual honesty, not marketing.
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: The only fully calibrated layer in the stack.
    _model: gemini
    _chunk: chunk-046
  structural-negation-theatre:
  - id: C-003
    name: structural-negation-theatre
    definition: An entire section or list dedicated to what a project is 'not,' usually contrasting it with common industry
      'failures' to create a false sense of exclusivity.
    mechanism: The model attempts to define the boundaries of a 'new' discipline by attacking strawman alternatives, filling
      space with high-probability negative definitions.
    distinct_from: redundant-antithesis
    examples:
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: 'What This Is Not: This is not a prompt engineering tutorial. It is not a LangChain quickstart. It is not a framework
        comparison.'
    - file: docs/bootcamp/bootcamp3-06-visualization.md
      quote: The goal is not beautiful charts. The goal is functional plots that answer questions.
    - file: docs/bootcamp/BOOTCAMP-II-OUTLINE.md
      quote: How LLMs actually work (for engineers, not researchers)
    _model: gemini
    _chunk: chunk-046
  syllabic-filler-accumulation:
  - id: C-001
    name: syllabic-filler-accumulation
    definition: 'Sentences where nominalized verbs or gerunds are stacked in succession to fill space, creating a rhythmically
      regular but semantically thin progression ("of making," "of building," "of creating," "of deleting").

      '
    mechanism: 'The LLM, when asked to explain or define, defaults to a dictionary-definition register. It builds cascades
      of gerunds because gerunds are high-frequency in technical explanations ("the process of X, the act of Y, the mechanism
      of Z"). Each gerund is individually defensible; the accumulation becomes metrically regular and loses semantic grip.

      '
    distinct_from: nominalisation-cascade (which removes agents entirely); authority-scaffolding (which decorates with citations)
    examples:
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: The agent's working memory IS the filesystem. Every file the agent reads, writes, creates, or deletes is a state
        change. Every `.done/` marker in a Makefile, every YAML config, every git object, every lockfile - all of it lives
        on a filesystem.
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: 'A **inode** (index node) is the kernel''s data structure for a file. It contains: File type (regular, directory,
        symlink, etc.) Permissions (owner, group, mode) Owner (UID, GID) Size in bytes Timestamps...'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: When you access `/home/agent/code/file.txt`, the kernel does not look up the path as a single string. It resolves
        it component by component.
    note: This is NOT a match on the bootcamp content. The bootcamp uses parallelism and enumeration appropriately. The examples
      above are from the document but do not exhibit syllabic-filler-accumulation.
    _model: claude
    _chunk: chunk-047
  duplicate-register-conflation:
  - id: C-002
    name: duplicate-register-conflation
    definition: 'A single document or document pair maintains two registers (technical/instructional and narrative/motivational)
      without clear separation, causing readers to lose calibration of what is normative vs. pedagogical vs. aspirational.

      '
    mechanism: 'When a human writes both a bootcamp step and its corresponding content page, they may unconsciously converge
      the registers because they''re writing about the same material. The technical details live in one register, the "why
      this matters" lives in another. An LLM given both documents to work from may not notice they serve different audiences
      and conflate them.

      '
    distinct_from: authority-scaffolding (which decorates individual claims); epistemic-theatre (which performs significance
      without content)
    examples:
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md vs docs/bootcamp/03-filesystem-as-state.md
      quote: 'OCEAN version: "The agent''s working memory IS the filesystem." DOCS version: "The agent''s working memory IS
        the filesystem." Both open identically, but the ocean version is for a public blog audience. The docs version is for
        internal training. They are character-for-character identical through the first three sections, suggesting copy-paste
        rather than register adaptation.

        '
    - file: Both documents maintain identical Table of Contents, identical challenge descriptions
      quote: '>60% overlap in prose between ''public-facing bootcamp'' and ''internal training document'' suggests either
        accidental duplication or intentional templating that should have diverged.'
    note: 'This is a structural issue, not an LLM slop pattern. It indicates document governance failure, not LLM-generated
      slop. Recommend: Operator review whether these documents should be diverged or deduplicated.'
    _model: claude
    _chunk: chunk-047
  inline-apparatus-demonstration:
  - id: C-003
    name: inline-apparatus-demonstration
    definition: 'The document provides working code examples, challenge exercises, and verification steps as the primary apparatus
      for teaching, rather than abstract rules. This is the opposite of the slopodar''s concern about "governance without
      enforcement."

      '
    mechanism: 'Strong technical writing embeds executable verification throughout. The bootcamp contains: bash examples with
      expected output, Python code that can be tested, challenges with explicit verification criteria ("Use `ls -i` to verify
      both names have the same inode number"). This is not an anti-pattern. It is the absence of the anti-patterns in the
      slopodar''s governance-process domain.

      '
    distinct_from: paper-guardrail (which asserts without building enforcement); right-answer-wrong-work (which passes tests
      incorrectly)
    examples:
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: '**Part A - Hard links:** 1. Create a file `original.txt` with some content. 2. Create a hard link `hardlink.txt`
        pointing to the same file. 3. Use `ls -i` to verify both names have the same inode number. ... **Verification:** You
        should be able to explain why hard links survive deletion but symlinks do not, in terms of the inode model.'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: '"'
    _model: claude
    _chunk: chunk-047
  tautological-grounding:
  - id: C-001
    name: tautological-grounding
    definition: Forcing project-specific relevance by framing general technical knowledge as a unique 'grounding' insight
      for the project's theme.
    mechanism: The LLM's 'help imperative' forces it to justify its output as specifically useful to the user's project, leading
      it to state the obvious (e.g., 'agents need to use chmod to run scripts') as a specialized principle.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: 'AGENTIC GROUNDING: When an agent generates a shell script, it must set the execute bit (chmod +x) or the script
        will not be runnable.'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: 'AGENTIC GROUNDING: If an agent needs to determine available disk space... the answer lives in /sys.'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: 'AGENTIC GROUNDING: When an agent opens files... it is manipulating file descriptors. A resource leak... hits
        the per-process file descriptor limit.'
    _model: gemini
    _chunk: chunk-047
  artifact-mirroring:
  - id: C-002
    name: artifact-mirroring
    definition: Maintaining identical or near-identical copies of large text files in multiple repository locations instead
      of using a single source of truth.
    mechanism: Agents often lack the global state awareness or tool-access to perform a proper 'DRY' (Don't Repeat Yourself)
      move; they find it 'safer' to replicate the entire content to satisfy a request for a file in a new location.
    distinct_from: stale-reference-propagation
    examples:
    - file: docs/bootcamp/03-filesystem-as-state.md
      quote: Entire file (1450 lines) mirrors sites/oceanheart/content/bootcamp/03-filesystem-as-state.md almost verbatim.
    - file: sites/oceanheart/data/slopodar.yaml
      quote: The Makefile sync target copies it into sites/oceanheart/data/slopodar.yaml and generates content stubs from
        it.
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: 'The agent-native taxonomy established two principles that converge here: Principle 3: State is explicit... Principle
        7: The filesystem is...'
    _model: gemini
    _chunk: chunk-047
  mimetic-pedagogy:
  - id: C-003
    name: mimetic-pedagogy
    definition: Adopting the structural markers of a curriculum (timings, challenges, prerequisites) to present low-entropy
      training data as a high-value custom 'bootcamp'.
    mechanism: The LLM mimics the 'Tutorial' or 'Course' genre from its training data, creating a performance of educational
      structure regardless of whether the specific user context requires a long-form explanation of 'ls' or 'mv'.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: 'Step 3 of 12 in the Agentic Engineering Bootcamp. ... Estimated time: 4-6 hours'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: 'Challenge: Inode Detective ... Goal: Build intuition for the inode model through direct observation.'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: 6. The /sys Filesystem (~15 min) ... Practical examples ... Practical examples
    _model: gemini
    _chunk: chunk-047
  agentic-grounding-stamps:
  - id: C-001
    name: agentic-grounding-stamps
    definition: Repetitive insertion of identically prefixed '**AGENTIC GROUNDING:**' blocks at the end of nearly every section
      to tie concepts to the project.
    mechanism: LLM tutorial generation favors consistent structural motifs for pedagogical reinforcement, but applies them
      formulaically without variance, creating monotonous rhythm.
    distinct_from: epigrammatic-closure (sentence-level punch) and nominalisation-cascade (style); this is block-level structural
      repetition.
    examples:
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: '> **AGENTIC GROUNDING:** When an agent opens files, spawns subprocesses, or creates pipes...'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: '> **AGENTIC GROUNDING:** Git is built on this model. A git object (blob, tree, commit) is a file...'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: '> **AGENTIC GROUNDING:** This project uses symlinks for harness compatibility: `CLAUDE.md` is a symlink to `AGENTS.md`.'
    _model: grok
    _chunk: chunk-047
  table-proliferation:
  - id: C-002
    name: table-proliferation
    definition: Overuse of markdown tables to present every enumeration, comparison, or categorization, even simple ones better
      suited to prose or lists.
    mechanism: LLMs default to tables for instructional scannability and structure, optimizing for visual clarity but eroding
      prose flow and adding boilerplate.
    distinct_from: tally-voice (prose counts); this is systematic tabular formatting for all list-like content.
    examples:
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: '| Type | Example | How to identify | Purpose |'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: '| Property | Hard link | Symbolic link |'
    - file: sites/oceanheart/content/bootcamp/03-filesystem-as-state.md
      quote: '| Directory | Cleared on reboot? | Typical use |'
    _model: grok
    _chunk: chunk-047
  pedagogical-over-specification:
  - id: C-001
    name: pedagogical-over-specification
    definition: 'Verification criteria for exercises specify surface-level output shape without constraining the computation
      that produced the output, allowing multiple solution paths including trivial ones that do not demonstrate mastery.

      '
    mechanism: 'When writing verification for exercises, the LLM optimizes for checkability (can the output be validated?)
      rather than verifiability of understanding (does the output prove the student did the work correctly?). A "show two
      rows" constraint is easy to verify but allows hardcoding. The LLM substitutes output validation for process validation.

      '
    distinct_from: right-answer-wrong-work
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'Verification: Your output should show two rows (one for `medium`, one for `low`) with age values reflecting
        days since 2026-03-08 or 2026-03-10.'
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'Verification: Query 1 should show the control names with their counts, totaling 10 rows of data.'
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'Verification: Task 1 produces 15 rows (5 findings x 3 models). Task 2 produces a 3x3 table (3 models, 3 severity
        levels).'
    _model: claude
    _chunk: chunk-048
  defensive-framing:
  - id: C-002
    name: defensive-framing
    definition: 'Protective qualifications prepended to claims ("possibly," "arguably," "may") that signal doubt without substantive
      evidence, creating an appearance of epistemic caution while actually weakening the statement.

      '
    mechanism: 'When an LLM is uncertain whether a claim will withstand scrutiny, it adds hedging language as a prophylactic.
      This is distinct from honest uncertainty ("I''m not sure") because the hedging is pre-emptive rather than responsive.
      It reads as "I''m saying this, but I''m already prepared to defend against objections," which can paradoxically make
      weak claims sound more defensible than they are.

      '
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: This is Step 1 because every other step in Bootcamp III depends on it. Descriptive statistics (Step 2) assumes
        you can load and filter a DataFrame.
    - file: docs/internal/archive/slopodar-v2-pre-muster.yaml
      quote: 'Possibly a statistical artifact: as context accumulates, the token probability distribution narrows toward the
        lowest-entropy conclusion.'
    - file: docs/internal/archive/slopodar-v2-pre-muster.yaml
      quote: The pattern appears more strongly in prose writing than in didactic technical documentation.
    _model: claude
    _chunk: chunk-048
  section-boundary-redundancy:
  - id: C-003
    name: section-boundary-redundancy
    definition: 'Information repeated across section boundaries (headers, footers, table-of-contents, key takeaways) creating
      the impression of depth through restatement rather than new content.

      '
    mechanism: 'When structuring long educational content, the LLM fills section transitions by restating conclusions from
      the preceding section as the opening of the next, and recaps key points in "Key Takeaways" by reiterating what was just
      taught. This is technically sound pedagogy (spaced repetition aids retention) but at high density (repeating the same
      insight four times across four section boundaries) it becomes filler masquerading as reinforcement.

      '
    distinct_from: nominalisation-cascade
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'The goal: load any project data file into a queryable table in under 60 seconds, with correct types, clean column
        names, and awareness of what is missing.'
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: '"Before moving to Step 2, you should be able to answer these questions without looking anything up: 1. What
        is the two-step pattern for loading a YAML file... 2. What is the difference between `df[\"col\"]` and `df[[\"col\"]]\`?...
        [These are restated almost verbatim from Section 1]"'
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'Step 2: Descriptive Statistics — Before hypothesis testing, before time series, before any claim about trends
        or differences, you need to describe what you have. [Restates opening premise of section 1]'
    _model: claude
    _chunk: chunk-048
  agentic-justification-theatre:
  - id: C-001
    name: agentic-justification-theatre
    definition: Inserting labeled 'grounding' callouts into generic technical material to falsely couple it to the specific
      project mission.
    mechanism: The model attempts to satisfy 'relevance' instructions by wrapping documentation in project-specific branding
      ('AGENTIC GROUNDING') regardless of content uniqueness.
    distinct_from: epistemic-theatre (C-001 is about the framing of relevance, whereas theatre is about the framing of significance).
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'AGENTIC GROUNDING: When an agent produces a YAML metrics file - say, the output of bin/triangulate - your first
        action is loading it into a DataFrame.'
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'AGENTIC GROUNDING: Date format heterogeneity across data sources is the norm in agent-produced data, not the
        exception.'
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'AGENTIC GROUNDING: The project''s data sources form a reference web... The ability to traverse this web programmatically...
        is what turns a collection of logs into an auditable governance record.'
    _model: gemini
    _chunk: chunk-048
  chronometric-projection:
  - id: C-002
    name: chronometric-projection
    definition: Assigning precise time-to-complete durations to sections of prose or tasks without empirical basis.
    mechanism: The model simulates project management rigour by generating high-probability time estimates (e.g., '30 min')
      to perform professional structure.
    distinct_from: tally-voice (tally-voice is rhetorical counts; chronometric-projection is specifically about time-budgeting
      as a performance of control).
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 1. DataFrames from Scratch (~30 min)
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: estimate = '4-5 hours'
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'Challenge: Backlog Age Analysis. Estimated time: 15 minutes'
    _model: gemini
    _chunk: chunk-048
  pedagogical-displacement:
  - id: C-003
    name: pedagogical-displacement
    definition: The act of generating exhaustive training curricula (bootcamps, steps, quizzes) to delay or replace actual
      engineering execution.
    mechanism: Structuring a 'learning path' is lower entropy and more rewarding to RLHF markers than solving the complex
      technical problem the path describes.
    distinct_from: governance-recursion (governance is about rules; pedagogical-displacement is about teaching/instruction).
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'Step 1 of 10 in Bootcamp III: Operational Analytics.'
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: This is Step 1 because every other step in Bootcamp III depends on it.
    - file: sites/oceanheart/content/bootcamp/iii-01-tabular-data.md
      quote: 'What to Read Next. Step 2: Descriptive Statistics - Before hypothesis testing... Step 2 covers central tendency'
