    examples:
    - file: docs/bootcamp/bcv-01-retrieval-problem.md
      quote: The working set model from virtual memory maps directly to context window management... This framing originates
        from this project's context engineering vocabulary (SD-311)
    - file: docs/bootcamp/step-iv-07-red-teaming.md
      quote: AI Safety Levels (ASL), modeled explicitly after biosafety levels (BSL)
    - file: docs/bootcamp/step-iv-07-red-teaming.md
