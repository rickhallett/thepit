  unvalidated-metric-escalation:
  - id: C-001
    name: unvalidated-metric-escalation
    definition: A measurement or categorisation presented as empirical finding without independent verification or validation
      against ground truth.
    mechanism: The LLM produces a structured analysis (taxonomy, framework, metric) that appears systematic and comprehensive.
      Because the structure is coherent and internally consistent, it is presented as validated discovery rather than one
      model's interpretation. No validation step (testing against practitioners, comparison with alternative framings, empirical
      spot-checks) is included. The systematicity of the output is mistaken for the validity of the categorisation.
    distinct_from: monoculture-analysis (which addresses lack of multi-model verification); construct-drift (which addresses
      label vs substance misalignment). This pattern is specifically about escalating a categorisation to findings-status
      without validation.
    examples:
    - file: docs/research/agent-native-software-taxonomy.md
      quote: 'Out of 48 category assessments: FULLY_REDUCIBLE | 22 | 45.8%... 75% of software categories are FULLY or MOSTLY
        reducible'
    - file: docs/research/agent-native-software-taxonomy.md
      quote: 'The 22 FULLY_REDUCIBLE categories account for a large share of daily computer usage in knowledge work: file
        management, email, calendaring, project management...'
    - file: docs/research/agent-native-software-taxonomy.md
      quote: 'Across the full taxonomy, a rough estimate: 60-70% of the combined engineering effort across all software categories
        exists to serve human visual perception...'
    _model: claude
    _chunk: chunk-018
  category-collapse:
  - id: C-002
    name: category-collapse
    definition: Treating as uniform a space of decisions that contains fundamentally different kinds of judgments, by applying
      a single metric that obscures the distinction.
    mechanism: 'The taxonomy sorts software into FULLY_REDUCIBLE, MOSTLY_REDUCIBLE, TASTE_REQUIRED, IRREDUCIBLE. This collapses
      at least three distinct questions: (1) Can the operation be automated? (2) Can the operation be done without visual
      feedback? (3) Can the outcome be verified structurally? By using ''reducible'' as the metric, the analysis conflates
      ''automatable'' with ''automatable without human judgment.'' CRM operations are MOSTLY_REDUCIBLE in the taxonomy, but
      ''reducing'' them to API calls does not solve the judgment problem (''when should I follow up on this lead'') which
      requires human tacit knowledge. The categorisation performs homogeneity it does not have.'
    distinct_from: 'semantic-inflation (which inflates the strength of a true finding); construct-drift (which misnames what
      a metric measures). This is different: the metric is valid but incomplete — it measures one dimension while implying
      it measures the whole space.'
    examples:
    - file: docs/research/agent-native-software-taxonomy.md
      quote: 'CRM... Agent-native form: The agent queries and updates the CRM via API... The CRM''s elaborate GUI exists because
        salespeople need to quickly find and update records between calls — a human ergonomics problem... What''s lost: Relationship
        management is human. Knowing when to follow up, how to handle a difficult client, reading buying signals — these are
        sales skills that require human judgment. The system of record and workflow automation are fully reducible. Verdict:
        MOSTLY_REDUCIBLE.'
    - file: docs/research/agent-native-software-taxonomy.md
      quote: 'Accounting Software... Double-entry bookkeeping... Transaction recording and reporting are fully reducible.
        Financial judgment and tax strategy require expertise. Verdict: MOSTLY_REDUCIBLE.'
    - file: docs/research/agent-native-software-taxonomy.md
      quote: 'Email / Messaging... Routine communication (notifications, status updates, data-bearing messages) requires no
        human involvement. Sensitive communication (client emails, sensitive HR matters) require human review of content (L12
        — tone, relationships, politics). Verdict: MOSTLY_REDUCIBLE.'
    _model: claude
    _chunk: chunk-018
  framework-as-closure:
  - id: C-003
    name: framework-as-closure
    definition: Presenting a framework as settled and complete, suppressing questions about what the framework leaves unexamined
      or where it may be misapplied.
    mechanism: The taxonomy provides a structured space (48 categories × 4 verdicts) that feels exhaustive and decisive. Once
      the table is presented, it functions as settlement of the underlying question ('what software can agents do?'). The
      framework is not argued against; it is used. Later sections (Synthesis, Implications) operate within the framework rather
      than interrogating it. The document structure creates a sense of closure — categories assessed, numbers computed, implications
      derived — that pre-empts questions about whether the categorisation scheme itself is right. The framework's internal
      consistency and granularity (48 specific categories, not 10 or 100) signal rigor while potentially obscuring that the
      judgments inside it are interpretive.
    distinct_from: epistemic-theatre (which performs significance without substance); nominalisation-cascade (which removes
      agents and accountability). This is about how a framework can foreclose discussion through its apparent completeness.
    examples:
    - file: docs/research/agent-native-software-taxonomy.md
      quote: '---

        ## Methodology


        Each category is assessed on:

        - Core operations: The irreducible computational work the software performs.

        - GUI tax: What percentage of the software''s complexity exists to render a human-comprehensible interface.

        - CLI/API surface: What already exists to perform the core operations without a GUI.

        - Agent-native form: What a purpose-built agent tool would look like.

        - Taste boundary: Where human judgment (L12) is genuinely required.

        - Verdict: FULLY_REDUCIBLE | MOSTLY_REDUCIBLE | TASTE_REQUIRED | IRREDUCIBLE'
    - file: docs/research/agent-native-software-taxonomy.md
      quote: '### 1. The Numbers


        Out of 48 category assessments:


        | Verdict | Count | Percentage |

        |---------|-------|-----------|

        | FULLY_REDUCIBLE | 22 | 45.8% |'
    - file: docs/research/agent-native-software-taxonomy.md
      quote: '### 7. Principles of Agent-Native Software


        Derived from the taxonomy — not from theory, but from observing what works when you strip software to its core operations'
    _model: claude
    _chunk: chunk-018
  agentic-exceptionalism:
  - id: C-001
    name: agentic-exceptionalism
    definition: Dismissing human-centric software features as 'overhead' while ignoring their utility in agent grounding.
    mechanism: The model performs an idealised 'pure data' persona to satisfy the prompt's theme.
    distinct_from: semantic-inflation
    examples:
    - file: midgets/docs/research/agent-native-software-taxonomy.md
      quote: The agent doesn't need to 'see' Tuesday.
    - file: midgets/docs/research/agent-native-software-taxonomy.md
