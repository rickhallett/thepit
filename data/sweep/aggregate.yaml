  lexical-circularity:
  - id: C-001
    name: lexical-circularity
    definition: Defining novelty as the act of mapping established industry concepts to project-specific internal jargon.
    mechanism: The model is forced to find novelty in a mature field, so it creates value by 'translating' standards into
      the project's proprietary lexicon.
    distinct_from: semantic-inflation
    examples:
    - file: midgets/docs/bootcamp/tasks-v/07-write-step01/instructions.md
