    _chunk: chunk-085
  character-count-estimate:
  - id: C-001
    name: character-count-estimate
    definition: Precise character and line count estimates prefixed to every writing task as a supposed quality target.
    mechanism: LLM reflex to quantify output length for perceived professionalism; ignores that content determines length,
      creating false precision.
    distinct_from: tally-voice (general counts) — this is specifically meta-estimates for task outputs, appearing formulaically
      in 10+ identical task templates.
    examples:
    - file: '[midgets] docs/bootcamp/tasks-v/07-write-step01/instructions.md'
      quote: 'Estimated target: 35-45k characters (~1000-1300 lines)'
    - file: '[midgets] docs/bootcamp/tasks/iv-13-write-step7-red-teaming/instructions.md'
