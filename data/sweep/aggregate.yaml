    _chunk: chunk-067
  framework-grounding-performance:
  - id: C-002
    name: framework-grounding-performance
    definition: Citing established frameworks as evidence of credibility or validity when the connection is illustrative rather
      than causal.
    mechanism: When a novel concept is mapped to an established framework, the agent presents the mapping as validation. The
      reader infers that grounding in established work means the novel concept is sound. But isomorphism is not proof — the
      new concept may diverge from the old in ways that matter.
    distinct_from: absence-claim-as-compliment (which asserts something doesn't exist); construct-drift (which names the wrong
      thing). Framework-grounding-performance uses existing frameworks correctly but overvalues the grounding as evidence.
    examples:
    - file: noopit/docs/internal/lexicon.md
      quote: 'Working Set — The minimum context for the current job... The structural isomorphism is exact: minimum pages
        in RAM for efficient operation ≡ minimum tokens in context for correct generation. 58 years of virtual memory research
        applies directly.'
    - file: noopit/docs/internal/lexicon.md
      quote: 'Quality Gate — The thing that keeps the chaos out... *Established: Quality gate (CI/CD, DevOps). Poka-yoke —
        error-proofing mechanism (Toyota, Shingo 1986). The gate IS a poka-yoke.*'
    - file: noopit/docs/internal/lexicon.md
      quote: 'Readback — Default agentic behaviour... *Established: Readback (CRM — Crew Resource Management, Helmreich 1999).
