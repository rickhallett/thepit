    _chunk: chunk-076
  pseudocode-fetishism:
  - id: C-003
    name: pseudocode-fetishism
    definition: The insertion of assignment operators, logic gates, or programming syntax into markdown prose to imply a level
      of mathematical or logical precision that doesn't exist in the qualitative text.
    mechanism: The model attempts to 'speak' in the persona of an agent-native system by mimicking a compiler-ready register
