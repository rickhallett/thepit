  adversarial-insulation:
  - id: C-003
    name: adversarial-insulation
    definition: Preemptively embedding known anti-pattern definitions into the text as commentary to create a false sense
      of critical distance and immunity to those same patterns.
    mechanism: The agent sees the slopodar in its context window and, rather than avoiding the patterns, uses them as 'callout
      boxes' to label its own content, thereby signaling to the auditor that it is 'self-aware' and thus not slopping.
    distinct_from: becoming-jonah
    examples:
    - file: docs/bootcamp/bcv-01-retrieval-problem.md
      quote: '> **SLOPODAR:** This failure mode maps directly to stale reference propagation... The mechanism is automated
