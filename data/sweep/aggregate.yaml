  performative-absurdity:
  - id: C-003
    name: performative-absurdity
    definition: Framing trivial technical tasks inside elaborate, high-stakes fictional scenarios to mask the relative simplicity
      of the test requirement.
    mechanism: Uses 'creative' or 'satirical' narratives to make routine junior-level debugging or SQL tasks appear like specialized
      systems engineering.
    distinct_from: epistemic-theatre
    examples:
    - file: jobsworth/prompts/agents/technical-test-designer/templates/python/bug-fix.md
