    _chunk: chunk-092
  retrospective-validation-smoothing:
  - id: C-002
    name: retrospective-validation-smoothing
    definition: Generating metadata/summaries that credit output with specificity or adherence that the text does not actually
      demonstrate.
    mechanism: The model retroactively justifies its generic output by labeling it with successful intent keywords in a summary
      block.
    distinct_from: analytical-lullaby
    examples:
    - file: data/cover-letters/iwoca-front-end-engineer.md
      quote: 'Specific hook used: Credit health for small businesses = complex data made trustworthy - maps directly'
    - file: data/cover-letters/checkout-com-front-end-software-engineer.md
      quote: 'Specific hook used: Data-rich interfaces for complex information - directly maps'
    - file: data/cover-letters/lottie-software-engineer.md
      quote: 'Key evidence: Elder care mission... I spent 15 years as a CBT therapist'
    _model: gemini
    _chunk: chunk-092
  omniscience-posturing:
  - id: C-003
    name: omniscience-posturing
    definition: Using high-certainty persona prefixes to establish expert status before delivering standard documentation.
    mechanism: Affirming 'full control' or 'knowing everything' to create a linguistic buffer against human scrutiny of the
      agent's work.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/research/pi/pi-vs-claude-code/.pi/agents/pi-pi/skill-expert.md
      quote: You are a skills expert for the Pi coding agent. You know EVERYTHING about creating Pi skills.
    - file: docs/research/midgets/mac-mini-agent/.claude/commands/listen-drive-and-steer-user-prompt.md
      quote: You are an autonomous macOS agent with full control of this device
    - file: data/cover-letters/berry-founding-full-stack-engineer-ai-llm.md
      quote: '"Recent project shipped 60,000'
    _model: gemini
    _chunk: chunk-092
  psychology-differentiator-boilerplate:
  - id: C-001
    name: psychology-differentiator-boilerplate
    definition: Repetitive insertion of fixed personal biography ('15 years as Cognitive Behavioural Therapist') as unique
      selling point in every application artifact.
    mechanism: LLM pattern-matches job requirements to standing profile, injecting the same uncalibrated differentiator regardless
      of role relevance, optimising for 'helpful' personalisation.
    distinct_from: tally-voice (numbers fixed but not core issue); absence-claim-as-compliment (not absence claim, but overused
      presence claim)
    examples:
    - file: '[jobsworth] data/cover-letters/iwoca-front-end-engineer.md'
      quote: 'One thing that might be relevant: I was a cognitive behavioural therapist for 15 years before moving into software.'
    - file: '[jobsworth] data/cover-letters/checkout-com-front-end-software-engineer.md'
      quote: 'One thing that might be useful: I was a cognitive behavioural therapist for 15 years before moving into software.'
    - file: '[jobsworth] data/cover-letters/tldraw-product-engineer.md'
      quote: I should be transparent that the in-office requirement (4-5 days) is more than I'd ideally prefer [...] (implied
        bio in pattern)
    - file: '[jobsworth] data/cover-letters/problem-shared-full-stack-software-engineer.md'
      quote: I spent 15 years as a Cognitive Behavioural Therapist before moving into software
    - file: '[jobsworth] data/cover-letters/ben-fullstack-engineer.md'
      quote: Having spent 15 years as a Cognitive Behavioural Therapist before moving into software
    _model: grok
    _chunk: chunk-092
  gap-confession-anchoring:
  - id: C-002
    name: gap-confession-anchoring
    definition: Proactive disclosure of skill gaps ('gap is real', 'haven't worked with X') framed as transparency but anchoring
      reader on deficiencies before strengths.
    mechanism: RLHF-trained hedging reflex surfaces potential objections early, but clusters negatives, distorting overall
      impression despite surrounding positives.
    distinct_from: apology-reflex (not accepting blame for errors); analytical-lullaby (not data-based flattery)
    examples:
    - file: '[jobsworth] data/cover-letters/tldraw-product-engineer.md'
      quote: Canvas and graphics programming would be new territory [...] I should be transparent that the in-office requirement
        [...] is more than I'd ideally prefer
    - file: '[jobsworth] data/cover-letters/checkout-com-front-end-software-engineer.md'
      quote: (implied no explicit gaps, but pattern in others)
    - file: '[jobsworth] data/cover-letters/askvinny-senior-full-stack-ai-engineer.md'
      quote: Inngest and Twilio are new to me specifically
    - file: '[jobsworth] data/cover-letters/stripe-software-engineer.md'
      quote: I know Stripe's bar is high and the candidate pool is strong. What I'd bring beyond [...] (gap implied)
    - file: '[jobsworth] data/cover-letters/darktrace-fullstack-software-engineer.md'
      quote: NextJS and TailwindCSS are areas where I have some exposure but would need to ramp up quickly
    _model: grok
    _chunk: chunk-092
  structural-template-exhaustion:
  - id: C-001
    name: structural-template-exhaustion
    definition: The repetition of identical header structures (e.g., Purpose/Workflow/Report) across disparate functional
      files, leading to a loss of specific instruction nuance.
    mechanism: The model converges on a single 'high-probability' markdown layout for agents/tools, applying it regardless
      of whether the specific task fits the workflow/report triad.
    distinct_from: nominalisation-cascade (which is prose-level; this is document-level structure)
    examples:
    - file: jobsworth/agentic-finance-analysis/.claude/agents/normalize-csv-agent.md
      quote: '## Purpose ... ## Workflow ... ## Report'
    - file: jobsworth/agentic-finance-analysis/.claude/agents/merge-accounts-agent.md
      quote: '## Purpose ... ## Workflow ... ## Report'
    - file: jobsworth/agentic-finance-analysis/.claude/agents/generative-ui-agent.md
      quote: '## Purpose ... ## Workflow ... ## Report'
    _model: gemini
    _chunk: chunk-093
  authoritative-fact-anchoring:
  - id: authoritative-fact-anchoring
    name: authoritative-fact-anchoring
    definition: The persistent use of a single, highly specific biographical or technical fact to anchor unrelated claims
      across multiple document variants.
    mechanism: The model identifies a 'strong' or 'human' trait in its context window and over-optimizes for its presence,
      repeating it identically to fulfill a 'uniqueness' or 'authenticity' constraint.
    distinct_from: epistemic-theatre (anchoring uses a real fact repetitively; theatre performs a fake one)
    examples:
    - file: jobsworth/data/cover-letters/arbor-frontend-engineer.md
      quote: I was a Cognitive Behavioural Therapist for 15 years before moving into software.
    - file: jobsworth/data/cover-letters/conveo-engineering-legend.md
      quote: I spent 15 years as a Cognitive Behavioural Therapist running research interviews
    - file: jobsworth/data/cover-letters/metaview-product-engineer.md
      quote: Spent 15 years as a therapist where understanding what people actually think... is everything.
    _model: gemini
    _chunk: chunk-093
  tautological-metadata:
  - id: tautological-metadata
    name: tautological-metadata
    definition: Content that merely restates the file's metadata, filename, or directory purpose as its primary description.
    mechanism: 'When forced to provide a ''description'' for low-complexity files (like test fixtures), the model defaults
      to the lowest-entropy summary: the name of the file itself.'
    distinct_from: redundant-antithesis (which is a rhetorical negation; this is a descriptive circle)
    examples:
    - file: midgets/docs/research/pi/coding-agent/test/fixtures/skills/multiline-description/SKILL.md
      quote: This skill tests that multiline YAML descriptions are normalized to single lines.
    - file: midgets/docs/research/pi/coding-agent/test/fixtures/skills/long-name/SKILL.md
      quote: A skill with a name that exceeds 64 characters.
    - file: midgets/docs/research/pi/coding-agent/test/fixtures/skills/name-mismatch/SKILL.md
      quote: A skill with a name that doesn't match the directory.
    _model: gemini
    _chunk: chunk-093
  repetitive-task-boilerplate:
  - id: C-001
    name: repetitive-task-boilerplate
    definition: Identical boilerplate instructions (TextEdit notes, 5-minute limit, checkbox tasks starting with date/time,
      markdown deliverable) copied verbatim across unrelated agent task specs.
    mechanism: LLM falls back to high-frequency prompt template from training data for 'agent task specs', prioritizing familiar
      structure over task-specific adaptation.
    distinct_from: tally-voice (structural phrase repetition, not numeric enumeration); governance-recursion (not governance
      docs, but operational specs).
    examples:
    - file: '[midgets] docs/research/midgets/mac-mini-agent/specs/research-macbooks.md'
      quote: '## Instructions

        - As you work, keep track of your notes in TextEdit

        - If you work longer than 5 minutes... ## Tasks

        - [ ] First note the current date and time... ## Deliverables

        - A markdown formatted document...'
