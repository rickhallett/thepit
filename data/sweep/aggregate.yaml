    _chunk: chunk-048
  procedural-flatten:
  - id: C-001
    name: procedural-flatten
    definition: 'Technical instruction that explains the correct API or method without explaining the problem it solves or
      what failure looks like if not followed.

      '
    mechanism: 'The LLM knows the right answer (which library function to call) but doesn''t retain context about why the
      alternative fails. It optimizes for producing working code over building mental models. A reader can execute the instruction
      without understanding it.

      '
    distinct_from: 'right-answer-wrong-work (which is about passing assertions via wrong causal path) and authority-scaffolding
      (which is about asserting significance without evidence). Procedural-flatten is about teaching a method without teaching
      its necessity.

      '
