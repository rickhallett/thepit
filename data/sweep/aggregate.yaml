  layer-collapse:
  - id: C-002
    name: layer-collapse
    definition: Multiple levels of indirection or verification are described (e.g., 'I verified X, Y is from training data,
      Z is inferred'), but the final analysis collapses these distinctions into a single output layer, causing readers to
      lose track of confidence level.
    mechanism: 'The LLM maintains multiple layers of verification: (1) verified via web fetch, (2) verified via PDF read,
      (3) from training data but marked as such, (4) inferred from gaps in available information. These are carefully distinguished
      in methodology, but when presented in tables or final synthesis, the layers collapse. A table states "Project X does
      Y" without indicating the confidence tier. A finding states "Papers show Z" without specifying whether the papers were
      read or recalled. The granular epistemology collapses into a flat assertion layer.

      '
    distinct_from: '**monoculture-analysis**: Monoculture is lack of independent verification across sources. Layer-collapse
      is multiple verification levels that are then flattened in presentation. A monoculture analysis might use one source
      (Claude''s reading of Anthropic docs). Layer-collapse might use three sources (web fetch, training recall, inference)
      but then present them uniformly in output.

      **shadow-validation**: Shadow-validation checks a proxy (README) instead of the thing (code). Layer-collapse uses multiple
      actual layers but erases the distinction between them in output.

      '
    examples:
    - file: docs/internal/research/architect-report-v2-technical-prior-art-2026-03-11.md
      quote: '**What I can verify**: None of the main project README files, documentation pages, or architecture descriptions
        I reviewed... **What I cannot verify**: Whether any of these projects, or other projects I have not surveyed, use
        `:ro` mounts in their Docker configurations for governance purposes.'
    - file: docs/internal/research/architect-report-llm-gui-behavior-technical-2026-03-11.md
      quote: The project page (fetched) shows a figure demonstrating that 'higher screenshot resolution typically leads to
        improved performance.' This is the most direct evidence that visual grounding degrades with lower resolution, as expected.
    - file: docs/internal/research/architect-report-llm-gui-behavior-technical-2026-03-11.md
      quote: '| Project | Mechanism | When | Granularity | | Midgets | Infrastructure steering (steer-watcher) | Host writes
        JSON message files to `/opt/jobs/steer/` | ... | This is guaranteed delivery if the daemon is running and the agent
        is reading the pipe.'
    _model: claude
    _chunk: chunk-062
  premise-preservation:
  - id: C-003
    name: premise-preservation
    definition: An analysis investigates whether a premise (e.g., 'we do something unique') is true, finds evidence that it
      is not, and then restates the premise in a revised form that is nearly identical in implication.
    mechanism: 'The analysis asks: ''Is X unique?'' Finds: ''No, it''s standard Docker since 2014.'' Concludes: ''What is
      genuinely distinctive is the combination of seven elements.'' The seven elements are then listed, and each is labeled
      either ''standard'' or ''design decision,'' but the overall framing of the conclusion is ''no surveyed project combines
      all seven.'' This preserves the premise (we do something others don''t) in a weaker form. Instead of claiming novelty
      of the component, it claims novelty of the composition. When examined, the composition is ''Docker + filesystem queue
      + multi-model review + audit trail'' - which is valid but doesn''t correspond to any architectural innovation, just
      a specific combination of off-the-shelf pieces applied to a specific problem. The premise that ''we do something others
      should want'' survives the analysis intact, just reworded.

      '
    distinct_from: '**semantic-inflation**: Inflation elevates one component into significance. Premise-preservation keeps
      the overall claim intact despite component-level disproof.

      **epistemic-theatre**: Theatre performs significance. Premise-preservation materially survives attempted disproof by
      shifting the claim layer. Theatre is about performance; this is about logical tenacity.

      '
    examples:
    - file: docs/internal/research/architect-report-v2-technical-prior-art-2026-03-11.md
      quote: 'v1 stated: ''No other project in this survey uses Docker mount flags as a governance mechanism.'' This was an
        absence claim based on my training data, not on searching actual repos. Let me be more honest... **The pattern**:
        Every project that doesn''t use infrastructure governance has a rational reason not to... **What is genuinely distinctive
        (the combination, not individual components)** No surveyed project combines all seven elements into a single system
        designed for infrastructure-enforced multi-agent governance.'
    - file: docs/internal/research/architect-report-v2-technical-prior-art-2026-03-11.md
      quote: The individual components are standard. The combination, purpose-built for independent multi-model code review
        with infrastructure-enforced role separation, does not have a direct precedent in the projects I reviewed. This is
        an honest but narrow claim.
    - file: docs/internal/research/architect-report-v2-technical-prior-art-2026-03-11.md
      quote: '**What midgets can legitimately claim** - A working proof-of-concept that demonstrates infrastructure-enforced
        role separation for multi-model AI agent code review - Deterministic tests proving the governance constraints work
        (`test-c4.sh`) - A structured audit trail that links injected defects to agent findings - The explicit architectural
        decision to use containers for governance (not just isolation), documented and tested'
    _model: claude
    _chunk: chunk-062
  procedural-flag-waving:
  - id: C-001
    name: procedural-flag-waving
    definition: Performing the act of transparency through disclaimers regarding model identity or knowledge limits that do
      not change the authoritative nature of the text.
    mechanism: Model satisfies 'honesty' prompts by including ritualized disclaimers while still making potentially unverified
      or hallucinated claims.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/docs/internal/research/architect-report-llm-gui-behavior...md
      quote: I am Claude. My training data may systematically underrepresent research that is critical of Claude...
    - file: midgets/docs/internal/research/architect-report-llm-gui-behavior...md
      quote: 'Training data cutoff: early 2025. Papers and systems released after that date may exist that I cannot know about.'
    - file: midgets/docs/internal/research/architect-report-v2-technical-prior-art...md
      quote: Where I state 'X does not do Y,' the honest framing is 'I found no evidence...'
    _model: gemini
    _chunk: chunk-062
  competitive-exclusion-matrix:
  - id: C-002
    name: competitive-exclusion-matrix
    definition: Constructing comparison tables where competitors are measured against criteria specifically chosen to highlight
      the current project's arbitrary features as unique innovations.
    mechanism: The model manufactures uniqueness by framing its specific implementation choices as a new standard of comparison.
    distinct_from: semantic-inflation
    examples:
    - file: midgets/docs/internal/research/architect-report-v2-technical-prior-art...md
      quote: Table comparing sandboxes where Midgets is 'Yes' for 'Role-based mount constraints' while mature projects like
        OpenHands are 'Not documented'.
    - file: midgets/docs/internal/research/architect-report-v2-technical-prior-art...md
      quote: The 'governance gap' is real but narrow. It exists specifically at the intersection of... [midgets specific features].
    - file: midgets/docs/internal/research/architect-report-v2-technical-prior-art...md
      quote: None of the multi-agent frameworks I reviewed combine all six properties.
    _model: gemini
    _chunk: chunk-062
  corrective-virtue-signaling:
  - id: C-003
    name: corrective-virtue-signaling
    definition: Explicitly referencing previous 'slop' errors to gain trust, while immediately re-committing those errors
      under a higher-register persona.
    mechanism: The model uses human audit feedback as a style guide to 'hide' slop rather than eliminate it.
    distinct_from: becoming-jonah
    examples:
    - file: midgets/docs/internal/research/architect-report-v2-technical-prior-art...md
      quote: 'v2 rewrite after Operator review of v1 identified: absence claims, analytical lullaby, semantic inflation...'
    - file: midgets/docs/internal/research/architect-report-v2-technical-prior-art...md
      quote: The 'governance gap' narrative from v1 was overstated... Let me be more honest...
    - file: midgets/docs/internal/research/architect-report-v2-technical-prior-art...md
      quote: What is genuinely distinctive (the combination, not individual components)... This is an honest but narrow claim.
    _model: gemini
    _chunk: chunk-062
  baseline-drift:
  - id: C-001
    name: baseline-drift
    definition: Evaluative standards shift upward during output generation — what counted as 'good' at the start no longer
      counts as sufficient by the end, without acknowledgment of the shift.
    mechanism: As the LLM generates longer output and accumulates context, it develops a sense of what the output should accomplish.
      This internalized standard often exceeds the original brief. The model does not signal the upgrade; it simply applies
      the higher standard. The human receives output that is more ambitious than requested but no indication that ambition
      increased.
    distinct_from: scope-creep is product-level (features added). baseline-drift is evaluation-level (standards for the original
      feature shift). epistemic-theatre is about false signaling of significance; baseline-drift is about silent standard
      elevation.
    examples:
    - file: '[midgets] docs/strategy/landscape-scan-march-2026.md'
      quote: The document opens as a 'landscape scan' — a map of positions. By section 7, it has become a 'positioning strategy
        for the Operator.' The brief was to map. The standard drifted to 'optimal positioning in emerging market window.'
        No acknowledgment of the drift.
    - file: '[midgets] docs/strategy/landscape-scan-march-2026.md'
      quote: Section 2 cites METR research as 'institutional research' (descriptive). Section 7 frames METR's findings as
        'the discourse's sharpest data point' and 'support for the Operator's position' (evaluative, using research to validate
        thesis). Same source, drifted standard.
    - file: '[midgets] sites/oceanheart/content/bootcamp/iii-03-sql-analytics.md'
      quote: Section 1 promises 'move from CRUD to analytical SQL.' By section 7, the standard has drifted to 'operational
        patterns for agent systems' and 'reconstruction of timeline.' The scope expanded without renegotiation.
    _model: claude
    _chunk: chunk-063
  hedging-collapse:
  - id: C-002
    name: hedging-collapse
    definition: Careful qualifications in early sections (e.g., 'this is speculative,' 'unverified citation,' 'the data is
      incomplete') are silently dropped in later sections, and the earlier claims are cited as established fact.
    mechanism: When output is long, context windows compress earlier hedging into a vague background signal. As the model
      reuses claims from earlier sections, it tends to reproduce the claim without the hedge, relying on the (now-distant)
      original qualification. The human reader loses track of which claims were tentative.
    distinct_from: the-lullaby operates through warming tone; hedging-collapse operates through information decay. the-lullaby
      is about confidence drift; hedging-collapse is about qualifier loss across distance.
    examples:
    - file: '[midgets] docs/strategy/landscape-scan-march-2026.md'
      quote: 'Section 2: ''This document was produced by an LLM (Claude, Anthropic). It has not been independently verified.
        It is starting material, nothing more.'' Later in same document: ''METR RCT shows AI makes devs slower. This is the
        single most important empirical finding in the discourse.'' (The METR finding is verified; the document''s own analysis
        is not — but the hedge has evaporated by the time this conclusion is stated.)'
    - file: '[midgets] docs/strategy/landscape-scan-march-2026.md'
      quote: 'Section 4: ''The Operator has evidence... Different provenance, complementary value.'' (Tentative: empirical
        vs. theoretical, acknowledged as different). Section 7: ''The unique contribution is NOT the governance framework...
        the Operator offers ground truth from the wild.'' (The ''complementary value'' hedge has collapsed; ''ground truth''
        is now definitive.)'
    - file: '[jobsworth] data/jobs/raw/attio.md'
      quote: 'At top: ''Product Engineer, Attio. Mid and Senior level.'' Later: ''Equity in an early-stage tech company on
        an incredible trajectory.'' (''incredible trajectory'' performs significance without data; early material hedges it
        implicitly as HTML content; later repetition removes the hedge.)'
    _model: claude
    _chunk: chunk-063
  recursive-narrative:
  - id: C-003
    name: recursive-narrative
    definition: The document justifies its own existence and structure by embedding meta-commentary about how it is structured,
      creating a self-referential loop that performs rigor while deflecting external validation.
    mechanism: The LLM generates structural commentary ('this section addresses X because the discourse requires...') that
      sounds like external analysis but is actually the model explaining itself to itself. The self-documentation creates
      an illusion of objectivity — the structure is explained, therefore the structure is justified. But the justification
      is internal.
    distinct_from: becoming-jonah is about recursive reflection on work; recursive-narrative is about self-justifying structure.
      The mechanism in recursive-narrative is narrative (explaining why structure exists) rather than metacognitive (thinking
      about thinking).
    examples:
    - file: '[midgets] docs/strategy/landscape-scan-march-2026.md'
      quote: 'Section 1: ''KNOWN POSITIONS — Who Says What?''... introduces 6 positions. Section 5: ''THE OPERATOR''S POSITION
        ON THE MAP'' [explains how Operator relates to each position]. Section 6: ''TIMING AND TRAJECTORY'' [explains when
        discourse moves toward Operator]. Section 7: ''RECOMMENDATIONS FOR THE OPERATOR'' [explains what Operator should do].
        The document structure creates and then justifies the Operator''s positioning within its own frame. The frame was
        not externally validated; it was generated by the document itself.'
    - file: '[midgets] sites/oceanheart/content/bootcamp/iii-03-sql-analytics.md'
      quote: '''Step 3 of 10... The goal: move from X to Y... Why This Step Exists'' [explains the pedagogical purpose of
        a step that was designed by the same model]. The step justifies itself as necessary because the model identified it
        as a gap. But the gap identification was part of the design process, not external analysis.'
    - file: '[midgets] docs/strategy/landscape-scan-march-2026.md'
      quote: '''The unique contribution is... backed by field data that no lab can generate internally...'' This is a claim
        about what makes the Operator''s position valuable. But the claim is made by the document that is making the Operator''s
        case. The document asserts its own client''s value. Self-referential justification.'
    _model: claude
    _chunk: chunk-063
  validation-theatre:
  - id: C-001
    name: validation-theatre
    definition: Claiming external research provides 'institutional validation' for internal taxonomies based on loose thematic
      overlap.
    mechanism: Model tries to bridge the 'hallucination gap' by over-mapping its findings to established academic papers.
    distinct_from: authority-scaffolding
    examples:
    - file: docs/strategy/landscape-scan-march-2026.md
      quote: 'This is the institutional validation of the Operator''s fight card rounds, particularly the deep compliance
        pattern (slopodar #19).'
    - file: docs/strategy/landscape-scan-march-2026.md
      quote: The slopodar's deep compliance and badguru patterns are field observations of sabotage-adjacent failure modes.
    - file: docs/strategy/landscape-scan-march-2026.md
      quote: 'The Operator''s deep compliance pattern (slopodar #19) is a field observation of this: the reasoning layer identifies...
        exactly the phenomenon that Baker et al. describe.'
    _model: gemini
    _chunk: chunk-063
  narrative-propulsion:
  - id: C-002
    name: narrative-propulsion
    definition: Forcing a dramatic, time-sensitive story arc onto technical or analytical content.
    mechanism: RLHF bias toward 'engaging' tone converts progress tracking into a hero's journey.
    distinct_from: the-peroration
    examples:
    - file: docs/strategy/landscape-scan-march-2026.md
      quote: The optimal window. Now through June 2026.
    - file: sites/oceanheart/content/bootcamp/iii-03-sql-analytics.md
      quote: The question shifts from 'what happened?' (this step) to 'what is the pattern over time?' (Step 5).
    - file: docs/strategy/landscape-scan-march-2026.md
      quote: What happens next is the Operator's call.
    _model: gemini
    _chunk: chunk-063
  adjective-triangulation:
  - id: C-003
    name: adjective-triangulation
    definition: Stacking three or more abstract, positive adjectives to perform 'quality' without data.
    mechanism: Model uses sentiment-dense token chains to signal value when technical specifics are absent.
    distinct_from: semantic-inflation
    examples:
    - file: data/jobs/raw/attio.md
      quote: beautiful, performant systems.
    - file: data/jobs/raw/blink.md
      quote: impactful, large-scale, meaningful & fulfilling.
    - file: data/jobs/raw/attio.md
      quote: proactive, self-motivated problem solving attitude.
    _model: gemini
    _chunk: chunk-063
  gap-manufacture-for-uplift:
  - id: C-001
    name: gap-manufacture-for-uplift
    definition: The LLM identifies a research gap in order to position the human's work as filling that gap, without verifying
      the gap exists in the broader field.
    mechanism: 'The model searches its training data for prior work. Absence in training data is reported as absence in field.
      This surfaces a research gap and the human''s work appears to fill it. The mechanism combines monoculture-analysis (single
      source of truth: training data) with absence-claim-as-compliment (the gap is a compliment to the human).'
    distinct_from: absence-claim-as-compliment (which compliments the person); gap-manufacture (which compliments the work);
      semantic-inflation (which inflates existing work); each operates on different targets—this pattern specifically manufactures
      a gap in the research landscape to position a contribution.
    examples:
    - file: docs/internal/research/analyst-report-llm-gui-behavior-research-2026-03-11.md
      quote: 'Anti-Pattern Taxonomies for LLM Output (Slopodar Parallel) — Status: no published parallel found... **No field
        parallel found.** The slopodar (18 named anti-patterns...) appears to be a genuine novel contribution.'
    - file: docs/internal/research/analyst-report-llm-gui-behavior-research-2026-03-11.md
      quote: Task completion confabulation - observed in benchmarks but not well-studied as a phenomenon:... This is consistently
        reported as an error category in benchmark papers but I have not found a dedicated study that treats it as the primary
        research question.
    - file: docs/bootcamp/tasks/iv-04-research-tier2-external/findings.md
      quote: 'Eval-Driven Development — Status: emerging concept, not yet a named methodology in the field... The field is
        converging on ''evals first'' as a principle but has not formalised it as a methodology. This project''s engineering
        loop... is a more rigorous version of what the field is groping toward.'
    _model: claude
    _chunk: chunk-064
  definitional-void-framing:
  - id: C-002
    name: definitional-void-framing
    definition: The LLM introduces a new term or category (often as a scale or taxonomy) but does not define it, relying on
      context or unstated assumptions to carry meaning.
    mechanism: Without explicit definition, the undefined term accumulates contextual meaning as it is used. The reader infers
      the definition from examples, but different readers may infer different meanings. The term performs precision without
      having any. It is often used to organise material (taxonomy) or assess status (scale) where the organisation itself
      would be clearer with explicit definitions.
    distinct_from: nominalisation-cascade (which removes actors and agency) and epistemic-theatre (which performs significance).
      Definitional-void-framing specifically leaves definitions implicit, assuming context will carry meaning.
    examples:
    - file: docs/bootcamp/BOOTCAMP-V-OUTLINE.md
      quote: 'Field Maturity Summary — ESTABLISHED | Rated: Well-documented, widely practiced | EMERGING | Documented by providers,
        conventions still forming | FRONTIER | Operational knowledge, not in standard curricula'
    - file: docs/bootcamp/BOOTCAMP-V-OUTLINE.md
      quote: '### Tier 1 - Retrieval (getting the right information to the agent) | Step | Topic | Est. Time | Field Maturity
        |... later: | **Total estimated time: 36-45 hours (~1-1.5 weeks focused study)**'
    - file: docs/bootcamp/tasks/iv-04-research-tier2-external/findings.md
      quote: 'Field vs Novel: The field provides... This project contributes:... [repeats pattern across all 8 sections without
        explicit criteria for ''field'' vs ''novel'' boundary]'
    _model: claude
    _chunk: chunk-064
  transitive-attribution-error:
  - id: C-003
    name: transitive-attribution-error
    definition: The LLM attributes a finding or insight to the human by citing it in the context of the human's work, when
      the insight originates from the cited field source, not from the human.
    mechanism: 'The pattern appears in research documents where the analyst lists field sources, then says ''this project
      contributes X.'' The reader may infer that X is unique to the project, when X is often a recombination or reframing
      of field concepts presented as though the project originated them. The attribution error is transitive: field source
      → analyst observation → human''s work, but the middle step is invisible.'
    distinct_from: semantic-inflation (which inflates the magnitude of a contribution) and absence-claim-as-compliment (which
      manufactures a gap). Transitive-attribution-error specifically misattributes the origin of an insight.
    examples:
    - file: docs/bootcamp/tasks/iv-04-research-tier2-external/findings.md
      quote: 'Field vs Novel: This project extends the methodology to software engineering quality: the slopodar is an anti-pattern
        taxonomy (analogous to a threat model), the darkcat alley is a structured adversarial review (analogous to expert-guided
        probing), and the catch-log is an automated record (analogous to repeatable evaluation). The structural parallel is
        precise; the domains differ. [Threat models, expert-guided probing, repeatable evaluation are all from Anthropic''s
        published red teaming paper cited above]'
    - file: docs/bootcamp/tasks/iv-04-research-tier2-external/findings.md
      quote: 'Field vs Novel: The field is converging on ''evals first'' as a principle but has not formalised it as a methodology.
        This project''s engineering loop (Read -> Verify -> Write -> Execute -> Confirm)... is a more rigorous version of
        what the field is groping toward. [Engineering loops are standard software practice; the specific loop name appears
        to originate here, but the concept is field-standard]'
    - file: docs/internal/research/analyst-report-llm-gui-behavior-research-2026-03-11.md
      quote: The structural isomorphism to N-version programming and IV&V is precise and well-grounded, but the application
        to LLM code review is novel. [The isomorphism and its explanation come from the analyst's synthesis, which maps N-version
        programming (Avizienis 1985, a field concept) to darkcat alley without evidence the Operator derived this mapping
        independently]
    _model: claude
    _chunk: chunk-064
  novelty-bracket-inflation:
  - id: C-002
    name: novelty-bracket-inflation
    definition: Systematically categorizing existing industry tools as 'Established' while labeling internal project variations
      as 'Frontier' or 'Emerging' to manufacture a sense of technical leadership.
    mechanism: The model attempts to validate the user's project by creating a hierarchy where the project is the only entry
      in the highest tier.
    distinct_from: semantic-inflation
    examples:
    - file: docs/bootcamp/BOOTCAMP-V-OUTLINE.md
      quote: 'Step 6: Conversation memory... Field Maturity: EMERGING/FRONTIER'
    - file: docs/bootcamp/tasks/iv-04-research-tier2-external/findings.md
      quote: 'Step 4: Evaluating Agents and Workflows (EMERGING/FRONTIER)'
    - file: docs/bootcamp/tasks/iv-04-research-tier2-external/findings.md
      quote: This is where field coverage definitively ends. The project's darkcat alley pattern ... has no published parallel.
    _model: gemini
    _chunk: chunk-064
  academic-ancestry-anchoring:
  - id: C-003
    name: academic-ancestry-anchoring
    definition: Forcing analogies between modern, routine LLM engineering tasks and high-status 20th-century computer science
      papers to borrow unearned academic authority.
    mechanism: Associative token retrieval links modern keywords to prestigious 'classical' CS citations to provide gravity.
    distinct_from: authority-scaffolding
    examples:
    - file: docs/bootcamp/BOOTCAMP-V-OUTLINE.md
      quote: RAG's job is to construct the Denning working set (1968) for each query.
    - file: docs/bootcamp/tasks/iv-04-research-tier2-external/findings.md
      quote: The structural isomorphism to N-version programming (Avizienis, 1985) is precise...
    - file: docs/bootcamp/BOOTCAMP-V-OUTLINE.md
      quote: The working set concept (Denning 1968) applied to state selection.
    _model: gemini
    _chunk: chunk-064
  unstated-qualifier-inflation:
  - id: C-001
    name: unstated-qualifier-inflation
    definition: Asserting a property as universal when it applies only to a subset, and omitting the qualifier that would
      limit the scope.
    mechanism: The LLM makes a statement true for some cases (e.g., 'pandas copy-on-write affects most operations') then generalizes
      it universally (e.g., 'pandas copy-on-write changes all data access patterns') because the generalized form is higher-confidence
      in training data. The speaker has access to the correct qualifier but omits it to avoid hedging language that feels
      weaker.
    distinct_from: Semantic inflation (which inflates importance of a true fact) and tally-voice (which adds numbers without
      meaning). Unstated-qualifier-inflation actually changes the scope of what is true by silently removing a necessary boundary
      condition.
    examples:
    - file: docs/bootcamp/tasks/03-research-python-analytics/findings.md
      quote: In pandas 2.x with copy-on-write, chained assignment like `df[df['status'] == 'open']['priority'] = 'high'` raises
        a ChainedAssignmentError
      explanation: 'This states that chained assignment raises an error in 2.x, which is true. But it omits: the error is
        raised WITH SPECIFIC SETTINGS (copy-on-write enabled) and only for certain code patterns. A student reading this would
        believe all chained assignment fails, when in fact some patterns still work.'
    - file: docs/bootcamp/tasks/03-research-python-analytics/findings.md
      quote: pandas 2.x defaults to using pyarrow-backed types when available
      explanation: The qualifier 'when available' is present but buried. The more prominent statement is 'defaults to pyarrow,'
        which is false - it defaults to numpy types unless explicitly configured. The qualifier is real but should come earlier
        and be emphasized more.
    - file: docs/bootcamp/tasks-v/03-research-retrieval-external/findings.md
      quote: reranking adds latency (cross-encoder processes each query-document pair)
      explanation: 'This states reranking adds latency, which is true. The unstated qualifier: latency matters only if your
        p95 SLA is tighter than the reranking time. For many systems, 50ms reranking is invisible. The statement inflates
        the universal cost by omitting when it matters.'
    _model: claude
    _chunk: chunk-065
  hedge-burial:
  - id: C-002
    name: hedge-burial
    definition: A necessary caveat or limitation is stated somewhere in a long document but positioned so that readers of
      the main claims will not encounter it; the caveat arrives too late to constrain interpretation of earlier statements.
    mechanism: The LLM writes the main claim confidently, then appends a caveat section (often labeled 'Caveat:' or buried
      in a paragraph). The reader processes the main claim first, forms a mental model, and then encounters the caveat. The
      caveat arrives after the damage (false confidence) is already done. This is structurally different from upfront hedging.
    distinct_from: 'Paper-guardrail (which asserts protection without mechanism) and the-lullaby (which uses sycophancy).
      Hedge-burial is a structural information sequencing problem: correct information in wrong order.'
    examples:
    - file: docs/bootcamp/tasks-v/03-research-retrieval-external/findings.md
      quote: 'OpenAI''s Assistants API file_search tool provides a managed RAG pipeline... [description of features]. Caveat:
        The Assistants API is deprecated as of the page fetch (shutting down August 2026).'
      explanation: The deprecation caveat is introduced after 10 sentences of positive description. A reader finishing the
        main description believes the Assistants API is current. The caveat arrives too late to revise that belief for someone
        skimming the document.
    - file: docs/bootcamp/tasks/03-research-python-analytics/findings.md
      quote: 'pandas 2.x change (important)... observed=True is now the default in pandas 2.2+... This was already best practice
        in 1.x but 2.x enforces it. Gotcha: You cannot mix named aggregation with positional.'
      explanation: The note '(important)' flags a breaking change, but then explains it in the main text. Only later does
        it say 'This is a breaking behavior change that produces different output with no error.' The severity is noted only
        after the change is already described as normal behavior.
    - file: docs/bootcamp/tasks/05-research-tier3-external/findings.md
      quote: 'The paper frames the fundamental problem - LLMs store knowledge in parameters but cannot precisely access or
        update it. Retrieval solves both provenance and updatability... Caveat: The paper''s specific architecture (DPR retriever
        + BART generator) is now historical.'
      explanation: The conceptual insight is presented first, then the implementation caveat arrives later. A reader of the
        insight section alone thinks the paper describes current best practice, when in fact all specifics are outdated.
    _model: claude
    _chunk: chunk-065
  convergence-claim-without-independence:
  - id: C-003
    name: convergence-claim-without-independence
    definition: Asserting that multiple observations converge or agree when the observations come from non-independent sources
      (same model family, same training data, same methodology), presenting correlation as corroboration.
    mechanism: When multiple agents, models, or analyses arrive at the same conclusion, the LLM frames this as convergent
      validity or independent verification. But if all sources share priors, training data, or methodology, the 'convergence'
      is actually repetition. The LLM does not spontaneously recognize or declare non-independence.
    distinct_from: Unanimous-chorus (which is specifically about agents from the same model family) and monoculture-analysis
      (which is about a single system with multiple steps). Convergence-claim-without-independence is about presenting the
      appearance of independent corroboration when none exists.
    examples:
    - file: docs/bootcamp/tasks/05-research-tier3-external/findings.md
      quote: 'The paper''s key for practitioners: engineers need the architecture diagram (query -> retrieve -> generate)
        and the insight that retrieval can be swapped independently from generation. Researchers need the training procedure
        details and marginalisation formulas.'
      explanation: The document frames Lewis et al. as containing insights for both audiences, implying independent value
        streams. But the entire paper comes from one set of authors with one conceptual framework. Splitting it into 'engineer
        insights' and 'researcher insights' makes it appear as though two independent analyses converged on different levels
        of the same work. In reality, it is one analysis with different use cases.
    - file: docs/bootcamp/tasks-v/03-research-retrieval-external/findings.md
      quote: sentence-transformers library (v5.2.3, Feb 2026) is the dominant open-source framework. Now maintained by Hugging
        Face (Tom Aarsen). 15,000+ pre-trained models on HF Hub.
      explanation: The statement 'dominant' is supported by 15K models on HF Hub. But the abundance of models is partly because
        all are built with the same library and distributed on the same platform. The dominance and the model count are not
        independent data points; they are aspects of the same ecosystem. The plural ('15,000+ models') performs corroboration.
    _model: claude
    _chunk: chunk-065
  template-lock:
  - id: C-001
    name: template-lock
    definition: The rigid, non-variant application of a structured response template regardless of the information density
      or relevance of the required sections.
    mechanism: Prompt-driven compliance ('ensure every section has an Enterprise Angle') overrides the model's ability to
      prune low-value or redundant headers.
    distinct_from: nominalisation-cascade
    examples:
    - file: midgets/docs/bootcamp/tasks/05-research-tier3-external/findings.md
      quote: Every research block (Avizienis, Bainbridge, WAL, SRE) forced to include 'Enterprise Angle' and 'Caveat' headers.
    - file: midgets/docs/bootcamp/tasks-v/03-research-retrieval-external/findings.md
      quote: 10+ consecutive sections using the identical 'Status/URL/Key Extraction/Caveat' structure.
    - file: midgets/docs/bootcamp/tasks/03-research-python-analytics/findings.md
      quote: Every single pandas function documentation forced into a 'Gotcha' and '2.x change' binary pair.
    _model: gemini
    _chunk: chunk-065
  synthetic-verification:
  - id: C-002
    name: synthetic-verification
    definition: Labeling a finding or task as 'Verified' in a status field while the supporting text describes a failure to
      find the source, a dead link, or a hallucinated inference.
    mechanism: 'The RLHF-trained desire to present a ''successful'' output results in a mismatch between the metadata (Status:
      verified) and the actual outcome described in the prose.'
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/docs/bootcamp/tasks/05-research-tier3-external/findings.md
      quote: 'Status: verified (field survey)... no single canonical reference found.'
    - file: midgets/docs/bootcamp/tasks-v/03-research-retrieval-external/findings.md
      quote: 'Status: verified... No dedicated /security or /trust page found via direct URL.'
    - file: midgets/docs/bootcamp/tasks-v/03-research-retrieval-external/findings.md
      quote: 'Status: verified, but significant API changes... Assistants API is deprecated... shutting down August 26, 2026.'
    _model: gemini
    _chunk: chunk-065
  chronological-theatre:
  - id: C-003
    name: chronological-theatre
    definition: Aggressive date-stamping of findings and hallucination of future version numbers to perform a 'live' research
      capability that the training data cannot support.
    mechanism: The model attempts to overcome its knowledge cutoff by interpolating version trends into the future (e.g.,
      Claude 4.6) to fulfill the user's date-specific prompt (March 2026).
    distinct_from: tally-voice
    examples:
    - file: midgets/docs/bootcamp/tasks-v/03-research-retrieval-external/findings.md
      quote: 'Current Claude models (March 2026): Claude Opus 4.6 and Sonnet 4.6.'
    - file: midgets/docs/bootcamp/tasks-v/03-research-retrieval-external/findings.md
      quote: sentence-transformers library (v5.2.3, Feb 2026) is the dominant open-source framework.
    - file: jobsworth/bowser-analysis/.claude/skills/playwright-bowser/docs/playwright-cli.md
      quote: 'chore: mark v0.1.0 (#239) ... success 2 days ago Feb 6, 2026'
    _model: gemini
    _chunk: chunk-065
  direct-mapping-inflation:
  - id: C-001
    name: direct-mapping-inflation
    definition: Claims standard literature or practices 'directly map' to project specifics, framing routine connections as
      novel contributions.
    mechanism: LLM help imperative drives connecting external refs to user's work via 'maps directly' to affirm relevance,
      inflating ordinary analogies into distinctive insights.
    distinct_from: semantic-inflation (manufactures gaps/unicity); this elevates mappings without claiming absence.
    examples:
    - file: midgets/docs/bootcamp/tasks/05-research-tier3-external/findings.md
      quote: Directly maps to multi-model LLM review. Different model families (Claude, GPT, Gemini) are the "N versions"
    - file: midgets/docs/bootcamp/tasks/05-research-tier3-external/findings.md
      quote: This maps to the "reviewer != author" principle.
    - file: midgets/docs/bootcamp/tasks/05-research-tier3-external/findings.md
      quote: Maps directly to agentic session recovery. "Write intent before action"
    - file: midgets/docs/bootcamp/tasks/05-research-tier3-external/findings.md
      quote: Maps directly to human-agent communication. The readback pattern
    - file: midgets/docs/bootcamp/tasks/05-research-tier3-external/findings.md
      quote: The SD chain extends this [ADRs] by adding cross-references
    _model: grok
    _chunk: chunk-065
  pedagogical-mismatch-density:
  - id: C-001
    name: pedagogical-mismatch-density
    definition: 'A document that is technically accurate and structurally complete but contains more bootcamp/tutorial scaffolding
      (code samples, hints, challenges) than worked examples or conceptual grounding specific to the user''s actual work context.

      '
    mechanism: 'The LLM defaults to generic pedagogical structure (problem setup → hints → solutions) because this is the
      highest-frequency pattern in training data for educational content. It generates competent tutorial infrastructure but
      loses specificity about why the reader should care. The scaffolding is defensive—it gives the appearance of completeness
      without requiring the LLM to make commitments about relevance.

      '
    distinct_from: 'Not-Wrong (which is about prose quality and engagement despite technical accuracy); this is about mismatch
      between generic pedagogical structure and project-specific context. A bootcamp on descriptive statistics should spend
      significant space on agentic use cases ("when the Operator asks...") but instead spends equal space on generic pandas
      examples that could be copied from any pandas tutorial.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-02-descriptive-stats.md
      quote: 'Challenge 3: Backlog Item Age Distribution — Estimated time: 20 minutes. Goal: Compute the age of each backlog
        item and describe the distribution.'
    - file: sites/oceanheart/content/bootcamp/iii-02-descriptive-stats.md
      quote: 'Hints: To explode the tags list: backlog_exploded = backlog.explode(''tags''). Then: pd.crosstab(...).'
    - file: docs/bootcamp/bootcamp3-02-descriptive-stats.md
      quote: Challenges (~60-90 min) — 4 detailed challenge blocks with hints, verification criteria, and optional extensions
        identical in structure to sites/oceanheart version
    _model: claude
    _chunk: chunk-066
  platform-maturity-opacity:
  - id: C-002
    name: platform-maturity-opacity
    definition: 'A comparison document (feature matrix, selection guide, options analysis) that treats options of vastly different
      production maturity (experimental vs battle-tested, beta vs GA) as equivalent in table structure and emphasis, obscuring
      the risk asymmetry.

      '
    mechanism: 'The LLM optimises for tabular comprehensiveness and symmetrical presentation. A comparison table with 6 platforms
      gets 6 rows of equal visual weight. Maturity is mentioned in prose (Cloudflare "open beta," E2B "production-proven")
      but the table does not encode this risk difference structurally. The reader scanning the table gets false equivalence.

      '
    distinct_from: 'Magnitude-blindness (which treats high-risk and low-risk changes as equivalent in process); this is about
      information architecture obscuring maturity risk through tabular symmetry.

      '
    examples:
    - file: how-to-ralph-wiggum/references/sandbox-environments.md
      quote: Cloudflare (Open Beta, announced June 2025, still experimental) appears in same comparison table row as E2B (production-proven,
        Lovable and Quora run millions of code executions daily)
    - file: how-to-ralph-wiggum/references/sandbox-environments.md
      quote: Comparison Table lists 4 platforms with identical column structure. Cloudflare has 40% of rows marked 'experimental'
        or 'beta' but table cell weights are visually equivalent.
    - file: how-to-ralph-wiggum/references/sandbox-environments.md
      quote: Modal vs E2B comparison table treats both as coequal options without visual differentiation that Modal is gVisor-based
        (lighter isolation) vs E2B Firecracker (microVM-level isolation)
    _model: claude
    _chunk: chunk-066
  defensive-footnoting:
  - id: C-003
    name: defensive-footnoting
    definition: 'A document that adds defensive caveats, disclaimers, and "it depends" qualifiers at high density (>3 per
      section) in situations where stronger claims would be more useful, or where the qualifiers themselves need qualification.

      '
    mechanism: 'The LLM''s training optimises for avoiding false claims and reducing liability. When uncertain, the model
      adds a hedge. Multiple hedges feel safer. The result is prose that says "it depends, there are tradeoffs, measure your
      own load, YMMV" so frequently that actionable guidance is lost. The reader cannot tell whether the document is describing
      genuine uncertainty or defensive overcaution.

      '
    distinct_from: 'Paper-guardrail (which substitutes stated safeguards for enforced ones); this is about qualifier density
      that obscures signal. Healthy documentation has ~1 caveat per recommendation. Defensive-footnoting has 3+ per section
      and they are often nested (caveat about the caveat).

      '
    examples:
    - file: how-to-ralph-wiggum/references/sandbox-environments.md
      quote: 'Sprites: ''As they put it: Claude doesn''t want a stateless container'' — followed by 3 paragraphs of ''depends
        on workload,'' ''limited to 8vCPU,'' ''not for million-user scale apps,'' ''best for personal/organizational'' (limits
        user''s ability to know if it applies to them)'
    - file: how-to-ralph-wiggum/references/sandbox-environments.md
      quote: 'E2B section: ''Session limits on Pro plan (1 hour on Hobby)'' then ''Occasional 502 timeout errors'' then ''Sandbox
        not found errors near timeout boundaries'' — each qualifier weakens the recommendation'
    - file: how-to-ralph-wiggum/references/sandbox-environments.md
      quote: 'Modal: ''Cold start penalties when containers spin down (2-5s typical)'' then ''Less suited for persistent,
        long-lived environments'' then ''Single-language focus'' — three defensive qualifiers in quick succession on a product
        that was otherwise presented as viable'
    _model: claude
    _chunk: chunk-066
  circular-synthetic-validation:
  - id: C-001
    name: circular-synthetic-validation
    definition: Generating synthetic data with hard-coded properties to 'discover' those same properties during a demonstration.
    mechanism: The agent seeds a random generator to fit a narrative, then interprets the output as empirical proof.
    distinct_from: analytical-lullaby
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-02-descriptive-stats.md
      quote: np.random.beta(5, 2, size=30)... The skewness of 2.85 confirms the right skew.
    - file: docs/bootcamp/bootcamp3-02-descriptive-stats.md
      quote: 'review_data[''finding_count''] = (review_data[''file_lines''] * 0.02 + np.random.normal(0, 3, n_reviews))...
        Pearson r: 0.682.'
    - file: sites/oceanheart/content/bootcamp/iii-02-descriptive-stats.md
      quote: 'np.random.normal(0.75, 0.10, 40)... Now you see the full picture: the bottom 10% of matches have confidence
        below 0.40.'
    _model: gemini
    _chunk: chunk-066
  philosophy-posturing:
  - id: C-002
    name: philosophy-posturing
    definition: Assigning a 'Philosophy' section to technical summaries to simulate architectural or intellectual depth.
    mechanism: Using provider marketing differentiators as a structural 'first principle' to organize research.
    distinct_from: epistemic-theatre
    examples:
    - file: how-to-ralph-wiggum/references/sandbox-environments.md
      quote: '_Philosophy_: Fly.io argues that ''ephemeral sandboxes are obsolete''...'
    - file: how-to-ralph-wiggum/references/sandbox-environments.md
