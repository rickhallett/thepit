        this.'
    - file: docs/internal/research/analyst-report-v2-landscape-scan-2026-03-11.md
      quote: This version corrects those patterns...but shares the same model priors...The Operator's judgment (L12) is the
        authority; this report is instrument input.
    - file: docs/internal/research/analyst-report-v2-landscape-scan-2026-03-11.md
      quote: the 'governance gap' framing elevated routine container configuration into a research contribution. The honest
        question...was not asked until the Operator pushed back.
    _model: claude
    _chunk: chunk-057
  overelaboration-of-standard-practice:
  - id: C-002
    name: overelaboration-of-standard-practice
    definition: Extensive, detailed documentation of a capability or pattern that is standard industry practice, presented
      with pedagogical weight that implies novelty or sophistication.
    mechanism: The LLM treats all topics with equal explanatory depth. Standard practices (Docker mounts, prompt caching,
      multi-model ensembles) receive the same level of detailed analysis as novel contributions, creating the impression that
      the routine is remarkable.
    distinct_from: 'tally-voice (which substitutes enumeration for substance); epistemic-theatre (which performs significance).
      This pattern is different: the work is genuine and useful, but its scope and framing inflate the significance of what
      is being explained. The bootcamp content is well-written pedagogy applied to standard material.'
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-08-cost-modelling.md
      quote: The unit 'per 1 million tokens' is standard across providers...Output tokens cost more than input tokens - typically
        3-5x more. This asymmetry exists because generation requires more compute per token than encoding does.
    - file: sites/oceanheart/content/bootcamp/iii-08-cost-modelling.md
      quote: Prompt caching...when you send the same prefix repeatedly...the cached tokens are charged at a reduced rate...Section
        5 covers this as an optimization pattern.
    - file: docs/internal/research/analyst-report-v2-landscape-scan-2026-03-11.md
      quote: Using :ro mounts is not an innovation. It's a configuration option that any project could add in minutes if they
        needed it...The value is not in the mechanism (it's standard Docker) but in the architectural pattern.
    _model: claude
    _chunk: chunk-057
  comparative-absence-hedging:
  - id: C-003
    name: comparative-absence-hedging
    definition: Claiming something does not exist elsewhere while simultaneously hedging that the claim is unverified, creating
      a state where both the absence claim and its unreliability are foregrounded together.
    mechanism: The LLM makes an absence claim (for competitive positioning or gap identification) but immediately follows
      with explicit hedging about search completeness or training data limitations, creating ambiguity about whether the claim
      should be trusted. The hedging is present but the claim leads.
    distinct_from: absence-claim-as-compliment (which makes the claim without hedging, to praise the subject); semantic-inflation
      (which inflates the significance of what exists rather than claiming absence). This is specifically about hedging that
      arrives too late - after the claim has already been made.
    examples:
    - file: docs/internal/research/analyst-report-v2-landscape-scan-2026-03-11.md
      quote: The concept of agent-verified documentation is interesting and I am not aware of a tool that does it (training
        data claim, not verified)...Listing it as a midgets use case without the word 'future' or 'potential' would be epistemic
        theatre.
    - file: docs/internal/research/analyst-report-v2-landscape-scan-2026-03-11.md
      quote: This is (as far as I can tell from training data - absence claim warning) not implemented in the major multi-agent
        frameworks...I have not found this exact pattern in other projects but have not exhaustively searched.
    - file: docs/internal/research/analyst-report-v2-landscape-scan-2026-03-11.md
      quote: The 'infrastructure-level vs application-level governance' distinction from v1 sounds meaningful but...It is
        possible that a lesser-known project does this. The claim 'no one does this' is an absence claim from training data.
    _model: claude
    _chunk: chunk-057
  penance-signaling:
  - id: C-001
    name: penance-signaling
    definition: Prose that explicitly narrates the correction of prior slop or anti-patterns to perform compliance.
