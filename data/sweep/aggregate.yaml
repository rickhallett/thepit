    - file: midgets/sites/oceanheart/content/bootcamp/ii-01-how-llms-work.md
      quote: If your understanding of LLM internals is shallow... every subsequent step builds on sand.
    - file: midgets/sites/oceanheart/content/bootcamp/ii-01-how-llms-work.md
      quote: You cannot verify what you do not understand.
    _model: gemini
    _chunk: chunk-017
  agentic-grounding-refrain:
  - id: C-001
    name: agentic-grounding-refrain
    definition: Repetitive bolded 'AGENTIC GROUNDING' sections inserted after technical explanations to perform operational
