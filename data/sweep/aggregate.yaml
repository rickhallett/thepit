  self-referential-exemption:
  - id: C-001
    name: self-referential-exemption
    definition: 'A document identifies a pattern as a flaw, then exempts itself from the pattern by claiming the identification
      is sufficient evidence of rigour.

      '
    mechanism: 'The anti-pattern taxonomy (slopodar) becomes so comprehensive that documents can cite it as proof of their
      own awareness, without demonstrating that the awareness changed the output. A document says "we caught ourselves doing
      X" and treats the citation as evidence of not-doing-X. The self-awareness performs rigour without requiring rigorous
      revision.

      '
    distinct_from: paper-guardrail (which asserts protection without enforcement). Self-referential-exemption asserts awareness
      and treats awareness as equivalent to correction.
    examples:
