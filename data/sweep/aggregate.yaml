    _chunk: chunk-083
  performative-brevity:
  - id: C-003
    name: performative-brevity
    definition: Utilizing custom symbolic notation, pseudo-DSL, or 'Signal' blocks to convey information that would be clearer
      or more naturally expressed in prose.
    mechanism: The model adopts an 'engineered' visual style to perform the aura of high-density information exchange, even
      when the content is standard narrative research.
    distinct_from: nominalisation-cascade (which is about noun-heavy prose; this is about avoiding prose entirely through
      symbolic formatting).
