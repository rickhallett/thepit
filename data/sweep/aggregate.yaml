  prescriptive-without-enforcement:
  - id: C-001
    name: prescriptive-without-enforcement
    definition: The text specifies a requirement or best practice as if it were enforced, when the mechanism of enforcement
      is invisible or missing.
    mechanism: 'When writing instructional material, especially for agent systems, there is an implicit assumption that the
      reader will follow the guidance. But agents and humans often do not. The writer asserts the guidance as mandatory (''agents
      should,'' ''if not, it is a defect'') without clarifying: Is this checked by a test? A linter? A human review gate?
      Or is it merely recommended and violations are discovered only through post-hoc review? The prescriptive voice without
      enforcement creates false certainty.'
    distinct_from: paper-guardrail (which describes governance mechanics that exist but lack teeth). This pattern is about
      instructional text that assumes compliance without specifying how compliance is verified.
    examples:
    - file: docs/bootcamp/01-process-model.md
      quote: 'The safe bash header for scripts that agents should be generating: set -euo pipefail... If an agent generates
        a script without this header, it is a defect.'
    - file: docs/bootcamp/step02-agent-architecture.md
      quote: This step teaches the OOP API exclusively. Every example starts with fig, ax = plt.subplots(). [Later:] When
        reviewing agent-generated visualization code, the first check is whether set_xlabel(), set_ylabel(), and set_title()
        are called. If they are missing, the plot is incomplete.
    - file: sites/oceanheart/content/bootcamp/iii-06-visualisation.md
      quote: When reviewing agent-generated seaborn code, check for ax= in every call. Its absence means the plot is not composable.
        [Later:] If an agent generates a script without including fig.savefig(), the script is useless in a headless pipeline.
    _model: claude
    _chunk: chunk-045
  operational-transparency-gap:
  - id: C-002
    name: operational-transparency-gap
    definition: The text describes a correct principle or mechanism but omits how the reader will know when the principle
      is violated or how to diagnose the violation post-hoc.
    mechanism: Instructional content often explains the right way to do something and the consequences of doing it wrong,
      but does not explain how to detect the wrong behavior in a deployed system. When an agent 'forgets to close unused file
      descriptors in a pipeline,' the text explains the consequence (zombie processes, pipe deadlock) but does not provide
      a diagnostic command or metric the reader can use to detect this in production. This leaves a gap between understanding
      the principle and observing it.
    distinct_from: paper-guardrail (enforcement mechanisms). This is about diagnostic transparency - knowing you have a problem
      and how to see it, not preventing the problem.
    examples:
    - file: docs/bootcamp/01-process-model.md
      quote: If the shell forgot to close pipefd[1] in the grep child, grep would never see EOF on its stdin, because the
        write end of pipe A would still be open (in grep's process). grep would block forever waiting for more input. This
        is a real bug class.
    - file: docs/bootcamp/01-process-model.md
      quote: 'Creating a zombie for observation: [shows creation] You will see a process in state Z (zombie) or marked <defunct>.
