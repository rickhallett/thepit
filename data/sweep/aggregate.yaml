  pedagogical-abstraction-mismatch:
  - id: C-001
    name: pedagogical-abstraction-mismatch
    definition: A tool is explained as operating at one conceptual level (sockets, verification, data transformation) when
      it actually operates across multiple levels, and the mismatch is not acknowledged, causing students to misunderstand
      the tool's actual domain.
    mechanism: 'The LLM selects a unifying frame (sockets, verification, transformation) that is true in a technical sense
      but incomplete. The frame is never questioned because it is technically defensible and pedagogically convenient. A human
      teaching would either explain the layered nature explicitly or choose a different frame. The LLM optimizes for coherence
      within the chosen frame rather than accuracy across frames.

      '
    distinct_from: '"right-answer-wrong-work" (which is about testing/verification), "semantic-inflation" (which is about
      exaggerating significance). This pattern is about conceptual frameworks that technically work but exclude important
      distinctions. A student following the teaching would believe curl, openssl, dig, tcpdump, and iptables are all fundamentally
      "socket tools" when they operate at different layers.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/10-networking-cli.md
      quote: A socket fd is the bridge between the process model (Step 1) and the network. Every tool in this step is either
        creating sockets, inspecting sockets, or capturing what flows through them.
    - file: sites/oceanheart/content/bootcamp/10-networking-cli.md
      quote: '"curl creates sockets... dig queries DNS servers (UDP sockets)... tcpdump captures packets (kernel-level)...
        iptables filters packets (kernel-level)" — all grouped as socket operations despite operating at different OSI layers'
    - file: docs/bootcamp/04-text-pipeline.md
      quote: '"At the Unix level, this pattern becomes: text in, transform, text out." — frames all tools as data transformers
        when grep is search, awk is computation, sed is substitution'
    _model: claude
    _chunk: chunk-043
  decontextualised-history:
  - id: C-003
    name: decontextualised-history
    definition: A tool's historical origin is cited to add authority and resonance ('Ken Thompson wrote grep in 1974') but
      the historical context is separated from the pedagogical point, making the history decorative rather than explanatory.
    mechanism: 'The LLM includes HISTORY sections that are factually accurate and well-written but divorced from the lesson.
      The history explains why a tool exists but not why understanding that origin matters for using the tool today. A human
      teaching would either integrate the history into the lesson (e.g., "grep is slow on very large files because it was
      written for sequential text processing; use ripgrep for large codebases") or omit it. The LLM includes it as scaffolding
      — it signals rigor and depth without adding pedagogical value. The reader learns facts about Bell Labs but not better
      tool usage.

      '
    distinct_from: '"authority-scaffolding" (which cites authorities to justify claims), "nominalisation-cascade" (which uses
      formal language to obscure simplicity). This pattern is specific to historical narrative used decoratively. The history
      is not wrong; it is contextually orphaned.

      '
    examples:
    - file: docs/bootcamp/04-text-pipeline.md
      quote: 'HISTORY: Ken Thompson wrote grep in 1974. The name comes from the ed editor command `g/re/p` - ''globally search
        for a regular expression and print matching lines.'' When Thompson''s colleagues at Bell Labs asked for a standalone
        tool to search files, he extracted the regex engine from ed and built grep overnight.'
    - file: docs/bootcamp/04-text-pipeline.md
      quote: 'HISTORY: awk was created by Alfred Aho, Peter Weinberger, and Brian Kernighan at Bell Labs in 1977. The name
        is their initials. It was the first ''little language''... awk has associative arrays (hash maps), predating Perl
        and Python by over a decade.'
    - file: sites/oceanheart/content/bootcamp/10-networking-cli.md
      quote: 'HISTORY: curl was written by Daniel Stenberg starting in 1998. The name originally stood for ''see URL'' (client
        for URLs)... curl is installed on virtually every Unix system and is one of the most widely deployed pieces of software
        in existence — it runs in cars, televisions, routers, and approximately 10 billion installations worldwide.'
    _model: claude
    _chunk: chunk-043
  history-spackle:
  - id: C-001
    name: history-spackle
    definition: The insertion of modular biographical tool-history blocks as a substitute for pedagogical narrative.
    mechanism: The LLM uses biographical facts (Person X created Tool Y in Year Z) to fill space and perform depth ('lore')
      when it reaches a new section, creating a pedigree for the subject matter.
    distinct_from: authority-scaffolding (which uses citations for theory; history-spackle uses biography for importance).
    examples:
    - file: midgets/docs/bootcamp/04-text-pipeline.md
      quote: 'HISTORY: jq was created by Stephen Dolan in 2012. It brought the Unix pipeline philosophy to structured data.'
