  placeholder-inertia:
  - id: C-002
    name: placeholder-inertia
    definition: Reusing the same arbitrary numerical anchor across different explanations to maintain superficial coherence.
    mechanism: Once a number (like 85%) enters the context window, it becomes the highest probability token for subsequent
      examples.
    distinct_from: tally-voice
    examples:
