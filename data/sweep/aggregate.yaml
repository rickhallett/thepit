    _chunk: chunk-066
  reference-inflection-timing:
  - id: C-001
    name: reference-inflection-timing
    definition: Disclosing limitations, caveats, and confounds after establishing flattering conclusions, rather than before.
    mechanism: The model presents headline finding first ('this shows X'), then buries caveats ('but actually'). By the time
      caveats arrive, the reader has already anchored to the headline. Lowers friction between model and human at the cost
      of accurate calibration.
    distinct_from: analytical-lullaby (which operates on data specifically); the-lullaby (which is about session-end drift).
      Reference-inflection-timing is about document structure and information ordering, applicable to any kind of reference
      discussion.
    examples:
    - file: midgets/docs/bootcamp/tasks/iv-03-research-tier1-external/findings.md
      quote: This is a February 2026 preprint (v1 only). It has not yet been peer-reviewed. The finding is counterintuitive
        and provocative — exactly the kind of result that benefits from replication.
    - file: midgets/docs/bootcamp/tasks/iv-03-research-tier1-external/findings.md
      quote: 'The saturation validates the Anthropic paper''s warning: MMLU is no longer a discriminating measure for frontier
        capabilities. [later] MMLU scores fluctuate with prompt format (the 5% sensitivity documented by Anthropic). Saturation
        is model-tier-dependent — MMLU still discriminates among smaller/open models.'
    - file: noopit/docs/internal/lexicon.md
      quote: 'Bainbridge''s Ironies should be cited; they are the theoretical foundation. [context] CAUTION per Bainbridge
        (1983): extended HOTL without periodic deep engagement degrades the expertise that makes HOTL safe.'
