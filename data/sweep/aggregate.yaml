    mechanism: 'The LLM frames a procedure as important by appealing to values ("customer obsession," "velocity," "ambition")
      rather than showing what breaks when the procedure is skipped. The frame performs motivation without installing understanding.

      '
    distinct_from: 'epistemic-theatre (which is about performing significance in analysis) and authority-scaffolding (which
