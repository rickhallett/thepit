  agentic-grounding-boilerplate:
  - id: C-001
    name: agentic-grounding-boilerplate
    definition: Repetitive formulaic '**AGENTIC GROUNDING:**' sections inserted after tutorial content to predict generic
      agent failure modes.
    mechanism: Model fulfills 'helpful' imperative by templating agent warnings based on training data patterns, but repetition
      across sections adds no unique causal insight and dilutes instructional density.
    distinct_from: epistemic-theatre (no false candor/novelty framing), paper-guardrail (no post-rule assurance), semantic-inflation
