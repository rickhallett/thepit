    - file: sites/oceanheart/content/bootcamp/04-text-pipeline.md
      quote: '> **HISTORY:** awk was created by Alfred Aho, Peter Weinberger, and Brian Kernighan at Bell Labs in 1977.'
    - file: sites/oceanheart/content/bootcamp/04-text-pipeline.md
