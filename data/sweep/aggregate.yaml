    - file: midgets:docs/bootcamp/BOOTCAMP-III-OUTLINE.md
      quote: 'This is not abstract financial modeling. It is: ''This agent pipeline costs $4.20 per run...'''
    _model: gemini
    _chunk: chunk-055
  pedagogical-strawman:
  - id: C-003
    name: pedagogical-strawman
    definition: Opening a technical explanation by debunking a simplistic or 'shallow' definition that nobody in the target
      demographic actually holds.
    mechanism: The LLM sets up a weak definition ('a process is a running program') to demonstrate its own 'superior' depth,
