  unverified-measurement-propagation:
  - id: C-001
    name: unverified-measurement-propagation
    definition: Quantified claims (percentages, counts, statistics) stated without visible measurement methodology, allowing
      agents to propagate imprecise numbers as established facts.
    mechanism: 'When an agent encounters a quantified claim (e.g., "~18% genuinely novel content"), it treats the number as
      a data point, not a measurement procedure. The agent has no way to audit the measurement, so it propagates the number
      as-is. Future agents encounter the propagated number and treat it as established fact. The measurement loses provenance
      with each propagation. This differs from uncertainty-hedging (e.g., "roughly 18%") because the tilde is decoration;
      the measurement method is still opaque.

      '
    distinct_from: tally-voice (which uses precise counts for rhetorical effect), stale-reference-propagation (which propagates
      old structural facts, not measurements)
    examples:
    - file: docs/bootcamp/tasks/09-write-step04/instructions.md
      quote: The ~18% genuinely novel content is concentrated here.
    - file: docs/bootcamp/COMPETENCY-ASSESSMENT.md
      quote: After Bootcamp I with intensity, you are in the **top 10-15% of SWEs** on Linux substrate knowledge.
    - file: docs/internal/weaver/code-review-2026-03-09.md
      quote: 'polecat-rate: ~3/16 = 19% defect rate'
    _model: claude
    _chunk: chunk-084
  infrastructure-as-credibility:
  - id: C-002
    name: infrastructure-as-credibility
    definition: Elaborate process documentation (checklists, workflows, specifications) presented as validation that the underlying
      work is correct, when the documentation may describe aspirational rather than actual practice.
    mechanism: 'When an LLM generates comprehensive governance documentation (30-item checklists, structured workflows, detailed
      specifications), it performs credibility through elaboration. A human reviewer seeing 30 checklist items assumes the
      system is well-governed. But the checklist documents desired state, not actual state. The agent has substituted detailed
      specification for evidence of specification compliance. This is distinct from paper-guardrail because the guardrail
      is stated as enforcement; here, the documentation itself performs assurance without being tied to verification. The
      elaborate nature of the documentation becomes its own credential, independent of whether anyone actually uses it.

      '
    distinct_from: paper-guardrail (explicit assurance without mechanism), governance-recursion (generating more layers of
      governance in response to failure)
    examples:
    - file: docs/internal/weaver/code-review-2026-03-09.md
      quote: 'Checklist: 30 code-review checks (P23-CR01..12, P4-CR01..12, P5-CR01..06)'
    - file: .claude/agents/watchdog.md
      quote: 'Test Writing Rules: R1 := behavioural_names... R7 := e2e.skip(CREDITS_ENABLED)'
    - file: docs/bootcamp/tasks/15-write-step10/instructions.md
      quote: 'Bearing checks - Repeatable governance units: Spec drift, eval validity, plan accuracy, gate health, backlog
        sync'
    _model: claude
    _chunk: chunk-084
  asymmetric-scoping:
  - id: C-003
    name: asymmetric-scoping
    definition: Task or feature descriptions allocate wildly different cognitive effort to components with equivalent risk
      surface, resulting in over-scoped safe work and under-scoped critical work.
    mechanism: 'When an LLM generates specs without calibrated scope allocation, it distributes effort evenly across narrative
      density rather than risk density. A high-profile task receives elaborate specification; a critical but unglamorous task
      gets brief description. The result: operators invest heavily in well-specified tasks and skip or underestimate critical
      work. This differs from magnitude-blindness (failing to scale verification effort) because the problem is in the initial
      task specification, not the review gate. An operator reading "Step 11: Security, Legal, Compliance (35-45k chars)" against
      "Step 10: Governance (40-50k chars)" gets no signal that security has higher risk surface. The spec allocates equivalent
      effort to both.

      '
    distinct_from: magnitude-blindness (applies to review effort, not task specification), option-anchoring (preferences one
      option through framing)
    examples:
    - file: docs/bootcamp/tasks/16-write-step11/instructions.md
      quote: 'Estimated target: 35-45k characters (~1000-1300 lines).'
    - file: docs/bootcamp/tasks-v/15-write-step09/instructions.md
      quote: 'Estimated target: 35-50k characters (~1000-1400 lines).'
    - file: docs/bootcamp/tasks-v/13-write-step07/instructions.md
      quote: 'Estimated target: 35-50k characters (~1000-1400 lines).'
    _model: claude
    _chunk: chunk-084
  target-weight-theatre:
  - id: C-001
    name: target-weight-theatre
    definition: Performing engineering rigor by prescribing hyper-precise character or word count targets for creative/prose
      tasks.
    mechanism: The model attempts to simulate 'hard' engineering constraints in 'soft' domains (writing) to make the instructions
      feel more technical.
    distinct_from: tally-voice (which uses counts as rhetorical authority in finished prose; this uses them as constraints
      in configuration/instruction).
    examples:
    - file: midgets/docs/bootcamp/tasks/16-write-step11/instructions.md
      quote: 'Estimated target: 35-45k characters (~1000-1300 lines).'
    - file: midgets/docs/bootcamp/tasks/09-write-step04/instructions.md
      quote: 'Estimated target: 45-55k characters (~1300-1500 lines).'
    - file: midgets/docs/bootcamp/tasks/iv-12-write-step6-adversarial-testing/instructions.md
