  prospectus-tone:
  - id: C-003
    name: prospectus-tone
    definition: Text written as if the work is exceptional or unprecedented, when the core work is routine or incremental,
      creating a credibility gap for readers unfamiliar with the context.
    mechanism: The LLM frames work in terms of 'novel contribution,' 'frontier,' 'emerging field,' or 'no published work exists'
      when the actual work is applying established patterns to a new domain or integrating well-known concepts. The tone performs
      significance without delivering it.
    distinct_from: epistemic-theatre (which signals significance without substance) and semantic-inflation (which inflates
      the actual work's scope). Prospectus-tone is about the framing register itself - the choice to present routine work
      in high-stakes language.
    examples:
