      quote: Most SWEs know enough SQL for ORM-backed CRUD operations. Analytical SQL is different.
    _model: gemini
    _chunk: chunk-055
  bootcamp-self-reference:
  - id: C-001
    name: bootcamp-self-reference
    definition: Pedagogical content that teaches a pattern by demonstrating it, often without acknowledging the demonstration
      is an instance of the pattern itself.
    mechanism: 'The bootcamp documents are designed to teach anti-patterns (epigrammatic closure, analytical lullaby, epistemic
      theatre) by providing examples. These examples are drawn from the project''s own documents, creating a recursive loop
      where the teaching material exhibits the very patterns it critiques. This is distinct from becoming-jonah (recursive
      metacognition) because it is intentional pedagogy, not self-referential spiraling. The mechanism is: teaching requires
      examples; the most accessible examples are from your own work; this creates a situation where the teacher demonstrates
      the anti-pattern while explaining it.

      '
    distinct_from: becoming-jonah (metacognition loop), epistemic-theatre (performing rather than being)
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-08-interpreting-results.md
      quote: 'Consider: ''Our model achieves 95.2% accuracy across 10,000 evaluation samples, demonstrating strong performance
        across all tested categories.'' This sounds rigorous. But what might be hidden: The 10,000 samples are 80% easy cases
        and 20% hard cases.'
    - file: sites/oceanheart/content/bootcamp/iv-08-interpreting-results.md
      quote: '''An eval that always passes is not an eval. It is a rubber stamp.'' [Then describes] The fix: notice when an
        eval has stopped providing signal and replace it with one that discriminates.'
    - file: docs/bootcamp/tasks/04-research-tier2-external/findings.md
      quote: 'Step 7: The Human-AI Interface (FRONTIER)... This is where field coverage ends and this project''s operational
        experience begins. [Appears 4 times in the step 4-7 sections as closure sentences]'
    _model: claude
    _chunk: chunk-056
  threshold-without-stakes:
  - id: C-002
    name: threshold-without-stakes
    definition: Defining a sufficiency threshold or evaluation gate without specifying what happens when the threshold is
      crossed, making the gate functionally decorative.
    mechanism: 'Closely related to paper-guardrail but distinct: paper guardrail is a rule stated but not enforced; threshold-without-stakes
      is a numerical target stated but the consequences are unclear. A team defines "85% accuracy required" but never states
      what triggers if accuracy is 84%. Is the gate hard (no deploy)? Soft (escalate)? Does it require review? The absence
      of specified consequences makes the threshold decorative - it exists as a number but not as a decision rule. The mechanism
      is: thresholds are easier to state than consequences; model outputs often comply with stating thresholds; the reader
      assumes consequences are defined elsewhere when they are not.

      '
    distinct_from: paper-guardrail (rule without enforcement mechanism)
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-08-interpreting-results.md
      quote: 'The missing piece in every eval score is a sufficiency threshold. Sufficiency depends on: Cost of error... Error
        distribution... Fallback mechanisms... None of these factors are captured in the score.'
    - file: sites/oceanheart/content/bootcamp/iv-08-interpreting-results.md
      quote: 'The question is: How many eval samples do you need for useful precision? [Provides table] For practical eval
        design: **Screening** (worth investigating?): 50-100 samples... **Comparison** (A better than B?): 200-500 samples...
        **Deployment**: 500-2000 samples. Worst-case CI bound must meet your sufficiency threshold.'
    - file: sites/oceanheart/content/bootcamp/iv-08-interpreting-results.md
      quote: 2. What score would make you NOT deploy? If no one can answer, the eval has no sufficiency threshold. [This question
        implies the threshold is often stated but the action is not specified.]
    _model: claude
    _chunk: chunk-056
  caveat-burial:
  - id: C-003
    name: caveat-burial
    definition: Stating important limitations or caveats in a subordinate clause, parenthetical, or section-end placement
      where their prominence is minimized relative to the headline claim.
    mechanism: 'A specific implementation of the analytical lullaby pattern but narrower in scope. The mechanism is structural:
      by placing a caveat after a main clause, or in a footnote, or in a "Limitations" section at document end, the caveat''s
      weight is reduced even if it invalidates or severely qualifies the headline. This differs from analytical-lullaby which
      is about the entire framing; caveat-burial is about the specific textual placement strategy. The reader processes main
      clauses before subordinate clauses and headline before footnotes, so caveat placement determines impact more than caveat
      content.

      '
    distinct_from: analytical-lullaby (lullaby in data form, broader framing issue)
    examples:
    - file: docs/bootcamp/tasks/04-research-tier2-external/findings.md
      quote: '**Field vs Novel:** The working set concept is established CS theory (1968)... [Full paragraph of context].
        **This project adds:** The structural isomorphism... This is a novel analogical mapping - no published work applies
        Denning''s working set theory to LLM context windows. [Then later] **Caveat:** The original paper is behind ACM paywall...
        the Wikipedia article... notes the terminology may be considered dated in modern OS discourse.'
    - file: docs/bootcamp/tasks/04-research-tier2-external/findings.md
      quote: 'The analogy is structurally exact: too little context = thrashing (pattern-matching from training data); too
        much context = resource waste and signal degradation. [Then buried below headline] **Caveat:** The original 1982 paper
        is behind Oxford Academic paywall.'
    - file: sites/oceanheart/content/bootcamp/iv-08-interpreting-results.md
      quote: '''Our model achieves 95.2% accuracy across 10,000 evaluation samples, demonstrating strong performance across
        all tested categories.'' This sounds rigorous. But what might be hidden: [Caveats follow in explanation]. The lullaby
        pattern: present the biggest number first, bury caveats in a footnote, use language that frames results as ''demonstrating''
        rather than ''suggesting.'''
    _model: claude
    _chunk: chunk-056
  - id: C-001
    name: caveat-burial
    definition: A limiting caveat about methodology or data quality is disclosed clearly at the outset, but the analysis that
      follows treats findings as if the limitation does not apply, requiring readers to mentally carry forward the caveat
      through dozens of pages of detailed findings.
    mechanism: 'The LLM discloses a significant limitation in a methodology section (''I did not read full PDFs,'' ''training
      data recall,'' ''no code search''). The caveat is technically present and technically honest. But subsequent sections
      present findings from that limited methodology without continuously re-flagging the limitation. The caveat is true but
      decays from salience as it recedes in the document. For example: "I did not read full paper bodies" (stated once, early),
      then five sections later "The paper shows X" (relying on training data without re-emphasizing the caveat).

      '
    distinct_from: '**paper-guardrail**: Guardrails are stated assurances that a problem will be prevented. Caveat-burial
      is stating a limitation and then proceeding as if it doesn''t apply. A guardrail says ''this will not happen''; caveat-burial
      says ''this might happen and I''m telling you'' then treats it as if it didn''t.

      **analytical-lullaby**: Lullaby is warm data presented without caveats. Caveat-burial is caveats presented without continuous
      warm data reinforcement. The mechanisms are opposite (omit caveats vs. emit caveats that decay).

      '
    examples:
    - file: docs/internal/research/architect-report-llm-gui-behavior-technical-2026-03-11.md
      quote: I did not read the full PDFs of any paper. I read abstracts, project pages, and documentation... I will flag
        where I am recalling from training data versus where I verified via web fetch.
    - file: docs/internal/research/architect-report-llm-gui-behavior-technical-2026-03-11.md
      quote: 'OSWorld''s qualitative analysis categorizes errors into: - **GUI grounding errors** - the agent cannot locate
        or identify the correct UI element - **Operational knowledge gaps** - the agent does not know the steps to accomplish
        a task in a specific application - **Planning failures** - the agent takes a wrong sequence of actions. I recall these
        being the three primary categories, but I cannot verify the exact taxonomy or proportions without reading the paper.'
    - file: docs/internal/research/architect-report-llm-gui-behavior-technical-2026-03-11.md
      quote: 'From training data recall: WebArena''s analysis discusses agents failing due to: - Incorrect element selection
        - Failing to complete multi-step sequences - Getting stuck in loops (repeating the same action) - Navigation errors
        (going to the wrong page). I recall the paper noting that many failures were early in the action sequence... but this
        is a recalled impression, not a verified citation.'
    _model: claude
    _chunk: chunk-062
  boundary-mantra:
