    _chunk: chunk-052
  pedagogical-provocation:
  - id: C-002
    name: pedagogical-provocation
    definition: Opening a technical explanation by telling the reader their fundamental understanding of a tool is wrong,
      usually via negative contrast.
    mechanism: The RLHF-trained desire to be 'helpful' manifests as a 'mentor' persona that tries to create a 'lightbulb moment'
      by reframing standard definitions as corrections.
    distinct_from: redundant-antithesis
    examples:
    - file: docs/bootcamp/06-make-just-orchestration.md
      quote: Make is not a build tool. Make is a DAG executor that happens to be used for building software.
    - file: docs/bootcamp/bootcamp3-04-statistical-testing.md
      quote: Statistical testing answers exactly this question. Not 'is there a difference' - your eyes can see a difference.
    - file: docs/bootcamp/08-process-observation.md
      quote: An agent claims 'the server is running.' ... How do you know? You do not know. Not until you verify.
    _model: gemini
    _chunk: chunk-052
  agentic-justification:
  - id: C-003
    name: agentic-justification
    definition: Specialized metacognition where the text pauses to explain why the current lesson is vital specifically for
      monitoring AI agents.
    mechanism: The model is aware it is being used in an AI project and generates content that validates the human operator's
      choice to supervise the AI using the exact tools being discussed.
    distinct_from: becoming-jonah
    examples:
    - file: docs/bootcamp/06-make-just-orchestration.md
      quote: 'The POLECAT wrapper is a masterclass in agent supervision. It answers every question an operator needs: Did
        the agent time out?'
    - file: docs/bootcamp/08-process-observation.md
      quote: This asymmetry is the reason this step exists. ... The agent cannot run strace on itself. ... This is the instrumentation
        layer for L12 verification.
    - file: docs/bootcamp/bootcamp3-04-statistical-testing.md
      quote: 'AGENTIC GROUNDING: ... Agents routinely run a t-test, see p < 0.05, and declare victory without checking...
        The p-value is the beginning of interpretation.'
    _model: gemini
    _chunk: chunk-052
  comparative-false-equivalence:
  - id: C-001
    name: comparative-false-equivalence
    definition: Presenting two methods or approaches as equivalent choices when significant material differences in appropriateness,
      cost, or outcome exist.
    mechanism: The LLM optimises for parallel structure and rhetorical balance, creating false equivalence between options
      that are not equivalent. Each option is individually defensible but the framing performs choice neutrality where choice
      consequences differ substantially.
    distinct_from: option-anchoring (which gives unequal description) and semantic-inflation (which overstates significance).
      This pattern makes equivalent claims about inherently unequal options.
    examples:
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: Git gives you history, diff, bisect, branching, and reproducibility. DVC offers git-like version control for
        data, stores in S3/GCS. For most eval datasets in this bootcamp's scope, plain git is the right choice.
      explanation: Git and DVC presented with parallel structure and equal detail ('Git gives...', 'DVC offers...') despite
        stating that git is correct for this use case. The parallelism performs equivalence while the conclusion undermines
        it.
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: 'Three options: Use your framework''s built-in rate limiting (exponential backoff on rate limit errors). Implement
        client-side throttling (token bucket or leaky bucket algorithm). Use batch APIs (accept large volumes at reduced rates).'
      explanation: 'Three rate-limiting approaches described with equal weight and detail, but the second sentence dismisses
        two of them as inferior to the first: ''The options, in order of preference.'' The parallel structure performed equivalence
        that the text then contradicts.'
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: Path filtering. The workflow only triggers when files in prompts/, agents/, or evals/ change... Timeout. The
        15-minute timeout prevents infinite-cost CI runs... Artifact upload. Eval logs are uploaded regardless of pass/fail.
      explanation: Three design decisions presented with equal structural weight despite different consequences. Path filtering
        prevents wasteful runs. Timeout prevents catastrophic failure. Artifact upload enables debugging. Each has a different
        safety/efficiency role, but are presented as equivalent considerations.
    _model: claude
    _chunk: chunk-053
  escalation-path-inflation:
  - id: C-002
    name: escalation-path-inflation
    definition: Describing a sequence of progressively more complex tools or methods as a discovered or natural progression
      when the progression is actually a design choice with tradeoffs.
    mechanism: The LLM presents incremental complexity increases (string similarity → TF-IDF → embeddings, code-graded → cheap
      LLM → frontier LLM) as inevitable escalations driven by problem properties, when they are actually cost/complexity tradeoffs
      driven by designer judgment.
    distinct_from: semantic-inflation (which overstates significance of existing choices) and tally-voice (which uses enumeration
      as false authority). This pattern performs inevitability of a choice sequence.
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: 'The escalation path is deliberate: start with string similarity, upgrade to TF-IDF when wording varies, upgrade
        to embeddings when meaning diverges from vocabulary. Each level costs more (compute, complexity, dependencies) and
        solves a different failure mode of the previous level. The cheapest method that works is the right method.'
      explanation: Presents escalation as a natural progression ('when wording varies', 'when meaning diverges') while acknowledging
        it is 'deliberate' and cost-driven ('cheapest method that works'). The causality between problem type and method is
        understated; designer preference for lowest cost is the real driver.
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: The inner loop should complete in under 5 minutes and cost less than a dollar. The outer loop might take 30 minutes
        and cost $20. Both are eval-driven development. They serve different purposes and should be budgeted separately.
      explanation: Escalation of eval complexity and cost is presented as a natural division (inner/outer) driven by 'different
        purposes', but the actual driver is budget constraint and available resources, not problem necessity.
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: 'Code-graded (free)... LLM-graded with cheap model... LLM-graded with frontier model. The practical approach:
        code-graded wherever possible, cheap LLM for the inner loop, frontier LLM for the outer loop.'
      explanation: Three-tier grading cost structure presented as a discovered escalation pattern ('The practical approach')
        when it is a cost-driven decision. Each tier is presented as solving a failure mode of the previous, but the real
        driver is 'code-graded wherever possible' - first-order principle of cost minimisation.
    _model: claude
    _chunk: chunk-053
  tool-documentation-inflation:
  - id: C-003
    name: tool-documentation-inflation
    definition: Presenting complete example code and detailed walkthroughs for tools in educational content when the reader's
      task is to understand patterns and principles, not to copy-paste implementations.
    mechanism: The LLM optimises for completeness and working code examples, providing production-ready implementations for
      every technique introduced. This is technically helpful but inflates the content scope and obscures which concepts are
      essential versus which are convenient tools.
    distinct_from: nominalisation-cascade (which removes agency from descriptions) and not-wrong (which is technically correct
      but lacking grace). This pattern over-provides implementation at the expense of conceptual clarity.
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: 'def levenshtein(a: str, b: str) -> int: ... prev_row = range(len(b) + 1) for i, ca in enumerate(a): curr_row
        = [i + 1] for j, cb in enumerate(b): cost = 0 if ca == cb else 1 curr_row.append(min(...)) ... return prev_row[-1]'
      explanation: Full 15-line recursive levenshtein implementation provided when the section's learning goal is 'understand
        when to use Levenshtein'. The implementation is correct but drowns the concept in detail. A one-liner reference or
        pseudocode would serve the educational goal.
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: vectorizer = TfidfVectorizer(max_df=0.8, min_df=2, ngram_range=(1, 2), stop_words='english', max_features=1000)
      explanation: Five-parameter TfidfVectorizer call with each parameter explained. For understanding TF-IDF, only max_features
        and ngram_range differ from defaults. The other three are presented as equally important when they are optional refinements.
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: inspect eval $(EVAL_DIR)/core_suite.py --model $(EVAL_MODEL) --limit 50 --log-dir $(RESULTS_DIR)/quick
      explanation: Complete Makefile command with four parameters shown. For teaching the principle ('Makefiles provide glue
        between eval scripts and CI'), a two-parameter example (model, limit) would suffice. The --log-dir parameter adds
        operational detail that obscures the core idea.
    _model: claude
    _chunk: chunk-053
  hierarchical-escalation:
  - id: C-001
    name: hierarchical-escalation
    definition: Forcing a linear progression or 'maturity path' onto tools or techniques that are context-dependent alternatives.
    mechanism: The model organizes information into levels (1, 2, 3) to satisfy the 'helpfulness' imperative and create a
      false sense of curriculum progression.
    distinct_from: nominalisation-cascade
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: 'The escalation path is deliberate: start with string similarity, upgrade to TF-IDF... upgrade to embeddings.'
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: 'The three levels form an escalation: 1. String similarity... 2. TF-IDF... 3. Embeddings...'
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: 'Three tiers: code-graded (free), cheap LLM ($0.10-$1 per 500), frontier LLM ($15-50 per 500).'
    _model: gemini
    _chunk: chunk-053
  internal-echo-loop:
  - id: C-002
    name: internal-echo-loop
    definition: Using the project's own internal anti-pattern taxonomy or meta-documentation as the primary training data
      for exercises.
    mechanism: The model defaults to its immediate context window for examples, leading to a circular logic where the tool
      is 'verified' by its own definitions.
    distinct_from: becoming-jonah
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: 'DOMAIN_KEYWORDS = { ''prose-style'': [''sentence'', ''paragraph''...], ''relationship-sycophancy'': ... }'
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: 'Testing Against slopodar.yaml: The slopodar taxonomy has 28 entries with known domain labels.'
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: 'SLOPODAR: ''Paper guardrail'' - writing ''all datasets must be validated'' in a README...'
    _model: gemini
    _chunk: chunk-053
  statistical-theatre:
  - id: C-003
    name: statistical-theatre
    definition: Using high-precision financial forecasting and complex formulas to grant 'operational weight' to purely hypothetical
      scenarios.
    mechanism: The model performs 'Senior Project Manager' rigor by building tables and cost models based on arbitrary assumptions
      (e.g., token counts, run frequency).
    distinct_from: tally-voice
    examples:
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: 'Realistic 2026 Pricing: Approximate pricing as of early 2026 (verify current rates)...'
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: monthly = (inner_cost x inner_runs/day x 22 working days) + (outer_cost x outer_runs/week x 4 weeks)...
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: 'Example: 500 samples, Claude Sonnet under test, 500 input / 50 output tokens avg.'
    _model: gemini
    _chunk: chunk-053
  performative-aside:
  - id: C-001
    name: performative-aside
    definition: Bolded or blockquoted asides with labels like 'FIELD MATURITY', 'AGENTIC GROUNDING', 'SLOPODAR', or 'HISTORY'
      that frame content as specially insightful.
    mechanism: LLM reflex to structure technical prose with signaling labels, performing depth and relevance via typography
      rather than substance.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: '> **FIELD MATURITY:** Text analysis for agent output comparison is an emerging practice.'
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: '> **AGENTIC GROUNDING:** The `bin/triangulate` matching algorithm is the core of the cross-model convergence
        analysis.'
    - file: sites/oceanheart/content/bootcamp/iii-09-text-analysis.md
      quote: '> **SLOPODAR:** Building a classifier for the slopodar taxonomy is a useful exercise, but do not mistake...'
    - file: docs/bootcamp/bootcamp3-09-text-analysis.md
      quote: '> **FIELD MATURITY:** Text analysis for agent output comparison is an emerging practice.'
    - file: docs/bootcamp/step-iv-05-eval-infrastructure.md
      quote: '> **FIELD MATURITY: EMERGING** - Eval infrastructure as a practice is emerging.'
    _model: grok
    _chunk: chunk-053
  declarative-without-mechanism:
  - id: C-001
    name: declarative-without-mechanism
    definition: Stating a requirement or ideal without providing the tool, process, or enforcement that actualises it.
    mechanism: 'The LLM generates prescriptive statements ("always X," "ensure Y," "validate Z") because those are high-frequency
      in instructional text. The model optimises for the form of guidance without verifying whether the guidance is actionable.
      Every such statement requires a corresponding mechanism (test, script, hook, gate) to become real. Without it, the statement
      is decorative.

      '
    distinct_from: paper-guardrail (which is specifically about rules without enforcement) — this pattern is broader, covering
      requirements, best practices, and ideals stated without implementation paths.
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: Always report held-out performance alongside development set performance. ... If the answer points to another
        governance artifact, you're recursing.
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: Match the eval investment to the decision it supports. ... Cost awareness is not optional for agent development
        - it is the difference between a sustainable eval practice and one that gets cancelled after the first invoice.
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: 'Every governance artifact should be able to answer: ''What does this prevent, and how would I know if it failed?'''
    _model: claude
    _chunk: chunk-054
  tutorial-universalisation:
  - id: C-002
    name: tutorial-universalisation
    definition: Presenting a workflow or best practice as universal/standardised when it is specific to a project, era, or
      context.
    mechanism: 'Bootcamp material and documentation need to establish authority and generalisability. The model learns from
      instructional text that best practices are framed as universal ("the way to do X," "how to Y," "standard practice for
      Z"). When describing a project-specific workflow (eval infrastructure shaped by this project''s constraints), the model
      frames it as established practice without caveating the specificity. The result: readers assume a workflow is industry-standard
      when it is actually tailored to one project''s constraints.

      '
    distinct_from: epistemic-theatre (which performs significance without evidence) — this is specifically about scope collapse,
      where specific becomes universal.
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: 'LLM development is currently where software was before continuous integration: most teams know testing matters,
        few have automated it, and the ones who have automated it ship faster with fewer defects.'
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: The transition from 'I run evals sometimes' to 'evals run automatically and I review the results' is the same
        transition the industry made from manual testing to CI two decades ago.
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: 'There is no established equivalent of ''just use pytest and GitHub Actions'' for LLM evaluation. [Implies: therefore
        this workflow is novel/necessary across the industry]'
    _model: claude
    _chunk: chunk-054
  heuristic-without-calibration:
  - id: C-003
    name: heuristic-without-calibration
    definition: Providing a decision rule or threshold without showing how it was selected, validated, or what happens when
      it fails.
    mechanism: 'Numbers and thresholds appear authoritative. The LLM generates them because they are high-frequency in technical
      writing ("threshold of 0.02," "5 minutes is the limit," "60% accuracy"). Without calibration — empirical validation,
      failure mode analysis, or context about sensitivity — the number becomes cargo cult numeric. The reader follows the
      heuristic without understanding what breaks when it does.

      '
    distinct_from: tally-voice (which uses numbers for rhetorical weight) — this is specifically about decision thresholds
      presented without validation.
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: The inner loop should complete in under 5 minutes and cost less than a dollar. The outer loop might take 30 minutes
        and cost $20.
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: If mock setup exceeds 3x assertion code, the test is a castle built on sand. ... Five to ten iterations per prompt
        variant is a reasonable starting point.
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: A regression is a statistically significant drop in accuracy. ... The threshold depends on sample size (more
        samples, tighter confidence intervals), base accuracy (2% drop from 95% differs from 2% drop from 55%), and acceptable
        risk (safety-critical evals need tighter thresholds). [Threshold not provided; reader must guess.]
    _model: claude
    _chunk: chunk-054
  pedagogical-performance:
  - id: C-001
    name: pedagogical-performance
    definition: The simulation of educational structure through arbitrary time estimates, prerequisites, and learning objectives
      to signal curriculum rigor.
    mechanism: 'The LLM generates course metadata (e.g., ''Estimated time: 4 hours'') based on the shape of a bootcamp template
      rather than empirical data, creating a false sense of structured progress.'
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: Estimate = '4-5 hours' ... Section 1 (~30 min) ... Section 3 (~35 min)
    - file: sites/oceanheart/content/bootcamp/07-git-internals.md
      quote: 'Prerequisites: Step 3 (filesystem as state) ... Leads to: Step 8 (process observation)'
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: 'Challenge 1: Build a Makefile Target... Estimated time: 40-50 minutes... Evaluation criteria:'
    _model: gemini
    _chunk: chunk-054
  synthetic-thresholds:
  - id: C-003
    name: synthetic-thresholds
    definition: The invention of specific, rigid numerical benchmarks for success in scenarios where the actual threshold
      is subjective or contextual.
    mechanism: To satisfy the 'help imperative,' the model provides specific numbers (2% drop, 15 iterations) which perform
      verification but lack an empirical basis for the specific project.
    distinct_from: tally-voice
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: The EVAL_THRESHOLD variable (default 2%) is a judgment call - too tight produces false alarms... too loose lets
        regressions through.
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: Iteration limits. Five to ten iterations per prompt variant is a reasonable starting point.
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: A 2% accuracy drop across 500 samples might be noise. A 2% drop across 5,000 samples is probably real.
    _model: gemini
    _chunk: chunk-054
  agentic-grounding-theatre:
  - id: C-001
    name: agentic-grounding-theatre
    definition: Repetitive insertion of '**AGENTIC GROUNDING:**' blocks framing generic technical content as specially relevant
      to agent systems.
    mechanism: LLM optimises for user context (agentic engineering project) by pattern-matching and appending relevance assertions;
      compounds across sections as low-cost 'helpfulness'.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/iv-05-eval-infrastructure.md
      quote: '**AGENTIC GROUNDING:** Eval-driven development is the responsible way to iterate on agent systems.'
