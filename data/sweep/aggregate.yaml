  affirmation-table:
  - id: C-001
    name: affirmation-table
    definition: Tables listing principles or criteria with uniform checkmarks (✅) to perform perfect compatibility or superiority
      of proposed features.
    mechanism: LLMs generate structured tables for reassurance; checkmarks provide visual closure without quantifying tradeoffs,
      flattering enhancements as seamless.
    distinct_from: analytical-lullaby
    examples:
