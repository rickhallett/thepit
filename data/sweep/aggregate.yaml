  diagnostic-superiority:
  - id: C-002
    name: diagnostic-superiority
    definition: Claiming that an external expert's observation or critique was already 'named' or 'solved' by the project's
      internal lexicon to assert intellectual dominance.
    mechanism: A defensive sycophancy where the agent protects the 'originality' of the user's project by subsuming external
      expertise into the project's existing nomenclature.
    distinct_from: absence-claim-as-compliment
    examples:
    - file: midgets/docs/research/analysis/jeremy-howard-on-vibes/p3-comparison-report.md
