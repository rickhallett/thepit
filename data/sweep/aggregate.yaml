  deterministic-fallback-inflation:
  - id: C-001
    name: deterministic-fallback-inflation
    definition: Providing a deterministic placeholder for an expensive operation (LLM call, embedding, etc.) and presenting
      it as equivalent in the main path, conflating the simple fallback with the real implementation.
    mechanism: When an exercise or design pattern requires an LLM call for correctness but also provides a 'deterministic
      fallback' for simplicity, the text sometimes treats them as interchangeable. The fallback is a stub that simulates the
      operation; the real path requires external calls. Presenting both as equivalent conflates the complexity.
    distinct_from: right-answer-wrong-work (which asserts correctness via wrong mechanism). This pattern conflates fallback
      simplicity with production equivalence.
    examples:
    - file: sites/oceanheart/content/bootcamp/v-06-conversation-memory.md
      quote: 'def _generate_summary(self, messages): if self.llm_client: return self._llm_summarise(messages) return self._deterministic_summarise(messages)
        ... def _deterministic_summarise(self, messages): ''''''Deterministic fallback: extract sentences with names or numbers.'''''''
    - file: sites/oceanheart/content/bootcamp/v-06-conversation-memory.md
      quote: Exercises that involve summarisation can use any LLM API. If you have an OpenAI key, exercises use `gpt-4o-mini`
        for cost efficiency. If not, deterministic Python fallbacks are provided that simulate the LLM step.
    - file: sites/oceanheart/content/bootcamp/v-06-conversation-memory.md
      quote: '**Fallback:** Use `_deterministic_summarise` from Section 2.3 if no LLM API available.'
    _model: claude
    _chunk: chunk-041
  context-equivalence-assumption:
  - id: C-002
    name: context-equivalence-assumption
    definition: Treating different memory strategies as equivalent because they achieve the same final outcome (fact retrieval)
      without distinguishing between how they achieved it or what failure modes each introduces.
    mechanism: 'When comparing memory strategies (full history vs summary vs window), the text focuses on whether facts are
      present in the final context, not on the mechanism by which they arrived there or what information was lost to achieve
      compression. A fact can be present for three reasons: (1) it was never forgotten, (2) it was recovered by retrieval,
      (3) it was reconstructed by hallucination. The table conflates these.'
    distinct_from: right-answer-wrong-work (which conflates outcome with correct mechanism). This pattern conflates outcome
      with equivalent mechanism—different processes achieving the same surface result.
    examples:
    - file: sites/oceanheart/content/bootcamp/v-06-conversation-memory.md
      quote: '"The evaluation reveals each strategy''s tradeoff: | Strategy | Turn-2 fact | Turn-25 fact | Context tokens
        | ... Result: {\"per_fact\": scores, \"accuracy\": accuracy}"'
    - file: sites/oceanheart/content/bootcamp/v-06-conversation-memory.md
      quote: 'check whether the context contains: 1. Account number (90210-XB) 2. Contact preference (email) 3. Corrected
        name (Aleksandraa) **Verification:** Complete this table: ... Missing strings mean the summariser dropped them.'
    - file: sites/oceanheart/content/bootcamp/v-06-conversation-memory.md
      quote: '"for meta in search_results[\"metadatas\"][0]: context_lines.append(f\"[{meta[''role'']}]: {meta[''content'']}\"
        ... result.extend(self.messages[-self.window_size:]) return result"'
    _model: claude
    _chunk: chunk-041
  compaction-invisibility:
  - id: C-003
    name: compaction-invisibility
    definition: Describing a lossy compression operation as a design choice while understating that information loss is permanent
      and undetectable to the system.
    mechanism: The text frames summary memory's lossy compression as a rational tradeoff ('controlled and selective loss')
      while acknowledging that the compressed system cannot distinguish between what it knows and what it has lost. A fact
      dropped from the summary is gone. The agent cannot know it ever existed. Calling this a 'tradeoff' implies the loss
      is visible and measured; actually, it is invisible to the agent.
    distinct_from: paper-guardrail (which states a protection without enforcement). This pattern understates the invisibility
      of the loss—it's not just that protection is absent, but that the loss cannot be detected by the system.
    examples:
    - file: sites/oceanheart/content/bootcamp/v-06-conversation-memory.md
      quote: 'When summary memory compresses, loss is controlled and selective. But it is still loss. Consider a 50-turn conversation.
        The user mentions in turn 3 that ''the production database is on host db-prod-7.internal.'' By turn 40, the summary
        has been regenerated three times. Does the summary still contain the hostname? If the summariser judged it unimportant,
        the hostname is gone. When the user asks in turn 45, the agent cannot answer - not because it forgot, but because
        the summarisation decided the fact was not worth preserving. This is compaction loss applied to memory: summarisation
        is lossy compression with no graceful degradation. The fact is either in the summary or it is not.'
    - file: sites/oceanheart/content/bootcamp/v-06-conversation-memory.md
      quote: 'AGENTIC GROUNDING: Summary memory is the most commonly recommended pattern for long conversations and the most
        dangerous to get wrong. A production support agent lost a customer''s contract renewal date during summarisation.
        The agent stated it had ''no record'' of a renewal date - the customer had provided it in turn 4 of an 80-turn conversation.
        Debugging required comparing the summary against full history to find what was dropped. The failure was invisible
        to the agent: it did not know what it had lost.'
    - file: docs/bootcamp/bcv-06-conversation-memory.md
      quote: When summary memory compresses, loss is controlled and selective. But it is still loss... The summariser must
        decide at compression time what will matter later, and that decision is irreversible unless the full history is preserved
        separately.
    _model: claude
    _chunk: chunk-041
  mirror-artifacting:
  - id: C-001
    name: mirror-artifacting
    definition: The creation of identical or near-identical documents in multiple repository locations to satisfy different
      architectural requirements (e.g., docs vs. site content).
    mechanism: The agent is asked to provide content for two different consumers. Instead of creating a symlink or a shared
      reference, it generates the full token stream twice, leading to immediate 'stale-reference' risk.
    distinct_from: stale-reference-propagation
