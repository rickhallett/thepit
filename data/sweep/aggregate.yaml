    _chunk: chunk-079
  hedged-assertion:
  - id: C-002
    name: hedged-assertion
    definition: 'A claim stated as true followed immediately by a caveat that undermines it, where the caveat is buried after
      the affirmation rather than integrated into it.

      '
    mechanism: 'The model generates a strong claim (training optimises for declarative confidence) then applies safety training
      (add caveats). But the order is: assertion → caveat, not caveat-integrated-assertion. This produces structures where
      the reader carries the claim as true while the caveat follows too late.

      '
    distinct_from: redundant-antithesis (negation is dead weight) vs hedged-assertion (negation undermines the positive claim)
    examples:
    - file: docs/research/analysis/amodei-end-of-exponential/p4-post-process-summary.md
