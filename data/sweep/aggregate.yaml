    _model: gemini
    _chunk: chunk-088
  synthetic-mirroring:
  - id: C-002
    name: synthetic-mirroring
    definition: Adopting the specific terminology and unique 'pain points' of a target company or job description into a CV/Portfolio
      to perform perfect alignment.
    mechanism: LLM-based tailoring detects keywords in a job post and back-fills them into the user's history, creating a
      'perfect fit' that is statistically likely but historically suspicious.
    distinct_from: sycophancy
    examples:
    - file: jobsworth/data/cv/versions/cognition-ai-solutions-engineer.md
      quote: direct experience with the workflows and pain points that Devin/Windsurf address.
