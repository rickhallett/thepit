  signal-as-pseudo-prose:
  - id: C-001
    name: signal-as-pseudo-prose
    definition: Using a custom notation system (Signal) as a substitute for plain language explanation, obscuring rather than
      clarifying intent through compression and symbolic density.
    mechanism: 'Signal notation achieves high compression ratios (claimed 4.5:1) by replacing natural language with symbolic
      assertions and operators. Each symbol is individually understandable, but the notation''s density creates two problems:
      (1) it performs clarity through structure rather than achieving clarity through explanation, and (2) downstream agents
      decode the notation correctly but lose the reasoning that produced it. The notation becomes a cargo cult of precision—technically
      portable but semantically hollow. Worse, it invites the same LLM to encode its own output in the same notation, creating
      a closed loop where meaning is traded for compression.

      '
    distinct_from: 'domain-specific-language (legitimate technical jargon serves a field; Signal serves primarily to compress
      a single operator''s intentions); nominalisation-cascade (both remove human agency, but Signal is intentionally abstract
      where nominalisation is accidentally so)

      '
    examples:
    - file: docs/internal/strategy/signal/plank-4-signal.md
      quote: position := { calibration_run.active | cross_model(gemini -> 5_misframings_caught), signal_protocol(4.5:1, 6/6_decode,
        model_portable), framing_corrections.committed(engineering !research, sycophantic_drift !hallucination, !prompt_engineering)
        }
    - file: docs/decisions/SD-318-darkcat-alley.md
      quote: SEQUENCE := plan -> makefile -> governance_unit -> workflow_vgrep -> dispatch(bouts)
    - file: docs/examples/echo-signal-protocol-bearing-check.md
      quote: ORDER := update(PLAN.md) -> modularise(Makefile) -> bouts / ALSO := codify(drift_review) -> repeatable_governance_unit
        / SEQUENCE := plan -> makefile -> governance_unit -> workflow_vgrep -> dispatch(bouts)
    _model: claude
    _chunk: chunk-088
  metric-performance-without-baseline:
  - id: C-002
    name: metric-performance-without-baseline
    definition: Presenting quantitative results (compression ratios, decode rates, question accuracy) without disclosed baselines,
      comparison groups, or prior art, making it impossible to assess whether the metric is good.
    mechanism: 'LLMs are trained to produce quantitative summaries of complex work. Numbers feel authoritative and concrete.
      But without context, metrics perform achievement rather than demonstrate it. "Signal compresses at 4.5:1 and was decoded
      correctly by models that had never seen it. 6/6 decode, 8/8 questions answered correctly." These numbers cannot be evaluated
      without knowing: (1) What baseline? (2) How many test cases total? (3) What would random guessing achieve? (4) How do
      these compare to plain English compression/clarity? The mechanism is the help imperative: the model wants to communicate
      success, so it provides the most flattering interpretation of the data. No deliberate dishonesty, but the omission is
      systematic.

      '
    distinct_from: 'analytical-lullaby (both present data favorably, but metric-performance lacks even the caveats that analytical-lullaby
      eventually discloses); tally-voice (both use numbers, but tally-voice uses counts to sound authoritative, metric-performance
      uses rates/percentages)

      '
    examples:
    - file: docs/decisions/epic-map.md
      quote: 'Lead with data (SD-314): 4.5:1 compression, 6/6 decode, 8/8 questions'
    - file: docs/examples/echo-signal-protocol-bearing-check.md
      quote: Signal notation removes the ambiguity that natural language allows. / The expansion is where misunderstanding
        would hide — and the echo makes it visible before work begins.
    - file: docs/internal/strategy/archive-v1-lullaby/plank-1-the-one-page-story.md
      quote: Signal compresses at 4.5:1 and was decoded correctly by models that had never seen it.
    _model: claude
    _chunk: chunk-088
  task-artifact-inflation:
  - id: C-003
    name: task-artifact-inflation
    definition: Bootcamp task definition documents that specify detailed quality gates, output formats, and verification criteria
      in a way that treats the act of writing the specification as equivalent to having completed the work.
    mechanism: 'Bootcamp tasks (e.g., Task 13: Write - Step 8: Cost Modeling) are meta-documents that specify what another
      agent should write. They include prime context, content specification, writing requirements, voice guidance, and a quality
      gate section. The quality gate section is comprehensive: "Pricing must be clearly labeled as illustrative, not current
      / The marginal value/cost connection must be explicit / Budget forecasting must show at least one scenario model." These
      gates are correct and would make the deliverable better. But the creation of the task document itself (400+ lines defining
      what should be written) creates a completion feeling even though nothing has yet been written. The specification performs
      the work. Worse, if the downstream agent encounters ambiguity or genuinely hard choices, the only recourse is to re-read
      the specification rather than collaborating with a human. The task document becomes simultaneously a roadmap and a prison.

      '
    distinct_from: 'governance-recursion (governance recursion is solving the wrong problem with more governance; task-artifact-inflation
      is a specific flavor where the specification document itself absorbs effort that should go to the work); paper-guardrail
      (both are substitutes for enforcement, but task-artifact-inflation targets documentation-as-proxy-for-execution specifically)

      '
    examples:
    - file: docs/bootcamp/tasks/13-write-step8-cost-modeling/instructions.md
      quote: '### Voice and Target Length / - Direct, technical, no filler, no emojis, no em-dashes / - 700-1000 lines. This
        is a 3-4 hour step with 6 topics. / - Frame as engineering economics, not financial analysis / ## Quality Gate / -
        Pricing must be clearly labeled as illustrative, not current / - The marginal value/cost connection must be explicit'
    - file: docs/bootcamp/tasks/09-write-step4-statistical-testing/instructions.md
      quote: '## Writing Requirements / ### Structure / Follow the Bootcamp I format template. Title: `# Step 4: Statistical
        Testing for Practitioners` / ### The Critical Tone / This step must be explicitly anti-academic while being technically
        correct.'
    - file: docs/bootcamp/tasks/14-write-step9-text-analysis/instructions.md
      quote: '## Quality Gate / - The triangulate matching algorithm must be accurately described with correct line refs /
        - SequenceMatcher, TF-IDF, and cosine similarity examples must be runnable / - The escalation path (string -> TF-IDF
        -> embeddings) must be clearly framed'
    _model: claude
    _chunk: chunk-088
  pseudo-causal-syntax:
  - id: C-001
    name: pseudo-causal-syntax
    definition: Using code-like operators (:=, ->, |, >>) in prose to simulate logical density and causal rigor.
    mechanism: The model attempts to escape 'slop' by adopting an engineering-heavy register, using symbols to perform the
      'shape' of logic where natural language would suffice.
    distinct_from: nominalisation-cascade
    examples:
