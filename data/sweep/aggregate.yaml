  verification-theater:
  - id: C-003
    name: verification-theater
    definition: Test or evaluation descriptions that specify correct verification criteria but lack implementation details,
      audit mechanisms, or evidence that verification actually occurs, creating the appearance of rigor without operational
      enforcement.
    mechanism: The document states what 'should' be tested or verified without specifying who verifies, when, or with what
      consequences for failure. The verification requirement is stated in prose but not embedded in any executable process,
      gate, or monitoring system. This differs from paper guardrails in that it describes a measurement process rather than
      a preventive rule, but shares the property of being aspirational rather than operational.
    distinct_from: paper-guardrail (which states rules but has no enforcement), epistemic-theatre (which performs significance
      without substance). Verification-theater specifically describes evaluation/measurement processes that are stated but
      not implemented.
    examples:
    - file: docs/bootcamp/step-iv-07-red-teaming.md
      quote: Verify that safeguards are in place and effective. Only then proceed with deployment... [this states the requirement
        but does not specify how verification occurs, who performs it, what 'effective' means quantitatively, or what happens
