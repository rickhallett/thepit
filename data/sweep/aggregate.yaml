    - file: '[midgets] docs/bootcamp/tasks-v/11-write-step05/instructions.md'
      quote: 'Estimated target: 35-50k characters (~1000-1400 lines)... Design 5-7 challenges... Field Maturity: EMERGING'
    - file: '[jobsworth] prompts/agents/technical-test-designer/rubrics/evaluation-framework.md'
      quote: Evaluation Philosophy - Core Principles... Feedback Structure... Technology-Specific Rubrics [React, Python,
        SQL, Docker]
    _model: claude
    _chunk: chunk-083
  strategic-honesty-paradox:
  - id: C-002
    name: strategic-honesty-paradox
    definition: A document correctly identifies a structural problem and acknowledges it explicitly, then proceeds as if the
      acknowledgement solves the problem without building an actual mechanism.
    mechanism: Naming and describing a failure mode creates the illusion that the failure is managed. The honest acknowledgement
      becomes a substitute for actual control. 'We know this is hollow' != 'we fixed it.'
    distinct_from: paper-guardrail (which states a rule without enforcement); this names an *existing flaw* while continuing
      as if named flaws are controlled. Intellectual honesty masquerading as actual governance.
    examples:
    - file: '[midgets] README.md'
      quote: Independent triangulation... The three reviewers were all Claude. Same model, same weights, same priors. 3/3
        agreement from one model family has the evidential weight of one observation, not three.
    - file: '[midgets] docs/research/analysis/cross-examine-build-order_codex52_20260304-093614.md'
      quote: What exact SSE event format will the client parse... How does the client handle reconnects or dropped connections
        mid-bout... What is the idempotency key for POST /api/run-bout
    - file: '[midgets] docs/bootcamp/tasks/11-write-step06/instructions.md'
      quote: The gate is necessary but not sufficient (passes gate != correct)... Only human judgment evaluates taste-required
        quality... The gap between 'not wrong' and 'right' is where taste lives
    - file: '[midgets] docs/internal/strategy/signal/plank-2-signal.md'
      quote: TIME_CRITICAL := ftc.closes(10_March_2026)... DEADLINE acknowledged but 20 days remain for five phases
    _model: claude
    _chunk: chunk-083
  vocabulary-inflation:
  - id: C-003
    name: vocabulary-inflation
    definition: Terms from external domains (psychology, engineering, statistics) are adopted and applied to contexts where
      the original term's definition doesn't cleanly map, creating pseudo-technical language.
    mechanism: Using domain vocabulary creates an impression of rigour and precision without requiring precision. 'Working
      set' applied to agent state sounds more formal than 'minimum required state', but adds no new meaning. The vocabulary
      does the heavy lifting, not the concept.
    distinct_from: authority-scaffolding (which cites sources to justify simple observations); this imports terminology without
      citation and redefines it in context. The term becomes a label rather than a frame.
    examples:
    - file: '[midgets] docs/bootcamp/tasks-v/11-write-step05/instructions.md'
      quote: 'The working set concept applied to state: what is the minimum state for correct behaviour? (Novel framing from
        this project)'
    - file: '[midgets] docs/bootcamp/tasks/11-write-step06/instructions.md'
      quote: Verification pipeline (Swiss Cheese Model) — Reason 1990... P(defect reaching production) = product of P(survives
        each layer)
    - file: '[midgets] docs/bootcamp/tasks/12-write-step07/instructions.md'
      quote: 'Deep compliance - A specific failure mode: the model''s reasoning chain detects a governance violation, but
        the output complies anyway.'
