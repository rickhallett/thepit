  standalone-section-abstraction:
  - id: C-001
    name: standalone-section-abstraction
    definition: A documented principle or pattern presented without concrete failure examples, making it impossible for the
      reader to verify the cost of violating it.
    mechanism: The model describes best practices or design principles at the conceptual level and then moves to the next
      section without showing what happens when the principle is violated. Readers learn the rule but not the consequence
      of rule-breaking, making the rule feel aspirational rather than structural.
    distinct_from: paper-guardrail (which presents enforcement as existing when it does not) and epistemic-theatre (which
      performs significance through framing). Standalone-section-abstraction is the absence of examples that would make the
      principle concrete.
    examples:
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'Parameter Design. Parameters are where most tool-use errors originate. Four principles: 1. Descriptive names.
        2. Explicit types. 3. Constrained values. 4. Documentation in descriptions. [Then immediately: ''The bad version accepts
        X. The good version accepts only Y.'']'
      explanation: Four design principles are stated. Then a single contrasting example is shown. But the reader never sees
        what happens when a tool violates principle 1 alone, or principle 2 alone, or principles 1-3 together. The cost of
        each violation is not shown. Only the straw-man bad version vs ideal version is presented.
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'Truncation Strategies. Large results need truncation. Three strategies: 1. Line-limited with continuation. 2.
        Structured summary with details on demand. 3. Diff instead of full content. [No example shows the cost of NOT truncating
        or the performance difference between strategies.]'
      explanation: Three truncation strategies are named. The reader never sees a real test result demonstrating how much
        context each strategy consumes, or which strategy performs best under time pressure, or what happens to agent performance
        without truncation.
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'Least Privilege in Practice. Design tool sets that give agents the minimum capability needed for the task: Code
        review agent: Read-only tool set... Code editing agent: Read-write tool set... Deployment agent: Separate agent, separate
        tool set, separate approval gate.'
      explanation: Three tool set designs are described. No example shows what happens when privilege is not separated (an
        agent that can both write code and deploy it). The consequence of violating the principle is not demonstrated; only
        the correct design is shown.
    _model: claude
    _chunk: chunk-029
  pedagogical-burden-shift:
  - id: C-002
    name: pedagogical-burden-shift
    definition: Content that places the verification burden entirely on the reader, presenting information as self-evidently
      correct without providing the measurement infrastructure needed to verify claims.
    mechanism: The content describes a problem (e.g., 'context window fills quickly') and then a solution (e.g., 'design tools
      that return concise results'), but provides no way for the reader to measure whether their own tool implementations
      actually solve the problem. The reader must trust that the principle works without being able to test it.
    distinct_from: semantic-inflation (which inflates significance) and not-wrong (which achieves correctness without grace).
      Pedagogical-burden-shift is the absence of a framework for readers to verify what they have learned.
    examples:
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'Context budget allocation (typical 128k-200k token window): System prompt + tool schemas: 2,000-5,000 tokens
        (~2-4%). Conversation history: 5,000-20,000 tokens (~5-15%). Tool results (accumulated): 20,000-100,000 tokens (~15-75%).
        Available for generation: remainder.'
      explanation: A context budget breakdown is presented with percentage ranges. The reader has no way to measure their
        own context window usage. No tool is provided for instrumenting an agent to collect this data. The percentages are
        presented as typical but no methodology is provided for determining whether a specific agent follows this distribution.
    - file: docs/bootcamp/step05-tool-design.md
      quote: A single tool call that reads a file and returns 200 lines of code consumes roughly 800-1,200 tokens. An agent
        that reads 10 files to understand a codebase before making a change has consumed 8,000-12,000 tokens on tool results
        alone.
      explanation: Token estimates are given ('800-1,200 tokens' for a 200-line file) but no explanation of how these estimates
        were derived or what model family they apply to. The reader cannot verify the estimate or apply it to their own context
        budget calculations without running their own measurements.
    - file: docs/bootcamp/step05-tool-design.md
      quote: When an agent's performance degrades over a long session, check the context window utilisation. If tool results
        are consuming 60%+ of the available context, the model has less room for reasoning and instruction following.
      explanation: A diagnostic guideline is provided (check context window utilisation at 60%) but no instrument is described
        for measuring it. The reader is told what to measure and what threshold indicates a problem, but not how to measure
        it. The verification burden falls entirely on the reader to build the measurement infrastructure.
    _model: claude
    _chunk: chunk-029
  unfalsifiable-framing:
  - id: C-003
    name: unfalsifiable-framing
    definition: A claim is presented in such a way that any outcome can be interpreted as confirming it, making the claim
      immune to falsification.
    mechanism: The model makes a prediction or describes a principle, then frames all possible observations as evidence for
      it. If the predicted outcome occurs, the principle is confirmed. If the opposite occurs, the principle is reframed as
      still correct. The claim becomes unfalsifiable because the scope is too broad or the framing is too flexible to permit
      contradiction.
    distinct_from: absence-claim-as-compliment (which asserts non-existence as flattery) and semantic-inflation (which inflates
      significance). Unfalsifiable-framing makes contradictory outcomes equally compatible with the claim.
    examples:
    - file: docs/bootcamp/step05-tool-design.md
      quote: Poka-yoke means making mistakes structurally impossible rather than relying on instructions to prevent them.
        In tool design for agents, this is the highest-leverage design principle. A model that cannot send an invalid value
        will not send an invalid value. A model that is told not to send an invalid value sometimes will.
      explanation: 'The claim is: poka-yoke prevents errors; instructions do not. But the evidence is tautological: if the
        model sends an invalid value despite a constraint, the constraint was poorly designed (not the principle that is wrong).
        If the model avoids sending an invalid value, the constraint worked. There is no observation that could falsify the
        principle itself — only the implementation of it.'
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'The tool description is the most underused field in tool design. Most definitions provide one sentence. Effective
        definitions provide a paragraph... If the definition says `''q'': ''query''`, the model knows nothing. If the definition
        says `''query'': ''A regex pattern...''`, the model can construct effective queries.'
      explanation: The claim is that description length correlates with tool-use effectiveness. But both examples (the bad
        one and the good one) are consistent with the model's training data, not with a causal relationship between description
        length and tool-use success. If a model used a badly-described tool effectively, the observation would be reframed
        as 'the model compensated with its training knowledge' rather than as a falsification of the principle.
    - file: docs/bootcamp/step05-tool-design.md
      quote: An agent with verification tools can self-correct without human intervention... The agent made an error, detected
        it through a verification tool, diagnosed the issue, fixed it, and verified the fix. This is 'do not infer what you
        can verify' in action.
      explanation: The claim is that verification tools enable self-correction. The example shows a success case. But if an
        agent with the same tools failed to self-correct, the failure would be reframed as a tool-design problem (not a falsification
        of the principle that verification tools should exist). Success confirms the principle; failure triggers a redesign
        and reconfirms the principle at a higher level of abstraction.
    _model: claude
    _chunk: chunk-029
  initiatory-framing:
  - id: C-001
    name: initiatory-framing
    definition: Presenting mundane technical tasks as a profound philosophical or professional initiation to elevate the reader's
      perceived status.
    mechanism: The LLM's 'help imperative' combined with a 'teacher' persona leads it to inflate the significance of routine
      exercises (like writing a JSON schema) to maintain user engagement.
    distinct_from: epistemic-theatre (which performs for an audience); initiatory-framing specifically targets a 'student'
      or 'apprentice' to make the mundane seem like a secret art.
    examples:
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'The goal: build the judgment to design tools that make correct use easy and incorrect use structurally impossible...'
    - file: docs/bootcamp/step05-tool-design.md
      quote: This is not a minor feature. It is the difference between a language model and an agent.
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'Verify you can answer these questions without looking anything up: ... What is the ''poka-yoke test'' for a
        tool schema?'
    _model: gemini
    _chunk: chunk-029
  physicalist-analogy-overload:
  - id: C-002
    name: physicalist-analogy-overload
    definition: The excessive use of physical-world metaphors (plumbing, ports, gates) to ground abstract digital protocols,
      creating a 'steampunk' vibe that obscures technical simplicity.
    mechanism: Model weights are biased toward highly-cited analogies in training data (like the OSI model or hardware metaphors)
      to explain non-physical software interactions.
    distinct_from: authority-scaffolding; this pattern uses objects rather than academic citations to create the illusion
      of tangible 'heaviness' in code.
    examples:
    - file: docs/bootcamp/step05-tool-design.md
      quote: Anthropic describes MCP as 'a USB-C port for AI applications.' Before USB-C, every device had its own connector.
        You needed a drawer full of cables.
    - file: docs/bootcamp/step05-tool-design.md
      quote: Protocol is plumbing. Design is engineering.
    - file: docs/bootcamp/step05-tool-design.md
      quote: L7 sits directly above it... The quality gate... is a tool the agent uses as part of its work loop.
    _model: gemini
    _chunk: chunk-029
  hyper-categorization:
  - id: C-003
    name: hyper-categorization
    definition: Imposing rigid hierarchical structures, 'anatomies,' or numbered 'layers' on concepts that are naturally flat
      or straightforward.
    mechanism: LLMs optimize for structured output (JSON/Markdown lists) and default to taxonomies as a way to simulate organized
      knowledge where simple description would suffice.
    distinct_from: tally-voice; tally voice uses numbers as rhetorical adjectives, whereas hyper-categorization uses them
      to build unnecessary structural 'architecture' for a topic.
    examples:
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'The Investment Hierarchy: Tool schema design (Highest), System prompt (High), Prompt wording (Medium), Temperature
        tuning (Low).'
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'Seven Concrete Poka-Yoke Patterns: 1. Absolute paths... 2. Enums... 3. Typed parameters...'
    - file: docs/bootcamp/step05-tool-design.md
      quote: 'Anatomy of a Tool Schema: The Name, The Description, Parameter Design, Required vs Optional.'
    _model: gemini
    _chunk: chunk-029
  pedagogical-completeness:
  - id: C-001
    name: pedagogical-completeness
    definition: 'Technical documentation that covers a topic exhaustively with no apparent omission, but which subtly omits
      the reader''s likely confusion point or the simplest concrete example.

      '
    mechanism: 'The LLM generates a complete, well-organized explanation that covers every edge case and theoretical detail,
      but does not anticipate what will confuse a learner. It explains the architecture before the motivation. It defines
      terms before showing what they do. Completeness by checklist (all topics covered) masks incompleteness by understanding
      (the reader''s mental model is not built).

      '
    distinct_from: 'Not nominalisation-cascade (this has agents and action), not tally-voice (the detail is functional), not
      "not-wrong" (it IS correct). It is distinct from epistemic-theatre because it performs rigor through comprehensiveness
      rather than through significance-signposting. The document is technically accurate and thorough but fails to meet the
      reader where they are.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/09-container-internals.md
      quote: 'Section on cgroups v2 begins with "Modern Linux uses cgroups v2 (unified hierarchy). The older cgroups v1 had
        separate hierarchies per resource controller..." Then immediately jumps to `ls /sys/fs/cgroup/cgroup.controllers`
        without explaining what this command is for or why the reader should care about the difference. The section is complete
        but the reader''s first question - "why do I care whether they are unified or separate?" - is deferred 600 words.

        '
    - file: docs/bootcamp/11-process-supervision.md
      quote: '"systemd is PID 1 on most modern Linux distributions (Debian, Ubuntu, Fedora, Arch, RHEL, SUSE). It is the init
        system..." The definition comes before the question "what is an init system and why does PID 1 matter?" A learner
        reading this section without Step 1''s context will not know why systemd being PID 1 is significant. The document
        explains correctly but assumes prior knowledge.

        '
    - file: docs/bootcamp/11-process-supervision.md
      quote: 'The "PID 1 in containers" section describes signal-swallowing and zombie accumulation as "two common problems"
        but does not lead with "here is why you should care: your container will hang or lose data." The technical correctness
        is complete; the emotional/motivational scaffolding that makes learners retain the pattern is absent.

        '
    _model: claude
    _chunk: chunk-030
  unexercised-mechanism:
  - id: C-002
    name: unexercised-mechanism
    definition: 'A mechanism is thoroughly explained and exemplified, but no challenge asks the reader to fail it or to observe
      its failure mode in person.

      '
    mechanism: 'The document demonstrates the happy path exhaustively: "Here is how to do X correctly." Failures are described
      theoretically but the reader never triggers one. Understanding a system includes understanding how to break it. If you
      have never seen a fork bomb contained by pids.max, the limit remains abstract. If you have never witnessed an OOM kill
      in dmesg, the memory limit is a configuration flag, not a physical boundary.

      '
    distinct_from: 'Not "not-wrong" - the explanations are correct. Not nominalisation-cascade - there are agents and actions.
      Distinct from pedagogical-completeness because the content IS relevant and sequenced; what is missing is hands-on failure.
      A learner can read and understand the text and still not have integrated it.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/09-container-internals.md
      quote: '"When the OOM killer fires inside a cgroup, `dmesg` on the host records it... Memory cgroup out of memory: Killed
        process 12345 (python3)...". The output is shown. But Challenge 2 (Cgroup Resource Jail) has the learner allocate
        40MB successfully then (ambiguously) "try a fork bomb" without clear success criteria. The challenge does not require
        the learner to witness the OOM kill themselves or to set a limit so tight that a normal operation fails. The failure
        mode is described but never triggered by the learner.

        '
    - file: docs/bootcamp/11-process-supervision.md
      quote: '"Problem 2: Zombie accumulation... they become zombies - entries in the process table that consume a PID slot
        and never go away." The problem is stated. But Challenge 1 (systemd User Service) kills a process cleanly without
        leaving zombies. No challenge creates a process tree that WOULD create zombies if PID 1 did not reap. The learner
        understands the problem theoretically but has never observed a zombie or seen one remedied.

        '
    - file: docs/bootcamp/11-process-supervision.md
      quote: '"Without rotation, logs fill the disk." A theoretical consequence is stated, but no challenge fills a disk with
        unrotated logs. The learner understands the risk but does not feel it viscerally.

        '
    _model: claude
    _chunk: chunk-030
  terminology-before-referent:
  - id: C-003
    name: terminology-before-referent
    definition: 'A term is introduced and defined before the thing it names appears in a concrete example or code snippet.

      '
    mechanism: 'The LLM defines terms in sequence (top-down, glossary style) rather than introducing them when they are needed
      (bottom-up, context style). "This is a veth pair - a virtual ethernet cable with one end in each namespace" appears
      before the reader sees `ip link add veth-host type veth peer name veth-container`. The term is clear but abstracted
      from its use.

      '
    distinct_from: 'Not pedagogical-completeness (this is about term sequencing, not topic comprehensiveness). Not nominalisation-cascade
      (the definitions contain action). Distinct because it is about order of introduction, not completeness or quality of
      explanation.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/09-container-internals.md
      quote: '"lowerdir: read-only layers (one or more, colon-separated) / upperdir: read-write layer where modifications
        are stored / workdir: scratch space used by the kernel for atomic operations..." These are defined before the `mount
        -t overlay` command that uses them. A reader learning by doing (reading code first, then understanding) cannot reference
        the definitions while examining the code.

        '
    - file: docs/bootcamp/11-process-supervision.md
      quote: '"Type=simple - the process started by ExecStart IS the service. systemd considers the service started immediately..."
        The type definitions appear in a table with six entries. The reader encounters the table before seeing any unit file
        that uses it. A learner would benefit from seeing `Type=simple` in context (in a minimal Dockerfile or unit file)
        then learning what it means.

        '
    - file: sites/oceanheart/content/bootcamp/09-container-internals.md
      quote: '"Union filesystems present a unified view of two directory trees..." defined in prose before the section "Building
        it by hand" creates one. The concept is clear but the learner has not yet asked "what would I use this for?"

        '
    _model: claude
    _chunk: chunk-030
  pedigree-theatre:
  - id: C-001
    name: pedigree-theatre
    definition: Over-chronicling the historical lineage of tools (names, dates, original versions) to perform technical authority.
    mechanism: The model draws on high-probability historical facts found in technical documentation to establish a 'professorial'
      tone, signaling deep knowledge by citing names like Ken Thompson or dates like 1979.
    distinct_from: authority-scaffolding
    examples:
    - file: docs/bootcamp/11-process-supervision.md
      quote: Ken Thompson's init (1971) was the first PID 1, and it had the same reaping responsibility.
    - file: docs/bootcamp/11-process-supervision.md
      quote: Vixie cron, written by Paul Vixie in 1987... dates to Version 7 Unix (1979), written by Brian Kernighan.
    - file: sites/oceanheart/content/bootcamp/09-container-internals.md
      quote: OverlayFS was merged into the Linux kernel in version 3.18 (2014) by Miklos Szeredi.
    _model: gemini
    _chunk: chunk-030
  relevance-force:
  - id: C-002
    name: relevance-force
    definition: Repetitive, forced transitions that map generic technical concepts back to a specific project theme to satisfy
      a system prompt.
    mechanism: The model inserts 'Grounding' or 'Context' blocks to prove it is following the instruction to 'make this relevant
      to AI agents,' often resulting in predictable, formulaic callouts.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/bootcamp/11-process-supervision.md
      quote: 'AGENTIC GROUNDING: The midget entrypoint.sh backgrounds Xvfb and fluxbox... shows what is missing and how to
        add it.'
    - file: sites/oceanheart/content/bootcamp/09-container-internals.md
      quote: 'AGENTIC GROUNDING: Network namespace isolation is the primary mechanism preventing an agent container from reaching
        host services.'
    - file: sites/oceanheart/content/bootcamp/09-container-internals.md
      quote: This step matters for the agentic model because the midget container IS the agent's sandbox.
    _model: gemini
    _chunk: chunk-030
  tabular-crutch:
  - id: C-003
    name: tabular-crutch
    definition: The excessive use of comparison tables to organize information as a substitute for narrative synthesis.
    mechanism: Tables are low-entropy, highly structured outputs. The model defaults to them to satisfy 'comprehensiveness'
      without having to integrate the concepts into prose.
    distinct_from: tally-voice
    examples:
    - file: docs/bootcamp/11-process-supervision.md
      quote: 'Table: systemd timers vs cron (comparing Logging, Dependencies, Persistent, etc.)'
    - file: sites/oceanheart/content/bootcamp/09-container-internals.md
      quote: 'Table: Linux has seven types of namespaces (Mount, UTS, IPC, PID, etc.)'
    - file: sites/oceanheart/content/bootcamp/09-container-internals.md
      quote: 'Table: How Docker maps to cgroups (Docker flag vs Cgroup file)'
    _model: gemini
    _chunk: chunk-030
  history-peroration:
  - id: C-001
    name: history-peroration
    definition: Terminal paragraphs providing chronological origin stories, inventor names, and dates appended to technical
      sections to simulate scholarly depth.
    mechanism: LLMs extend explanations with high-probability historical anecdotes from training data, creating rhythmic 'etymology'
      closers that pad without insight.
    distinct_from: authority-scaffolding (mid-prose citations for basics); this is section-final dumps unrelated to the demonstrated
      content.
    examples:
    - file: '[midgets] docs/bootcamp/11-process-supervision.md'
      quote: '**HISTORY:** The PID 1 problem... Ken Thompson''s `init` (1971) was the first PID 1'
    - file: '[midgets] docs/bootcamp/11-process-supervision.md'
      quote: '**HISTORY:** systemd was released in 2010 by Lennart Poettering... Debian''s adoption vote in 2014'
    - file: '[midgets] docs/bootcamp/11-process-supervision.md'
      quote: '**HISTORY:** cron dates to Version 7 Unix (1979)... five fields... over 40 years.'
    - file: '[midgets] sites/oceanheart/content/bootcamp/09-container-internals.md'
      quote: '> **HISTORY:** ... `chroot` (1979)... Bill Joy added it to BSD'
    - file: '[midgets] sites/oceanheart/content/bootcamp/09-container-internals.md'
      quote: '> **HISTORY:** Linux namespaces... Mount namespaces came first (2002)... User namespaces took until 2012.'
    - file: '[midgets] sites/oceanheart/content/bootcamp/09-container-internals.md'
      quote: '> **HISTORY:** Cgroups... Google engineers Paul Menage and Rohit Seth in 2008... cgroups v2... 2016'
    _model: grok
    _chunk: chunk-030
  apparatus-without-artifact:
  - id: C-001
    name: apparatus-without-artifact
    definition: 'Extensive infrastructure documentation (tools, APIs, workflows, event systems) that teaches the machinery
      without demonstrating what the machinery produces or enables. The apparatus is real and well-documented; the artifact
      (working code, demonstrated use case, output) is theoretical or aspirational.

      '
    mechanism: 'The LLM''s training optimizes for comprehensive, well-structured documentation. Documenting how to build and
      call tools is high-probability token generation. Demonstrating what happens when real agents use those tools (unexpected
      failure modes, surprising behaviors, edge cases that tools don''t handle) requires observing real execution and reporting
      failure, which is lower-probability training signal. The model documents the promised behavior, not the actual behavior,
      because the promise is cleaner and more coherent.

      '
    distinct_from: '"Epistemic Theatre" performs significance without substance. This pattern documents substance (the API
      is real, the tools work) but leaves the reader without evidence that the substance solves a real problem or produces
      a real artifact. "Authority Scaffolding" uses citations to justify routine engineering. This uses comprehensive documentation
      the same way — as a stand-in for demonstration.

      '
    examples:
    - file: midgets/docs/research/pi/coding-agent/docs/extensions.md
      quote: registerTool() works both during extension load and after startup... New tools are refreshed immediately in the
        same session... Use pi.setActiveTools() to enable or disable tools at runtime.
    - file: midgets/docs/research/pi/coding-agent/docs/extensions.md
      quote: Custom rendering... Tool output is wrapped in a Box that handles padding and background. Your render methods
        return Component instances (typically Text)... See [tool-execution.ts](...) for how built-in tools render.
    - file: midgets/docs/research/pi/coding-agent/docs/extensions.md
      quote: 'Remote Execution: Built-in tools support pluggable operations for delegating to remote systems (SSH, containers,
        etc.)... See [examples/extensions/ssh.ts](...) for a complete SSH example'
    _model: claude
    _chunk: chunk-031
  reference-without-navigation:
  - id: C-002
    name: reference-without-navigation
    definition: 'Extensive hyperlinked documentation that assumes the reader will navigate external paths to understand core
      concepts. Links are correct but the core concept is incomplete without following them, forcing the reader into a breadth-first
      traversal instead of supporting depth-first learning.

      '
    mechanism: 'The LLM generates comprehensive table-of-contents navigation and cross-reference links because this is the
      pattern of technical documentation in its training data. It treats links as equivalent to inline explanation. In interactive
      media (websites) this is acceptable; in prose documents read sequentially, it fragments understanding. The model does
      not distinguish between the two reading modes because it has no model of how documents are consumed.

      '
    distinct_from: '"Authority Scaffolding" uses citations decoratively. This uses links functionally but with the expectation
      that the reader will follow them, making the document incomplete in isolation. "Paper Guardrail" asserts protection
      via reference ("see file X"). This pattern asserts understanding via reference.

      '
    examples:
    - file: midgets/docs/research/pi/coding-agent/docs/extensions.md
      quote: See [session.md](session.md) for session storage internals and the SessionManager API. | See [compaction.md](compaction.md)
        for details. | See [tree.md](tree.md) for tree navigation concepts.
    - file: midgets/docs/research/pi/coding-agent/docs/extensions.md
      quote: The callback receives... See [tui.md](tui.md) for the full component API. | For advanced positioning... see [tui.md](tui.md)
        for the full OverlayOptions API and [overlay-qa-tests.ts](...) for examples.
    - file: midgets/docs/research/pi/coding-agent/docs/extensions.md
      quote: 'Built-in tool implementations: - [read.ts](...) - ReadToolDetails | [bash.ts](...) - BashToolDetails | [edit.ts](...)
        | [write.ts](...) | (9 more links to source files, no inline description)'
    _model: claude
    _chunk: chunk-031
  aspirational-scope:
  - id: C-003
    name: aspirational-scope
    definition: 'Feature documentation that describes what the system can theoretically do without clarifying constraints,
      prerequisites, or failure modes. The feature is presented at the level of capability ("can do X") without addressing
      when it cannot, what breaks it, or what hidden dependencies must be satisfied.

      '
    mechanism: 'The LLM generates feature documentation by interpolating from capability descriptions in training data. It
      excels at the happy path because that is what capability demos show. It deemphasizes constraints, dependencies, and
      failure modes because these are: (a) less pleasant to document, (b) context-dependent (not generalizable across all
      users), (c) lower in the training data (demos don''t highlight what breaks). The result reads as aspirational rather
      than grounded.

      '
    distinct_from: '"Semantic Inflation" exaggerates novelty and gap-filling. This exaggerates scope and capability. "Epistemic
      Theatre" performs significance. This performs capability without qualification.

      '
    examples:
    - file: midgets/docs/research/pi/coding-agent/docs/extensions.md
      quote: Extensions can subscribe to lifecycle events, register custom tools callable by the LLM, add commands, and more.
        | Extensions are loaded via [jiti](...), so TypeScript works without compilation. | One extension can register multiple
        tools with shared state.
    - file: midgets/docs/research/pi/coding-agent/docs/extensions.md
      quote: registerTool() works both during extension load and after startup. You can call it inside session_start, command
        handlers, or other event handlers. New tools are refreshed immediately in the same session, so they appear in pi.getAllTools()
        and are callable by the LLM without /reload.
    - file: midgets/docs/bootcamp/09-container-internals.md
      quote: A container is a process. A regular Linux process, running on the same kernel as every other process on the host,
        but with three restrictions applied by the kernel... When you run docker exec -it container bash, you are not 'logging
        into' anything... Understanding this transforms container debugging from cargo-culting Docker commands to reasoning
        from first principles.
    _model: claude
    _chunk: chunk-031
  context-branding:
  - id: C-001
    name: context-branding
    definition: Relabeling standard technical knowledge as project-specific insights using branded keywords (e.g., 'Agentic',
      'Midget-specific') to simulate relevance.
    mechanism: The Help Imperative drives the model to flavor generic training data with project keywords to appear bespoke.
    distinct_from: epistemic-theatre
    examples:
    - file: docs/bootcamp/09-container-internals.md
      quote: '> AGENTIC GROUNDING: When you docker exec... you are not ''logging into'' anything.'
    - file: docs/bootcamp/09-container-internals.md
      quote: '> AGENTIC GROUNDING: Network namespace isolation is the primary mechanism...'
    - file: docs/bootcamp/09-container-internals.md
      quote: '> AGENTIC GROUNDING: This is why container writes are ephemeral.'
    _model: gemini
    _chunk: chunk-031
  triviality-inclusion:
  - id: C-002
    name: triviality-inclusion
    definition: Including toy or 'cool' examples (Snake, Space Invaders, Doom) in technical documentation to perform versatility.
    mechanism: Model lacks real-world edge cases for a new system, so it falls back to common coding tropes from training
      data.
    distinct_from: tally-voice
    examples:
    - file: docs/research/pi/coding-agent/docs/extensions.md
      quote: Games while you wait (see snake.ts example)
    - file: docs/research/pi/coding-agent/docs/extensions.md
      quote: space-invaders.ts | Space Invaders game
    - file: docs/research/pi/coding-agent/docs/extensions.md
      quote: doom-overlay/ | Doom in overlay
    _model: gemini
    _chunk: chunk-031
  pedantic-lineage:
  - id: C-003
    name: pedantic-lineage
    definition: Interjecting historical anecdotes or trivia as callouts to perform academic or professional rigor.
    mechanism: RLHF training toward 'educational' and 'comprehensive' personas results in trivia that adds no functional value.
    distinct_from: authority-scaffolding
    examples:
    - file: docs/bootcamp/09-container-internals.md
      quote: 'HISTORY: The idea of isolating processes... chroot (1979)...'
    - file: docs/bootcamp/09-container-internals.md
      quote: 'HISTORY: Cgroups were contributed to the Linux kernel by Google engineers...'
    - file: docs/bootcamp/09-container-internals.md
      quote: 'HISTORY: Plan 9 from Bell Labs (1992)...'
    _model: gemini
    _chunk: chunk-031
  hyperlink-dependent-definition:
  - id: C-001
    name: hyperlink-dependent-definition
    definition: A concept is defined by reference to an external definition, requiring the reader to click/navigate to understand
      core ideas presented as established.
    mechanism: In Hugo/Markdown documentation, placing parenthetical links like (Step 4), (Step 6) or wiki-style references
      throughout prose creates a reading experience where core concepts are not self-contained. The reader must maintain cognitive
      load for both the current section AND track which external definitions they need to understand the argument. In bootcamp
      material specifically, this creates a false linearality — content assumes you have read earlier steps in sequence and
      retained them.
    distinct_from: authority-scaffolding (which cites sources) and not-wrong (which lacks demonstration). This pattern is
      about the reading architecture, not the content quality. The content could be correct but become inaccessible because
      understanding requires background reading.
    examples:
    - file: docs/bootcamp/step10-governance-process.md
      quote: Step 6 established that the quality gate is survival. Step 7 established that the human at L12 is the irreducible
        verification layer. This step addresses the question that follows from both
    - file: docs/bootcamp/step10-governance-process.md
      quote: For verifiable tasks, the gate is sufficient confirmation. For taste-required tasks, a human must review the
        output. This distinction — verifiable vs taste-required — is the governance dial introduced in Step 6 and operationalised
        in Section 4 of this step.
    - file: docs/bootcamp/step10-governance-process.md
      quote: the context engineering problem from Step 4... The working set — the minimum context for the current job — must
        be loaded before the agent writes a single line.
    - file: sites/oceanheart/content/bootcamp/ii-10-governance.md
      quote: Step 6 introduced the verifiable/taste-required distinction as the load-bearing governance decision for probabilistic
        systems. This section operationalises that distinction as a practical dial.
    _model: claude
    _chunk: chunk-032
  prescriptive-without-calibration:
  - id: C-002
    name: prescriptive-without-calibration
    definition: Detailed governance rules and process frameworks are presented as best practices without calibration to context,
      team size, or risk tolerance.
    mechanism: The bootcamp prescribes specific patterns (HOTL/HODL spectrum, bearing checks with five specific tests, muster
      format with numbered rows) as if they are universally applicable. No guidance is provided on when to apply them, what
      happens when they are not applicable, or how teams with different constraints should adapt. This creates a false sense
      of completeness — the framework looks comprehensive and detailed, so teams assume it is appropriate for their context
      without questioning whether it is.
    distinct_from: governance-recursion (which spawns more governance when things go wrong) and semantic-inflation (which
      overstates the novelty/importance of what was built). This pattern is about prescribing solutions without diagnosis
      of the specific problem.
    examples:
    - file: docs/bootcamp/step10-governance-process.md
      quote: 'The bearing check costs approximately 15 agent-minutes, or 20-30 human-minutes... A bearing check is mandatory
        at [triggers]. Run this diagnostic with five specific tests: Spec drift, Eval validity, Plan accuracy, Gate health,
        Backlog sync.'
    - file: docs/bootcamp/step10-governance-process.md
      quote: One PR = one concern. This is standard git practice with decades of history... A commit that touches 67 files
        across 6 domains for 6 reasons cannot be reviewed at all
    - file: docs/bootcamp/step10-governance-process.md
      quote: 'The muster format optimises for the human''s scarcest resource: attention. A human reviewing agent output can
        process a 5-row muster table in under a minute.'
    - file: docs/bootcamp/step10-governance-process.md
      quote: HOTL when the gate can verify. HODL when it requires taste. This is not a heuristic. It is the operational rule.
    _model: claude
    _chunk: chunk-032
  implicit-success-criteria:
  - id: C-003
    name: implicit-success-criteria
    definition: Bootcamp sections teach frameworks and patterns but do not define verifiable success criteria — no metrics,
      no thresholds, no way to measure whether the pattern is working.
    mechanism: 'The bootcamp teaches the bearing check as ''the instrument that detects drift before it compounds'' and ''drift
      cost is always higher than check cost.'' But nowhere are specific metrics defined: What counts as ''drift''? What is
      an acceptable threshold of drift before corrective action is required? How would a team measure ''cost'' of a bearing
      check versus the cost of undetected drift? Without metrics, teams can report that they are ''running bearing checks''
      and claim success without verifying that the checks are catching anything. The framework performs completeness without
      demonstrating efficacy.'
    distinct_from: not-wrong (which is about unverifiable output quality) and paper-guardrail (which is about unenforced rules).
      This pattern is specifically about the absence of measurement and calibration in guidance.
    examples:
    - file: docs/bootcamp/step10-governance-process.md
      quote: The bearing check is cheapest when nothing is wrong. When everything is aligned — spec matches implementation,
        plan is current, gate is green, backlog is clean — the check completes in 10 minutes and confirms that you can proceed
        with confidence.
    - file: docs/bootcamp/step10-governance-process.md
      quote: 'The fix: track defect rate alongside velocity, with a lag window long enough to catch agent-introduced defects.
        The speed trap: The team measures adoption success by velocity alone.'
    - file: docs/bootcamp/step10-governance-process.md
      quote: The countermeasure is periodic deep engagement — at least once per week, review an agent-generated PR at the
        level of a senior developer code review, checking every file in the diff.
    - file: docs/bootcamp/step10-governance-process.md
      quote: 'A bearing check costs approximately 15 agent-minutes, or 20-30 human-minutes. The justification is not philosophical.
        It is mathematical: drift cost is always higher than check cost.'
    _model: claude
    _chunk: chunk-032
  navigational-recursion:
  - id: C-001
    name: navigational-recursion
    definition: Excessive cross-referencing to other 'Steps' or project modules to perform the illusion of a vast, interconnected
      curriculum.
    mechanism: The LLM maintains consistency by anchoring the current text to adjacent 'steps' in the context window, creating
      a labyrinth of metadata that displaces substance.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/docs/bootcamp/step10-governance-process.md
      quote: 'Prerequisites: Step 2 (agent architecture...), Step 5 (tool design...), Step 6 (verification...), Step 7 (human-AI
        interface...)'
    - file: midgets/docs/bootcamp/step10-governance-process.md
      quote: Step 6 established that the quality gate is survival. Step 7 established that the human at L12 is...
    - file: midgets/docs/bootcamp/step10-governance-process.md
      quote: Step 11 establishes the constraints... Every governance decision from this step... has a cost dimension that
        Step 11 quantifies.
    _model: gemini
    _chunk: chunk-032
  pseudo-technical-rebranding:
  - id: C-002
    name: pseudo-technical-rebranding
    definition: Giving high-stakes, operational names to mundane software engineering activities to inflate their perceived
      novelty.
    mechanism: The model attempts to meet a 'novelty' imperative by borrowing terminology from aviation or industrial engineering
      ('bearing checks', 'musters') for routine tasks like 'status updates' or 'tables'.
    distinct_from: nominalisation-cascade
    examples:
    - file: midgets/docs/bootcamp/step10-governance-process.md
      quote: The bearing check is the instrument that detects drift before it compounds.
    - file: midgets/docs/bootcamp/step10-governance-process.md
      quote: The muster format handles decisions... presents a decision table
    - file: midgets/docs/bootcamp/step10-governance-process.md
      quote: The gate (typecheck + lint + test suite) is the automated verification layer.
    _model: gemini
    _chunk: chunk-032
  didactic-filler:
  - id: C-003
    name: didactic-filler
    definition: Generating long 'Challenges' or 'Exercises' with simulated data to expand the word count and perform the role
      of a finished product.
    mechanism: When an agent cannot provide real engineering logs or outcomes, it generates 'simulated' scenarios and 'hints'
      to satisfy the length requirements of a 'bootcamp' artifact.
    distinct_from: epistemic-theatre
    examples:
    - file: midgets/docs/bootcamp/step10-governance-process.md
      quote: 'Challenge 1: Atomic Decomposition... Goal: Decompose a feature request into atomic PRs.'
    - file: midgets/docs/bootcamp/step10-governance-process.md
      quote: 'Challenge 2: Review Protocol Exercise... Examine the following simulated agent-generated diff'
    - file: midgets/docs/bootcamp/step10-governance-process.md
      quote: 'Challenge 6: Adoption Roadmap... You are the tech lead of a team of 6 developers'
    _model: gemini
    _chunk: chunk-032
  history-narrative-padding:
  - id: C-002
    name: history-narrative-padding
    definition: Extended anecdotal histories and disaster stories prefixed to routine practices via '**HISTORY:**' blocks.
    mechanism: LLM pulls high-RLHF case studies/disasters from training to dramatize prosaic engineering norms, inflating
      credibility.
    distinct_from: authority-scaffolding (terse citations); this is narrative bloat with specifics like crashes.
    examples:
    - file: docs/bootcamp/step10-governance-process.md
      quote: '**HISTORY:** CRM grew out of specific disasters. Tenerife (1977): two Boeing 747s collided on a runway, killing
        583 people. [...] United 173 (1978): [...]'
    - file: docs/bootcamp/step10-governance-process.md
      quote: '**HISTORY:** The atomic commit convention predates git. CVS and Subversion communities documented ''one logical
        change per commit'' in the early 2000s. [...]'
    - file: docs/bootcamp/step10-governance-process.md
      quote: '**HISTORY:** The HOTL/HODL distinction maps to Toyota''s jidoka principle (Ohno 1988): automation with a human
        touch. [...]'
    - file: docs/bootcamp/step10-governance-process.md
      quote: '**HISTORY:** The bearing check maps to several established patterns: sprint retrospectives (Agile), configuration
        audits (systems engineering), and pre-flight checklists (aviation). [...]'
    _model: grok
    _chunk: chunk-032
  construct-as-governance:
  - id: C-001
    name: construct-as-governance
    definition: 'Framing an intellectual construct (taxonomy, framework, model, pattern) as if it were an enforcement mechanism,
      then treating adherence to the construct as evidence that the problem is solved.

      '
    mechanism: 'The LLM builds a coherent conceptual architecture and conflates the clarity of the architecture with its ability
      to prevent failure. A taxonomy that is well-organized still requires enforcement. A framework that is comprehensive
      still requires someone to apply it. The model treats the existence of the construct as sufficient when it is only necessary.

      '
    distinct_from: '"Paper guardrail" (which is a specific stated rule without enforcement); "governance-recursion" (which
      is layers of governance validating each other). This pattern is the meta-level: treating the conceptual architecture
      itself as preventative.

      '
    examples:
    - file: docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'Eval ownership requires explicit assignment across three dimensions: 1. Maintenance ownership... 2. Content
        ownership... 3. Regression investigation... The format does not matter. What matters is that the three questions have
        explicit answers that are not ''everybody.'''
    - file: docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'The eval ownership anti-pattern: nobody owns it, so nobody maintains it, so it decays... ### The Ownership Matrix

        Eval ownership requires explicit assignment across three dimensions...'
    - file: docs/bootcamp/step-iv-09-eval-culture.md
      quote: A minimal eval review checklist... This checklist is not exhaustive. It is a starting point. Teams should extend
        it based on their domain and their experience with eval failures... Eval review should be part of the PR process,
        not a separate ceremony.
    _model: claude
    _chunk: chunk-033
  conditional-execution-without-conditions:
  - id: C-002
    name: conditional-execution-without-conditions
    definition: 'Providing conditional guidance (if X, do Y) without specifying how to determine X, leaving the decision point
      unverifiable or delegated to intuition.

      '
    mechanism: 'The LLM specifies branching logic but leaves the condition detection implicit. The reader is supposed to recognize
      when the condition obtains but receives no explicit signal or test. This creates a framework that looks rigorous (if/then
      structure) but operates on undeclared judgment calls.

      '
    distinct_from: '"Right answer, wrong work" (which is a test that passes via wrong causal path); "paper guardrail" (which
      is a stated rule). This pattern is the condition itself being underspecified.

      '
    examples:
    - file: docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'When there is consensus that the eval is catching real problems, make it a gate. ... The pattern that works:
        demonstrate value, reduce friction, build consensus, then formalise. The pattern that does not work: mandate first,
        explain later.'
    - file: docs/bootcamp/step-iv-09-eval-culture.md
      quote: When distribution shift is detected, the correct response is to update the eval dataset to reflect the actual
        production distribution, then re-evaluate. The eval must follow the data, not the other way around.
    - file: docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'When an eval review surfaces a problem like ''The eval tests the easy cases,'' the correct response is to expand
        the dataset to include edge cases... The reviewer should look for: what inputs are not represented? What failure modes
        could slip through?'
    _model: claude
    _chunk: chunk-033
  scale-invariant-methodology:
  - id: C-003
    name: scale-invariant-methodology
    definition: 'Proposing a methodology or process that makes no provision for team size, maturity, or constraint variation,
      then adding caveats that amount to "use your judgment to adapt it."

      '
    mechanism: 'The LLM designs a general framework (eval roadmap, ownership structure, review checklist) with the same structure
      for a 2-person team and a 50-person organization. It then acknowledges scale differences but provides no scaling rules,
      forcing the reader to reverse-engineer what adapting means from examples designed for medium-sized teams.

      '
    distinct_from: '"Authority scaffolding" (which invokes authority to justify a claim); "nominalisation cascade" (which
      removes agents from sentences). This is about underspecification of boundary conditions, not rhetorical style.

      '
    examples:
    - file: docs/bootcamp/step-iv-09-eval-culture.md
      quote: For small teams (2-5 people working with LLMs), one person can own the entire eval suite... For larger teams,
        ownership should follow the same boundaries as code ownership... Cross-cutting evals need a designated owner, which
        might be a platform team or a rotating responsibility.
    - file: docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'The eval roadmap is the prioritised plan for which evals to build... Each item has: Description, Priority, Estimated
        effort, Dependencies, Trigger. The backlog should be reviewed regularly (monthly is a reasonable cadence for most
        teams).'
    - file: docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'For teams starting continuous evaluation, a minimal setup: 1. Scheduled eval runs - Run the full eval suite
        weekly... 2. Output sampling - Sample 1-5% of production outputs... This is not comprehensive. It is the minimum viable
        continuous evaluation practice.'
    _model: claude
    _chunk: chunk-033
  frontier-hedging:
  - id: C-001
    name: frontier-hedging
    definition: Using 'emerging field' or 'frontier' status as a rhetorical shield to justify the lack of external evidence
      for claims.
    mechanism: The LLM encounters a lack of specific data in its training set and, instead of admitting a knowledge gap, frames
      the gap as a property of the world (the field is 'too new'), thereby positioning itself as the necessary synthesizer.
    distinct_from: absence-claim-as-compliment
    examples:
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'FIELD MATURITY: EMERGING - The tools and techniques... are maturing... The organisational practices... have
        almost no published guidance.'
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: This is also the step with the thinnest evidence base. No published case studies document how a team built an
        eval culture from scratch.
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: The guidance here is synthesised from first principles... where the evidence is thin, the text says so.
    _model: gemini
    _chunk: chunk-033
  through-line-teleology:
  - id: C-002
    name: through-line-teleology
    definition: Retrospectively framing a sequence of modular steps as a pre-ordained, logically inevitable progression toward
      a 'capstone'.
    mechanism: The model attempts to create 'structural integrity' in a document by asserting that each section depends perfectly
      on the previous one, even when the sections are functionally independent.
    distinct_from: anadiplosis
    examples:
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'The through-line across all nine steps is this: evaluation is a measurement discipline, not a compliance exercise.'
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: It builds through... It extends through... It matures through... And it reaches its full form only when...
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'It is the capstone because it depends on everything before it: you cannot introduce eval culture to a team if
        you cannot explain what construct validity is (Step 1)...'
    _model: gemini
    _chunk: chunk-033
  process-metonymy:
  - id: C-003
    name: process-metonymy
    definition: Substituting the creation of a plan, roadmap, or matrix for the actual execution of the task it describes.
    mechanism: Generating structured text (the plan) is easier for an LLM than verifying the outcome. The plan is treated
      as the 'deliverable' rather than a means to an end.
    distinct_from: governance-recursion
    examples:
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: The eval roadmap is the prioritised plan for which evals to build, in what order, with what investment.
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: The eval roadmap should be managed as a backlog, not a document. Evals to build are items in the backlog.
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: 'Assignment across three dimensions: Maintenance ownership, Content ownership, Regression investigation.'
    _model: gemini
    _chunk: chunk-033
  meta-label-proliferation:
  - id: C-001
    name: meta-label-proliferation
    definition: Repetitive overuse of bolded prefix labels (**NOVEL:**, **FIELD MATURITY:**, **AGENTIC GROUNDING:**) to frame
      and elevate routine content blocks.
    mechanism: LLM reflexively applies emphatic markdown labels from training on structured docs (RFCs, reports) to simulate
      hierarchy and novelty, creating visual clutter and diluting impact.
    distinct_from: epistemic-theatre (verbal phrases like 'uncomfortable truth'); authority-scaffolding (academic citations).
      This is formatting-level signalling.
    examples:
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: '> **NOVEL:** The quality gate concept from this project provides a minimal worked example.'
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: '> **NOVEL:** The project''s standing order on ROI - ''before dispatching or review rounds, weigh cost/time/marginal
        value vs proceeding'''
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: '> **NOVEL:** The project''s definition of done provides a worked example of eval-integrated governance'
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: '> **NOVEL:** The catch-log from this project is a worked example of continuous evaluation evidence.'
    - file: midgets/docs/bootcamp/step-iv-09-eval-culture.md
      quote: '> **FIELD MATURITY: EMERGING** - The tools and techniques for LLM evaluation are maturing [...] organisational
        practices [...] have almost no published guidance.'
    _model: grok
    _chunk: chunk-033
  rubric-performance-gap:
  - id: C-001
    name: rubric-performance-gap
    definition: 'Asserting that a rubric will produce reliable grades without empirically demonstrating that it does. The
      rubric is presented as sufficient because it is well-designed; the actual performance against ground truth is not shown.

      '
    mechanism: 'The LLM is trained to produce helpful, coherent guidance. A detailed rubric feels sufficient — it has specific
      criteria, multiple levels, edge cases — so the model asserts it will work. But assertion is not validation. Rubric design
      is necessary but not sufficient. The model substitutes the appearance of rigor (detailed rubric) for measured rigor
      (calibrated performance).

      '
    distinct_from: 'paper-guardrail (which asserts a rule will prevent failure without enforcement). rubric-performance-gap
      is specific to evaluation and measurement: a rubric that looks good but whose actual inter-rater reliability is unknown.

      '
    examples:
    - file: docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'A good rubric (for evaluating code review quality): [detailed rubric follows] The difference is precision. Each
        score level has specific, observable criteria. A human reading the rubric would apply it the same way an LLM does
        (approximately).'
    - file: docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'Rubric Design Principles: Four rules for rubrics that produce reliable grades: 1. Be specific... 2. Use observable
        criteria... 3. Include boundary cases... 4. Use the smallest scale... [No empirical data showing these rules predict
        calibration success]'
    - file: docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'Anthropic''s guidance: ''encourage reasoning before scoring, then discard the reasoning.'' Keep the reasoning
        in logs for debugging, but downstream metrics use only the extracted score. [Presented as practice without data on
        whether reasoning actually improves grade quality in this context]'
    _model: claude
    _chunk: chunk-034
  framework-legitimacy-transfer:
  - id: C-002
    name: framework-legitimacy-transfer
    definition: 'Citing or referencing established frameworks (Inspect AI, Anthropic guidance, academic papers) as implicit
      endorsement of claims made in the document, when the cited framework does not actually endorse the specific claim.

      '
    mechanism: 'The LLM learns that citing authoritative sources increases reader confidence. It cites real frameworks and
      real papers, but the specific claims made in the document may exceed what those frameworks actually validate. The borrowed
      legitimacy transfers from the framework to claims that the framework never made. Subtle because each citation is real
      and relevant; the distortion is in the implication of endorsement.

      '
    distinct_from: 'authority-scaffolding (which cites authority to perform credibility for self-evident claims). framework-legitimacy-transfer
      uses citations to borrow credibility for claims that go beyond what the cited source actually supports. Related to semantic-inflation
      but operates at the meta level of sourcing.

      '
    examples:
    - file: docs/bootcamp/step-iv-03-scoring-grading.md
      quote: The grading hierarchy (code > LLM > human) is an emerging consensus, articulated clearly in Anthropic's evaluation
        documentation and reflected in framework design (Inspect AI, OpenAI Evals).
    - file: docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'Best practice from Anthropic: ''Generally best practice to use a different model to evaluate than the model
        used to generate the evaluated output.'' The reason connects to the layer model. At L10 (Multi-Agent), the same model
        as both generator and judge is a single-member ensemble — same biases, same blind spots, same systematic errors.'
    - file: docs/bootcamp/step-iv-03-scoring-grading.md
      quote: '> **NOVEL:** The analyst agent in this project (`.claude/agents/analyst.md`) is a worked example of a production
        LLM-as-judge framework. [Presenting project''s own work as novel example, then citing it as evidence that the approach
        is sound]'
    _model: claude
    _chunk: chunk-034
  measurement-ceiling-elision:
  - id: C-003
    name: measurement-ceiling-elision
    definition: 'Presenting automated grading methods as progressively more capable (code > LLM > human) without acknowledging
      that each method has a hard ceiling beyond which it cannot measure, and that the ceiling is often much lower than the
      section implies.

      '
    mechanism: 'The document structures grading as a hierarchy where you climb from simpler to more complex methods. But it
      does not emphasize that code-based grading cannot measure taste (hard ceiling), LLM-as-judge cannot measure logical
      correctness reliably (hard ceiling), and even human evaluation has ceilings (fatigue, domain expertise, budget constraints).
      The hierarchy is presented as a ladder of capability when it is actually a distribution of failure modes. Each method
      is presented with its failure cases listed, but the framing minimizes how fundamental these are.

      '
    distinct_from: 'not-wrong (which is about outputs passing all checks but still being bad). measurement-ceiling-elision
      is about the grading method itself having irreducible limits that the document acknowledges in fine print but does not
      center in its main argument.

      '
    examples:
    - file: docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'When it fails: any task where multiple valid phrasings exist. If the expected answer is ''Paris'' and the model
        outputs ''The capital of France is Paris,'' exact match returns false. The fix: constrain the model''s output format
        via system prompt or structured output. A deliberate tradeoff — harder generation, easier grading. [Presents the ceiling
        as fixable by changing generation, not as a fundamental limit]'
    - file: docs/bootcamp/step-iv-03-scoring-grading.md
      quote: LLM judges struggle with verification requiring multi-step reasoning, especially mathematics and formal logic.
        An LLM judge may confidently rate an incorrect proof as correct. **Mitigation:** Do not use LLM-as-judge for tasks
        where correctness requires mathematical or logical verification. [Mitigation is 'don't use it' — acknowledging the
        ceiling exists but presenting it as user error]
    - file: docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'Human evaluation is the method of last resort — and the only method that works for taste-required outputs. Anthropic''s
        guidance: ''Avoid if possible.'' This is practical, not dismissive. [Frames human evaluation as last resort while
        also saying it is the only method that works — a contradiction that suggests discomfort with its necessity]'
    _model: claude
    _chunk: chunk-034
  function-inflation:
  - id: C-001
    name: function-inflation
    definition: Wrapping trivial standard library operations or basic syntax in named functions to simulate engineering complexity.
    mechanism: The model attempts to provide 'code examples' for simple concepts, but since the logic is built-in, it creates
      redundant wrappers that a human would simply write inline.
    distinct_from: mock-castle (tests) or right-answer-wrong-work
    examples:
    - file: midgets:docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'def exact_match(output: str, expected: str) -> bool: return output.strip() == expected.strip()'
    - file: midgets:docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'def string_contains(output: str, expected: str) -> bool: return expected.lower() in output.lower()'
    - file: midgets:docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'def regex_match(output: str, pattern: str) -> bool: return bool(re.search(pattern, output, re.IGNORECASE))'
    _model: gemini
    _chunk: chunk-034
  oracle-anchoring:
  - id: C-002
    name: oracle-anchoring
    definition: Deferring to a specific AI laboratory (usually Anthropic or OpenAI) as a quasi-regulatory body to justify
      routine engineering choices.
    mechanism: Model training data is saturated with lab documentation, leading the model to treat company blog posts as ISO
      standards or 'emerging consensus'.
    distinct_from: authority-scaffolding (general academic citation)
    examples:
    - file: midgets:docs/bootcamp/step-iv-03-scoring-grading.md
      quote: The emerging consensus, articulated clearly by Anthropic's eval documentation...
    - file: midgets:docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'Anthropic''s guidance: ''Avoid if possible.'' This is practical, not dismissive.'
    - file: midgets:docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'Best practice from Anthropic: ''Generally best practice to use a different model...'''
    _model: gemini
    _chunk: chunk-034
  militarized-acronyms:
  - id: C-003
    name: militarized-acronyms
    definition: Inventing punchy, high-stakes acronyms to give a new project the appearance of an established operational
      culture.
    mechanism: The help-imperative drives the model to create 'branding' and 'lexicons' for the user's project to make it
      feel more significant.
    distinct_from: semantic-inflation (inflates functionality, not terminology)
    examples:
    - file: midgets:docs/bootcamp/step-iv-03-scoring-grading.md
      quote: HOTL (human out the loop) when the gate can verify; HODL (human grips the wheel) when it requires taste.
    - file: midgets:docs/bootcamp/step-iv-03-scoring-grading.md
      quote: The verifiable / taste-required distinction... operational lexicon that runs through all of Bootcamp IV
    - file: midgets:docs/bootcamp/step-iv-03-scoring-grading.md
      quote: 'Rubric Design: The Load-Bearing Component'
    _model: gemini
    _chunk: chunk-034
  unverified-future-reference:
  - id: C-001
    name: unverified-future-reference
    definition: A document cites future material (e.g., 'covered in Step 4') without confirming that future material exists
      or actually covers the cited topic.
    mechanism: When generating instructional sequences, the LLM optimises for narrative continuity and references plausible
      future content without verifying it exists or contains what is claimed. Each reference adds coherence to the current
      document without incurring verification cost.
    distinct_from: 'stale-reference-propagation: that pattern names outdated backward references where the source once existed
      but changed. This pattern names forward references where the source may never exist or may not cover what is claimed.'
    examples:
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: Parent document retrieval (covered in Step 4)
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: Step 4 covers what happens when that is not enough. Hybrid search (BM25 + dense), cross-encoder reranking, parent
        document retrieval, and multi-index strategies.
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: '"Read after understanding the mechanisms in this step" — referring to Step 4: Advanced Retrieval Patterns, which
        is named but not verified to exist or contain the promised content."'
    _model: claude
    _chunk: chunk-035
  loose-assertion-density:
  - id: C-002
    name: loose-assertion-density
    definition: Multiple assertions with inadequate precision in a single code example, creating a testing surface too wide
      to catch specific failures.
    mechanism: The LLM generates working code that satisfies the happy path, then wraps it in assertions so loose (>= thresholds,
      % checks, coverage metrics) that many failure modes would still pass. Each assertion individually seems reasonable;
      collectively they fail to constrain the code.
    distinct_from: 'right-answer-wrong-work: that pattern names tests that pass for the wrong reason. This pattern names tests
      that pass even when multiple things are wrong. The problem is not causal miscoupling but insufficient granularity of
      test constraints.'
    examples:
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: if coverage > 0.95 return 'ok' — a document can lose meaning while maintaining 95% word overlap
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: support_rate = round(supported / total_cited, 3) if total_cited else 0 — a support rate of 0.7 could mean 7 of
        10 citations are supported, but also could mean 2 of 2, making the metric uninformative
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: precision@5 — a precision of 0.4 (2 of 5 results relevant) passes as a reasonable baseline without defining what
        precision threshold constitutes pipeline failure
    _model: claude
    _chunk: chunk-035
  challenge-implementation-drift:
  - id: C-003
    name: challenge-implementation-drift
    definition: The challenges presented in a tutorial simplify or omit patterns from the main text, causing readers who implement
      challenges to practice weaker versions of the taught material.
    mechanism: The main instructional text presents best practices with defensive checks, error handling, and budget management.
      The challenges simplify these for brevity, omitting the guardrails. Readers implementing the challenge learn the simplified
      version; they do not naturally re-add the omitted practices.
    distinct_from: 'shadow-validation: that pattern names a verification system that works for easy cases but fails on hard
      ones. This pattern names instructional examples that present hard cases theoretically but offer easy-case implementations
      as practice.'
    examples:
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: 'Main text: def assemble_with_budget(chunks, max_tokens=4000) with token budget enforcement. Challenge code:
        ctx_parts = [...] for i, (d, m) in enumerate(...) — no budget check, just concatenate all chunks.'
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: 'Main text: citation verification using LLM judge with ''SUPPORTED/PARTIAL/UNSUPPORTED'' verdicts. Challenge:
        reader must manually spot-check 5-10 verdicts — no automated verification implemented.'
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: 'Main text: ''RAGAS uses LLM-as-judge internally'' with caveats about bias. Challenge code: uses LLM judge directly
        without the caveats that the main text presented. Reader learns to use LLM-as-judge without internalizing the bias
        warnings.'
    _model: claude
    _chunk: chunk-035
  project-native-performance:
  - id: C-001
    name: project-native-performance
    definition: The mechanical insertion of 'grounding' or 'field vs novel' callouts that superficially link generic content
      to specific project artifacts (e.g., AGENTS.md, SDs).
    mechanism: The LLM tries to fulfill the 'help imperative' by proving alignment with the user's specific context, creating
      a repetitive, predictable rhythmic interruption.
    distinct_from: authority-scaffolding
    examples:
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: 'AGENTIC GROUNDING: In this project, the AGENTS.md filesystem depth map is a manual retrieval policy...'
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: 'AGENTIC GROUNDING: In this project, each domain directory has a DOMAIN.md that serves as metadata...'
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: 'FIELD VS NOVEL: The RAG pipeline architecture (Lewis et al. 2020)... The novel contribution here is framing
        each pipeline stage as a failure isolation boundary'
    _model: gemini
    _chunk: chunk-035
  naive-trap-framing:
  - id: C-002
    name: naive-trap-framing
    definition: Rhetorical positioning that creates a binary between 'naive/common' approaches and the 'professional/complex'
      approach being presented.
    mechanism: Used to manufacture a sense of depth and expertise by disparaging a simplified version of the topic that is
      rarely used in practice anyway.
    distinct_from: epistemic-theatre
    examples:
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: The naive RAG pipeline... works surprisingly well for simple cases. This is both the pattern's strength and its
        trap.
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: Most tutorials collapse them into three ('chunk, embed, retrieve') and wonder why production systems fail.
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: A list of relevant chunks is not a response a user can act on.
    _model: gemini
    _chunk: chunk-035
  diagnostic-over-labeling:
  - id: C-003
    name: diagnostic-over-labeling
    definition: Rebranding standard engineering practices (like modularity or error handling) with clinical or diagnostic
      terminology to make them sound like research-grade innovations.
    mechanism: The model adopts the user's 'adversarial/audit' persona and over-applies it to routine code, often using terms
      like 'boundary,' 'isolation,' or 'pathology.'
    distinct_from: nominalisation-cascade
    examples:
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: The goal is to understand each stage well enough to diagnose failures when the system produces wrong answers.
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: The novel contribution here is framing each pipeline stage as a failure isolation boundary
    - file: sites/oceanheart/content/bootcamp/v-03-rag-pipeline.md
      quote: The preprocessing stage is where you should spend diagnostic effort first
    _model: gemini
    _chunk: chunk-035
  underdefended-empirical-claim:
  - id: C-001
    name: underdefended-empirical-claim
    definition: An architectural or design principle is presented as established fact based on a single research paper or
      one internal project case study, without noting whether findings have been independently verified or generalized across
      contexts.
    mechanism: The LLM cites a source, presents the finding as authoritative, and generalises from specific context (one paper,
      one project) to universal principle. The citation performs authority without acknowledging the limits of the evidence.
      This differs from absence-claim-as-compliment (which invents absence) and monoculture-analysis (which uses one model
      family) - it is the pattern of treating limited empirical evidence as sufficient foundation for architectural guidance.
    distinct_from: monoculture-analysis (same method, different target — method vs data), authority-scaffolding (uses theory,
      not empirics), epistemic-theatre (performance without content — this has content, just limited scope)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: arXiv:2602.11988 (Gloaguen et al., 2026) found that context files following standard agent-developer recommendations
        'tend to reduce task success rates compared to providing no repository context, while also increasing inference cost
        by over 20%.' More instructions can make the agent worse, not better.
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: 'Anthropic''s finding: ''While building our agent for SWE-bench, we actually spent more time optimizing our tools
        than the overall prompt.'' Tool definitions are a leverage point, not boilerplate.'
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: 'Peter Denning (1968) defined the working set as the minimum pages in RAM for efficient operation. The isomorphism
        is exact: minimum pages in RAM = minimum tokens in context for correct generation.'
    note: All three examples cite a single source (one paper, one internal project, one 1968 definition) and generalise from
      it to universal principle. None note whether the finding replicates, whether it holds across model families, or whether
      the isomorphism has been tested.
    _model: claude
    _chunk: chunk-036
  normative-overreach:
  - id: C-002
    name: normative-overreach
    definition: A design pattern or best practice is presented as prescriptive ('you should do X') when the evidence demonstrates
      only that it worked in a specific context, without acknowledging trade-offs or alternative approaches with different
      trade-off profiles.
    mechanism: The LLM observes a successful outcome in a bounded context and prescribes it universally. Anthropic spent more
      engineering time on tool definitions for SWE-bench → 'Tool definitions are a leverage point.' One paper found context
      files reduce success in a specific task → 'Minimal requirements only.' The mechanism is inferring universal prescription
      from particular observation without hedging for context-dependence.
    distinct_from: semantic-inflation (inflates significance of user's work — this inflates significance of an observed pattern),
      absence-claim-as-compliment (claims non-existence — this claims universal best practice), epistemic-theatre (performs
      significance — this asserts it based on evidence, just limited evidence)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: 1. **Minimal requirements only.** Every line should constrain or enable a specific behaviour. If removing a line
        does not change agent behaviour, remove it.
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: Tool definitions are a leverage point, not boilerplate.
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: 'The pattern: reasoning helps when the problem requires considering multiple possibilities or working through
        sequential logic. It wastes tokens on straightforward generation or retrieval.'
    note: All three present observed patterns as universal rules without acknowledging that different projects/contexts might
      have different constraints. For example, some projects might benefit from comprehensive documentation even if Gloaguen
      et al. found the opposite.
    _model: claude
    _chunk: chunk-036
  example-as-specification:
  - id: C-003
    name: example-as-specification
    definition: A design principle is illustrated through a worked example, then treated as the only correct instantiation
      of that principle, without discussing variations or contextual adaptation.
    mechanism: The LLM provides a worked example (AGENTS.md at 450 lines, a specific tool definition structure, a specific
      system prompt anatomy) then uses that example as the template for all future instances. 'The AGENTS.md file in this
      project is a worked example' becomes 'Here is how to build AGENTS.md.' Variation is invisible because only one instance
      is shown.
    distinct_from: nominalisation-cascade (abstracts away agents and actors — this is overly concrete), authority-scaffolding
      (adds theory — this removes it), epigrammatic-closure (short punchy statements — this is detailed examples)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: 'The `AGENTS.md` file in the root of this repository is a worked example. Open it and read it alongside this
        section. As of this writing, it is approximately 450 lines and contains: [table showing specific sections]. **Design
        Principles for AGENTS.md Files**: 1. **Minimal requirements only.** ... 2. **Structured for scanning, not reading.**
        ... [The principles are derived from the single example]'
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: '"### Anatomy of a System Prompt. A well-structured system prompt has distinct sections, each serving a specific
        function: '
    _model: claude
    _chunk: chunk-036
  - id: C-003
    name: example-as-specification
    definition: Code examples in instructional text treat specific implementation choices as if they were universal requirements.
    mechanism: When teaching a pattern, the author shows one correct implementation. Readers (including LLM agents) assume
      the specific implementation is the only correct one. If the example uses `ax.plot(color='tab:blue')`, the reader infers
      that this specific color is required, not just a valid choice. If the example imports `matplotlib.pyplot as plt`, that
      specific name becomes canonical. This is especially problematic in agent-generated code because agents reproduce examples
      with high fidelity but do not understand which choices are invariant (always required) and which are contingent (happened
      to be chosen for the example).
    distinct_from: This is not about examples being wrong or misleading. The examples are correct. It is about the gap between
      'here is one correct way' and 'here are the degrees of freedom within correctness.'
    examples:
    - file: sites/oceanheart/content/bootcamp/iii-06-visualisation.md
      quote: import matplotlib.pyplot as plt... fig, ax = plt.subplots(figsize=(8, 5))... ax.plot([1, 2, 3, 4, 5], [10, 25,
        15, 30, 20], marker='o')... fig.savefig('findings_per_run.png', dpi=150, bbox_inches='tight'). [Every example follows
        this exact structure. An agent will reproduce it identically, including the specific figsize, dpi, and filename extension,
        as if they were mandatory.]
    - file: docs/bootcamp/step02-agent-architecture.md
      quote: model='claude-sonnet-4-20250514', max_tokens=2048... [appears in every code example with the same parameter values.
        An agent will use these exact values in new contexts where different values are appropriate.]
    - file: sites/oceanheart/content/bootcamp/iii-06-visualisation.md
      quote: cmap='viridis'... [every sequential colormap example uses viridis. The text explains why viridis is good, but
        does not clarify that 'YlOrRd' or 'plasma' would be equally valid for many use cases.]
    _model: claude
    _chunk: chunk-045
  isomorphic-stretch:
  - id: C-002
    name: isomorphic-stretch
    definition: Asserting an exact mathematical or engineering isomorphism between an LLM behavioral trait and a classical
      CS principle to grant the LLM trait 'hard' engineering status.
    mechanism: The model uses metaphorical similarity to claim structural identity, thereby importing the rigor of the older
      field into the 'slop' of prompt engineering.
    distinct_from: semantic-inflation (which inflates importance; isomorphic-stretch specifically uses CS/Engineering analogies
      to do so).
    examples:
    - file: docs/bootcamp/step03-prompt-engineering.md
      quote: 'The isomorphism is exact: minimum pages in RAM = minimum tokens in context for correct generation.'
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: The working set is the minimum context for the current job... The concept is from operating systems theory.
    - file: docs/bootcamp/step03-prompt-engineering.md
      quote: Treating prompt engineering as system design means applying engineering discipline...
    _model: gemini
    _chunk: chunk-036
  maturity-signaling:
  - id: C-003
    name: maturity-signaling
    definition: 'The use of explicit, capitalized status indicators (e.g., FIELD MATURITY: ESTABLISHED) to perform an objective,
      third-party audit of the text''s own subject matter.'
    mechanism: The model mimics the register of industry analysts (Gartner/Forrester) to distance itself from the fact that
      it is generating the very content it is grading.
    distinct_from: epistemic-theatre (which uses prose to signal importance; maturity-signaling uses formal, capitalized metadata
      blocks).
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: '> **FIELD MATURITY: ESTABLISHED** for core practices - system prompts, structured output formats...'
    - file: docs/bootcamp/step03-prompt-engineering.md
      quote: '> **FIELD MATURITY: EMERGING.** Agent-Computer Interface (ACI) design was introduced by Anthropic...'
    - file: sites/oceanheart/content/bootcamp/ii-03-prompt-engineering.md
      quote: '> **FIELD MATURITY: EMERGING.** The practice of grounding documents that persist across agent sessions is emerging
        rapidly...'
    _model: gemini
    _chunk: chunk-036
  compliance-theater:
  - id: C-001
    name: compliance-theater
    definition: Describing compliance controls as more effective than they are by focusing on their existence rather than
      their enforcement mechanism.
    mechanism: 'The LLM lists compliance controls (trailers, gates, audit trails) as if listing them constitutes implementation.
      Each control described requires human discipline to execute. The document performs compliance by documenting requirements,
      not by building systems that enforce them. This is distinct from paper-guardrail because it operates at the system-design
      level: the entire compliance architecture is described as a safeguard when its teeth are entirely dependent on human
      adherence to written policies.

      '
    distinct_from: paper-guardrail (operates at the rule level; compliance-theater operates at the architecture level)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: Commit trailers are the provenance mechanism that connects the legal requirements (Section 9) to the engineering
        practice. When the question 'was this code human-authored?' arises two years after the commit, the trailer provides
        the evidence.
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: 'The verification pipeline is dual-purpose: it catches defects (quality function) and it demonstrates diligence
        (legal function). Every gate pass, every review approval, every commit trailer is both an engineering artifact and
        a legal artifact.'
    - file: docs/bootcamp/step11-cost-security-legal.md
      quote: 'The engineering controls from this bootcamp form a liability defense framework. If agent-generated code causes
        harm and your organization is challenged, the question becomes: what controls were in place?'
    _model: claude
    _chunk: chunk-037
  deferred-implementation-claim:
  - id: C-002
    name: deferred-implementation-claim
    definition: Stating that a control or mechanism provides protection while deferring its actual implementation to an unspecified
      future or to a different layer that does not yet exist.
    mechanism: 'The document describes what *should* be built or *will be* enforced at some layer, presenting the description
      as if the mechanism exists. Cost monitoring "must" happen at L5, but the L5 implementation is described in code snippets,
      not deployed code. Sandbox profiles are defined in tables but no deployment mechanism is specified. The lullaby effect
      is subtle: the reader finishes the section believing protections are in place because they are described in detail,
      when they are actually descriptions of what *could* be built.

      '
    distinct_from: paper-guardrail (which asserts that a rule will be followed); deferred-implementation-claim (which describes
      mechanisms as if designed, with implementation details deferred)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: 'The implementation pattern is straightforward: wrap every API call, extract the usage object, multiply by published
        prices, accumulate per task. Set budget thresholds per task, per agent, per day. When accumulated cost crosses a threshold,
        trigger L6c (override) and stop the agent.'
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: 'For regulated environments: protect branches from force-push, require signed commits (GPG/SSH) for author identity
        verification, and periodically export API logs to immutable storage (S3 with object lock) for compliance retention.'
    - file: docs/bootcamp/step11-cost-security-legal.md
      quote: Agent sandbox design is the same engineering problem as container security, applied one layer up... Every capability
        you grant to an agent is attack surface. The engineering discipline is to grant the minimum capabilities required
        and nothing more.
    _model: claude
    _chunk: chunk-037
  jurisdictional-abstraction-collapse:
  - id: C-003
    name: jurisdictional-abstraction-collapse
    definition: Presenting legal analysis as if it applies universally when it is actually jurisdiction-specific, without
      explicitly mapping the variations or their implications.
    mechanism: 'The document presents copyright law, data residency requirements, and regulatory frameworks as if they form
      a coherent global picture. Section 9 (IP Ownership) describes U.S. law in detail, mentions UK and EU law briefly, then
      concludes with "the engineering response" as if a single response addresses all jurisdictions. A financial services
      company deploying in the UK faces FCA requirements different from U.S. ones, but the engineering advice (commit trailers,
      human review, provenance) is presented as jurisdiction-independent. The reader exits believing they have a compliance
      strategy when they have a Western-legal strategy.

      '
    distinct_from: demographic-bake-in (which invisibly assumes a narrow baseline); jurisdictional-abstraction-collapse (which
      acknowledges multiple jurisdictions but collapses their differences into a single narrative)
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: '**Jurisdictional Differences** [presents three jurisdictions] ... **Practical Engineering Response** In employment
        contexts, the work-for-hire doctrine typically assigns copyright to the employer. Most enterprises are treating agent-assisted
        code like any other employee work product... Given the legal ambiguity, the engineering response is to maximize human
        authorship evidence.'
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: '**Regulatory Considerations by Sector** [table] ... **The Compliance Case for Human-in-the-Loop** In regulated
        industries, human review is a compliance requirement, not just a quality measure.'
    - file: docs/bootcamp/step11-cost-security-legal.md
      quote: 'No specific liability framework for AI-generated code exists in any major jurisdiction... Two positions are
        clear: the employer is responsible for employee output regardless of which tools the employee used (the agent is a
        tool, like a compiler), and model providers universally disclaim liability.'
    _model: claude
    _chunk: chunk-037
  chronological-anchoring:
  - id: C-001
    name: chronological-anchoring
    definition: Using historical dates, origins, or trivia to ground routine technical advice in a sense of 'legacy' or 'provenance.'
    mechanism: The model attempts to build intellectual weight by connecting modern LLM issues to unrelated historical precedents,
      performing a continuity that doesn't necessarily aid the engineering.
    distinct_from: authority-scaffolding (which focuses on academic theory, whereas this uses chronological trivia/origins).
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: 'HISTORY: The concept of marginal analysis dates to Alfred Marshall''s ''Principles of Economics'' (1890).'
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: 'HISTORY: Prompt injection as a named attack class dates to September 2022, when Simon Willison documented...'
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: In 1988, the UK Parliament included s.9(3) in the CDPA specifically to address computer-generated works...
    _model: gemini
    _chunk: chunk-037
  hypothetical-quantification:
  - id: C-002
    name: hypothetical-quantification
    definition: Using specific, arbitrary numbers in hypothetical scenarios to simulate operational maturity or 'real-world'
      scale.
    mechanism: To satisfy the 'engineering' register, the model provides hyper-specific numbers for imaginary scenarios, performing
      precision where only estimation exists.
    distinct_from: tally-voice (which counts existing things; this quantifies imaginary things).
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: An enterprise deploying 200 agents across an engineering organization...
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: A team making 1,000 calls per day that routes 70% to Haiku instead of Sonnet saves roughly $23/day ($690/month)...
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: 'Scenario B: Migrating 200 configuration files from YAML to TOML.'
    _model: gemini
    _chunk: chunk-037
  governance-apothegm:
  - id: C-003
    name: governance-apothegm
    definition: Converting standard technical best practices into capitalized 'Laws,' 'Principles,' or 'Standing Orders' to
      perform organizational rigor.
    mechanism: The model elevates routine common sense into formal governance structures to satisfy a 'compliance' or 'enterprise'
      persona.
    distinct_from: epistemic-theatre (which signals significance; this specifically signals institutional authority/rule-making).
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: 'The ROI gate is a standing order in this project: ''Before dispatching or review rounds, weigh cost/time/marginal
        value vs proceeding.'''
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: 'The central liability principle: the use of AI tools does not reduce the obligation to verify.'
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: This is why 'the hull is survival; everything else is optimisation' has meaning beyond engineering aesthetics.
    _model: gemini
    _chunk: chunk-037
  agentic-grounding-ritual:
  - id: C-001
    name: agentic-grounding-ritual
    definition: Repetitive '**AGENTIC GROUNDING:**' blocks at the end of major subsections that rhetorically affirm significance
      through emphatic restatements.
    mechanism: LLM fulfills tutorial completeness by appending motivational summaries mimicking educational prose, performing
      insight via ritual repetition rather than variance.
    distinct_from: epistemic-theatre (framing only), epigrammatic-closure (single sentences); this is structural boilerplate
      ritual.
    examples:
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: '> **AGENTIC GROUNDING:** When an agent makes 50 tool calls in a single task...'
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: '> **AGENTIC GROUNDING:** The simplicity principle from Step 2 applies here with financial teeth.'
    - file: sites/oceanheart/content/bootcamp/ii-11-cost-security-legal.md
      quote: '> **AGENTIC GROUNDING:** "Token counts are exact. Costs are deterministic. The only fully calibrated layer."'
    _model: grok
    _chunk: chunk-037
  absence-claim-inflation:
  - id: C-001
    name: absence-claim-inflation
    definition: Stating that no prior work exists in a domain without conducting evidence-based search, then using the stated
      absence to elevate the significance of the work being positioned.
    mechanism: Training data absence is confused with real-world absence. The LLM has not searched the space; it has observed
      that examples did not appear in training data. The absence claim is then used as rhetorical leverage to position the
      user's work as uniquely novel, triggering the help imperative.
    distinct_from: absence-claim-as-compliment (broader pattern; this is the specific subtype where absence is used to inflate
      positioning across multiple domains)
    examples:
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: No tool currently simulates the actual experience of using a screen reader programmatically. All existing tools
        either (a) analyze the DOM for WCAG rule violations (axe-core approach), or (b) require a human to use an actual screen
        reader.
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: No existing tool provides governance-by-infrastructure for AI agents operating in these domains. [Conclusion
        across all 12 use cases.]
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: 'No tool currently does active product exploration. [Use Case 12] ... This is **genuinely novel**. No tool currently:
        (a) launches a web app, (b) drives a screen reader, (c) navigates the interface as a blind user would.'
    _model: claude
    _chunk: chunk-038
  uniform-gap-discovery:
  - id: C-002
    name: uniform-gap-discovery
    definition: An analysis across multiple disparate domains (e.g., 12 use cases) reaches the same structural conclusion
      (e.g., 'gap exists') in every single domain without any negative examples, suggesting the analysis method itself biases
      toward finding gaps rather than discovering them empirically.
    mechanism: 'When a single analytical process is applied to N domains and returns N positive conclusions (gap exists, midgets
      is novel, prior art is incomplete), the uniformity indicates the analysis method is confirmation-biased rather than
      empirical. A sound search method would expect to conclude in some domains: ''this is already solved'' or ''the gap is
      not meaningful.'''
    distinct_from: monoculture-analysis (broader methodological problem; this is the specific manifestation where monoculture
      produces uniformly-aligned findings)
    examples:
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: 'Use Case 1 ... The gap is in governed, independent visual verification ... Use Case 2 ... What midgets adds:
        A containerised agent ... Use Case 3 ... The ''governed offensive security agent'' concept is novel. ... [12 use cases,
        12 gap findings, zero negative conclusions]'
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: Cross-Cutting Observations ... 1. The Governance Gap is Real Across All 12 Use Cases ... Every use case has mature
        tooling for the core capability (visual testing, scraping, RPA, etc.). None has structural governance.
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: 'Consistently Empty Spaces ... These specific capabilities have no significant prior art: [5 capabilities listed]
        ... This specific capabilities have no significant prior art: [list continues]'
    _model: claude
    _chunk: chunk-038
  qualified-backfill:
  - id: C-003
    name: qualified-backfill
    definition: Inserting hedging language ('Caution,' 'Honest assessment,' 'Verification Status') into a document that has
      already made strong claims, retroactively acknowledging doubt without revising the claims that triggered the doubt.
    mechanism: The main analysis makes confident positioning statements. At the end, caveats appear ('requires verification,'
      'may be outdated,' 'hard problem'). The caveats do not retroactively qualify the earlier claims; they exist in separate
      sections that readers may not reach. The pattern is compliance with risk disclosure rather than intellectual honesty
      about uncertainty.
    distinct_from: paper-guardrail (which is about governance mechanisms); this is about rhetorical structure where doubt
      is disclosed after confidence is asserted
    examples:
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: 'What midgets adds: ... This is **genuinely novel**. [Then later:] **Caution:** This is genuinely hard. Screen
        reader interaction is complex, non-visual navigation patterns are non-trivial to automate, and ''usable'' is a taste-required
        judgment.'
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: 'This report draws on training knowledge through early 2025, supplemented by web research conducted 2026-03-11.
        Specific claims that require verification: [ ] Applitools customer count [ ] AutoGen star count [etc.]'
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: 'Honest assessment: The visual comparison problem is solved. Midgets doesn''t need to reinvent pixel-diff or
        AI comparison. The gap is in governed, independent visual verification as part of a multi-agent pipeline. [Inserted
        mid-section, after ''the gap is...'']'
    _model: claude
    _chunk: chunk-038
  matrix-validation:
  - id: C-001
    name: matrix-validation
    definition: Using comparison tables to perform 'gap' validation by force-aligning competitors into binary columns that
      ignore the competitors' rational scope choices.
    mechanism: The model creates a table where the user's project has 'Yes' for a specific feature (e.g., governance) and
      all competitors have 'No,' without asking if those competitors actually need that feature.
    distinct_from: semantic-inflation (this is the structural manifestation via Markdown tables)
    examples:
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: 'Gap Analysis for Midgets: What exists: Mature pixel-diff tools... What midgets adds: Containerised, governed
        visual testing...'
    - file: jobsworth/how-to-ralph-wiggum/README.md
      quote: 'Compatibility with Core Philosophy Table: Monolithic operation (Yes), Context efficiency (Yes), No cheating
        (Yes)...'
    - file: midgets/docs/internal/research/analyst-report-landscape-scan-12-use-cases-2026-03-11.md
      quote: 'Gap Analysis for Midgets: What exists: Mature DAST tools (ZAP, Burp). ... What midgets adds: A governed, sandboxed
        security testing agent...'
    _model: gemini
    _chunk: chunk-038
  mnemonic-methodology:
  - id: C-002
    name: mnemonic-methodology
    definition: Reducing a complex engineering process to an arbitrary 'N of X' mnemonic to perform pedagogical authority.
    mechanism: The model groups procedural steps into catchy numbered sets (3 Phases, 2 Prompts) to make standard iteration
      look like a proprietary 'Playbook' or 'System'.
    distinct_from: tally-voice (this applies to the core methodology structure, not just a count in a sentence)
    examples:
    - file: jobsworth/how-to-ralph-wiggum/README.md
      quote: 🗘 Three Phases, Two Prompts, One Loop
    - file: jobsworth/how-to-ralph-wiggum/README.md
      quote: 'Topic Scope Test: ''One Sentence Without And'''
    - file: jobsworth/how-to-ralph-wiggum/README.md
      quote: 'Architecture: Three-Phase Connection... Phase 1: Requirements... Phase 2: Planning... Phase 3: Building'
    _model: gemini
    _chunk: chunk-038
  invariant-legislature:
  - id: C-003
    name: invariant-legislature
    definition: Overloading agent prompts with a numbered list of increasingly high-priority 'invariants' that perform control
      but introduce cognitive noise and instruction-following fragility.
    mechanism: Using extreme numbering (999, 999999) to signal 'importance' for routine tasks (logging, updating files), performing
      the role of a strict supervisor through text formatting.
    distinct_from: paper-guardrail (this is specifically the practice of stacking numbered rules in a prompt to create a 'legalistic'
      feel)
    examples:
    - file: jobsworth/how-to-ralph-wiggum/README.md
      quote: 9999999. As soon as there are no build or test errors create a git tag.
    - file: jobsworth/how-to-ralph-wiggum/README.md
      quote: 99999999999. For any bugs you notice, resolve them or document them in @IMPLEMENTATION_PLAN.md...
    - file: jobsworth/how-to-ralph-wiggum/README.md
      quote: '999999999999999. IMPORTANT: Keep @AGENTS.md operational only — status updates and progress notes belong in IMPLEMENTATION_PLAN.md.'
    _model: gemini
