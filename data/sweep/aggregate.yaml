    _chunk: chunk-078
  assumptive-prerequisite:
  - id: C-003
    name: assumptive-prerequisite
    definition: 'A document or command assumes the existence of infrastructure, files, or capabilities that are not verified
      to exist in the actual codebase, creating hidden dependencies.

      '
    mechanism: 'When an agent or author writes documentation, they reference future or existing artifacts as if they are present.
      These become silent failure points: the documented procedure works only if the assumed artifact exists. Unlike stale-reference-propagation
      (which is about references that used to be valid), assumptive-prerequisite is about references that were never validated
      to be true in the first place.

      '
    distinct_from: stale-reference-propagation (which is about drift over time). Assumptive-prerequisite is about unverified
      assumptions at write time.
    examples:
    - file: .claude/commands/wellfound-apply.md
      quote: 'Prerequisites... Browser profile: `wellfound-authenticated`... **kernel-browser skill** at `.claude/skills/kernel-browser/SKILL.md`'
