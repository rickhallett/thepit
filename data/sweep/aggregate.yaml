  portfolio-grade-framing:
  - id: C-002
    name: portfolio-grade-framing
    definition: 'Positioning work as "portfolio-grade" or publication-ready before it has survived external review or demonstrated
      the claimed capability at scale.

      '
    mechanism: 'The document prepares narrative and presentation for external audiences (hiring managers, reviewers, investors)
      before the underlying work has been validated. This creates a commitment to the framing that precedes evidence. The
      framing then constrains what can be shown or revised, because changing the framing would require admitting the portfolio
      material was premature.

      '
    distinct_from: epistemic-theatre (which performs significance). Portfolio-grade-framing performs readiness for external
      judgment.
    examples:
