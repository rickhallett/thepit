  emphatic-directive-overload:
  - id: C-002
    name: emphatic-directive-overload
    definition: Overuse of bolded '**CRITICAL:**', '**WARNING:**', all-caps 'ALWAYS', and 'The Rule:' phrases to hammer every
      guideline, creating visual and tonal fatigue.
    mechanism: LLMs amplify imperative styles from training data (e.g., StackOverflow, bash man pages) to ensure rules 'stick',
      but apply to minor points, diluting emphasis.
    distinct_from: epigrammatic-closure
    examples:
    - file: midgets/sites/oceanheart/content/bootcamp/02-shell-language.md
      quote: '**The Rule** **Always double-quote variable expansions unless you specifically want word splitting.**'
