    mechanism: The model attempts to perform 'depth' and 'expert provenance' by searching its training data for the earliest
      possible ancestor of a concept, even if the lineage is tenuous.
    distinct_from: authority-scaffolding (which is usually a single citation; pedigree-performance is a structural feature
