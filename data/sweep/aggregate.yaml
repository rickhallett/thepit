      quote: '**AGENTIC GROUNDING:** `git write-tree` is how the project identifies builds.'
    - file: docs/bootcamp/07-git-internals.md
      quote: '**AGENTIC GROUNDING:** When you review an agent''s commit with `git show`'
    _model: grok
    _chunk: chunk-054
  pedagogical-confidence-mismatch:
  - id: C-001
    name: pedagogical-confidence-mismatch
    definition: Claims about learning outcomes or skill levels that lack evidence from actual completion or assessment.
    mechanism: 'The curriculum document makes assertions about what students will be able to do ("you should be able to answer
      these from memory") and what constitutes mastery ("the highest compositional leverage") without showing test data, completion
      rates, or learner feedback. The confidence is performative - stated with authority but not backed by evidence from actual
      pedagogy.

      '
    distinct_from: 'epistemic-theatre (which performs significance through framing) and not-wrong (which lacks grace rather
      than evidence). This is specifically the gap between stated learning outcomes and demonstrated learning validation.

      '
    examples:
    - file: midgets/docs/bootcamp/BOOTCAMP-III-OUTLINE.md
      quote: Each of these is a 2-6 hour investment that pays off for years.
      context: No data on actual time spent or payoff duration.
    - file: midgets/sites/oceanheart/content/bootcamp/01-process-model.md
      quote: 'Before moving to Step 2, you should be able to answer these from memory: 1. What is a process, structurally?
        2. Why does Unix split process creation into fork() and exec()?...'
      context: The 10 questions are posed as canonical learning objectives without assessment data. Are these tested? What
        is the pass rate? This reads like stated objectives, not validated ones.
    - file: midgets/docs/bootcamp/BOOTCAMP-III-OUTLINE.md
      quote: Return per hour - how much capability per unit of learning time?
      context: The ranking criteria reference 'return per hour' as a metric, but provide no empirical data on actual return-per-hour
        for any single topic.
    _model: claude
    _chunk: chunk-055
  context-inflation-through-history:
  - id: C-002
    name: context-inflation-through-history
    definition: Inserting historical anecdotes or etymology that seem to add legitimacy to a technical choice without changing
      the technical substance.
    mechanism: 'The document includes detailed historical narratives (Doug McIlroy''s 1964 memo on pipes, Ken Thompson implementing
      pipes in one night, the PDP-11''s 64-256 KB memory constraint) that are contextually interesting but do not affect how
      pipes actually work or how to use them. The history feels like authority scaffolding - it makes the explanation feel
      deeper and more grounded without adding technical content. A reader could skip all history and understand pipes identically.

      '
    distinct_from: 'authority-scaffolding (which cites external sources) and epigrammatic-closure (which uses short final
      sentences for effect). This is specifically the use of historical narrative to create a sense of depth and legitimacy
      without changing the technical information density.

      '
    examples:
    - file: midgets/sites/oceanheart/content/bootcamp/01-process-model.md
      quote: 'HISTORY: Doug McIlroy had been thinking about connecting programs together since 1964... Ken Thompson implemented
        them in a single night after McIlroy''s persistent advocacy. The next morning, the entire Unix group at Bell Labs
        rewrote their programs to use pipes. The PDP-11''s limited memory (typically 64-256 KB) made pipes practical rather
        than theoretical...'
      context: The history is vivid and real. But nowhere in the technical explanation does the historical narrative become
        necessary. Pipes could be explained identically without mentioning McIlroy, Thompson, the date, or the memory constraints.
    - file: midgets/sites/oceanheart/content/bootcamp/01-process-model.md
      quote: 'Why does stderr exist? It seems redundant if stdout already goes to the terminal. The answer becomes obvious
        the moment you pipe stdout somewhere: `sort bigfile > sorted.txt`. If `sort` encounters an error (e.g., disk full),
        where does the error message go?... stderr (fd 2) exists so that error messages can reach the human even when stdout
        is redirected. This was not in the original Unix - it was added to Version 6 Unix (1975) after practical experience
        showed it was necessary.'
      context: The 1975 date and the history of why stderr was added are interesting but not necessary to understand why stderr
        matters. The functional explanation works without the date.
    - file: midgets/sites/oceanheart/content/bootcamp/01-process-model.md
      quote: Before stderr, programs either wrote errors to stdout (corrupting pipelines) or opened `/dev/tty` directly (brittle
        and non-composable).
      context: This explains the problem that stderr solves, but the historical framing ('Before stderr... programs...') inflates
        the explanation with historical weight when the functional problem is sufficient.
    _model: claude
    _chunk: chunk-055
  preemptive-differentiation:
  - id: C-001
    name: preemptive-differentiation
    definition: Defining a subject primarily through what it is not (e.g., 'not academic', 'not decoration') to perform a
      specific 'operational' or 'pragmatic' identity.
    mechanism: The LLM attempts to avoid sounding like a generic encyclopedia by building a strawman ('academic proofs', 'decoration')
