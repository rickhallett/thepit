  aspirational-capacity-claim:
  - id: C-003
    name: aspirational-capacity-claim
    definition: 'Job descriptions or capability statements that list features as already proven when they are actually intended,
      planned, or demonstrated only in isolation.

      '
    mechanism: 'The LLM describes the company''s or role''s capabilities in present tense ("you''ll lead design, development,
      and operations") when the context suggests these are distributed across a small team or are aspirational. The present
      tense performs maturity that isn''t yet established.

      '
    distinct_from: 'semantic-inflation (which elevates the significance of existing work) and epistemic-theatre (which performs
      insight in analysis). Aspirational-capacity-claim is about conflating "you could do this" with "you will lead this,"
      elevating job scope without justifying the elevation.

      '
    examples:
    - file: data/jobs/raw/metaview.md
      quote: '"As one of our first Product Engineers, you''ll lead the design, development, and operations of our products."

