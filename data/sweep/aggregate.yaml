  framework-without-grounding:
  - id: C-001
    name: framework-without-grounding
    definition: 'A comprehensive explanatory framework presented with full pedagogical structure before being validated against
      real failure cases or independent verification.

      '
    mechanism: 'The LLM''s training optimizes for structured, coherent explanations. Building a complete framework with layers,
      definitions, and examples feels like progress and feels right. The framework is then presented as if it has been validated
      when validation is deferred or absent. The difference between "this is a useful model" and "I have proven this model
      works" is obscured by the confidence of the presentation.

      '
    distinct_from: '"Becoming Jonah" (recursive metacognition) because this is not recursive; it''s presentational. "Monoculture
      Analysis" because this specifically concerns frameworks rather than analysis. "Epistemic Theatre" because the theatre
      is in the structure, not in signalling phrases. "Not Wrong" because Not Wrong is about individual output quality; this
      is about architectural choices made at the scale of a full bootcamp step.

      '
    examples:
    - file: sites/oceanheart/content/bootcamp/v-08-debugging.md
      quote: The L0-L12 layer model is the primary diagnostic framework for this step... each failure type has a specific
        set of layers to investigate.
      explanation: 'The framework is presented as if proven ("primary diagnostic framework") but the document never shows
        a practitioner using it to diagnose a real failure. The examples in Sections 5 are hypothetical ("Try this..."). The
        challenge at the end asks students to classify traces using the framework, but does not show the framework in action
        first.

        '
    - file: sites/oceanheart/content/bootcamp/v-08-debugging.md
      quote: 'FIELD VS NOVEL: The OSI model provides a layered debugging framework for network protocols... No equivalent
        layered debugging model exists for LLM agent systems as of March 2026.'
      explanation: 'Acknowledges novelty but does not acknowledge that a novel framework requires validation. The comparison
        to OSI (which has been refined for 30+ years through countless real failures) and implicit claim to equivalence happens
        in the same section. The caveat "useful operational framework, not an industry standard" comes late, after the framework
        has been presented as authoritative.

        '
    - file: sites/oceanheart/content/bootcamp/v-08-debugging.md
      quote: By the end of this step, you will be able to diagnose agent failures systematically rather than guessing, classify
        failures into actionable categories, decide when to rerun versus when to fix, and apply layer-by-layer diagnosis to
        locate root causes.
      explanation: 'Learning outcome promises mastery via framework. The framework has never been validated. No evidence that
        applying L0-L12 diagnosis is better than alternative approaches. The promise assumes the framework''s efficacy rather
        than demonstrating it. A bootcamp step should show "here is how someone used this framework to fix a real agent failure"
        before promising that students will be able to do it.

        '
    _model: claude
    _chunk: chunk-004
  pedigree-performance:
  - id: C-001
    name: pedigree-performance
    definition: Forging an authoritative lineage by citing established engineering precedents to grant unearned legitimacy
      to novel LLM methodologies.
    mechanism: Borrowing social capital from stable fields (SRE, OSI) to mask the instability of probabilistic systems.
    distinct_from: authority-scaffolding
    examples:
    - file: sites/oceanheart/content/bootcamp/v-08-debugging.md
      quote: Post-mortem debugging from logs is well-established in SRE practice (Beyer et al., 2016).
    - file: sites/oceanheart/content/bootcamp/v-08-debugging.md
      quote: The OSI model (ISO 7498-1:1994) provides a layered debugging framework... The L0-L12 layer model fills this gap.
    - file: sites/oceanheart/content/bootcamp/v-08-debugging.md
