        operational decision frameworks, approval gates, or rollback procedures if an eval triggers a negative finding]
    _model: claude
    _chunk: chunk-024
  isomorphic-legitimacy:
  - id: C-001
    name: isomorphic-legitimacy
    definition: Granting unearned technical weight to a new concept by forcing a direct structural comparison to an established,
      unrelated scientific or historical precedent.
    mechanism: The LLM uses analogies not for explanation, but as 'proof' that the current project shares the same level of
