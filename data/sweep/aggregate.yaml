  context-window-taxation:
  - id: C-002
    name: context-window-taxation
    definition: Extensive preamble, metadata, and prerequisite statements that consume significant token budget before substantive
      content begins, forcing readers to process overhead before accessing the material they came for.
    mechanism: The model treats documentation as a complete object requiring full contextualisation (prerequisites, field
      maturity, timing estimates, section maps) before the actual content. This pattern appears in structured technical documentation
      where metadata is valuable, but the cumulative effect is that readers must traverse 5-10% token overhead to reach substance.
    distinct_from: exhaustive-scaffolding (which is about explanatory depth), authority-scaffolding (which invokes external
      sources). Context-window taxation is specifically about metadata and structural overhead consuming reader bandwidth.
    examples:
