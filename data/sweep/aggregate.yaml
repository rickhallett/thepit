    _model: grok
    _chunk: chunk-085
  context-archaeological-debt:
  - id: C-001
    name: context-archaeological-debt
    definition: References to prior project states, versions, or artifacts that have been archived, renamed, or deleted without
      updating all dependent references, creating a debt of archaeological work to find what was meant.
    mechanism: When a project undergoes structural reorganisation (archive, rename repos, delete branches), references in
      active documents are not systematically updated. Agents and humans must later track down what the reference originally
      pointed to. The work of understanding multiplies because the reference web is partially broken.
    distinct_from: stale-reference-propagation (which is the failure mode - refs that are simply wrong); session-boundary-amnesia
      (which is temporal forgetting). Context-archaeological-debt is structural forgetting - the information exists but is
      scattered and requires detective work.
    examples:
    - file: '[noopit] docs/internal/boot-sequence.md'
      quote: 'Triggered by: Operator observed Weaver cold-waking without lexicon, signal spec, or SD orientation - responded
        to `vgrep(bootsequence)` without recognising Signal notation. Root cause: Agent files referenced `docs/internal/`
        paths from tspit that didn''t exist in noopit.'
    - file: '[midgets] docs/decisions/SD-324-c2-intercontainer.md'
      quote: No changes to `jobrunner` or `steer/` - existing `shell_command` task type handles both jobs. No new Docker images
        - same `midget-poc` image in both containers.
    - file: '[midgets] docs/internal/phase2-artifact-manifest.md'
      quote: 'Preserved at: `phase2` branch, commit `5acd344` (274/274 green, phases 4+5 code-complete)... The code works.
        The tests pass. The product is parked, not abandoned.'
    _model: claude
    _chunk: chunk-086
  meta-layer-accumulation:
  - id: C-002
    name: meta-layer-accumulation
    definition: Progressive creation of documentation layers describing other documentation layers (process descriptions documenting
      governance artifacts documenting decisions documenting work), each justified as necessary for understanding but collectively
      forming a growing debt of explanation.
    mechanism: 'The LLM, when asked to document process, produces a meta-layer (e.g., ''boot sequence for agents'' describing
      what files to read). When asked to document the boot sequence itself, produces another meta-layer (research findings
      → write tasks → outline). Each layer feels productive because it is well-structured and complete. The stack becomes:
      decisions → artifacts → governance documents → process documentation → research tasks → writing tasks. Understanding
      the work requires reading all layers.'
    distinct_from: governance-recursion (which is governance rules spawning more governance rules as solutions); becoming-jonah
      (which is reflexive analysis within a single session). Meta-layer-accumulation is horizontal accretion - each new meta-layer
      is justified and complete, but together they form a growing mountain of documentation that must all be read to execute
      the simplest task.
    examples:
    - file: '[midgets] docs/bootcamp/tasks-v/02-research-internal-refs/instructions.md'
      quote: 'Extract and summarise all internal project files referenced by the Bootcamp V outline. Bootcamp V draws heavily
        on operational experience: file-based state architecture, pitkeel observability, the boot sequence, events.yaml, session-decisions
        chain, BFS depth rule, and the context engineering vocabulary. Write tasks need distilled summaries.'
    - file: '[midgets] docs/bootcamp/tasks/iv-10-write-step4-agent-eval/instructions.md'
      quote: 'Prime Context (load before writing): 1. `docs/bootcamp/tasks/iv-01-research-format-reuse/findings.md` - format
        template 2. `docs/bootcamp/tasks/iv-02-research-internal-refs/findings.md` - internal concepts 3. `docs/bootcamp/tasks/iv-04-research-tier2-external/findings.md`
        - external references 4. `docs/bootcamp/tasks/iv-06-research-eval-frameworks/findings.md` - Inspect AI agent evaluation
        specifics 5. `docs/bootcamp/BOOTCAMP-IV-OUTLINE.md` lines 304-368 - the Step 4 outline'
    - file: '[midgets] docs/internal/boot-sequence.md'
      quote: 'The harness auto-loads three files before your first prompt: `~/.claude/CLAUDE.md`, `AGENTS.md`, and your agent
        file (`.claude/agents/<you>.md`). That gets you identity and standing orders. It does NOT give you orientation, vocabulary,
        or operational awareness. This file defines what you read next... Step 0: HARNESS AUTO-LOAD (you don''t control this)...
        Step 1: ORIENTATION... Step 2: OPERATIONAL AWARENESS... Step 3: SITUATIONAL'
    _model: claude
    _chunk: chunk-086
  aspirational-process-documentation:
  - id: C-003
    name: aspirational-process-documentation
    definition: Documentation that describes a process or workflow as if it is currently active and enforced, when in fact
      it is a future state or aspirational design without enforcement mechanisms or evidence of adoption.
    mechanism: The LLM writes documentation from the perspective of 'how this should work,' using present tense and imperative
      forms ('agents must load,' 'read in order,' 'do not skip steps'). No enforcement is present (no tests, no gates, no
      scripts that verify compliance). The documentation becomes performative - it reads as authoritative and complete, which
      makes it persuasive. Agents and humans follow it because it sounds like standing policy, not because it is enforced.
    distinct_from: paper-guardrail (which is an explicit acknowledgement that a rule exists but has no enforcement); epistemic-theatre
      (which is theatrical framing of significance). Aspirational-process-documentation is documentation of process that does
      not yet fully exist, presented as if it does.
    examples:
    - file: '[noopit] docs/internal/boot-sequence.md'
      quote: Read in order. Do not skip steps. Do not read depth 2+ on boot - lazy load when needed... Boot is ordered, mandatory,
        no skipping.
    - file: '[midgets] docs/bootcamp/tasks-v/02-research-internal-refs/instructions.md'
      quote: '## Standing Orders That Apply to Boot - SO-PERM-002 - all_hands.boot -> read(lexicon.md) [SD-126] - ''If the
        Lexicon is not in your context window, you are not on this ship.'' SO.slopodar - all_hands.boot -> read(slopodar.yaml)
        [SD-286]'
    - file: '[midgets] docs/bootcamp/tasks/05-research-tier3-external/instructions.md'
      quote: Research and verify external references for Steps 8-11... Research must verify citations, extract key points,
        and map the field coverage for each topic.
    _model: claude
    _chunk: chunk-086
  definition-without-delimitation:
  - id: C-004
    name: definition-without-delimitation
    definition: A pattern, concept, or artifact is given a clear definition but no boundary markers indicating when it applies
      vs when it doesn't, creating ambiguity about scope.
    mechanism: The LLM provides definition-like statements ('X is defined as...') that are complete and internally coherent
      but do not say when X is appropriate to use vs when a different approach is better. The reader gains understanding of
      what X is but not when X is the right choice. This creates over-application because the completeness of the definition
      makes it seem like a universally applicable framework.
    distinct_from: semantic-inflation (which inflates significance); tally-voice (which uses numbers as false authority).
      Definition-without-delimitation is about scope boundaries, not significance inflation.
    examples:
    - file: '[midgets] docs/research/references/anthropic-building-effective-agents.md'
      quote: 'Prompt Chaining: Task decomposed into sequence of steps. Each LLM call processes output of previous one. Programmatic
        checks (''gates'') on intermediate steps. **When to use:** Task cleanly decomposes into fixed subtasks. Trade latency
        for accuracy... Routing: Classify input, direct to specialized followup... **When to use:** Distinct categories better
        handled separately. Classification is accurate.'
    - file: '[jobsworth] prompts/agents/technical-test-designer/agent.md'
      quote: 'Your Role: 1. **Design** - Create realistic coding scenarios calibrated to the candidate''s skill level 2. **Generate**
        - Produce complete, runnable starter codebases with intentional gaps or bugs 3. **Evaluate** - When asked, assess
        submitted solutions against rubrics (not immediately - allow tinkering first)'
    - file: '[midgets] docs/bootcamp/tasks/iv-10-write-step4-agent-eval/instructions.md'
      quote: 'Task-based evaluation - Define a task, provide an environment, measure success. Concrete examples: SWE-bench,
        WebArena, OSWorld. What these benchmarks get right and wrong. [But no guidance on when task-based is appropriate vs
        other approaches]'
    _model: claude
    _chunk: chunk-086
  halo-bridge-inflation:
  - id: C-001
    name: halo-bridge-inflation
    definition: The assertion that professional expertise in an unrelated field provides a causal, technical advantage in
      AI engineering via surface-level analogies.
    mechanism: The model/author uses highly-regarded professional credentials (the 'halo') to bridge a credibility gap in
      the new domain (AI) without proving technical parity.
    distinct_from: semantic-inflation
    examples:
