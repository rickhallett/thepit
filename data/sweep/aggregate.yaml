  recursive-self-description:
  - id: C-001
    name: recursive-self-description
    definition: A taxonomy or system that describes itself as an instance of the patterns it catalogs, creating unfalsifiable
      evidence for its own validity.
    mechanism: 'When a document systematically describes anti-patterns but itself exhibits those patterns, the document becomes
      immune to criticism through meta-level redefinition. Any objection to the document''s own slop becomes ''evidence of
      the pattern'' rather than contradiction. This is distinct from becoming-jonah because it''s not recursive thinking about
      work; it''s recursive containment where the map claims to describe the territory while being made of the same material
      as the territory.

      '
    distinct_from: becoming-jonah (which is about reflecting on reflections); monoculture-analysis (which is about lack of
      independent verification). This pattern is about self-referential evidence immunity.
    examples:
    - file: docs/internal/slopodar.yaml
      quote: Entries are added when caught in the wild. The patterns are hypotheses. If you recognise them in your own work,
        they replicate.
    - file: docs/internal/slopodar.yaml
      quote: v2 — Audited 2026-03-05. Slop purged from signal fields... Rewrites applied in plain register.
    - file: docs/internal/slopodar.yaml
      quote: Each entry has at least one concrete instance with provenance... Secondary tier separated from primary observations.
    _model: claude
    _chunk: chunk-050
  template-mimicry-at-scale:
  - id: C-002
    name: template-mimicry-at-scale
    definition: Multiple structurally distinct documents (job postings, prose, configuration) that are individually well-formed
      but collectively indistinguishable, suggesting generation from the same underlying template or decision tree.
    mechanism: 'When an LLM generates multiple artifacts across different domains (job descriptions from different companies,
      different hiring levels), the output follows high-probability token sequences that converge on the same cadence, vocabulary,
      and structure. Each artifact is defensible in isolation; the pattern only emerges in comparison. This is related to
      monoculture-analysis but operates at the surface level of generated prose rather than analytical methodology.

      '
    distinct_from: not-wrong (which flags individual artifacts as technically correct but characterless). Template-mimicry-at-scale
      is about the convergence of multiple artifacts toward indistinguishability.
    examples:
    - file: data/jobs/raw/trustpilot.md
      quote: You are an engineer with a high passion for learning... You are comfortable building Web Apps... You are collaborative
        and playful
    - file: data/jobs/raw/spotify.md
