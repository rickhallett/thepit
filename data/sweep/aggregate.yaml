        time]'
    - file: sites/oceanheart/content/bootcamp/iii-06-visualisation.md
      quote: 'Agents frequently generate redirections like 2>&1 without understanding the evaluation order... The agent tested
        it in a context where stderr was empty, so the error was invisible. [But does not explain how the reader would detect
        this error: checking logs? running the script with known-error inputs?]'
    _model: claude
    _chunk: chunk-045
