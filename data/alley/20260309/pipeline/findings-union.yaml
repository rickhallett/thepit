      slopodar: paper-guardrail
      line: 133-146
      description: |
        `validate_review` checks for `model`, `date`, and `branches`, but ignores `base_commit` which is required by the schema. Similarly, `validate_finding` strictly checks `watchdog` against a constant set, but does not validate the `slopodar` field against known patterns, allowing typos to corrupt downstream analytics.
      recommendation: |-
        Add `base_commit` to metadata validation loop, and add a `VALID_SLOPODAR` set to validate `slopodar` values.
    R3:
      id: F-004
      severity: low
      watchdog: WD-DC
      slopodar: paper-guardrail
      line: 129-168
      description: |
        validate_finding checks presence and enum membership but not data types or formats. Non-dict entries or non-string line values can pass and later break downstream tools. base_commit is required by spec but not validated.
      recommendation: |-
        Add type checks and format validation for fields (line, branch, file) and include base_commit in required metadata.
    R1:
      id: F-005
      severity: medium
      watchdog: WD-CB
      slopodar: paper-guardrail
      line: 130-146
      description: |
        validate_finding checks that required fields exist but does not validate their types. severity: 42, line: [1,2,3], or title: true (parsed as boolean by YAML) will pass validation or produce confusing warning messages. The watchdog field is validated against a set but only as string membership — a list value would produce a misleading warning. No ID format validation (F-NNN expected). No duplicate ID detection within or across reviews.
      recommendation: |-
        Add type checks: severity must be str, line must be str or int, id must match r'F-\d{3}'. Track seen IDs and warn on duplicates.
- title: Marginal value computed for single ordering only
  file: bin/triangulate
  severity: high
  found_by:
  - R1
  - R3
  convergence_count: 2
  match_confidence: 0.6389
  details:
    R1:
      id: F-003
      severity: high
      watchdog: WD-PG
      slopodar: phantom-ledger
      line: 294-308
      description: |
        The marginal value metric answers 'what does the Nth review add?' but only for the ordering determined by CLI argument position. The first review always gets credit for the most findings. With 3 reviews there are 6 possible orderings; the tool computes 1. The resulting line chart will show a declining curve that is partly an artifact of evaluation order, not a true measurement of diminishing returns. This is the most misleading metric in the tool.
      recommendation: |-
        Compute marginal value for all 6 permutations of review order. Report mean, min, max marginal value per model. This is 6x the work but the permutation count is trivially small.
    R3:
      id: F-002
      severity: medium
      watchdog: WD-PL
      slopodar: paper-guardrail
      line: 293-308
      description: |
        Marginal value is computed by iterating groups in their existing order, which depends on file read order and the greedy matcher. This makes the cumulative curve non-deterministic across equivalent inputs and biases the "value of the nth reviewer" interpretation.
      recommendation: |-
        Define and document a deterministic ordering for groups (e.g., sort by canonical_file/title) or compute marginal value across all permutations and report mean/variance.
- title: Seed-only similarity comparison produces false negatives
  file: bin/triangulate
  severity: critical
  found_by:
  - R1
  - R2
  convergence_count: 2
  match_confidence: 0.607
  details:
    R1:
      id: F-002
      severity: high
      watchdog: WD-PL
      slopodar: shadow-validation
      line: 224-226
      description: |
        The inner matching loop compares f_j against f_i (the seed) only. Two findings that are both similar to a third but dissimilar to each other will not be grouped. This is the primary failure mode of the matching algorithm: R1 says 'missing error handling', R2 says 'lacks try-catch blocks', R3 says 'no error handling'. R1-R3 match, R1-R2 might not, so R2 ends up as a separate single-model finding despite describing the same issue.
      recommendation: |-
        Compare candidates against all findings in the group (best-of-group score) rather than only the seed. Alternatively, use transitive closure: if A matches B and B matches C, group all three.
    R2:
      id: F-001
      severity: critical
      watchdog: WD-LRT
      slopodar: right-answer-wrong-work
      line: 348-350
      description: |
        In Metric 6, `severities_seen` uses `model_name` as the dictionary key. If multiple review files share the same `model` string (e.g., evaluating non-determinism across 3 runs of gpt-4), the severities will overwrite each other. This leads to artificially small sets and phantom agreement (`len(set(ordinals)) == 1`), hiding actual calibration disagreements.
      recommendation: Key `severities_seen` by `rid` (Review ID) instead of `model_name`.
