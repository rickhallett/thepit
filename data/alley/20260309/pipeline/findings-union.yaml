- title: Greedy matching is order-dependent and non-commutative
  file: bin/triangulate
  severity: high
  found_by:
  - R1
  - R3
  - R2
  convergence_count: 3
  match_confidence: 0.8232
  details:
    R1:
      id: F-001
      severity: high
      watchdog: WD-PL
      slopodar: shadow-validation
      line: 206-249
      description: |
        match_findings uses greedy first-come-first-served assignment. The iteration order depends on dict insertion order of the reviews argument, which depends on CLI argument position. Swapping R1 and R2 at the CLI can produce different convergence numbers. For a tool whose output feeds portfolio visualisations, non-deterministic results undermine defensibility. The algorithm also only compares candidates against the group seed, not all group members, producing false negatives when reviewers use different vocabulary for the same issue.
      recommendation: |-
        Compute similarity against best-in-group (not seed only). Run matching on all permutations of review order and report variance. If variance is zero, the matching is robust; if non-zero, report the range.
    R3:
      id: F-001
      severity: high
      watchdog: WD-PL
      slopodar: shadow-validation
      line: 202-248
      description: |
        match_findings uses a single-pass greedy clustering with SequenceMatcher. The first acceptable match absorbs a finding, preventing better later matches. This can collapse distinct findings into one group or split true duplicates, depending on the order of all_findings. Convergence metrics and marginal value then reflect matching artifacts rather than reviewer overlap.
      recommendation: |-
        Use a stable clustering strategy (e.g., pairwise scores + max-weight matching or hierarchical clustering) and record match confidence per group.
    R2:
      id: F-003
      severity: medium
      watchdog: WD-CB
      slopodar: none
      line: 223-228
      description: |
        The matching algorithm combines file similarity (0.3) and title similarity (0.7). If the file path matches exactly (score 1.0), the combined score is already 0.3. To cross the 0.6 threshold, the title only needs a 0.428 similarity. This means distinct bugs within the same file that have vaguely similar titles will be incorrectly merged into a single finding.
      recommendation: |-
        Increase the threshold to 0.75, or adjust the weights to demand higher title similarity when the file path is identical.
- title: Validation misses base_commit and slopodar enumerations
  file: bin/triangulate
