      line: 358-369
      description: |
        The FP rate metric defaults all findings to confirmed_true=total, confirmed_false=0, fp_rate=0.0. Downstream consumers will render this as '0% false positive rate' which implies empirical verification that has not occurred. This is a phantom ledger: the books show a clean audit trail that doesn't correspond to any actual audit.
