- title: No inter-rater reliability statistic (kappa)
  file: bin/triangulate
  severity: medium
  found_by:
  - R1
  convergence_count: 1
  match_confidence: null
  details:
    R1:
      id: F-006
      severity: medium
      watchdog: none
      slopodar: none
      line: 254-380
      description: |
        The tool computes severity agreement as a binary (agree/disagree) and max_delta. It does not compute Cohen's or Fleiss' kappa, which is the standard measure for inter-rater reliability. The portfolio audience (Anthropic red team, ML researchers) will expect this metric. Its absence signals either unfamiliarity with the standard or deliberate avoidance — neither is a good signal.
      recommendation: |-
        Implement ordinal-weighted Fleiss' kappa for severity ratings across converged findings. Even with small N, the metric demonstrates methodological awareness.
