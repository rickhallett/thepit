- title: Matching algorithm unvalidated — all quantitative claims depend on it
  file: bin/triangulate
  severity: critical
  found_by:
  - R1
  convergence_count: 1
  match_confidence: null
  details:
    R1:
      id: F-002
      severity: critical
      watchdog: WD-PG
      slopodar: shadow-validation
      line: n/a
      description: |
        The greedy SequenceMatcher-based matching is order-dependent, uses unvalidated weights (0.3/0.7) and threshold (0.6), and has no measured false match or missed match rate. Every downstream metric — convergence rate, unique finding count, marginal value curve — is a function of this matcher. An unvalidated instrument produces unvalidated measurements.
      recommendation: |-
        Switch to stable matching (Hungarian algorithm). Run sensitivity analysis on threshold [0.4-0.8]. Human-validate all 31 matches/non-matches.
