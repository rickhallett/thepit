      severity: critical
      watchdog: WD-PG
      slopodar: paper-guardrail
      line: n/a
      description: |
        The FP rate defaults all findings to confirmed true. This makes the precision chart and any quality claims invalid until independent human verification is completed.
      recommendation: Require human adjudication of every finding before reporting FP/precision.
- title: Human delta confounded by priming and residual effects
  file: docs/internal/weaver/darkcat-alley.md
  severity: high
  found_by:
  - R1
  - R3
  convergence_count: 2
  match_confidence: 0.6624
  details:
    R1:
      id: F-005
      severity: high
      watchdog: none
      slopodar: none
      line: n/a
      description: |
        DP-3 (Human Delta) measures what humans find AFTER seeing model findings on FIXED code. The human is primed by knowledge of model categories and operates on a different defect population (post-fix residuals). The counterfactual — what the human would find on raw code without model exposure — is not measured and cannot be recovered from this design.
      recommendation: |-
        Either add a blind human review arm (same raw diff, no model findings) or reframe DP-3 as 'human residual value after model review' with explicit acknowledgement of the priming confound.
    R3:
      id: F-007
      severity: high
      watchdog: WD-PG
      slopodar: shadow-validation
      line: n/a
      description: |
        Human review occurs after model outputs, priming the reviewer and inflating the apparent human delta. This measures residuals after models, not human capability.
      recommendation: Add blind human-first baseline with counterbalanced order.
