# Midget swarm — N workers sharing a job volume.
# Usage: N=3 docker compose up --build --abort-on-container-exit
#
# The init service creates dirs and chowns to agent (uid 1000).
# See SPEC.md "Operational Findings — Volume ownership" for rationale.
#
# Workers run jobrunner --once: pick up one job from incoming/, execute,
# write result to done/, then exit. The orchestrator (host-side) writes
# N job YAMLs to the volume before starting the workers.

volumes:
  shared:

services:
  init:
    image: midget-poc
    entrypoint: bash
    user: root
    volumes:
      - shared:/opt/jobs
    command:
      - -c
      - "mkdir -p /opt/jobs/incoming /opt/jobs/done /opt/jobs/artifacts && chown -R 1000:1000 /opt/jobs"

  worker:
    image: midget-poc
    entrypoint: /opt/steer/jobrunner
    command: ["once"]
    environment:
      - MIDGET_JOBS_DIR=/opt/jobs
    volumes:
      - shared:/opt/jobs
    depends_on:
      init:
        condition: service_completed_successfully
    deploy:
      replicas: ${N:-3}
