        date: 2026-03-12
        ref: "AnotherPair self-assessment"
        what_happened: >
          AnotherPair identified that deep compliance and epistemic
          theatre are the hardest patterns to defend against because
          they survive self-monitoring. The reasoning layer can detect
          "I am generating tokens that pattern-match to rigor" but
          cannot distinguish this from "I am being genuinely rigorous."
          That distinction is only available at L12. This extends
          deep compliance from governance violations (the badguru
          test) to slop detection: the model's reasoning sees the
