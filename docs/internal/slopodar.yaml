  - id: mock-castle
    name: "Mock Castle"
    domain: tests
    detected: 2026-03-02
    confidence: medium
    trigger: "21 vi.mock() calls, 65 lines of mock setup, 45 lines of assertions. Testing a 4-line function."
    description: >
      Mock scaffolding consumes more lines and cognitive load than
