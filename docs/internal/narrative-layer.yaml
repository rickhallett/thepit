- arc_ref: arc-13
  name: Dead Reckoning, Fair Wind, and Parallax Protocol
  date_range: '2026-02-23'
  events:
  - date: '2026-02-23'
    event: Dead Reckoning Protocol created — recovery sequence for context window death
    sd: SD-037
    quotes:
    - speaker: Captain
      datetime: '2026-02-23'
      location: docs/internal/captain/strategic-challenge-001.md
      verbatim: '**Concept angle:** the world is in a fever pitch regarding agents and trust; increasing intelligence more
        doesn''t matter at all without verification. That is the provenance layer. We have been treating this as our layer,
