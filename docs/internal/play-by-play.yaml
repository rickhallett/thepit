# play-by-play.yaml — Chronological timeline of The Pit project
# Compiled: 2026-03-02
# Sources: decisions.json (277 SDs), git log (600+ commits), PR history (416 PRs),
#          slopodar.yaml (16 entries), lexicon.md (v0.1–v0.17), paths-forward.yaml
# Purpose: Raw material for a narrative piece on human-LLM collaboration
# Format: Each entry has date, optional SD, event, and significance.
# Arcs group naturally themed clusters of decisions and commits.

arcs:

  # ============================================================================
  # ARC 0: GENESIS — The sandbox, the port, the first day
  # ============================================================================
  - id: arc-0
    name: "Genesis — Prior Work and Fresh Start"
    date_range: "before 2026-02-07"
    summary: >
      The project existed in an earlier form as an "agentic sandbox." The Captain
      decided to start over with a clean repo, porting only what survived scrutiny.

    events:
      - date: "~2026-01-25"
        event: "API token consumption begins (earliest week in billing data)"
        significance: "The Captain starts spending his own money on Anthropic API calls while between jobs."

      - date: "2026-02-07"
        event: "First commit: 'init: port over prior work from agentic sandbox and start over..'"
        significance: "The Pit begins. Everything before this is prehistory. The trailing dots in the commit message are the Captain's."

  # ============================================================================
  # ARC 1: THE FIRST DAY — Building the product at machine speed
  # ============================================================================
  - id: arc-1
    name: "The First Day — Feature Explosion"
    date_range: "2026-02-07"
    summary: >
      In a single day, the entire product skeleton is built: credit system, multi-model
      AI support, bout engine, auth, on-chain attestations, landing page, arena, research
      page, presets, sharing, reactions, voting, leaderboard, and admin tools. 30+ commits.

    events:
      - date: "2026-02-07"
        event: "Credit system schema, multi-model support, bout engine integration, UI primitives"
        significance: "The core product — AI agents debating — goes from zero to functional in hours."

      - date: "2026-02-07"
        event: "On-chain DNA attestations via EAS (Ethereum Attestation Service)"
        significance: "The provenance layer appears on day one. It will be questioned, pivoted, and ultimately assessed as 'blockchain theatre' (SD-250) 3 weeks later."

      - date: "2026-02-07"
        event: "Landing page, arena, research, roadmap, contact pages, HAL preset agent"
        significance: "Full site structure in place within 14 hours of first commit."

      - date: "2026-02-07"
        event: "User credits, intro pool, referrals, share/replay, reactions, voting, Stripe checkout, arena builder, leaderboard"
        significance: "Every major feature vertical scaffolded. The speed is agentic — no human types this fast."

  # ============================================================================
  # ARC 2: THE BIG MERGE — Integration and hardening
  # ============================================================================
  - id: arc-2
    name: "The Big Merge — Integration Week"
    date_range: "2026-02-08 to 2026-02-10"
    summary: >
      14 feature branches merged into a single integration branch. First test harness.
      First security hardening pass. The product goes from scaffolding to something
      that could theoretically be deployed.

    events:
      - date: "2026-02-08"
        event: "14-branch merge into integration/merge-2026-02-08"
        significance: "First large-scale integration. No merge conflicts because the branches were all created the same day."

      - date: "2026-02-08"
        event: "Unit test harness added, typecheck regressions fixed"
        significance: "The hull gets its first integrity check. Tests exist."

      - date: "2026-02-08"
        event: "Security hardening: atomic credit preauth, auth for agent creation, rate limiting, idempotency, timing oracle fix"
        significance: "PR #52 — the first systematic security pass. Pattern: build fast, harden immediately."

      - date: "2026-02-09"
        event: "Roadmap redesign, agent clone/remix, homepage polish, README upgrade"
        significance: "PRs #53–#57. The product starts looking like a product."

      - date: "2026-02-09"
        event: "Security hardening round 2: pricing margin fix, webhook credit bug, fictional tiers replaced"
        significance: "PRs #58–#60. Reality corrections — replacing aspirational copy with what actually exists."

      - date: "2026-02-10"
        event: "Launch prep: license, ToS, disclaimer, EAS messaging, admin moderation, rate limits, Ask The Pit, Stripe setup"
        significance: "PR #61. First attempt at launch readiness. The project thinks it's almost ready. It is not."

  # ============================================================================
  # ARC 3: SUBSCRIPTION MODEL AND TOOLCHAIN — Building the business layer
  # ============================================================================
