    events:
      - date: "2026-02-10"
        event: "Subscription tier schema, Stripe checkout, billing portal, webhook handlers (PR #63)"
        significance: "The business model gets real infrastructure. Drizzle migration, Stripe webhooks, tier gating."

      - date: "2026-02-10"
        event: "pitctl scaffolded — first Go CLI tool for site administration (PR #66)"
        significance: "The pit* CLI family begins. Go chosen for resonance with the project's engineering values."

      - date: "2026-02-11"
        event: "5 testing PRs merged (#67–#71): webhooks, tier access, user lifecycle, features, complex queries"
        significance: "First systematic test coverage push."

      - date: "2026-02-11"
        event: "5 QA PRs merged (#72–#76): agent actions, bout engine, credit economy, admin utils, interactions"
        significance: "Second testing wave. Total test count starts climbing toward 700+."

      - date: "2026-02-11"
        event: "Release readiness review document created"
        significance: "First formal assessment of ship-readiness. Many gaps identified."

      - date: "2026-02-11"
        event: "Critical security fixes: admin auth, timing-safe comparison (PR #77)"
        significance: "First CRITICAL security finding and immediate fix."

      - date: "2026-02-11"
        event: "Security hardening rounds: HIGH (PR #78), MEDIUM (PR #79)"
        significance: "Systematic security work. Headers, deduplication, validation, path traversal guards."

      - date: "2026-02-12"
        event: "Code quality and hygiene PRs (#80–#82)"
        significance: "Lint cleanup, constant extraction, docs sync. The project starts caring about craft."

