coverage_map:
  claims_vs_evidence: E1
  test_oracle_and_coverage: E2
  reliability_and_recovery: E2
  security_and_abuse: E2
  observability_and_diagnostics: E1
  data_integrity: E2
  operational_readiness: E0
  product_and_user_risk: E2
evidence_from_tests:
  test_oracle_and_coverage:
    - Input validation and error path coverage for APIs (invalid JSON, missing fields).
    - Idempotency and retry behavior for bouts, short links, and votes.
    - Experiment config validation for API v1 with research key gating.
  reliability_and_recovery:
    - Streaming error handling with status updates and share-line failure tolerance.
    - Credit preauth, settlement, refund, and intro pool refund logic on failure.
    - Stripe webhook edge cases and idempotent grant handling.
  security_and_abuse:
    - Auth gates for admin actions, BYOK, feature requests, votes, and seed endpoints.
    - Rate limit responses include headers and error codes.
    - UNSAFE_PATTERN checks for URL/script payloads in user input.
  observability_and_diagnostics:
    - Rate limit headers verified for reactions endpoint.
    - Error messaging mapped to descriptive user-facing strings.
  data_integrity:
    - OnConflictDoNothing usage for duplicate submissions and votes.
    - Race handling for short-link creation.
    - Credit transaction idempotency for Stripe events.
  product_and_user_risk:
    - Clear error messages for retries, missing data, and premium access denials.
    - Demo mode handling for unauthenticated user flow.
gaps:
  - category: observability_and_diagnostics
    issue: No direct evidence of metrics, tracing, or log correlation beyond unit assertions.
    evidence: E1
    severity: S2
  - category: operational_readiness
    issue: No evidence provided for SLOs, load testing, or rollback procedures.
    evidence: E0
    severity: S3
follow_ups:
  - Request tests or runbooks that validate security and privacy controls.
  - Provide evidence for test oracle correctness and critical path coverage.
  - Provide operational artifacts: SLOs, metrics dashboards, load test results.
  - Reconcile public counts for session decisions and agent count across sources.
